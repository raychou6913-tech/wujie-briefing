<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>📊 管理儀表板 — 蕪解</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:48px}
.topbar{background:#1e293b;border-bottom:1px solid #334155;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.topbar-title{font-size:18px;font-weight:700;color:#f1f5f9;letter-spacing:.5px}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn-sm{padding:6px 14px;border-radius:8px;text-decoration:none;font-size:12px;font-weight:600;border:none;cursor:pointer}
.wrap{max-width:1200px;margin:0 auto;padding:0 20px}
/* KPI 卡 */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;padding:20px 24px}
.kpi{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:18px 20px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--c)}
.kpi-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.kpi-value{font-size:28px;font-weight:700;color:#f1f5f9;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:12px;color:#94a3b8;margin-top:4px}
/* VAM 進度條 */
.vam-section{margin:0 24px 20px;background:#1e293b;border:1px solid #334155;border-radius:16px;padding:20px 24px}
.vam-title{font-size:14px;font-weight:700;color:#f1f5f9;margin-bottom:14px}
.vam-bar-bg{background:#0f172a;border-radius:8px;height:16px;overflow:hidden;margin:8px 0}
.vam-bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#10b981,#6ee7b7);transition:width 1s ease}
.vam-nums{display:flex;justify-content:space-between;font-size:12px;margin-top:6px}
/* 區塊 */
.section{margin:0 24px 20px;background:#1e293b;border:1px solid #334155;border-radius:16px;overflow:hidden}
.section-hdr{padding:14px 20px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center}
.section-title{font-size:14px;font-weight:700;color:#f1f5f9}
.section-link{font-size:12px;color:#6366f1;text-decoration:none}
.section-body{padding:20px}
.dt{width:100%;border-collapse:collapse;font-size:13px}
.dt th{background:#0f172a;color:#94a3b8;font-size:11px;font-weight:600;padding:8px 12px;text-align:left;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.dt td{padding:9px 12px;border-bottom:1px solid #0f172a30;vertical-align:middle}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:#0f172a33}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700}
.proj-row-bar{height:6px;border-radius:3px;margin-top:4px}
.loc-pill{font-size:10px;padding:1px 7px;border-radius:10px;background:#334155;color:#94a3b8}
/* 損益明細 grid */
.pl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.pl-card{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:14px 16px}
.pl-label{font-size:11px;color:#64748b;margin-bottom:6px}
.pl-num{font-size:20px;font-weight:700}
.loading-msg{text-align:center;color:#64748b;padding:40px;font-size:14px}
@media(max-width:600px){.kpi-grid{grid-template-columns:1fr 1fr}.section{margin:0 12px 16px}.kpi-grid{padding:12px}}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar-title">📊 管理儀表板</div>
    <div style="font-size:12px;color:#64748b;margin-top:2px" id="refresh-time">資料載入中...</div>
  </div>
  <div class="topbar-actions">
    <button class="btn-sm" style="background:#334155;color:#94a3b8" onclick="loadAll()">↻ 重新整理</button>
    <a href="home.html" class="btn-sm" style="background:#6366f1;color:#fff">← 首頁</a>
  </div>
</div>

<!-- KPI 卡 -->
<div class="kpi-grid">
  <div class="kpi" style="--c:#10b981">
    <div class="kpi-label">全年預計淨利</div>
    <div class="kpi-value" id="kpi-net">—</div>
    <div class="kpi-sub" id="kpi-net-sub">讀取中...</div>
  </div>
  <div class="kpi" style="--c:#6366f1">
    <div class="kpi-label">全年預計毛利</div>
    <div class="kpi-value" id="kpi-gross">—</div>
    <div class="kpi-sub" id="kpi-gross-sub">收入 − 直接成本</div>
  </div>
  <div class="kpi" style="--c:#f97316">
    <div class="kpi-label">固定成本合計</div>
    <div class="kpi-value" id="kpi-overhead">—</div>
    <div class="kpi-sub">薪資 / 租金 / 運營</div>
  </div>
  <div class="kpi" style="--c:#f59e0b">
    <div class="kpi-label">對賭完成度</div>
    <div class="kpi-value" id="kpi-vam-pct">—</div>
    <div class="kpi-sub">目標 ¥8,000,000</div>
  </div>
  <div class="kpi" style="--c:#8b5cf6">
    <div class="kpi-label">進行中項目</div>
    <div class="kpi-value" id="kpi-proj">—</div>
    <div class="kpi-sub" id="kpi-proj-sub">批發 / 快閃店</div>
  </div>
  <div class="kpi" style="--c:#06b6d4">
    <div class="kpi-label">快閃店本月流水</div>
    <div class="kpi-value" id="kpi-daily">—</div>
    <div class="kpi-sub" id="kpi-daily-sub">當月累計</div>
  </div>
</div>

<!-- VAM 進度條 -->
<div class="vam-section">
  <div class="vam-title">🏦 對賭淨利進度 — 目標 ¥8,000,000</div>
  <div class="vam-bar-bg"><div class="vam-bar-fill" id="vam-bar" style="width:0%"></div></div>
  <div class="vam-nums">
    <span id="vam-current" style="color:#10b981;font-weight:700">¥0</span>
    <span style="color:#64748b">目標 ¥8,000,000</span>
  </div>
  <div id="vam-breakdown" style="margin-top:12px;font-size:12px;color:#64748b"></div>
</div>

<!-- 損益分解 -->
<div class="section">
  <div class="section-hdr">
    <span class="section-title">📊 損益分解</span>
    <span style="font-size:11px;color:#475569">預算表數據 + 費用實報</span>
  </div>
  <div class="section-body">
    <div class="pl-grid" id="pl-grid"><div class="loading-msg">載入中...</div></div>
  </div>
</div>

<!-- 各項目盈虧 -->
<div class="section">
  <div class="section-hdr">
    <span class="section-title">📋 各項目收支一覽</span>
    <a href="forms/view_budget_summary.html" class="section-link">查看預算詳情 ›</a>
  </div>
  <div class="section-body" style="padding:0">
    <div style="overflow-x:auto" id="proj-table-wrap"><div class="loading-msg">載入中...</div></div>
  </div>
</div>

<!-- 快閃店流水 -->
<div class="section">
  <div class="section-hdr">
    <span class="section-title">🏪 快閃店本月日流水</span>
    <a href="forms/view_daily_sales.html" class="section-link">查看全部 ›</a>
  </div>
  <div class="section-body" style="padding:0">
    <div style="overflow-x:auto" id="daily-table-wrap"><div class="loading-msg">載入中...</div></div>
  </div>
</div>

<!-- 今日出勤 -->
<div class="section">
  <div class="section-hdr">
    <span class="section-title">✅ 今日登入紀錄</span>
    <span id="att-date-lbl" style="font-size:12px;color:#64748b"></span>
  </div>
  <div class="section-body" id="att-body"><div class="loading-msg">載入中...</div></div>
</div>

<script>
const _P="https://feishu-proxy.raychou6913.workers.dev";
const _AT="YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _BT="tblteo2QEO0jP8j9";
const _ET="tblu2NkqBWyBSskG";
const _DT="tblz7zvgbzOqknzm";
const _VL="tblUzRSQgKLhlttk";
const _PROJ="tblYBjAlemYPuNGy";
const VAM_TARGET=8000000;
const OVERHEAD_PROJ="全公司固定成本";

function _fv(f,k){
  const v=f[k];
  if(!v&&v!==0) return "";
  if(typeof v==="number") return String(v);
  if(Array.isArray(v)) return v.map(x=>typeof x==="object"?(x.text||x.name||x.link||""):String(x)).join("");
  if(typeof v==="object") return v.text||v.link||v.name||"";
  return String(v);
}
function _num(s){const n=parseFloat(s);return isNaN(n)?0:n;}
function _fmt(n,dec=0){
  if(Math.abs(n)>=1000000) return (n/1000000).toFixed(1)+"M";
  if(Math.abs(n)>=1000) return (n/1000).toFixed(0)+"K";
  return n.toFixed(dec);
}
function _fmtFull(n){return n.toLocaleString("zh-TW",{maximumFractionDigits:0});}

async function _token(){
  const r=await fetch(_P+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
  const d=await r.json();
  if(d.code!==0) throw new Error("token fail");
  return d.tenant_access_token;
}
async function _all(tk,tbl){
  let items=[],cursor="";
  do{
    const url=_P+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+tbl+"/records?page_size=100"+(cursor?"&page_token="+cursor:"");
    const res=await fetch(url,{headers:{"Authorization":"Bearer "+tk}});
    const d=await res.json();
    items=items.concat(d.data?.items||[]);
    cursor=d.data?.has_more?d.data.page_token:"";
  }while(cursor);
  return items;
}

async function loadAll(){
  try{
    document.getElementById("refresh-time").textContent="資料載入中...";
    const tk=await _token();
    const [budgets,expenses,dailys,projects]=await Promise.all([
      _all(tk,_BT),_all(tk,_ET),_all(tk,_DT),_all(tk,_PROJ)
    ]);

    // ── 預算彙整 ─────────────────────────────────────────────────
    let totalIncome=0, totalDirectCost=0;
    const projMap={};  // projName → {income, cost, type, loc}
    budgets.forEach(i=>{
      const f=i.fields||{};
      const proj=_fv(f,"項目關聯");
      const nature=_fv(f,"性質");   // 收入 or 支出
      const amt=_num(_fv(f,"金額合計")||_fv(f,"金額")||"0");
      if(!proj) return;
      if(!projMap[proj]) projMap[proj]={income:0,cost:0,type:"",loc:""};
      if(nature==="收入"){ totalIncome+=amt; projMap[proj].income+=amt; }
      else { totalDirectCost+=amt; projMap[proj].cost+=amt; }
    });
    // 補項目類型
    projects.forEach(i=>{
      const f=i.fields||{};
      const name=_fv(f,"項目名稱")||_fv(f,"案件／產品名稱")||_fv(f,"名稱");
      if(projMap[name]){
        projMap[name].type=_fv(f,"業務類型")||"";
        projMap[name].loc=_fv(f,"所在地")||"";
      }
    });

    const grossProfit=totalIncome-totalDirectCost;

    // ── 費用彙整（固定成本 vs 項目費用）──────────────────────────
    let overhead=0, projectExpense=0;
    const overheadByType={};
    expenses.forEach(i=>{
      const f=i.fields||{};
      const proj=_fv(f,"關聯項目")||_fv(f,"項目關聯");
      const amt=_num(_fv(f,"實際金額")||_fv(f,"金額")||"0");
      const cat=_fv(f,"費用類別");
      if(proj===OVERHEAD_PROJ||!proj){
        overhead+=amt;
        overheadByType[cat]=(overheadByType[cat]||0)+amt;
      } else {
        projectExpense+=amt;
      }
    });

    const netProfit=grossProfit-overhead;
    const vamPct=Math.min(150,Math.round(netProfit/VAM_TARGET*100));

    // ── KPI ──────────────────────────────────────────────────────
    document.getElementById("kpi-net").textContent="¥"+_fmt(netProfit);
    document.getElementById("kpi-net").style.color=netProfit>=VAM_TARGET?"#10b981":netProfit>=0?"#f59e0b":"#ef4444";
    document.getElementById("kpi-net-sub").textContent=netProfit>=VAM_TARGET?"✅ 超過對賭目標！":netProfit>=0?"離目標差 ¥"+_fmt(VAM_TARGET-netProfit):"⚠️ 目前虧損";
    document.getElementById("kpi-gross").textContent="¥"+_fmt(grossProfit);
    document.getElementById("kpi-gross-sub").textContent="收入 ¥"+_fmt(totalIncome)+" - 成本 ¥"+_fmt(totalDirectCost);
    document.getElementById("kpi-overhead").textContent="¥"+_fmt(overhead);
    document.getElementById("kpi-vam-pct").textContent=vamPct+"%";
    document.getElementById("kpi-vam-pct").style.color=vamPct>=100?"#10b981":vamPct>=60?"#f59e0b":"#ef4444";

    // VAM bar
    document.getElementById("vam-bar").style.width=Math.min(100,vamPct)+"%";
    document.getElementById("vam-current").textContent="¥"+_fmtFull(Math.round(netProfit));
    const breakdown=Object.entries(overheadByType).map(([k,v])=>`<span style="margin-right:12px">${k} ¥${_fmt(v)}</span>`).join("");
    document.getElementById("vam-breakdown").innerHTML="固定成本明細："+breakdown;

    // ── 損益分解卡 ────────────────────────────────────────────────
    document.getElementById("pl-grid").innerHTML=`
      <div class="pl-card"><div class="pl-label">全年預計收入</div><div class="pl-num" style="color:#10b981">¥${_fmtFull(Math.round(totalIncome))}</div></div>
      <div class="pl-card"><div class="pl-label">直接成本（採購+版權+物流等）</div><div class="pl-num" style="color:#f97316">¥${_fmtFull(Math.round(totalDirectCost))}</div></div>
      <div class="pl-card"><div class="pl-label">毛利</div><div class="pl-num" style="color:#6366f1">¥${_fmtFull(Math.round(grossProfit))}<span style="font-size:13px;color:#64748b"> (${totalIncome?Math.round(grossProfit/totalIncome*100):0}%)</span></div></div>
      <div class="pl-card"><div class="pl-label">固定成本（薪資/租金/運營）</div><div class="pl-num" style="color:#f97316">¥${_fmtFull(Math.round(overhead))}</div></div>
      <div class="pl-card"><div class="pl-label">預計淨利</div><div class="pl-num" style="color:${netProfit>=0?'#10b981':'#ef4444'}">¥${_fmtFull(Math.round(netProfit))}</div></div>
      <div class="pl-card"><div class="pl-label">對賭缺口</div><div class="pl-num" style="color:${netProfit>=VAM_TARGET?'#10b981':'#f59e0b'}">${netProfit>=VAM_TARGET?"已達標":"差 ¥"+_fmtFull(Math.round(VAM_TARGET-netProfit))}</div></div>
    `;

    // ── 項目明細表 ────────────────────────────────────────────────
    const projEntries=Object.entries(projMap).filter(([k])=>k!==OVERHEAD_PROJ);
    projEntries.sort((a,b)=>(b[1].income-b[1].cost)-(a[1].income-a[1].cost));
    const TYPE_C={"批發":"#6366f1","快閃店":"#10b981","代工":"#f59e0b","設計服務":"#ec4899","授權":"#8b5cf6","其他":"#64748b"};
    const projRows=projEntries.map(([name,p])=>{
      const gp=p.income-p.cost;
      const gm=p.income>0?Math.round(gp/p.income*100):0;
      const tc=TYPE_C[p.type]||"#64748b";
      const barPct=p.income>0?Math.min(100,Math.max(0,gm))+"%" :"0%";
      return `<tr>
        <td>
          <div style="font-weight:600;color:#f1f5f9;white-space:nowrap">${name}</div>
          <div style="display:flex;gap:5px;margin-top:3px">
            ${p.type?`<span class="badge" style="background:${tc}33;color:${tc}">${p.type}</span>`:""}
            ${p.loc?`<span class="loc-pill">${p.loc}</span>`:""}
          </div>
        </td>
        <td style="text-align:right;color:#10b981;font-weight:600;white-space:nowrap">¥${_fmt(p.income)}</td>
        <td style="text-align:right;color:#f97316;white-space:nowrap">¥${_fmt(p.cost)}</td>
        <td style="text-align:right">
          <span style="color:${gp>=0?'#10b981':'#ef4444'};font-weight:700">¥${_fmt(gp)}</span>
          <div class="proj-row-bar" style="background:${gp>=0?'#10b98130':'#ef444430'}"><div style="height:100%;border-radius:3px;background:${gp>=0?'#10b981':'#ef4444'};width:${barPct}"></div></div>
          <div style="font-size:11px;color:#64748b">${gm}%</div>
        </td>
      </tr>`;
    }).join("");

    document.getElementById("proj-table-wrap").innerHTML=
      projEntries.length?`<table class="dt">
        <thead><tr><th>項目</th><th style="text-align:right">預計收入</th><th style="text-align:right">直接成本</th><th style="text-align:right">毛利 / 毛利率</th></tr></thead>
        <tbody>${projRows}</tbody>
      </table>`:'<div class="loading-msg">尚無項目預算資料</div>';

    // ── 快閃店本月流水 ────────────────────────────────────────────
    const now=new Date();
    const thisYear=now.getFullYear(), thisMon=now.getMonth()+1;
    const thisMonStr=thisYear+"-"+String(thisMon).padStart(2,"0");
    let popupTotal=0, popupDays=0;
    const dailyRows=dailys.filter(i=>{
      const d=_fv(i.fields,"日期")||"";
      return d.startsWith(thisMonStr);
    }).sort((a,b)=>_fv(b.fields,"日期").localeCompare(_fv(a.fields,"日期"))).map(i=>{
      const f=i.fields||{};
      const amt=_num(_fv(f,"日流水總額")||"0");
      popupTotal+=amt; popupDays++;
      return `<tr>
        <td style="font-weight:600;white-space:nowrap">${_fv(f,"日期")||"—"}</td>
        <td style="color:#94a3b8">${_fv(f,"項目關聯")||"—"}</td>
        <td style="text-align:right;color:#10b981;font-weight:700">${amt.toLocaleString()} ${_fv(f,"幣別")||""}</td>
        <td style="text-align:right">${_fv(f,"客流人數")||"—"}</td>
        <td style="color:#64748b">${_fv(f,"填報人")||"—"}</td>
      </tr>`;
    });
    document.getElementById("kpi-daily").textContent="¥"+_fmt(popupTotal);
    document.getElementById("kpi-daily-sub").textContent=thisMon+"月 · "+popupDays+"天記錄";

    document.getElementById("daily-table-wrap").innerHTML=
      dailyRows.length?`<table class="dt">
        <thead><tr><th>日期</th><th>項目</th><th style="text-align:right">流水</th><th style="text-align:right">客流</th><th>填報人</th></tr></thead>
        <tbody>${dailyRows.join("")}</tbody>
      </table>`:'<div class="loading-msg">本月尚無每日流水記錄</div>';

    // ── 項目數量 KPI ──────────────────────────────────────────────
    const activeProj=Object.values(projMap).filter(p=>p.type);
    document.getElementById("kpi-proj").textContent=activeProj.length;
    const popup=activeProj.filter(p=>p.type==="快閃店").length;
    const batch=activeProj.filter(p=>p.type==="批發").length;
    document.getElementById("kpi-proj-sub").textContent=`批發 ${batch} 個 / 快閃店 ${popup} 場`;

    // ── 今日登入 ──────────────────────────────────────────────────
    const today=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
    document.getElementById("att-date-lbl").textContent=today;
    const [vtk]=await Promise.all([_token()]);
    const vItems=await _all(vtk,_VL);
    const visitors={};
    vItems.forEach(i=>{
      const f=i.fields||{};
      const rawD=_fv(f,"日期");
      const d=typeof f["日期"]==="number"?new Date(f["日期"]).toISOString().slice(0,10):rawD.slice(0,10);
      if(d!==today) return;
      const name=_fv(f,"姓名"); const time=_fv(f,"時間");
      if(name&&(!visitors[name]||time<visitors[name].time)) visitors[name]={name,dept:_fv(f,"部門"),time};
    });
    const vList=Object.values(visitors).sort((a,b)=>a.time.localeCompare(b.time));
    document.getElementById("att-body").innerHTML=vList.length
      ?'<div style="display:flex;flex-wrap:wrap;gap:10px">'+vList.map(v=>`
        <div style="background:#0f172a;border:1px solid #10b981;border-radius:10px;padding:10px 16px;min-width:130px">
          <div style="font-size:14px;font-weight:700;color:#f1f5f9">${v.name}</div>
          <div style="font-size:11px;color:#64748b;margin-top:2px">${v.dept}</div>
          <div style="font-size:12px;color:#10b981;margin-top:6px">⏰ ${v.time}</div>
        </div>`).join("")+'</div>'
      :'<div style="color:#64748b;font-size:13px">今日尚無登入紀錄</div>';

    const ts=new Date().toLocaleTimeString("zh-TW");
    document.getElementById("refresh-time").textContent="最後更新："+today+" "+ts;
  }catch(e){
    document.getElementById("refresh-time").textContent="資料載入失敗："+e.message;
  }
}

(function(){
  const s=JSON.parse(localStorage.getItem("wujie_session")||"null");
  if(!s||Date.now()>s.expires){localStorage.removeItem("wujie_session");location.replace("login.html");return;}
