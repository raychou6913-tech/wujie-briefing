<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🤝 寄售管理 — 蕪解</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-bottom:48px}
.hdr{background:#8b5cf612;border-bottom:2px solid #8b5cf6;padding:18px 20px;display:flex;align-items:center;gap:12px}
.hdr-icon{font-size:26px}.hdr-title{font-size:19px;font-weight:700;color:#0f172a}
.hdr-sub{font-size:13px;color:#64748b;margin-top:2px}
.wrap{max-width:620px;margin:24px auto;padding:0 14px}
.card{background:#ffffff;border:1px solid #e2e8f0;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px #0000000a}
.ctitle{font-size:12px;font-weight:700;color:#8b5cf6;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.f{margin-bottom:13px}
.f label{display:block;font-size:13px;color:#64748b;margin-bottom:5px;font-weight:600}
.f input,.f select,.f textarea{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;color:#0f172a;font-size:14px;outline:none;transition:border .15s}
.f input:focus,.f select:focus,.f textarea:focus{border-color:#8b5cf6;background:#fff}
.f textarea{min-height:72px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.req{color:#8b5cf6}
.hint{font-size:11px;color:#94a3b8;margin-top:3px}
.btn{width:100%;background:#8b5cf6;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:all .15s}
.btn:hover{opacity:.88;transform:translateY(-1px)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.result{display:none;border-radius:12px;padding:20px;text-align:center;margin-top:14px;border:1px solid}
.result.ok{background:#f0fdf4;border-color:#10b981;color:#166534}
.result.err{background:#fef2f2;border-color:#ef4444;color:#991b1b}
.result-icon{font-size:32px;margin-bottom:8px}
.result-msg{font-size:15px;font-weight:700}
.result-sub{font-size:12px;margin-top:4px;opacity:.8;word-break:break-all}
.back{display:block;text-align:center;color:#64748b;font-size:15px;font-weight:500;margin-top:24px;text-decoration:none;padding:10px}
.back:hover{color:#8b5cf6}
@media(max-width:480px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-icon">🤝</div>
  <div><div class="hdr-title">寄售管理</div>
  <div class="hdr-sub">蕪解創意 · 填報後即時同步管理儀表板</div></div>
</div>
<div class="wrap">
<form id="frm">

<div class="card">
  <div class="ctitle">📋 關聯項目</div>
  <div class="f">
    <label>選擇項目</label>
    <select id="proj-sel"><option value="">載入中...</option></select>
    <div class="hint">選擇此填報對應的項目，系統將自動關聯</div>
  </div>
</div>
    <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:13px;color:#92400e;line-height:1.6">
      📌 <strong>操作說明：</strong>每筆記錄 = <strong>一件商品 × 一天</strong>的銷售記錄。<br>
      有多個寄售方時，請分別為每個供應商各填一筆。商品基本資料每次提交都需填寫。
    </div>
    <div class="card">
      <div class="ctitle">📦 寄售商品資訊</div>
      <div class="f"><label>商品名稱 <span class="req">*</span></label>
        <input id="f-name" required placeholder="例：Chiikawa 公仔系列"></div>
      <div class="row2">
        <div class="f"><label>寄售方</label>
          <select id="f-consignor">
            <option>版權方</option><option>版權代理商</option><option>授權商</option><option>其他</option>
          </select></div>
        <div class="f"><label>寄售方公司名稱</label>
          <input id="f-consignor-name" placeholder="公司 / 品牌名稱"></div>
      </div>
      <div class="row2">
        <div class="f"><label>寄售數量</label>
          <input type="number" id="f-qty" placeholder="0"></div>
        <div class="f"><label>建議售價</label>
          <input type="number" id="f-price" placeholder="0"></div>
      </div>
      <div class="row2">
        <div class="f"><label>幣別</label>
          <select id="f-cur"><option>TWD</option><option>CNY</option><option>THB</option><option>USD</option></select></div>
        <div class="f"><label>分潤比例 (%) <span class="req">*</span></label>
          <input type="number" id="f-rate" required placeholder="例：30" step="0.1"></div>
      </div>
      <div class="hint">分潤比例 = 寄售方應得銷售額百分比，每日自動計算應付金額</div>
    </div>
    <div class="card">
      <div class="ctitle">📊 當日結算</div>
      <div class="row2">
        <div class="f"><label>結算日期</label><input type="date" id="f-date"></div>
        <div class="f"><label>當日銷售額</label>
          <input type="number" id="f-daily-sales" placeholder="0" oninput="calcDue()"></div>
      </div>
      <div class="row2">
        <div class="f"><label>當日銷售件數</label>
          <input type="number" id="f-daily-qty" placeholder="0"></div>
        <div class="f"><label>當日應付分潤（自動計算）</label>
          <input type="number" id="f-daily-due" placeholder="0" readonly
            style="background:#f1f5f9;color:#64748b;font-weight:700"></div>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">📋 結算狀態</div>
      <div class="row2">
        <div class="f"><label>結算狀態</label>
          <select id="f-status">
            <option>未結算</option><option>已通知待付款</option><option>已付款</option><option>有爭議</option>
          </select></div>
        <div class="f"><label>負責人</label>
          <input id="f-owner" placeholder="你的名字"></div>
      </div>
      <div class="f"><label>備註</label>
        <textarea id="f-note" placeholder="補貨需求、特殊情況..."></textarea></div>
    </div>
<button class="btn" type="submit" id="sbtn">提交</button>
</form>
<div class="result" id="res">
  <div class="result-icon" id="res-icon"></div>
  <div class="result-msg" id="res-msg"></div>
  <div class="result-sub" id="res-sub"></div>
</div>
<a class="back" href="index.html">← 返回填報中心</a>
</div>
<script>

const _PROXY="https://feishu-proxy.raychou6913.workers.dev";
const _AT="YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _TABLES={"project": "tblYBjAlemYPuNGy", "cashflow": "tblxaiogh3tYlZUz", "budget": "tblteo2QEO0jP8j9", "sales": "tblRtqmbO9TO3sYZ", "design": "tblTEoNLDvtYi4pX", "procure": "tblae5v8pGMXleJZ", "stock": "tblsmZ7S5cNiYN4Y", "contract": "tbltnJNDhRNwVkZC", "approval": "tblD6acV3m2ZXJHe", "product": "tblH1pYYlHBGSBHc", "ip_db": "tblHPNUTdcFa7tqs", "supplier": "tblgpiqW1yOa2DR4", "customer": "tblXMXDGZKw8KOsl", "design_vendor": "tblc8uH2yHbOAI4l", "logistics": "tbl1MeP2wUWHwenW", "daily_sales": "tblz7zvgbzOqknzm", "popup_venue": "tbldKRVsE4RcoZrD", "consignment": "tblypFKMeOARPFT1", "visit_log": "tblUzRSQgKLhlttk", "notice_board": "tblPtgudsOOlmJAx"};

async function _getToken(){
  const r=await fetch(_PROXY+"/auth/token",{
    method:"POST",headers:{"Content-Type":"application/json"},body:"{}"
  });
  if(!r.ok) throw new Error("Token HTTP "+r.status);
  const d=await r.json();
  if(d.code!==0) throw new Error("Token err: "+d.msg);
  return d.tenant_access_token;
}

async function _post(tableKey,fields){
  const tk=await _getToken();
  const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES[tableKey]+"/records",{
    method:"POST",
    headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  if(!r.ok) throw new Error("HTTP "+r.status);
  const d=await r.json();
  if(d.code!==0) throw new Error(d.msg||"Feishu error "+d.code);
  return d;
}

async function _getProjects(){
  const tk=await _getToken();
  const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["project"]+"/records?page_size=100",{
    headers:{"Authorization":"Bearer "+tk}
  });
  const d=await r.json();
  if(d.code!==0) return [];
  return (d.data?.items||[]).map(rec=>{
    const f=rec.fields||{};
    const n=f["項目名稱"];
    if(!n) return null;
    const name=Array.isArray(n)?n[0]?.text||"":String(n);
    return name;
  }).filter(Boolean);
}

function _ts(dateStr){ return dateStr?new Date(dateStr).getTime():null; }

async function _loadProjectSelect(selectId){
  const sel=document.getElementById(selectId);
  if(!sel) return;
  try{
    const list=await _getProjects();
    sel.innerHTML='<option value="">— 選擇項目（選填）—</option>';
    list.forEach(name=>{
      const o=document.createElement("option");
      o.value=name; o.textContent=name;
      sel.appendChild(o);
    });
    const opt=document.createElement("option");
    opt.value="__new__"; opt.textContent="＋ 新增項目（跳轉）";
    sel.appendChild(opt);
    sel.onchange=()=>{
      if(sel.value==="__new__") window.open("project.html","_blank");
    };
  }catch(e){
    sel.innerHTML='<option value="">（無法載入項目列表）</option>';
    const txt=document.createElement("input");
    txt.type="text"; txt.placeholder="請手動輸入項目名稱";
    txt.style.cssText="width:100%;margin-top:6px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;color:#0f172a;font-size:14px";
    txt.id=selectId+"_fallback";
    sel.parentNode.appendChild(txt);
  }
}

function _projVal(selectId){
  const sel=document.getElementById(selectId);
  const fb=document.getElementById(selectId+"_fallback");
  if(fb) return fb.value.trim();
  return sel?.value==="__new__"?"":sel?.value||"";
}

function _dateToTs(v){ return v?new Date(v).getTime():null; }

async function _uploadImages(files,tk){
  const res=[];
  for(const f of files){
    const fd=new FormData();
    fd.append("file_name",f.name);
    fd.append("parent_type","bitable_image");
    fd.append("parent_node",_AT);
    fd.append("size",String(f.size));
    fd.append("file",f);
    const r=await fetch(_PROXY+"/open-apis/drive/v1/medias/upload_all",{
      method:"POST",headers:{"Authorization":"Bearer "+tk},body:fd
    });
    const d=await r.json();
    if(d.code!==0) throw new Error("圖片上傳失敗："+f.name+" ("+d.msg+")");
    res.push({file_token:d.data.file_token,name:f.name});
  }
  return res;
}

function _bindImgPreview(inputId,previewId){
  const inp=document.getElementById(inputId);
  if(!inp) return;
  inp.addEventListener("change",function(){
    const box=document.getElementById(previewId);
    box.innerHTML="";
    Array.from(this.files).forEach(f=>{
      const wrap=document.createElement("div");
      wrap.style.cssText="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:6px;width:90px;text-align:center;font-size:11px;color:#64748b;overflow:hidden;flex-shrink:0";
      if(f.type.startsWith("image/")){
        const img=document.createElement("img");
        img.src=URL.createObjectURL(f);
        img.style.cssText="width:78px;height:58px;object-fit:cover;border-radius:4px;margin-bottom:4px;display:block";
        wrap.appendChild(img);
      }
      const nm=document.createElement("div");
      nm.style.cssText="white-space:nowrap;overflow:hidden;text-overflow:ellipsis";
      nm.textContent=f.name;
      wrap.appendChild(nm);
      box.appendChild(wrap);
    });
  });
}

// 登入驗證 + 自動帶入填報人
window.addEventListener("DOMContentLoaded",function(){
  const s=JSON.parse(localStorage.getItem("wujie_session")||"null");
  if(!s||Date.now()>s.expires){
    localStorage.removeItem("wujie_session");
    location.replace("../login.html");
    return;
  }
  ["f-who","f-owner"].forEach(id=>{
    const el=document.getElementById(id);
    if(el&&!el.value) el.value=s.name;
  });
});


_loadProjectSelect("proj-sel");
const today=new Date().toISOString().split("T")[0];
document.getElementById("f-date").value=today;

function calcDue(){
  const sales=parseFloat(document.getElementById("f-daily-sales").value)||0;
  const rate=parseFloat(document.getElementById("f-rate").value)||0;
  document.getElementById("f-daily-due").value=sales>0?(sales*rate/100).toFixed(0):"";
}

document.getElementById("f-rate").addEventListener("input",calcDue);

document.getElementById("frm").onsubmit=async(e)=>{
  e.preventDefault();
  const btn=document.getElementById("sbtn");
  const res=document.getElementById("res");
  btn.disabled=true; btn.textContent="提交中...";
  res.style.display="none";
  try{
    const proj=_projVal("proj-sel");
    const dailySales=parseFloat(document.getElementById("f-daily-sales").value)||0;
    const rate=parseFloat(document.getElementById("f-rate").value)||0;
    const fields={
      "商品名稱":     document.getElementById("f-name").value,
      "寄售方類型":   document.getElementById("f-consignor").value,
      "寄售方":       document.getElementById("f-consignor-name").value,
      "寄售數量":     parseFloat(document.getElementById("f-qty").value)||0,
      "建議售價":     parseFloat(document.getElementById("f-price").value)||0,
      "幣別":         document.getElementById("f-cur").value,
      "分潤比例%":    rate,
      "結算日期":     _dateToTs(document.getElementById("f-date").value),
      "當日銷售額":   dailySales,
      "當日銷售件數": parseFloat(document.getElementById("f-daily-qty").value)||0,
      "當日應付分潤": dailySales>0?Math.round(dailySales*rate/100):0,
      "結算狀態":     document.getElementById("f-status").value,
      "負責人":       document.getElementById("f-owner").value,
      "備註":         document.getElementById("f-note").value,
    };
    if(proj) fields["項目關聯"]=proj;
    await _post("consignment", fields);
    res.className="result ok"; res.style.display="block";
    document.getElementById("res-icon").textContent="✅";
    document.getElementById("res-msg").textContent="提交成功！";
    document.getElementById("res-sub").textContent="寄售記錄已同步至飛書";
    document.getElementById("frm").reset();
    document.getElementById("f-date").value=new Date().toISOString().split("T")[0];
    _loadProjectSelect("proj-sel");
  }catch(err){
    res.className="result err"; res.style.display="block";
    document.getElementById("res-icon").textContent="❌";
    document.getElementById("res-msg").textContent="提交失敗";
    document.getElementById("res-sub").textContent=err.message;
    console.error(err);
  }finally{
    btn.disabled=false; btn.textContent="提交";
  }
};
</script>
</body></html>
