<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>💰 現金流填報 — 蕪解</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-bottom:48px}
.hdr{background:#10b98118;border-bottom:2px solid #10b981;padding:18px 20px;display:flex;align-items:center;gap:12px}
.hdr-icon{font-size:26px}.hdr-title{font-size:19px;font-weight:700;color:#f1f5f9}
.hdr-sub{font-size:12px;color:#94a3b8;margin-top:2px}
.wrap{max-width:620px;margin:24px auto;padding:0 14px}
.card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:20px;margin-bottom:14px}
.ctitle{font-size:12px;font-weight:700;color:#10b981;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.f{margin-bottom:13px}
.f label{display:block;font-size:12px;color:#94a3b8;margin-bottom:5px;font-weight:500}
.f input,.f select,.f textarea{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:9px 12px;color:#f1f5f9;font-size:14px;outline:none;transition:border .15s}
.f input:focus,.f select:focus,.f textarea:focus{border-color:#10b981}
.f textarea{min-height:72px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.req{color:#10b981}
.hint{font-size:11px;color:#475569;margin-top:3px}
.btn{width:100%;background:#10b981;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity .15s}
.btn:hover{opacity:.85}.btn:disabled{opacity:.4;cursor:not-allowed}
.result{display:none;border-radius:12px;padding:20px;text-align:center;margin-top:14px;border:1px solid}
.result.ok{background:#052e16;border-color:#10b981;color:#6ee7b7}
.result.err{background:#450a0a;border-color:#ef4444;color:#fca5a5}
.result-icon{font-size:32px;margin-bottom:8px}
.result-msg{font-size:15px;font-weight:700}
.result-sub{font-size:12px;margin-top:4px;opacity:.8;word-break:break-all}
.back{display:block;text-align:center;color:#475569;font-size:12px;margin-top:18px;text-decoration:none}
.back:hover{color:#10b981}
@media(max-width:480px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-icon">💰</div>
  <div><div class="hdr-title">現金流填報</div>
  <div class="hdr-sub">蕪解創意 · 填報後即時同步管理儀表板</div></div>
</div>
<div class="wrap">
<form id="frm">

<div class="card">
  <div class="ctitle">📋 關聯項目</div>
  <div class="f">
    <label>選擇項目</label>
    <select id="proj-sel"><option value="">載入中...</option></select>
    <div class="hint">選擇此填報對應的項目，系統將自動關聯</div>
  </div>
</div>
    <div class="card">
      <div class="ctitle">辦公室 & 日期</div>
      <div class="row2">
        <div class="f"><label>辦公室 <span class="req">*</span></label>
          <select id="f-office" required>
            <option value="">請選擇</option>
            <option>台北</option><option>北京</option><option>曼谷</option>
          </select></div>
        <div class="f"><label>日期 <span class="req">*</span></label>
          <input type="date" id="f-date" required></div>
      </div>
      <div class="f"><label>幣別</label>
        <select id="f-cur">
          <option>TWD</option><option>CNY</option><option>THB</option><option>USD</option>
        </select></div>
    </div>
    <div class="card">
      <div class="ctitle">本期金流</div>
      <div class="row2">
        <div class="f"><label>期初餘額</label><input type="number" id="f-open" placeholder="0"></div>
        <div class="f"><label>本期收入</label><input type="number" id="f-in" placeholder="0"></div>
      </div>
      <div class="row2">
        <div class="f"><label>本期支出</label><input type="number" id="f-out" placeholder="0"></div>
        <div class="f"><label>期末餘額</label><input type="number" id="f-close" placeholder="留空自動計算"></div>
      </div>
      <div class="f"><label>收入明細</label><textarea id="f-in-detail" placeholder="應收帳款、訂金..."></textarea></div>
      <div class="f"><label>支出明細</label><textarea id="f-out-detail" placeholder="貨款、租金、薪資..."></textarea></div>
    </div>
    <div class="card">
      <div class="ctitle">預測</div>
      <div class="row2">
        <div class="f"><label>預計下月支出</label><input type="number" id="f-next" placeholder="0"></div>
        <div class="f"><label>可用天數估算</label><input type="number" id="f-days" placeholder="0"></div>
      </div>
      <div class="f"><label>填報人</label><input id="f-who" placeholder="你的名字"></div>
    </div>
<button class="btn" type="submit" id="sbtn">提交</button>
</form>
<div class="result" id="res">
  <div class="result-icon" id="res-icon"></div>
  <div class="result-msg" id="res-msg"></div>
  <div class="result-sub" id="res-sub"></div>
</div>
<a class="back" href="index.html">← 返回填報中心</a>
</div>
<script>

const _PROXY="https://feishu-proxy.raychou6913.workers.dev";
const _AT="YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _TABLES={"project": "tblYBjAlemYPuNGy", "cashflow": "tblxaiogh3tYlZUz", "budget": "tblteo2QEO0jP8j9", "sales": "tblRtqmbO9TO3sYZ", "design": "tblTEoNLDvtYi4pX", "procure": "tblae5v8pGMXleJZ", "stock": "tblsmZ7S5cNiYN4Y", "contract": "tbltnJNDhRNwVkZC", "approval": "tblD6acV3m2ZXJHe", "product": "tblH1pYYlHBGSBHc"};

async function _getToken(){
  const r=await fetch(_PROXY+"/auth/token",{
    method:"POST",headers:{"Content-Type":"application/json"},body:"{}"
  });
  if(!r.ok) throw new Error("Token HTTP "+r.status);
  const d=await r.json();
  if(d.code!==0) throw new Error("Token err: "+d.msg);
  return d.tenant_access_token;
}

async function _post(tableKey,fields){
  const tk=await _getToken();
  const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES[tableKey]+"/records",{
    method:"POST",
    headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  if(!r.ok) throw new Error("HTTP "+r.status);
  const d=await r.json();
  if(d.code!==0) throw new Error(d.msg||"Feishu error "+d.code);
  return d;
}

async function _getProjects(){
  const tk=await _getToken();
  const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["project"]+"/records?page_size=100",{
    headers:{"Authorization":"Bearer "+tk}
  });
  const d=await r.json();
  if(d.code!==0) return [];
  return (d.data?.items||[]).map(rec=>{
    const f=rec.fields||{};
    const n=f["項目名稱"];
    if(!n) return null;
    const name=Array.isArray(n)?n[0]?.text||"":String(n);
    return name;
  }).filter(Boolean);
}

function _ts(dateStr){ return dateStr?new Date(dateStr).getTime():null; }

async function _loadProjectSelect(selectId){
  const sel=document.getElementById(selectId);
  if(!sel) return;
  try{
    const list=await _getProjects();
    sel.innerHTML='<option value="">— 選擇項目（選填）—</option>';
    list.forEach(name=>{
      const o=document.createElement("option");
      o.value=name; o.textContent=name;
      sel.appendChild(o);
    });
    const opt=document.createElement("option");
    opt.value="__new__"; opt.textContent="＋ 新增項目（跳轉）";
    sel.appendChild(opt);
    sel.onchange=()=>{
      if(sel.value==="__new__") window.open("project.html","_blank");
    };
  }catch(e){
    sel.innerHTML='<option value="">（無法載入項目列表）</option>';
    const txt=document.createElement("input");
    txt.type="text"; txt.placeholder="請手動輸入項目名稱";
    txt.style.cssText="width:100%;margin-top:6px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#f1f5f9;font-size:14px";
    txt.id=selectId+"_fallback";
    sel.parentNode.appendChild(txt);
  }
}

function _projVal(selectId){
  const sel=document.getElementById(selectId);
  const fb=document.getElementById(selectId+"_fallback");
  if(fb) return fb.value.trim();
  return sel?.value==="__new__"?"":sel?.value||"";
}

function _dateToTs(v){ return v?new Date(v).getTime():null; }


_loadProjectSelect("proj-sel");
document.getElementById("frm").onsubmit=async(e)=>{
  e.preventDefault();
  const btn=document.getElementById("sbtn");
  const res=document.getElementById("res");
  btn.disabled=true; btn.textContent="提交中...";
  res.style.display="none";
  try{
    const proj=_projVal("proj-sel");
    const fields={...({
      "辦公室":     document.getElementById("f-office").value,
      "日期":       _dateToTs(document.getElementById("f-date").value),
      "幣別":       document.getElementById("f-cur").value,
      "期初餘額":   parseFloat(document.getElementById("f-open").value)||0,
      "本期收入":   parseFloat(document.getElementById("f-in").value)||0,
      "本期支出":   parseFloat(document.getElementById("f-out").value)||0,
      "期末餘額":   parseFloat(document.getElementById("f-close").value)||
                    ((parseFloat(document.getElementById("f-open").value)||0)+
                     (parseFloat(document.getElementById("f-in").value)||0)-
                     (parseFloat(document.getElementById("f-out").value)||0)),
      "收入明細":   document.getElementById("f-in-detail").value,
      "支出明細":   document.getElementById("f-out-detail").value,
      "預計下月支出":parseFloat(document.getElementById("f-next").value)||0,
      "可用天數估算":parseFloat(document.getElementById("f-days").value)||0,
      "填報人":     document.getElementById("f-who").value,
    })};
    if(proj) fields["項目關聯"]=proj;
    await _post("cashflow", fields);
    res.className="result ok"; res.style.display="block";
    document.getElementById("res-icon").textContent="✅";
    document.getElementById("res-msg").textContent="提交成功！";
    document.getElementById("res-sub").textContent="資料已同步至飛書，儀表板將於下次排程更新";
    document.getElementById("frm").reset();
    _loadProjectSelect("proj-sel");
  }catch(err){
    res.className="result err"; res.style.display="block";
    document.getElementById("res-icon").textContent="❌";
    document.getElementById("res-msg").textContent="提交失敗";
    document.getElementById("res-sub").textContent=err.message+" ｜ 請截圖此錯誤並回報管理員";
    console.error(err);
  }finally{
    btn.disabled=false; btn.textContent="提交";
  }
};
</script>
</body></html>
