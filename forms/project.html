<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📅 項目進度更新 — 蕪解填報</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:0 0 40px}
.header{background:#8b5cf622;border-bottom:2px solid #8b5cf6;padding:20px 24px;display:flex;align-items:center;gap:12px}
.header-icon{font-size:28px}
.header-title{font-size:20px;font-weight:700;color:#f1f5f9}
.header-sub{font-size:12px;color:#94a3b8;margin-top:2px}
.form-wrap{max-width:640px;margin:28px auto;padding:0 16px}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:24px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:#8b5cf6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:#94a3b8;margin-bottom:6px;font-weight:500}
.field input,.field select,.field textarea{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#f1f5f9;font-size:14px;outline:none;transition:border .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#8b5cf6}
.field textarea{min-height:80px;resize:vertical}
.field select option{background:#1e293b}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{width:100%;background:#8b5cf6;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:8px}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.toast{display:none;background:#0f172a;border:1px solid #8b5cf6;border-radius:12px;padding:20px 24px;text-align:center;margin-top:16px}
.toast.show{display:block}
.toast-icon{font-size:36px;margin-bottom:8px}
.toast-msg{color:#f1f5f9;font-size:15px;font-weight:600}
.toast-sub{color:#94a3b8;font-size:12px;margin-top:4px}
.back{display:block;text-align:center;color:#64748b;font-size:12px;margin-top:20px;text-decoration:none}
.back:hover{color:#8b5cf6}
.req{color:#8b5cf6}
@media(max-width:480px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">📅</div>
  <div>
    <div class="header-title">項目進度更新</div>
    <div class="header-sub">蕪解創意 · 填報後直接同步至管理儀表板</div>
  </div>
</div>
<div class="form-wrap">
  <form id="form">
    
    <div class="card">
      <div class="card-title">項目資訊</div>
      <div class="field"><label>項目名稱 <span class="req">*</span></label>
        <input type="text" id="f-name" required placeholder="例：Snoopy 台北快閃店 Q2"></div>
      <div class="row">
        <div class="field"><label>類別</label>
          <select id="f-cat">
            <option>商品批發</option><option>快閃店</option><option>其他</option>
          </select></div>
        <div class="field"><label>所在地</label>
          <select id="f-loc">
            <option>台北</option><option>北京</option><option>曼谷</option><option>跨地區</option>
          </select></div>
      </div>
      <div class="field"><label>負責人</label>
        <input type="text" id="f-owner" placeholder="你的名字"></div>
    </div>
    <div class="card">
      <div class="card-title">時程與進度</div>
      <div class="row">
        <div class="field"><label>開始日期</label><input type="date" id="f-start"></div>
        <div class="field"><label>截止日期</label><input type="date" id="f-end"></div>
      </div>
      <div class="row">
        <div class="field"><label>目前狀態</label>
          <select id="f-status">
            <option>計劃中</option><option>進行中</option><option>已延遲</option>
            <option>已完成</option><option>已取消</option>
          </select></div>
        <div class="field"><label>完成進度 (%)</label>
          <input type="number" id="f-pct" min="0" max="100" placeholder="0–100"></div>
      </div>
      <div class="field"><label>本次更新說明 / 備註</label>
        <textarea id="f-note" placeholder="進度說明、遇到的問題、需要的資源..."></textarea></div>
    </div>
    <button class="btn" type="submit" id="btn">提交</button>
  </form>
  <div class="toast" id="toast">
    <div class="toast-icon" id="t-icon">✅</div>
    <div class="toast-msg" id="t-msg">提交成功</div>
    <div class="toast-sub" id="t-sub">資料已同步至管理儀表板</div>
  </div>
  <a class="back" href="../dashboard.html">← 返回管理儀表板</a>
</div>
<script>
const APP_ID="cli_a96188997ea49e15",APP_SECRET="Bnd53bURDQmPC3yUHN4UMhfwT2UeobX1",APP_TOKEN="YlVkb0ACjacJVqsgRT5j4c6gpeh",TABLE_ID="tblYBjAlemYPuNGy";
const FEISHU="https://open.feishu.cn/open-apis";

async function getToken(){
  const r=await fetch(FEISHU+"/auth/v3/tenant_access_token/internal",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({app_id:APP_ID,app_secret:APP_SECRET})
  });
  return (await r.json()).tenant_access_token;
}

function tsDate(val){
  if(!val)return null;
  return new Date(val).getTime();
}

function getFields(){
  
    const s=document.getElementById("f-start").value;
    const e=document.getElementById("f-end").value;
    return {
      "項目名稱":  document.getElementById("f-name").value,
      "類別":      document.getElementById("f-cat").value,
      "所在地":    document.getElementById("f-loc").value,
      "負責人":    document.getElementById("f-owner").value,
      "開始日期":  s ? new Date(s).getTime() : null,
      "截止日期":  e ? new Date(e).getTime() : null,
      "狀態":      document.getElementById("f-status").value,
      "完成進度%": parseFloat(document.getElementById("f-pct").value)||0,
      "備註":      document.getElementById("f-note").value,
    };
}

document.getElementById("form").onsubmit=async(e)=>{
  e.preventDefault();
  const btn=document.getElementById("btn");
  btn.disabled=true; btn.textContent="提交中...";
  try{
    const token=await getToken();
    const fields=getFields();
    const r=await fetch(FEISHU+"/bitable/v1/apps/"+APP_TOKEN+"/tables/"+TABLE_ID+"/records",{
      method:"POST",
      headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify({fields})
    });
    const d=await r.json();
    const toast=document.getElementById("toast");
    toast.classList.add("show");
    if(d.code===0){
      document.getElementById("t-icon").textContent="✅";
      document.getElementById("t-msg").textContent="提交成功！";
      document.getElementById("t-sub").textContent="資料已同步，儀表板將於下次排程更新";
      document.getElementById("form").reset();
    }else{
      document.getElementById("t-icon").textContent="❌";
      document.getElementById("t-msg").textContent="提交失敗";
      document.getElementById("t-sub").textContent=d.msg||"請聯繫管理員";
    }
  }catch(err){
    alert("網路錯誤："+err.message);
  }finally{
    btn.disabled=false; btn.textContent="提交";
  }
};
</script>
</body>
</html>
