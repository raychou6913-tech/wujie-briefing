<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>📋 新增項目 — 蕪解</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-bottom:48px}
.hdr{background:#6366f112;border-bottom:2px solid #6366f1;padding:18px 20px;display:flex;align-items:center;gap:12px}
.hdr-icon{font-size:26px}.hdr-title{font-size:19px;font-weight:700;color:#0f172a}
.hdr-sub{font-size:13px;color:#64748b;margin-top:2px}
.wrap{max-width:620px;margin:24px auto;padding:0 14px}
.card{background:#ffffff;border:1px solid #e2e8f0;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px #0000000a}
.ctitle{font-size:12px;font-weight:700;color:#6366f1;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.f{margin-bottom:13px}
.f label{display:block;font-size:13px;color:#64748b;margin-bottom:5px;font-weight:600}
.f input,.f select,.f textarea{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;color:#0f172a;font-size:14px;outline:none;transition:border .15s}
.f input:focus,.f select:focus,.f textarea:focus{border-color:#6366f1;background:#fff}
.f textarea{min-height:72px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.req{color:#6366f1}
.hint{font-size:11px;color:#94a3b8;margin-top:3px}
.btn{width:100%;background:#6366f1;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:all .15s}
.btn:hover{opacity:.88;transform:translateY(-1px)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.result{display:none;border-radius:12px;padding:20px;text-align:center;margin-top:14px;border:1px solid}
.result.ok{background:#f0fdf4;border-color:#10b981;color:#166534}
.result.err{background:#fef2f2;border-color:#ef4444;color:#991b1b}
.result-icon{font-size:32px;margin-bottom:8px}
.result-msg{font-size:15px;font-weight:700}
.result-sub{font-size:12px;margin-top:4px;opacity:.8;word-break:break-all}
.back{display:block;text-align:center;color:#64748b;font-size:15px;font-weight:500;margin-top:24px;text-decoration:none;padding:10px}
.back:hover{color:#6366f1}

.cb-label{display:inline-flex;align-items:center;gap:6px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;transition:border-color .15s;color:#0f172a}
.cb-label:hover{border-color:#6366f1}
.cb-label input{accent-color:#6366f1;width:14px;height:14px}
@media(max-width:480px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-icon">📋</div>
  <div><div class="hdr-title">新增項目</div>
  <div class="hdr-sub">蕪解創意 · 填報後即時同步管理儀表板</div></div>
</div>
<div class="wrap">
<form id="frm">

    <div class="card">
      <div class="ctitle">📋 基本資訊</div>
      <div class="f"><label>項目名稱 <span class="req">*</span></label>
        <input id="m-name" required placeholder="例：Chiikawa 台灣批發 Q2">
        <div class="hint">其他部門填報時會用此名稱關聯，請填清楚</div></div>
      <div class="row2">
        <div class="f"><label>IP 品牌</label>
          <select id="m-ip">
            <option value="">請選擇</option>
            <option>Snoopy</option><option>Mofusand</option><option>Chiikawa</option>
            <option>Labubu</option><option>Fuggler</option><option>EVE點點</option><option>其他</option>
          </select></div>
        <div class="f"><label>業務類型</label>
          <select id="m-type" onchange="toggleBatchFields(this.value)">
            <option>批發</option><option>快閃店</option><option>代工</option>
            <option>設計服務</option><option>授權</option><option>其他</option>
          </select></div>
      </div>
      <div class="row2">
        <div class="f"><label>所在地</label>
          <select id="m-loc">
            <option>台北</option><option>北京</option><option>曼谷</option><option>跨地區</option>
          </select></div>
        <div class="f"><label>版權對接人</label>
          <input id="m-owner" placeholder="負責與版權方溝通的同事"></div>
      </div>
    </div>

    <!-- 批發/代工專屬：產品類別 -->
    <div class="card" id="batch-card">
      <div class="ctitle">📦 批發商品資訊</div>
      <div class="f">
        <label>產品類別（可複選）</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">
          <label class="cb-label"><input type="checkbox" class="pcat" value="公仔" onchange="toggleSpec()"> 公仔</label><label class="cb-label"><input type="checkbox" class="pcat" value="絨毛玩偶" onchange="toggleSpec()"> 絨毛玩偶</label><label class="cb-label"><input type="checkbox" class="pcat" value="3C配件"> 3C配件</label><label class="cb-label"><input type="checkbox" class="pcat" value="文具周邊"> 文具周邊</label><label class="cb-label"><input type="checkbox" class="pcat" value="服飾配件"> 服飾配件</label><label class="cb-label"><input type="checkbox" class="pcat" value="家品"> 家品</label><label class="cb-label"><input type="checkbox" class="pcat" value="食品"> 食品</label><label class="cb-label"><input type="checkbox" class="pcat" value="其他"> 其他</label>
        </div>
      </div>
      <div class="f" id="spec-wrap" style="display:none">
        <label>規格 / 尺寸說明</label>
        <textarea id="m-spec" placeholder="例：公仔高約 12cm，搪膠材質，附底座；或 L碼 / M碼"></textarea>
        <div class="hint">勾選公仔或絨毛玩偶後請填寫，後續可在「產品明細」中為每款產品補充詳情</div>
      </div>
    </div>

    <!-- 快閃店專屬資訊 -->
    <div class="card" id="popup-card" style="display:none;border-top:3px solid #f59e0b">
      <div class="ctitle" style="color:#f59e0b">🏪 快閃店專屬資訊</div>
      <div class="f"><label>快閃店主題</label>
        <input id="m-popup-theme" placeholder="例：Chiikawa 療癒星球 2026 台北站"></div>
      <div class="row2">
        <div class="f"><label>IP 快閃店現狀</label>
          <select id="m-popup-ip-status">
            <option>版權方尚無計畫（我方提案）</option>
            <option>版權方已有官方計畫（洽談合作）</option>
            <option>同品牌已有其他快閃店在運營</option>
            <option>我方主導首次開設</option>
          </select></div>
        <div class="f"><label>投資結構</label>
          <select id="m-invest-type" onchange="toggleInvestFields(this.value)">
            <option>獨資（蕪解）</option>
            <option>合資</option>
            <option>代運營</option>
          </select></div>
      </div>
      <div id="invest-detail" style="display:none">
        <div class="f"><label>合資方（可多方，逗號分隔）</label>
          <input id="m-partners" placeholder="例：有你共創、版權代理商名稱"></div>
        <div class="f"><label>各方出資比例說明</label>
          <textarea id="m-invest-split" placeholder="例：蕪解 40%（含技術股）/ 有你共創 60%；或 以產品入股說明..."></textarea></div>
      </div>
      <div id="agency-detail" style="display:none">
        <div class="f"><label>代運營費結構</label>
          <input id="m-agency-fee" placeholder="例：月費 5 萬 TWD；或 流水抽成 8%"></div>
      </div>
      <div class="f"><label>商品組成方式（可複選）</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">
          <label class="cb-label"><input type="checkbox" class="pcomp" value="採購"> 採購</label>
          <label class="cb-label"><input type="checkbox" class="pcomp" value="復刻"> 復刻（付設計費自找工廠）</label>
          <label class="cb-label"><input type="checkbox" class="pcomp" value="寄售"> 寄售</label>
          <label class="cb-label"><input type="checkbox" class="pcomp" value="自主開發"> 自主開發</label>
        </div></div>
      <div class="f"><label>IP 商品開發方</label>
        <select id="m-dev-party">
          <option>版權方開發</option><option>版權代理商開發</option>
          <option>授權商開發</option><option>我方自主開發</option><option>混合（多方並行）</option>
        </select></div>
      <div class="f"><label>贊助收入預估</label>
        <input type="number" id="m-sponsor" placeholder="商場/品牌贊助金額（無則填 0）"></div>
    </div>

    <!-- IP 授權資訊 -->
    <div class="card">
      <div class="ctitle">📜 IP 授權資訊</div>
      <div class="row2">
        <div class="f"><label>版權方</label>
          <input id="m-licensor" placeholder="例：Peanuts Worldwide"></div>
        <div class="f"><label>簽約狀態</label>
          <select id="m-sign">
            <option>洽談中</option><option>已簽署</option><option>待續約/待轉讓</option>
            <option>已到期</option><option>已終止</option>
          </select></div>
      </div>
      <div class="f"><label>授權地區範圍</label>
        <input id="m-territory" placeholder="例：台灣、香港、澳門；或 全球"></div>
      <div class="row2">
        <div class="f"><label>授權開始日</label><input type="date" id="m-lic-start"></div>
        <div class="f"><label>授權結束日</label><input type="date" id="m-lic-end"></div>
      </div>
      <div class="row2">
        <div class="f"><label>保底金額</label>
          <input type="number" id="m-mg" placeholder="0"></div>
        <div class="f"><label>幣別</label>
          <select id="m-cur"><option>TWD</option><option>CNY</option><option>USD</option><option>THB</option></select></div>
      </div>
      <div class="row2">
        <div class="f"><label>權利金（零售價 %）</label>
          <input type="number" id="m-royal-retail" placeholder="例：12" step="0.1"></div>
        <div class="f"><label>權利金（批發價 %）</label>
          <input type="number" id="m-royal-wholesale" placeholder="例：18" step="0.1"></div>
      </div>
    </div>

    <div class="card">
      <div class="ctitle">📅 時程與狀態</div>
      <div class="row2">
        <div class="f"><label>開始日期</label><input type="date" id="m-start"></div>
        <div class="f"><label>截止日期</label><input type="date" id="m-end"></div>
      </div>
      <div class="f"><label>當前關卡</label>
        <select id="m-stage">
          <option>IP決策中</option><option>預算規劃</option><option>概念提案</option><option>跨部門確認</option><option>設計送審</option><option>採購詢價</option><option>預算確認</option><option>打樣/開模</option><option>市場收單</option><option>大貨生產</option><option>出貨物流</option><option>銷售推廣</option><option>已完成</option><option>已暫停</option>
        </select>
        <div class="hint">反映項目目前推進到哪個階段，每次更新時請同步調整</div>
      </div>
      <div class="row2">
        <div class="f"><label>目前狀態</label>
          <select id="m-status">
            <option>計劃中</option><option>進行中</option><option>已延遲</option>
            <option>已完成</option><option>已取消</option>
          </select></div>
        <div class="f"><label>完成進度 (%)</label>
          <input type="number" id="m-pct" min="0" max="100" placeholder="0"></div>
      </div>
      <div class="f"><label>備註 / 說明</label>
        <textarea id="m-note" placeholder="項目背景、目標、特殊注意事項..."></textarea></div>
    </div>
<button class="btn" type="submit" id="sbtn">提交</button>
</form>
<div class="result" id="res">
  <div class="result-icon" id="res-icon"></div>
  <div class="result-msg" id="res-msg"></div>
  <div class="result-sub" id="res-sub"></div>
</div>
<a class="back" href="index.html">← 返回填報中心</a>
</div>
<script>

const _PROXY="https://feishu-proxy.raychou6913.workers.dev";
const _AT="YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _TABLES={"project": "tblYBjAlemYPuNGy", "cashflow": "tblxaiogh3tYlZUz", "budget": "tblteo2QEO0jP8j9", "sales": "tblRtqmbO9TO3sYZ", "design": "tblTEoNLDvtYi4pX", "procure": "tblae5v8pGMXleJZ", "stock": "tblsmZ7S5cNiYN4Y", "contract": "tbltnJNDhRNwVkZC", "approval": "tblD6acV3m2ZXJHe", "product": "tblH1pYYlHBGSBHc", "ip_db": "tblHPNUTdcFa7tqs", "supplier": "tblgpiqW1yOa2DR4", "customer": "tblXMXDGZKw8KOsl", "design_vendor": "tblc8uH2yHbOAI4l", "logistics": "tbl1MeP2wUWHwenW", "daily_sales": "tblz7zvgbzOqknzm", "popup_venue": "tbldKRVsE4RcoZrD", "consignment": "tblypFKMeOARPFT1", "visit_log": "tblUzRSQgKLhlttk"};

async function _getToken(){
  const r=await fetch(_PROXY+"/auth/token",{
    method:"POST",headers:{"Content-Type":"application/json"},body:"{}"
  });
  if(!r.ok) throw new Error("Token HTTP "+r.status);
  const d=await r.json();
  if(d.code!==0) throw new Error("Token err: "+d.msg);
  return d.tenant_access_token;
}

async function _post(tableKey,fields){
  const tk=await _getToken();
  const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES[tableKey]+"/records",{
    method:"POST",
    headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  if(!r.ok) throw new Error("HTTP "+r.status);
  const d=await r.json();
  if(d.code!==0) throw new Error(d.msg||"Feishu error "+d.code);
  return d;
}

async function _getProjects(){
  const tk=await _getToken();
  const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["project"]+"/records?page_size=100",{
    headers:{"Authorization":"Bearer "+tk}
  });
  const d=await r.json();
  if(d.code!==0) return [];
  return (d.data?.items||[]).map(rec=>{
    const f=rec.fields||{};
    const n=f["項目名稱"];
    if(!n) return null;
    const name=Array.isArray(n)?n[0]?.text||"":String(n);
    return name;
  }).filter(Boolean);
}

function _ts(dateStr){ return dateStr?new Date(dateStr).getTime():null; }

async function _loadProjectSelect(selectId){
  const sel=document.getElementById(selectId);
  if(!sel) return;
  try{
    const list=await _getProjects();
    sel.innerHTML='<option value="">— 選擇項目（選填）—</option>';
    list.forEach(name=>{
      const o=document.createElement("option");
      o.value=name; o.textContent=name;
      sel.appendChild(o);
    });
    const opt=document.createElement("option");
    opt.value="__new__"; opt.textContent="＋ 新增項目（跳轉）";
    sel.appendChild(opt);
    sel.onchange=()=>{
      if(sel.value==="__new__") window.open("project.html","_blank");
    };
  }catch(e){
    sel.innerHTML='<option value="">（無法載入項目列表）</option>';
    const txt=document.createElement("input");
    txt.type="text"; txt.placeholder="請手動輸入項目名稱";
    txt.style.cssText="width:100%;margin-top:6px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;color:#0f172a;font-size:14px";
    txt.id=selectId+"_fallback";
    sel.parentNode.appendChild(txt);
  }
}

function _projVal(selectId){
  const sel=document.getElementById(selectId);
  const fb=document.getElementById(selectId+"_fallback");
  if(fb) return fb.value.trim();
  return sel?.value==="__new__"?"":sel?.value||"";
}

function _dateToTs(v){ return v?new Date(v).getTime():null; }

async function _uploadImages(files,tk){
  const res=[];
  for(const f of files){
    const fd=new FormData();
    fd.append("file_name",f.name);
    fd.append("parent_type","bitable_image");
    fd.append("parent_node",_AT);
    fd.append("size",String(f.size));
    fd.append("file",f);
    const r=await fetch(_PROXY+"/open-apis/drive/v1/medias/upload_all",{
      method:"POST",headers:{"Authorization":"Bearer "+tk},body:fd
    });
    const d=await r.json();
    if(d.code!==0) throw new Error("圖片上傳失敗："+f.name+" ("+d.msg+")");
    res.push({file_token:d.data.file_token,name:f.name});
  }
  return res;
}

function _bindImgPreview(inputId,previewId){
  const inp=document.getElementById(inputId);
  if(!inp) return;
  inp.addEventListener("change",function(){
    const box=document.getElementById(previewId);
    box.innerHTML="";
    Array.from(this.files).forEach(f=>{
      const wrap=document.createElement("div");
      wrap.style.cssText="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:6px;width:90px;text-align:center;font-size:11px;color:#64748b;overflow:hidden;flex-shrink:0";
      if(f.type.startsWith("image/")){
        const img=document.createElement("img");
        img.src=URL.createObjectURL(f);
        img.style.cssText="width:78px;height:58px;object-fit:cover;border-radius:4px;margin-bottom:4px;display:block";
        wrap.appendChild(img);
      }
      const nm=document.createElement("div");
      nm.style.cssText="white-space:nowrap;overflow:hidden;text-overflow:ellipsis";
      nm.textContent=f.name;
      wrap.appendChild(nm);
      box.appendChild(wrap);
    });
  });
}

// 登入驗證 + 自動帶入填報人
window.addEventListener("DOMContentLoaded",function(){
  const s=JSON.parse(localStorage.getItem("wujie_session")||"null");
  if(!s||Date.now()>s.expires){
    localStorage.removeItem("wujie_session");
    location.replace("../login.html");
    return;
  }
  ["f-who","f-owner"].forEach(id=>{
    const el=document.getElementById(id);
    if(el&&!el.value) el.value=s.name;
  });
});


function toggleSpec(){
  const has=document.querySelector('.pcat[value="公仔"]:checked')||
             document.querySelector('.pcat[value="絨毛玩偶"]:checked');
  document.getElementById("spec-wrap").style.display=has?"block":"none";
}
function toggleBatchFields(type){
  document.getElementById("batch-card").style.display=
    (type==="批發"||type==="代工")?"block":"none";
  document.getElementById("popup-card").style.display=
    type==="快閃店"?"block":"none";
}
function toggleInvestFields(v){
  document.getElementById("invest-detail").style.display=v==="合資"?"block":"none";
  document.getElementById("agency-detail").style.display=v==="代運營"?"block":"none";
}
toggleBatchFields("批發");

document.getElementById("frm").onsubmit=async(e)=>{
  e.preventDefault();
  const btn=document.getElementById("sbtn");
  const res=document.getElementById("res");
  btn.disabled=true; btn.textContent="提交中...";
  res.style.display="none";
  try{
    const cats=[...document.querySelectorAll(".pcat:checked")].map(x=>x.value);
    const fields={
      "項目名稱":    document.getElementById("m-name").value,
      "IP品牌":      document.getElementById("m-ip").value,
      "業務類型":    document.getElementById("m-type").value,
      "所在地":      document.getElementById("m-loc").value,
      "版權對接人":  document.getElementById("m-owner").value,
      "版權方":      document.getElementById("m-licensor").value,
      "簽約狀態":    document.getElementById("m-sign").value,
      "授權地區範圍":document.getElementById("m-territory").value,
      "保底金額":    parseFloat(document.getElementById("m-mg").value)||0,
      "權利金_零售%":parseFloat(document.getElementById("m-royal-retail").value)||0,
      "權利金_批發%":parseFloat(document.getElementById("m-royal-wholesale").value)||0,
      "當前關卡":    document.getElementById("m-stage").value,
      "狀態":        document.getElementById("m-status").value,
      "完成進度%":   parseFloat(document.getElementById("m-pct").value)||0,
      "備註":        document.getElementById("m-note").value,
    };
    const licS=_dateToTs(document.getElementById("m-lic-start").value);
    const licE=_dateToTs(document.getElementById("m-lic-end").value);
    const startTs=_dateToTs(document.getElementById("m-start").value);
    const endTs=_dateToTs(document.getElementById("m-end").value);
    if(licS) fields["授權開始日"]=licS;
    if(licE) fields["授權結束日"]=licE;
    if(startTs) fields["開始日期"]=startTs;
    if(endTs) fields["截止日期"]=endTs;
    if(cats.length) fields["產品類別"]=cats;
    const spec=document.getElementById("m-spec")?.value;
    if(spec) fields["規格尺寸說明"]=spec;
    if(fields["業務類型"]==="快閃店"){
      const comps=[...document.querySelectorAll(".pcomp:checked")].map(x=>x.value);
      fields["快閃店主題"]=document.getElementById("m-popup-theme").value;
      fields["IP快閃店現狀"]=document.getElementById("m-popup-ip-status").value;
      fields["投資結構"]=document.getElementById("m-invest-type").value;
      if(comps.length) fields["商品組成方式"]=comps;
      fields["IP商品開發方"]=document.getElementById("m-dev-party").value;
      fields["贊助收入預估"]=parseFloat(document.getElementById("m-sponsor").value)||0;
      const partners=document.getElementById("m-partners")?.value;
      if(partners) fields["合資方"]=partners;
      const split=document.getElementById("m-invest-split")?.value;
      if(split) fields["出資比例說明"]=split;
      const fee=document.getElementById("m-agency-fee")?.value;
      if(fee) fields["代運營費結構"]=fee;
    }
    await _post("project", fields);
    res.className="result ok"; res.style.display="block";
    document.getElementById("res-icon").textContent="✅";
    document.getElementById("res-msg").textContent="項目已建立！";
    document.getElementById("res-sub").textContent="接下來可至「新增產品」表單為此項目建立個別產品";
    document.getElementById("frm").reset();
    toggleBatchFields("批發");
  }catch(err){
    res.className="result err"; res.style.display="block";
    document.getElementById("res-icon").textContent="❌";
    document.getElementById("res-msg").textContent="提交失敗";
    document.getElementById("res-sub").textContent=(err.message||String(err)||"未知錯誤")+" ｜ 請截圖此畫面回報管理員";
    console.error(err);
  }finally{
    btn.disabled=false; btn.textContent="提交";
  }
};
</script>
</body></html>
