<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解填報中心</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:0 0 40px}
.header{background:#1e293b;border-bottom:1px solid #334155;padding:24px;text-align:center}
.header h1{font-size:22px;font-weight:700;color:#f1f5f9}
.header p{font-size:13px;color:#64748b;margin-top:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;padding:28px 24px;max-width:900px;margin:0 auto}
.form-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:24px;text-decoration:none;display:block;transition:transform .15s,border-color .15s}
.form-card:hover{transform:translateY(-2px);border-color:currentColor}
.fc-icon{font-size:32px;margin-bottom:12px}
.fc-title{font-size:16px;font-weight:700;margin-bottom:6px}
.fc-desc{font-size:12px;color:#64748b;line-height:1.5}
.footer{text-align:center;padding:16px;color:#334155;font-size:12px}
.dash-link{display:block;text-align:center;margin:0 24px 8px;padding:12px;background:#1e293b;border:1px solid #334155;border-radius:12px;color:#94a3b8;text-decoration:none;font-size:13px}
.dash-link:hover{border-color:#6366f1;color:#6366f1}
</style>
</head>
<body>
<div class="header">
  <h1>🏢 蕪解填報中心</h1>
  <p>選擇你的崗位，填報後資料即時同步至管理儀表板</p>
</div>
<div class="grid">
        <a href="cashflow.html" class="form-card" style="border-color:#10b98122">
          <div class="fc-icon">💰</div>
          <div class="fc-title" style="color:#10b981">現金流填報</div>
          <div class="fc-desc">財務 / 各辦公室負責人填寫本期收支與餘額</div>
        </a>
        <a href="sales.html" class="form-card" style="border-color:#6366f122">
          <div class="fc-icon">🎯</div>
          <div class="fc-title" style="color:#6366f1">銷售進度填報</div>
          <div class="fc-desc">業務 / BD 填寫訂單狀態與金額</div>
        </a>
        <a href="project.html" class="form-card" style="border-color:#8b5cf622">
          <div class="fc-icon">📅</div>
          <div class="fc-title" style="color:#8b5cf6">項目進度更新</div>
          <div class="fc-desc">各項目負責人填寫進度與狀態</div>
        </a>
        <a href="stock.html" class="form-card" style="border-color:#f59e0b22">
          <div class="fc-icon">📦</div>
          <div class="fc-title" style="color:#f59e0b">庫存物流填報</div>
          <div class="fc-desc">倉庫 / 物流負責人填寫庫存與出貨狀態</div>
        </a>
        <a href="design.html" class="form-card" style="border-color:#ec489922">
          <div class="fc-icon">🎨</div>
          <div class="fc-title" style="color:#ec4899">設計送審填報</div>
          <div class="fc-desc">創意 / 設計師填寫設計進度與審核狀態</div>
        </a>
        <a href="procure.html" class="form-card" style="border-color:#f9731622">
          <div class="fc-icon">🛒</div>
          <div class="fc-title" style="color:#f97316">採購詢比價</div>
          <div class="fc-desc">採購負責人填寫報價比較與議價結果</div>
        </a>
        <a href="approval.html" class="form-card" style="border-color:#ef444422">
          <div class="fc-icon">🔔</div>
          <div class="fc-title" style="color:#ef4444">審批申請</div>
          <div class="fc-desc">任何人提交需要管理層審批的事項</div>
        </a></div>
<a class="dash-link" href="../dashboard.html">📊 查看管理儀表板</a>
<div class="footer">蕪解創意 · 填報中心</div>
</body>
</html>
