<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎯 銷售進度 — 蕪解</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-bottom:48px}
.breadcrumb{background:#fff;border-bottom:1px solid #f1f5f9;padding:7px 20px;font-size:12px;color:#94a3b8;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.breadcrumb a{color:#64748b;text-decoration:none}.breadcrumb a:hover{color:#6366f1}.breadcrumb .sep{color:#cbd5e1;margin:0 1px}.breadcrumb .cur{color:#0f172a;font-weight:600}
.hdr{background:#6366f115;border-bottom:2px solid #6366f1;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-icon{font-size:26px}.hdr-title{font-size:19px;font-weight:700;color:#0f172a}
.hdr-sub{font-size:13px;color:#64748b;margin-top:2px}
.hdr-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-add{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}
.btn-back{background:#fff;color:#64748b;border:1px solid #e2e8f0;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block}
.toolbar{padding:14px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid #e2e8f0}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;color:#0f172a;background:#f8fafc;outline:none}
.search-wrap input:focus{border-color:#6366f1;background:#fff}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:15px;pointer-events:none}
.filter-sel{padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;background:#f8fafc;outline:none;cursor:pointer}
.filter-sel:focus{border-color:#6366f1}
.stat-bar{padding:8px 20px;background:#fff;border-bottom:1px solid #f1f5f9;font-size:12px;color:#64748b;display:flex;justify-content:space-between;align-items:center}
.view-toggle{display:flex;gap:4px}
.vbtn{background:#f1f5f9;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:14px;color:#64748b}
.vbtn.active{background:#6366f1;color:#fff}
.wrap{padding:20px}
#card-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.db-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px;box-shadow:0 1px 4px #0000000a;transition:transform .15s,box-shadow .15s}
.db-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px #00000010}
.db-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.db-card-title{font-size:15px;font-weight:700;color:#0f172a;line-height:1.3}
.db-card-sub{font-size:12px;color:#64748b;margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.db-card-body{font-size:13px;color:#475569;line-height:1.6;margin-top:8px}
.db-card-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid #f1f5f9}
.db-card-footer{font-size:11px;color:#94a3b8;margin-top:8px}
#table-view{overflow-x:auto;display:none}
.dt{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px #0000000a}
.dt th{background:#f8fafc;color:#64748b;font-weight:600;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;border-bottom:1px solid #e2e8f0}
.dt td{padding:11px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle;color:#374151}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:#f8fafc}
.empty{text-align:center;padding:48px;color:#94a3b8;font-size:14px}
@media(max-width:600px){#card-view{grid-template-columns:1fr}}
.db-card{cursor:pointer}
#detail-modal{display:none;position:fixed;inset:0;background:#0009;z-index:9999;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.detail-box{background:#fff;border-radius:18px;max-width:580px;width:100%;margin:auto;padding:24px 24px 20px;position:relative}
.df-row{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid #f1f5f9}
.df-key{font-size:12px;color:#94a3b8;min-width:96px;flex-shrink:0;padding-top:2px;font-weight:500}
.df-val{font-size:14px;color:#0f172a;flex:1;word-break:break-word;line-height:1.6}
</style>
</head>
<body>
<div class="breadcrumb">
  <a href="../home.html">🏠 首頁</a><span class="sep">›</span>
  <a href="../progress_browser.html">進度查閱</a><span class="sep">›</span>
  <span class="cur">銷售進度</span>
</div>
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-icon">🎯</div>

  </div>
  <div class="hdr-actions">

</div>
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search-box" placeholder="搜尋關鍵字..." oninput="_dbFilter()">
  </div>
  <select class="filter-sel" data-field="訂單狀態" onchange="applyFilter()">
          <option value="">全部狀態</option><option>詢價中</option><option>報價送出</option>
          <option>訂單確認</option><option>備貨中</option><option>已出貨</option>
          <option>已收款</option><option>取消</option></select>
        <select class="filter-sel" data-field="所在地" onchange="applyFilter()">
          <option value="">全部地區</option><option>台北</option><option>北京</option>
          <option>曼谷</option><option>跨地區</option></select>
  <button class="btn-back" onclick="loadData()" style="white-space:nowrap">↻ 重新整理</button>
</div>
<div class="stat-bar">
  <span id="stat-text">— 筆資料</span>
  <div class="view-toggle">
    <button class="vbtn active" id="btn-card" onclick="setView('card')">⊞ 卡片</button>
    <button class="vbtn" id="btn-table" onclick="setView('table')">☰ 表格</button>
    
  </div>
</div>
<div class="wrap">
  <div id="card-view"><div class="empty">載入中...</div></div>
  <div id="table-view">
    <table class="dt">
      <thead><tr><th>產品/項目</th><th>客戶</th><th>IP</th><th>狀態</th><th>金額</th><th>幣別</th><th>交貨日</th><th>業務</th></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
  
</div>
<div id="detail-modal" onclick="if(event.target===this)closeDetail()">
  <div class="detail-box">
    <button onclick="closeDetail()" style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8;line-height:1">✕</button>
    <div style="font-size:17px;font-weight:700;margin-bottom:16px;padding-right:32px" id="detail-title">詳細資訊</div>
    <div id="detail-body"></div>
    <div id="detail-footer" style="position:sticky;bottom:0;background:#fff;padding:12px 0 4px;margin-top:8px;border-top:1px solid #f1f5f9">
      <div id="detail-view-btns" style="display:flex;gap:8px">
        <button onclick="closeDetail()" style="flex:1;background:#f1f5f9;border:none;border-radius:8px;padding:10px;font-size:14px;color:#64748b;cursor:pointer;font-weight:500">關閉</button>
        <button id="btn-edit-record" onclick="openEdit(_curRid)" style="display:none;flex:1;background:#6366f1;border:none;border-radius:8px;padding:10px;font-size:14px;color:#fff;cursor:pointer;font-weight:600">✏️ 編輯</button>
      </div>
      <div id="detail-edit-btns" style="display:none;gap:8px">
        <button onclick="cancelEdit()" style="flex:1;background:#f1f5f9;border:none;border-radius:8px;padding:10px;font-size:14px;color:#64748b;cursor:pointer;font-weight:500">取消</button>
        <button onclick="saveEdit(_curRid)" id="btn-save-edit" style="flex:1;background:#6366f1;border:none;border-radius:8px;padding:10px;font-size:14px;color:#fff;cursor:pointer;font-weight:700">💾 儲存</button>
      </div>
    </div>
  </div>
</div>
<script>
const _PROXY="https://feishu-proxy.raychou6913.workers.dev";
const _AT="YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _TABLES={"project": "tblYBjAlemYPuNGy", "cashflow": "tblxaiogh3tYlZUz", "budget": "tblteo2QEO0jP8j9", "sales": "tblRtqmbO9TO3sYZ", "design": "tblTEoNLDvtYi4pX", "procure": "tblae5v8pGMXleJZ", "stock": "tblsmZ7S5cNiYN4Y", "contract": "tbltnJNDhRNwVkZC", "approval": "tblD6acV3m2ZXJHe", "product": "tblH1pYYlHBGSBHc", "ip_db": "tblHPNUTdcFa7tqs", "supplier": "tblgpiqW1yOa2DR4", "customer": "tblXMXDGZKw8KOsl", "design_vendor": "tblc8uH2yHbOAI4l", "logistics": "tbl1MeP2wUWHwenW", "daily_sales": "tblz7zvgbzOqknzm", "popup_venue": "tbldKRVsE4RcoZrD", "consignment": "tblypFKMeOARPFT1", "visit_log": "tblUzRSQgKLhlttk", "notice_board": "tblPtgudsOOlmJAx", "feedback": "tbl68ofUGp7FTjx8", "meeting": "tblEf71rCbLy3GGO", "venue_db": "tblHSG9gEJ53iO1l", "daily_briefing": "tbliwX6nFg6rryn7", "expense": "tblu2NkqBWyBSskG", "follow_up": "tblyO9Cz2nUx6q46", "roles": "tblEj5GSDYUrKGY9", "product_pipeline": "tblfX6fsMshb7KL0", "ip_studio_assets": "tblq1Zl3oo0lYby5", "ip_studio_themes": "tblEBClCNZyCSxNb"};
const _EDIT_SCHEMA={"\u8a02\u55ae\u72c0\u614b": {"type": "select", "options": ["\u6d3d\u8ac7\u4e2d", "\u5df2\u4e0b\u55ae", "\u5099\u8ca8\u4e2d", "\u5df2\u51fa\u8ca8", "\u5df2\u6536\u6b3e", "\u5df2\u53d6\u6d88"]}, "\u7522\u54c1/\u9805\u76ee": {"type": "text"}, "\u5ba2\u6236\u540d\u7a31": {"type": "text"}, "\u6578\u91cf": {"type": "number"}, "\u7e3d\u91d1\u984d": {"type": "number"}, "\u5e63\u5225": {"type": "select", "options": ["TWD", "CNY", "THB", "USD", "EUR"]}, "\u5e33\u671f": {"type": "select", "options": ["\u9810\u4ed8", "Net30", "Net60", "Net90", "\u5176\u4ed6"]}, "\u8ca0\u8cac\u696d\u52d9": {"type": "text"}, "\u5099\u8a3b": {"type": "textarea"}};
const _EDIT_ROLES_CFG=["\u696d\u52d9", "\u7ba1\u7406\u5c64"];
let allRecords=[];
let _filteredRecs=[];
let _curRid="";
(function(){
  const s=JSON.parse(localStorage.getItem("wujie_session")||"null");
  if(!s||Date.now()>s.expires){localStorage.removeItem("wujie_session");location.replace("../login.html");}
})();
async function loadData(){
  document.getElementById("card-view").innerHTML='<div class="empty">載入中...</div>';
  document.getElementById("table-body").innerHTML="";
  document.getElementById("hdr-count").textContent="載入中...";
  try{
    const tr=await fetch(_PROXY+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
    const td=await tr.json();
    if(td.code!==0)throw new Error("Token err");
    const tk=td.tenant_access_token;
    let items=[],pt=null;
    do{
      const url=_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["sales"]+"/records?page_size=100"+(pt?"&page_token="+pt:"");
      const res=await fetch(url,{headers:{"Authorization":"Bearer "+tk}});
      const d=await res.json();
      if(d.code!==0)throw new Error("API err: "+d.msg);
      items=items.concat(d.data?.items||[]);
      pt=d.data?.has_more?d.data.page_token:null;
    }while(pt);
    allRecords=items;
    document.getElementById("hdr-count").textContent="共 "+items.length+" 筆資料";
    
// Pre-load procurement & stock for fulfillment chain
(async()=>{
  try{
    const tr2=await fetch(_PROXY+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
    const td2=await tr2.json();
    const tk2=td2.tenant_access_token;
    const [pd,sd]=await Promise.all([
      fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["procure"]+"/records?page_size=200",{headers:{"Authorization":"Bearer "+tk2}}).then(r=>r.json()),
      fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["stock"]+"/records?page_size=200",{headers:{"Authorization":"Bearer "+tk2}}).then(r=>r.json()),
    ]);
    window._procAll=pd.data?.items||[];
    window._stockAll=sd.data?.items||[];
  }catch(e){window._procAll=[];window._stockAll=[];}
})();
// Override openDetail to append fulfillment chain
const _origOD=openDetail;
openDetail=async function(rid){
  await _origOD(rid);
  const rec=allRecords.find(r=>r.record_id===rid);
  if(!rec)return;
  const prodRaw=fv(rec.fields,"產品/項目")||"";
  if(!prodRaw)return;
  const prod=prodRaw.toLowerCase();
  const procMatches=(window._procAll||[]).filter(r=>{
    const it=(r.fields["採購品項"]||"").toLowerCase();
    return it&&(it.includes(prod)||prod.includes(it));
  });
  const stockMatches=(window._stockAll||[]).filter(r=>{
    const it=(r.fields["品項名稱"]||"").toLowerCase();
    return it&&(it.includes(prod)||prod.includes(it));
  });
  if(!procMatches.length&&!stockMatches.length)return;
  const SC_P={"詢價中":"#f59e0b","比價完成":"#6366f1","已下單":"#10b981","到貨中":"#06b6d4","已到貨":"#84cc16","取消":"#ef4444"};
  const SC_S={"在庫":"#10b981","出貨中":"#f59e0b","已出貨":"#6366f1","待補貨":"#ef4444","滯銷":"#94a3b8"};
  let html=`<div style="border-top:2px solid #e2e8f0;margin-top:14px;padding-top:12px">
    <div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">📦 履約鏈</div>`;
  if(procMatches.length){
    html+=`<div style="font-size:12px;font-weight:700;color:#f97316;margin-bottom:6px">🛒 相關採購</div>`;
    procMatches.forEach(r=>{
      const f=r.fields,st=f["採購狀態"]||"—",sc=SC_P[st]||"#64748b";
      html+=`<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:13px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <span style="font-weight:600">${_esc(f["採購品項"]||"—")}</span>
          <span style="background:${sc};color:#fff;border-radius:4px;padding:1px 7px;font-size:11px">${st}</span>
        </div>
        <div style="color:#64748b;font-size:12px">數量：${f["採購數量"]||"—"} · 議定：${f["議定價格"]||"—"} ${f["幣別"]||""}${f["預計到貨日"]?" · 到貨："+f["預計到貨日"]:""}</div>
      </div>`;
    });
  }
  if(stockMatches.length){
    html+=`<div style="font-size:12px;font-weight:700;color:#10b981;margin:8px 0 6px">📦 庫存狀態</div>`;
    stockMatches.forEach(r=>{
      const f=r.fields,ls=f["物流狀態"]||"—",lc=SC_S[ls]||"#64748b";
      const qty=parseFloat(f["現有庫存"]||0);
      html+=`<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:13px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <span style="font-weight:600">${_esc(f["品項名稱"]||"—")}</span>
          <span style="background:${lc};color:#fff;border-radius:4px;padding:1px 7px;font-size:11px">${ls}</span>
        </div>
        <div style="color:${qty<=0?"#ef4444":"#10b981"};font-weight:700;font-size:12px">庫存：${f["現有庫存"]||"0"} ${f["單位"]||""} · ${_esc(f["所在倉庫"]||"—")}</div>
      </div>`;
    });
  }
  html+='</div>';
  document.getElementById("detail-body").innerHTML+=html;
};

    applyFilter();
    const _urlRid=new URLSearchParams(location.search).get("rid");
    if(_urlRid) setTimeout(()=>openDetail(_urlRid),300);
    const _urlQ=new URLSearchParams(location.search).get("q");
    if(_urlQ){const sb=document.getElementById("search-box");if(sb){sb.value=_urlQ;applyFilter();}}
  }catch(e){
    document.getElementById("card-view").innerHTML='<div class="empty">⚠️ 載入失敗：'+e.message+'</div>';
    document.getElementById("hdr-count").textContent="載入失敗";
  }
}
function fv(f,k){
  const v=f[k];
  if(v===null||v===undefined||v==="")return"";
  if(typeof v==="number"){if(v>1000000000000)return new Date(v).toLocaleDateString("zh-TW");return String(v);}
  if(Array.isArray(v))return v.map(x=>typeof x==="object"?(x.link||x.text||x.name||""):String(x)).join("");
  if(typeof v==="object")return v.link||v.text||v.name||String(v);
  return String(v);
}
function _esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
let _dbFilterTimer=null;
function _dbFilter(){clearTimeout(_dbFilterTimer);_dbFilterTimer=setTimeout(applyFilter,250);}
function applyFilter(){
  const q=document.getElementById("search-box").value.trim().toLowerCase();
  const filterVals={};
  document.querySelectorAll(".filter-sel").forEach(s=>{if(s.dataset.field&&s.value)filterVals[s.dataset.field]=s.value;});
  const sf=["\u7522\u54c1/\u9805\u76ee", "\u5ba2\u6236\u540d\u7a31", "IP\u54c1\u724c", "\u8ca0\u8cac\u696d\u52d9"];
  const filtered=allRecords.filter(item=>{
    const f=item.fields||{};
    if(q&&!sf.some(k=>fv(f,k).toLowerCase().includes(q)))return false;
    for(const[k,v]of Object.entries(filterVals)){if(fv(f,k)!==v)return false;}
    return true;
  });
  document.getElementById("stat-text").textContent=filtered.length+" / "+allRecords.length+" 筆";
  _filteredRecs=filtered;
  const el=document.getElementById("card-view");
  el.innerHTML=filtered.length?filtered.map(i=>cardHTML(i.fields||{},i.record_id||"")).join(""):'<div class="empty">😕 找不到符合的資料</div>';
  const tb=document.getElementById("table-body");
  tb.innerHTML=filtered.length?filtered.map(i=>rowHTML(i.fields||{},i.record_id||"")).join(""):'<tr><td colspan="99" class="empty">😕 找不到符合的資料</td></tr>';
  document.querySelectorAll('#card-view .db-card').forEach((c,i)=>{
    if(_filteredRecs[i]){c.style.cursor='pointer';c.onclick=()=>openDetail(_filteredRecs[i].record_id);}
  });
  document.querySelectorAll('#table-body tr').forEach((r,i)=>{
    if(_filteredRecs[i]){r.style.cursor='pointer';r.onclick=()=>openDetail(_filteredRecs[i].record_id);}
  });
  
}
function setView(v){
  document.getElementById("card-view").style.display=v==="card"?"grid":"none";
  document.getElementById("table-view").style.display=v==="table"?"block":"none";
  const tl=document.getElementById("timeline-view");if(tl)tl.style.display=v==="timeline"?"block":"none";
  document.getElementById("btn-card").className="vbtn"+(v==="card"?" active":"");
  document.getElementById("btn-table").className="vbtn"+(v==="table"?" active":"");
  const tlb=document.getElementById("btn-timeline");if(tlb)tlb.className="vbtn"+(v==="timeline"?" active":"");
  localStorage.setItem("wj_view_sales",v);
}
(function(){const sv=localStorage.getItem("wj_view_sales");if(sv&&document.getElementById("btn-"+sv))setView(sv);})();
async function openDetail(rid){
  _curRid=rid;
  const hasEdit=Object.keys(_EDIT_SCHEMA).length>0;
  let _canEdit=hasEdit;
  if(hasEdit&&_EDIT_ROLES_CFG.length>0){
    const _se=JSON.parse(localStorage.getItem("wujie_session")||"null");
    const _isSuper=_se&&(_se.role==="超級管理員"||_se.role==="總部管理中心"||["Ray","Shawn","安然"].includes(_se.name));
    _canEdit=_isSuper||_EDIT_ROLES_CFG.includes("all")||_EDIT_ROLES_CFG.includes(_se?.role||"");
  }
  document.getElementById("btn-edit-record").style.display=_canEdit?"flex":"none";
  const rec=allRecords.find(r=>r.record_id===rid);
  if(!rec)return;
  const f=rec.fields||{};
  const body=document.getElementById("detail-body");
  const attKeys=[];
  let html="";
  for(const[k,v] of Object.entries(f)){
    if(v===null||v===undefined||v==="")continue;
    const isAtt=Array.isArray(v)&&v.length>0&&typeof v[0]==="object"&&v[0].file_token;
    if(isAtt){
      attKeys.push(k);
      const sid="att_"+rid.replace(/[^a-z0-9]/gi,"_")+"_"+k.replace(/[^a-z0-9]/gi,"_");
      html+=`<div class="df-row"><div class="df-key">${_esc(k)}</div><div class="df-val" id="${sid}"><span style="color:#94a3b8;font-size:13px">載入圖片中...</span></div></div>`;
    }else{
      const _val=fv(f,k);
      const _disp=_val.startsWith("http")?`<a href="${_esc(_val)}" target="_blank" rel="noopener noreferrer" style="color:#6366f1;word-break:break-all">${_esc(_val.slice(0,80)+(_val.length>80?"…":""))}</a>`:_esc(_val);
      html+=`<div class="df-row"><div class="df-key">${_esc(k)}</div><div class="df-val" style="white-space:pre-wrap">${_disp}</div></div>`;
    }
  }
  body.innerHTML=html||'<div style="color:#94a3b8;padding:20px 0;text-align:center">無資料</div>';
  document.getElementById("detail-modal").style.display="flex";
  if(attKeys.length>0){
    try{
      const tr=await fetch(_PROXY+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
      const td=await tr.json();
      const tk=td.tenant_access_token;
      for(const k of attKeys){
        const atts=f[k];
        const tokens=atts.map(a=>a.file_token).join(",");
        const r=await fetch(_PROXY+"/open-apis/drive/v1/medias/batch_get_tmp_download_url?file_tokens="+tokens,{headers:{"Authorization":"Bearer "+tk}});
        const data=await r.json();
        const urls=data.data?.tmp_download_urls||[];
        const sid="att_"+rid.replace(/[^a-z0-9]/gi,"_")+"_"+k.replace(/[^a-z0-9]/gi,"_");
        const el=document.getElementById(sid);
        if(!el)continue;
        el.innerHTML=urls.map(u=>{
          const att=atts.find(a=>a.file_token===u.file_token)||{};
          const name=att.name||"";
          const isImg=/\.(jpg|jpeg|png|gif|webp)$/i.test(name);
          return isImg
            ?`<img src="${u.tmp_download_url}" alt="${name}" style="max-width:100%;max-height:260px;border-radius:8px;margin:4px 0;display:block" loading="lazy">`
            :`<a href="${u.tmp_download_url}" target="_blank" style="color:#6366f1;font-size:13px;display:block;margin:4px 0">📎 ${name||"下載附件"}</a>`;
        }).join("")||'<span style="color:#94a3b8;font-size:13px">（無附件）</span>';
      }
    }catch(e){
      attKeys.forEach(k=>{
        const sid="att_"+rid.replace(/[^a-z0-9]/gi,"_")+"_"+k.replace(/[^a-z0-9]/gi,"_");
        const el=document.getElementById(sid);
        if(el)el.innerHTML='<span style="color:#ef4444;font-size:13px">圖片載入失敗</span>';
      });
    }
  }
}
function closeDetail(){
  _curRid="";
  document.getElementById("detail-modal").style.display="none";
  document.getElementById("detail-view-btns").style.display="flex";
  document.getElementById("detail-edit-btns").style.display="none";
  document.getElementById("detail-title").textContent="詳細資訊";
}
function _tsToDate(v){
  if(!v&&v!==0)return"";
  const n=typeof v==="number"?v:parseFloat(v);
  if(isNaN(n))return"";
  return new Date(n).toISOString().slice(0,10);
}
function openEdit(rid){
  const rec=allRecords.find(r=>r.record_id===rid);
  if(!rec)return;
  const f=rec.fields||{};
  const schema=_EDIT_SCHEMA;
  let html="";
  for(const[k,cfg]of Object.entries(schema)){
    const raw=f[k];
    const cur=fv(f,k)||"";
    const lbl=`<div class="df-key" style="padding-top:6px">${_esc(k)}</div>`;
    let inp="";
    if(cfg.type==="select"){
      const opts=cfg.options.map(o=>`<option${o===cur?' selected':''}>${_esc(o)}</option>`).join("");
      inp=`<select data-field="${k}" style="flex:1;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:13px;background:#fff;outline:none">${opts}</select>`;
    }else if(cfg.type==="textarea"){
      inp=`<textarea data-field="${k}" rows="3" style="flex:1;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:13px;resize:vertical;outline:none">${_esc(cur)}</textarea>`;
    }else if(cfg.type==="date"){
      const dateVal=_tsToDate(typeof raw==="number"?raw:(cur?new Date(cur).getTime():null));
      inp=`<input type="date" data-field="${k}" data-type="date" value="${dateVal}" style="flex:1;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:13px;outline:none">`;
    }else{
      const t=cfg.type==="number"?"number":"text";
      inp=`<input type="${t}" data-field="${k}" value="${_esc(cur)}" style="flex:1;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:13px;outline:none">`;
    }
    html+=`<div class="df-row">${lbl}<div style="flex:1">${inp}</div></div>`;
  }
  document.getElementById("detail-body").innerHTML=html||'<div style="color:#94a3b8;padding:20px 0;text-align:center">無可編輯欄位</div>';
  document.getElementById("detail-title").textContent="✏️ 編輯資料";
  document.getElementById("detail-view-btns").style.display="none";
  document.getElementById("detail-edit-btns").style.display="flex";
}
function cancelEdit(){
  document.getElementById("detail-view-btns").style.display="flex";
  document.getElementById("detail-edit-btns").style.display="none";
  document.getElementById("detail-title").textContent="詳細資訊";
  if(_curRid)openDetail(_curRid);
}
async function saveEdit(rid){
  const btn=document.getElementById("btn-save-edit");
  btn.disabled=true;btn.textContent="儲存中...";
  try{
    const fields={};
    document.querySelectorAll("#detail-body [data-field]").forEach(el=>{
      const k=el.dataset.field;
      const schema=_EDIT_SCHEMA[k]||{};
      let v=el.value.trim();
      if(schema.type==="number"){fields[k]=v?Number(v):null;}
      else if(schema.type==="date"||el.dataset.type==="date"){fields[k]=v?new Date(v).getTime():null;}
      else if(v){fields[k]=v;}
      else{fields[k]="";}
    });
    const tr=await fetch(_PROXY+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
    const td=await tr.json();
    if(td.code!==0)throw new Error("Token fail");
    const res=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["sales"]+"/records/"+rid,{
      method:"PUT",
      headers:{"Authorization":"Bearer "+td.tenant_access_token,"Content-Type":"application/json"},
      body:JSON.stringify({fields})
    });
    const d=await res.json();
    if(d.code!==0)throw new Error(d.msg||"API 錯誤 "+d.code);
    const idx=allRecords.findIndex(r=>r.record_id===rid);
    if(idx>=0)allRecords[idx].fields=Object.assign(allRecords[idx].fields||{},d.data?.record?.fields||{});
    cancelEdit();
    applyFilter();
    alert("✅ 已儲存");
  }catch(e){alert("❌ 儲存失敗："+e.message);}
  finally{btn.disabled=false;btn.textContent="💾 儲存";}
}
