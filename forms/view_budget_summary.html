<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>💵 項目預算總覽 — 蕪解</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-bottom:48px}
.hdr{background:#8b5cf615;border-bottom:2px solid #8b5cf6;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-title{font-size:19px;font-weight:700;color:#0f172a}
.hdr-sub{font-size:13px;color:#64748b;margin-top:2px}
.btn-back{background:#fff;color:#64748b;border:1px solid #e2e8f0;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block}
.btn-back:hover{border-color:#8b5cf6;color:#8b5cf6}
.btn-primary{background:#8b5cf6;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer}
.toolbar{padding:12px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid #e2e8f0}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;background:#f8fafc;outline:none}
.search-wrap input:focus{border-color:#8b5cf6}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:15px;pointer-events:none}
.filter-sel{padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;background:#f8fafc;outline:none;cursor:pointer}
.filter-sel:focus{border-color:#8b5cf6}
.stat-bar{padding:8px 20px;background:#fff;border-bottom:1px solid #f1f5f9;font-size:12px;color:#64748b;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:20px}
.proj-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px;box-shadow:0 1px 4px #0000000a;cursor:pointer;transition:transform .15s,box-shadow .15s;border-top:3px solid #8b5cf6}
.proj-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px #00000010}
.proj-name{font-size:15px;font-weight:700;color:#0f172a;margin-bottom:8px}
.budget-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.budget-label{color:#64748b}
.budget-val{font-weight:600}
.budget-income{color:#10b981}
.budget-expense{color:#f97316}
.budget-bar{margin:10px 0 4px;background:#f1f5f9;border-radius:6px;height:8px;overflow:hidden}
.budget-fill{height:100%;border-radius:6px;background:#8b5cf6;transition:width .4s}
.badge-sm{display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:600}
.empty{text-align:center;padding:60px;color:#94a3b8;font-size:14px}
#detail-modal{display:none;position:fixed;inset:0;background:#0009;z-index:9999;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.detail-box{background:#fff;border-radius:18px;max-width:700px;width:100%;margin:auto;padding:24px;position:relative}
.dt{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
.dt th{background:#f8fafc;color:#64748b;font-weight:600;padding:8px 12px;text-align:left;font-size:11px;border-bottom:1px solid #e2e8f0;white-space:nowrap}
.dt td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:#faf5ff}
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0 16px}
.sum-item{background:#f8fafc;border-radius:10px;padding:12px;text-align:center}
.sum-num{font-size:18px;font-weight:700;color:#8b5cf6}
.sum-lbl{font-size:11px;color:#64748b;margin-top:2px}
@media(max-width:600px){.grid{grid-template-columns:1fr}.sum-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left">
    <div style="font-size:26px">💵</div>
    <div><div class="hdr-title">項目預算總覽</div>
    <div class="hdr-sub" id="hdr-sub">載入中...</div></div>
  </div>
  <a href="../progress_browser.html" class="btn-back">← 進度查閱</a>
</div>
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search-box" placeholder="搜尋項目名稱..." oninput="applyFilter()">
  </div>
  <select class="filter-sel" id="year-filter" onchange="applyFilter()">
    <option value="">全部年度</option>
  </select>
  <select class="filter-sel" id="loc-filter" onchange="applyFilter()">
    <option value="">全部地點</option><option>台北</option><option>北京</option><option>曼谷</option><option>全公司</option>
  </select>
  <button class="btn-primary" onclick="exportCSV()">⬇ 匯出全部 CSV</button>
  <button class="btn-back" onclick="loadData()" style="white-space:nowrap">↻ 重新整理</button>
</div>
<div class="stat-bar">
  <span id="stat-text">— 筆記錄</span>
  <span id="stat-summary" style="color:#8b5cf6;font-weight:600"></span>
</div>
<div class="grid" id="grid"><div class="empty">載入中...</div></div>
<div id="budget-edit-modal" onclick="if(event.target===this)closeBudgetEdit()" style="display:none;position:fixed;inset:0;background:#0009;z-index:10000;align-items:center;justify-content:center;padding:20px;overflow-y:auto">
  <div style="background:#fff;border-radius:18px;max-width:460px;width:100%;padding:24px;position:relative">
    <button onclick="closeBudgetEdit()" style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8">✕</button>
    <div style="font-size:17px;font-weight:700;margin-bottom:16px">✏️ 編輯預算項目</div>
    <div id="budget-edit-body"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button onclick="closeBudgetEdit()" style="flex:1;background:#f1f5f9;border:none;border-radius:8px;padding:10px;font-size:14px;color:#64748b;cursor:pointer">取消</button>
      <button id="budget-save-btn" onclick="saveBudgetEdit()" style="flex:1;background:#8b5cf6;border:none;border-radius:8px;padding:10px;font-size:14px;color:#fff;cursor:pointer;font-weight:700">💾 儲存</button>
    </div>
  </div>
</div>
<div id="detail-modal" onclick="if(event.target===this)closeDetail()">
  <div class="detail-box">
    <button onclick="closeDetail()" style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8">✕</button>
    <div style="font-size:18px;font-weight:700;margin-bottom:4px;padding-right:32px" id="d-title"></div>
    <div id="d-sub" style="font-size:13px;color:#64748b;margin-bottom:12px"></div>
    <div class="sum-grid" id="d-summary"></div>
    <div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px">預算明細</div>
    <div style="overflow-x:auto">
      <table class="dt">
        <thead><tr><th>預算名稱</th><th>類別</th><th>性質</th><th style="text-align:right">單價</th><th style="text-align:right">數量</th><th style="text-align:right">金額</th><th>幣別</th><th>批次</th><th>執行率</th></tr></thead>
        <tbody id="d-table"></tbody>
      </table>
    </div>
    <div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:#fff;padding:10px 0 4px;border-top:1px solid #f1f5f9">
      <button class="btn-primary" onclick="exportProjectCSV(_curProj)" style="font-size:13px">⬇ 匯出此項目 CSV</button>
      <button onclick="closeDetail()" style="background:#f1f5f9;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;color:#64748b">關閉</button>
    </div>
  </div>
</div>
<script>
const _PROXY="https://feishu-proxy.raychou6913.workers.dev";
const _AT="YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _TBL="tblteo2QEO0jP8j9";
const _EXP_TBL="tblu2NkqBWyBSskG";
let allRecords=[];
let grouped={};
let _curProj="";
let _expMap={};
(function(){
  const s=JSON.parse(localStorage.getItem("wujie_session")||"null");
  if(!s||Date.now()>s.expires){localStorage.removeItem("wujie_session");location.replace("../login.html");}
})();
function fv(f,k){
  const v=f[k];
  if(v===null||v===undefined||v==="")return"";
  if(typeof v==="number")return String(v);
  if(Array.isArray(v))return v.map(x=>typeof x==="object"?(x.link||x.text||x.name||""):String(x)).join("");
  if(typeof v==="object")return v.link||v.text||v.name||"";
  return String(v);
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function projName(f){
  const note=fv(f,"備註")||"";
  const m=note.match(/^\[([^\]]+)\]/);
  return m?m[1]:("(無項目名稱)");
}
async function loadData(){
  document.getElementById("grid").innerHTML='<div class="empty">載入中...</div>';
  try{
    const r=await fetch(_PROXY+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
    const td=await r.json();
    if(td.code!==0)throw new Error("Token err");
    const tk=td.tenant_access_token;
    async function getAll(tbl){
      let items=[],pt=null;
      do{
        const url=_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+tbl+"/records?page_size=100"+(pt?"&page_token="+pt:"");
        const res=await fetch(url,{headers:{"Authorization":"Bearer "+tk}});
        const d=await res.json();
        if(d.code!==0)throw new Error(d.msg);
        items=items.concat(d.data?.items||[]);
        pt=d.data?.has_more?d.data.page_token:null;
      }while(pt);
      return items;
    }
    const [budgetItems,expItems]=await Promise.all([getAll(_TBL),getAll(_EXP_TBL)]);
    allRecords=budgetItems;
    _expMap={};
    expItems.forEach(item=>{
      const f=item.fields||{};
      const proj=Array.isArray(f["項目關聯"])?f["項目關聯"][0]?.text||"":String(f["項目關聯"]||"");
      if(!proj)return;
      if(!_expMap[proj])_expMap[proj]={total:0,items:[]};
      const amt=parseFloat(fv(f,"實際金額"))||0;
      _expMap[proj].total+=amt;
      _expMap[proj].items.push({cat:fv(f,"費用類別"),amt,cur:fv(f,"幣別")});
    });
    const years=[...new Set(budgetItems.map(i=>fv(i.fields,"年度")).filter(Boolean))].sort().reverse();
    const sel=document.getElementById("year-filter");
    years.forEach(y=>{const o=document.createElement("option");o.value=y;o.textContent=y+"年";sel.appendChild(o);});
    document.getElementById("hdr-sub").textContent="共 "+budgetItems.length+" 筆預算記錄";
    applyFilter();
  }catch(e){
    document.getElementById("grid").innerHTML='<div class="empty">⚠️ 載入失敗：'+e.message+'</div>';
  }
}
function applyFilter(){
  const q=(document.getElementById("search-box").value||"").trim().toLowerCase();
  const yr=document.getElementById("year-filter").value;
  const loc=document.getElementById("loc-filter").value;
  const filtered=allRecords.filter(i=>{
    const f=i.fields||{};
    const pn=projName(f).toLowerCase();
    if(q&&!pn.includes(q)&&!fv(f,"預算名稱").toLowerCase().includes(q))return false;
    if(yr&&fv(f,"年度")!==yr)return false;
    if(loc&&fv(f,"團隊辦公地")!==loc)return false;
    return true;
  });
  grouped={};
  let totalIncome=0,totalExpense=0;
  for(const i of filtered){
    const f=i.fields||{};
    const pn=projName(f);
    if(!grouped[pn])grouped[pn]=[];
    grouped[pn].push({...f,__rid:i.record_id});
    const amt=parseFloat(fv(f,"預算金額"))||0;
    if(fv(f,"預算性質")==="收入")totalIncome+=amt;else totalExpense+=amt;
  }
  document.getElementById("stat-text").textContent=filtered.length+" 筆 / "+Object.keys(grouped).length+" 個項目";
  document.getElementById("stat-summary").textContent="收入預算 "+fmt(totalIncome)+" · 支出預算 "+fmt(totalExpense);
  renderCards();
}
function fmt(n){
  if(n>=1000000)return(n/1000000).toFixed(1)+"M";
  if(n>=1000)return(n/1000).toFixed(0)+"K";
  return Math.round(n).toLocaleString();
}
function _margin(inc,exp){
  if(!inc)return null;
  return Math.round((inc-exp)/inc*100);
}
function _marginColor(pct){
  return pct>=30?'#10b981':pct>=15?'#f59e0b':'#ef4444';
}
function renderCards(){
  const projs=Object.keys(grouped).sort();
  if(!projs.length){document.getElementById("grid").innerHTML='<div class="empty">😕 沒有符合的預算記錄</div>';return;}
  let html="";
  for(const pn of projs){
    const items=grouped[pn];
    let income=0,expense=0;
    for(const f of items){
      const amt=parseFloat(fv(f,"預算金額"))||0;
      if(fv(f,"預算性質")==="收入")income+=amt;else expense+=amt;
    }
    const actualExp=(_expMap[pn]?.total)||0;
    const expRate=expense>0?Math.min(150,Math.round(actualExp/expense*100)):0;
    const overBudget=actualExp>expense&&expense>0;
    const mpct=_margin(income,expense);
    const mc=mpct!==null?_marginColor(mpct):'#94a3b8';
    const batches=[...new Set(items.map(f=>fv(f,"批次")).filter(Boolean))].join(" / ")||"";
    const barColor=expRate>100?"#ef4444":expRate>80?"#f59e0b":"#10b981";
    html+=`<div class="proj-card" onclick="openDetail('${esc(pn)}')" style="${overBudget?'border-top-color:#ef4444':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div class="proj-name" style="margin:0">${esc(pn)}</div>
        <div style="display:flex;gap:6px;align-items:center">
          ${overBudget?'<span style="font-size:11px;background:#fee2e2;color:#ef4444;border-radius:5px;padding:2px 6px;font-weight:700">超支</span>':''}
          ${mpct!==null?`<div style="background:${mc}18;color:${mc};border-radius:8px;padding:4px 10px;font-size:13px;font-weight:700;text-align:center">${mpct}%<div style="font-size:9px;opacity:.8">毛利</div></div>`:''}</div></div>
      ${batches?`<div style="font-size:11px;color:#8b5cf6;margin-bottom:8px">批次：${esc(batches)}</div>`:''}
      <div class="budget-row"><span class="budget-label">收入預算</span><span class="budget-val budget-income">${fmt(income)}</span></div>
      <div class="budget-row"><span class="budget-label">支出預算</span><span class="budget-val budget-expense">${fmt(expense)}</span></div>
      <div class="budget-row"><span class="budget-label">實際支出</span><span class="budget-val" style="color:${overBudget?'#ef4444':'#0f172a'};font-weight:700">${fmt(actualExp)} ${overBudget?'⚠️':''}</span></div>
      <div style="margin:8px 0 2px">
        <div style="background:#f1f5f9;border-radius:6px;height:8px;overflow:hidden">
          <div style="width:${Math.min(100,expRate)}%;height:100%;border-radius:6px;background:${barColor};transition:width .4s"></div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px">
        <span style="color:${barColor};font-weight:600">已執行 ${expRate}%</span>
        <span style="color:#94a3b8">${items.length} 筆預算</span>
      </div>
    </div>`;
  }
  document.getElementById("grid").innerHTML=html;
}
function openDetail(pn){
  _curProj=pn;
  const items=grouped[pn]||[];
  document.getElementById("d-title").textContent=pn;
  const yrs=[...new Set(items.map(f=>fv(f,"年度")).filter(Boolean))].sort().join("、");
  const locs=[...new Set(items.map(f=>fv(f,"團隊辦公地")).filter(Boolean))].join("、");
  const batches=[...new Set(items.map(f=>fv(f,"批次")).filter(Boolean))].join(" / ");
  document.getElementById("d-sub").textContent=(yrs?yrs+"年　":"")+locs+(batches?" ｜ 批次："+batches:"");
  let income=0,expense=0;
  for(const f of items){
    const amt=parseFloat(fv(f,"預算金額"))||0;
    if(fv(f,"預算性質")==="收入")income+=amt;else expense+=amt;
  }
  const actualExp=(_expMap[pn]?.total)||0;
  const expRate=expense>0?Math.min(150,Math.round(actualExp/expense*100)):0;
  const overBudget=actualExp>expense&&expense>0;
  const mpct=_margin(income,expense);
  const mc=mpct!==null?_marginColor(mpct):'#94a3b8';
  const barColor=expRate>100?"#ef4444":expRate>80?"#f59e0b":"#10b981";
  document.getElementById("d-summary").innerHTML=`
    <div class="sum-item"><div class="sum-num" style="color:#10b981">${income.toLocaleString()}</div><div class="sum-lbl">收入預算</div></div>
    <div class="sum-item"><div class="sum-num" style="color:#f97316">${expense.toLocaleString()}</div><div class="sum-lbl">支出預算</div></div>
    <div class="sum-item"><div class="sum-num" style="color:${overBudget?'#ef4444':'#0f172a'}">${actualExp.toLocaleString()}${overBudget?' ⚠️':''}</div><div class="sum-lbl">實際支出</div></div>
    <div class="sum-item"><div class="sum-num" style="color:${mpct!==null?mc:'#94a3b8'}">${mpct!==null?mpct+'%':'—'}</div><div class="sum-lbl">毛利率</div></div>
    <div class="sum-item"><div class="sum-num" style="color:${income-expense>=0?'#10b981':'#ef4444'}">${(income-expense).toLocaleString()}</div><div class="sum-lbl">淨利潤</div></div>
    <div class="sum-item"><div class="sum-num" style="color:${barColor};font-weight:700">${expRate}%</div><div class="sum-lbl">執行率（實際）</div></div>`;
  const expItems=_expMap[pn]?.items||[];
  const expByCategory={};
  expItems.forEach(e=>{expByCategory[e.cat||"其他"]=(expByCategory[e.cat||"其他"]||0)+e.amt;});
  const expBreakdown=Object.entries(expByCategory).sort((a,b)=>b[1]-a[1]);
  if(expBreakdown.length){
    const breakHtml='<div style="margin:14px 0 8px;font-size:12px;font-weight:600;color:#64748b">實際費用明細（按類別）</div>'+
      expBreakdown.map(([cat,amt])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f1f5f9;font-size:13px"><span style="color:#475569">${esc(cat)}</span><span style="font-weight:600">${amt.toLocaleString()}</span></div>`).join("");
    document.getElementById("d-summary").insertAdjacentHTML("afterend",breakHtml);
  }
  const _bse=JSON.parse(localStorage.getItem("wujie_session")||"null");
  const _bSuper=_bse&&(_bse.role==="超級管理員"||_bse.role==="總部管理中心"||["Ray","Shawn","安然"].includes(_bse.name));
  const _bCanEdit=_bSuper||["財務","管理層"].includes(_bse?.role||"");
  const tbody=document.getElementById("d-table");
  const thead=document.querySelector("#detail-modal table thead tr");
  if(thead){
    const hasEditCol=thead.querySelector("th.edit-col");
    if(_bCanEdit&&!hasEditCol){const th=document.createElement("th");th.className="edit-col";th.textContent="";thead.appendChild(th);}
    if(!_bCanEdit&&hasEditCol)hasEditCol.remove();
  }
  const INC_C="#10b981";const EXP_C="#f97316";
  tbody.innerHTML=items.map(f=>{
    const isInc=fv(f,"預算性質")==="收入";
    const r2=parseFloat(fv(f,"執行率%"))||0;
    const unit=fv(f,"單價");const qty=fv(f,"數量");
    const editBtn=_bCanEdit?`<td><button onclick="openBudgetEdit('${f.__rid}',event)" style="background:#8b5cf6;color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer">✏️</button></td>`:"";
    return `<tr>
      <td style="font-weight:600">${esc(fv(f,"預算名稱"))||"—"}</td>
      <td style="color:#64748b">${esc(fv(f,"類別"))||"—"}</td>
      <td><span style="background:${isInc?INC_C+"20":EXP_C+"20"};color:${isInc?INC_C:EXP_C};padding:2px 7px;border-radius:6px;font-size:11px;font-weight:600">${isInc?"收入":"支出"}</span></td>
      <td style="text-align:right;color:#64748b">${unit?parseFloat(unit).toLocaleString():"—"}</td>
      <td style="text-align:right;color:#64748b">${qty?parseFloat(qty).toLocaleString():"—"}</td>
      <td style="text-align:right;font-weight:600">${(parseFloat(fv(f,"預算金額"))||0).toLocaleString()}</td>
      <td style="color:#64748b">${esc(fv(f,"幣別"))}</td>
      <td style="color:#8b5cf6;font-size:11px">${esc(fv(f,"批次"))||"—"}</td>
      <td><div style="display:flex;align-items:center;gap:4px"><div style="background:#f1f5f9;border-radius:4px;height:6px;width:50px;overflow:hidden"><div style="width:${r2}%;background:${r2>90?"#ef4444":r2>70?"#f59e0b":"#8b5cf6"};height:100%"></div></div><span style="font-size:11px;color:#94a3b8">${r2}%</span></div></td>
      ${editBtn}
    </tr>`;
  }).join("")||'<tr><td colspan="10" style="text-align:center;color:#94a3b8;padding:16px">無明細</td></tr>';
  document.getElementById("detail-modal").style.display="flex";
}
function closeDetail(){document.getElementById("detail-modal").style.display="none";}
let _budgetEditRid="";
function openBudgetEdit(rid,e){
  e&&e.stopPropagation();
  _budgetEditRid=rid;
  const rec=allRecords.find(r=>r.record_id===rid);
  if(!rec)return;
  const f=rec.fields||{};
  const schema=[
    ["預算名稱","text",null],["類別","text",null],
    ["預算性質","select",["收入","支出"]],
    ["單價","number",null],["數量","number",null],["預算金額","number",null],
    ["幣別","select",["CNY","TWD","THB","USD"]],
    ["批次","text",null],["執行率%","number",null],["備註","textarea",null]
  ];
  let html="";
  for(const[k,t,opts]of schema){
    const cur=fv(f,k)||"";
    const lbl=`<div style="font-size:12px;color:#94a3b8;min-width:80px;padding-top:6px">${k}</div>`;
    let inp;
    if(t==="select")inp=`<select data-field="${k}" style="flex:1;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:13px;background:#fff;outline:none">${opts.map(o=>`<option${o===cur?" selected":""}>${o}</option>`).join("")}</select>`;
    else if(t==="textarea")inp=`<textarea data-field="${k}" rows="2" style="flex:1;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:13px;resize:vertical;outline:none">${cur}</textarea>`;
    else inp=`<input type="${t==="number"?"number":"text"}" data-field="${k}" value="${cur}" style="flex:1;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:13px;outline:none">`;
    html+=`<div style="display:flex;gap:12px;padding:7px 0;border-bottom:1px solid #f1f5f9">${lbl}<div style="flex:1">${inp}</div></div>`;
  }
  document.getElementById("budget-edit-body").innerHTML=html;
  document.getElementById("budget-edit-modal").style.display="flex";
}
function closeBudgetEdit(){document.getElementById("budget-edit-modal").style.display="none";_budgetEditRid="";}
async function saveBudgetEdit(){
  if(!_budgetEditRid)return;
  const btn=document.getElementById("budget-save-btn");
  btn.disabled=true;btn.textContent="儲存中...";
  try{
    const fields={};
    document.querySelectorAll("#budget-edit-body [data-field]").forEach(el=>{
      const k=el.dataset.field;const v=el.value.trim();
      if(el.tagName==="INPUT"&&el.type==="number")fields[k]=v?Number(v):null;
      else if(v)fields[k]=v;else fields[k]="";
    });
    const tr=await fetch(_PROXY+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
    const td=await tr.json();
    if(td.code!==0)throw new Error("Token fail");
    const res=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TBL+"/records/"+_budgetEditRid,{
      method:"PUT",headers:{"Authorization":"Bearer "+td.tenant_access_token,"Content-Type":"application/json"},
      body:JSON.stringify({fields})
    });
    const d=await res.json();
    if(d.code!==0)throw new Error(d.msg||"API 錯誤");
    const idx=allRecords.findIndex(r=>r.record_id===_budgetEditRid);
    if(idx>=0)allRecords[idx].fields=Object.assign(allRecords[idx].fields||{},d.data?.record?.fields||{});
    closeBudgetEdit();
    applyFilter();
    openDetail(_curProj);
    alert("✅ 已儲存");
  }catch(e){alert("❌ 儲存失敗："+e.message);}
  finally{btn.disabled=false;btn.textContent="💾 儲存";}
}
function _buildCSV(rows){
  const headers=["項目","預算名稱","類別","性質","單價","數量","預算金額","幣別","批次","已使用","剩餘","執行率%","年度","季度","團隊辦公地","備註"];
  const lines=[headers.join(",")];
  for(const f of rows){
    const cols=[projName(f),fv(f,"預算名稱"),fv(f,"類別"),fv(f,"預算性質"),fv(f,"單價"),fv(f,"數量"),fv(f,"預算金額"),fv(f,"幣別"),fv(f,"批次"),fv(f,"已使用金額"),fv(f,"剩餘預算"),fv(f,"執行率%"),fv(f,"年度"),fv(f,"季度"),fv(f,"團隊辦公地"),fv(f,"備註")];
    lines.push(cols.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(","));
  }
  return "﻿"+lines.join("\n");
}
function exportCSV(){
  const all=Object.values(grouped).flat();
  const blob=new Blob([_buildCSV(all)],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="budget_all_"+new Date().toISOString().slice(0,10)+".csv";a.click();
}
function exportProjectCSV(pn){
  const rows=grouped[pn]||[];
  const blob=new Blob([_buildCSV(rows)],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="budget_"+pn.replace(/[^\w]/g,"_")+"_"+new Date().toISOString().slice(0,10)+".csv";a.click();
}
loadData();
