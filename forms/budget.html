<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>💵 預算編列 — 蕪解</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-bottom:48px}
.hdr{background:#8b5cf612;border-bottom:2px solid #8b5cf6;padding:18px 20px;display:flex;align-items:center;gap:12px}
.hdr-icon{font-size:26px}.hdr-title{font-size:19px;font-weight:700;color:#0f172a}
.hdr-sub{font-size:13px;color:#64748b;margin-top:2px}
.wrap{max-width:620px;margin:24px auto;padding:0 14px}
.card{background:#ffffff;border:1px solid #e2e8f0;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px #0000000a}
.ctitle{font-size:12px;font-weight:700;color:#8b5cf6;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.f{margin-bottom:13px}
.f label{display:block;font-size:13px;color:#64748b;margin-bottom:5px;font-weight:600}
.f input,.f select,.f textarea{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;color:#0f172a;font-size:14px;outline:none;transition:border .15s}
.f input:focus,.f select:focus,.f textarea:focus{border-color:#8b5cf6;background:#fff}
.f textarea{min-height:72px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.req{color:#8b5cf6}
.hint{font-size:11px;color:#94a3b8;margin-top:3px}
.btn{width:100%;background:#8b5cf6;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:all .15s}
.btn:hover{opacity:.88;transform:translateY(-1px)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.result{display:none;border-radius:12px;padding:20px;text-align:center;margin-top:14px;border:1px solid}
.result.ok{background:#f0fdf4;border-color:#10b981;color:#166534}
.result.err{background:#fef2f2;border-color:#ef4444;color:#991b1b}
.result-icon{font-size:32px;margin-bottom:8px}
.result-msg{font-size:15px;font-weight:700}
.result-sub{font-size:12px;margin-top:4px;opacity:.8;word-break:break-all}
.back{display:block;text-align:center;color:#64748b;font-size:15px;font-weight:500;margin-top:24px;text-decoration:none;padding:10px}
.back:hover{color:#8b5cf6}
@media(max-width:480px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-icon">💵</div>
  <div><div class="hdr-title">預算編列</div>
  <div class="hdr-sub">蕪解創意 · 填報後即時同步管理儀表板</div></div>
</div>
<div id="popup-mode-banner" style="display:none;background:#fff7ed;border-bottom:2px solid #f59e0b;padding:9px 20px;font-size:13px;font-weight:700;color:#92400e;letter-spacing:.2px">🏪 快閃店模式 — 項目選單已篩選為快閃店專屬項目</div>
<div class="wrap">
<form id="frm">

    <div class="card" style="border-color:#8b5cf6">
      <div class="ctitle" style="color:#a78bfa">📋 關聯項目（必填）</div>
      <div class="f">
        <label>選擇項目 <span class="req" style="color:#8b5cf6">*</span></label>
        <select id="proj-sel" required><option value="">載入中...</option></select>
        <div class="hint">必須先選擇項目，才能編列該項目的預算</div>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">預算明細</div>
      <div class="f"><label>預算名稱 <span class="req">*</span></label>
        <input id="f-name" required placeholder="請選擇或自填" list="f-name-list">
        <datalist id="f-name-list"></datalist></div>
      <div class="row2">
        <div class="f"><label>預算類別</label>
          <select id="f-cat" onchange="_updBN()">
            <option>生產製造</option><option>開發費用</option><option>版權費用</option>
            <option>採購</option><option>行銷</option><option>運營</option>
            <option>人事</option><option>差旅</option><option>展場</option>
            <option>物流</option><option>設計</option><option>其他支出</option>
            <option>預計收入</option>
          </select></div>
        <div class="f"><label>預算性質</label>
          <select id="f-nature">
            <option>支出</option><option>收入</option>
          </select></div>
      </div>
      <!-- 版權費用計算輔助 -->
      <div id="royal-helper" style="display:none;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:10px;padding:14px;margin-bottom:12px">
        <div style="font-size:12px;font-weight:700;color:#7c3aed;margin-bottom:10px">🧮 版權費計算器（選填，自動帶入金額）</div>
        <div class="row2">
          <div class="f"><label>零售價</label><input type="number" id="rh-retail" placeholder="單件零售價" oninput="_calcRoyal()"></div>
          <div class="f"><label>版稅率 %</label><input type="number" id="rh-rate" placeholder="例：12" step="0.1" oninput="_calcRoyal()"></div>
        </div>
        <div class="row2">
          <div class="f"><label>預計數量</label><input type="number" id="rh-qty" placeholder="件數" oninput="_calcRoyal()"></div>
          <div class="f"><label>計算結果</label><input type="number" id="rh-result" readonly placeholder="0" style="background:#ede9fe;font-weight:700;color:#7c3aed"></div>
        </div>
        <div class="hint">版稅 = 零售價 × 版稅率% × 數量；點擊「帶入金額」填入預算金額</div>
        <button type="button" onclick="_applyRoyal()" style="margin-top:8px;background:#8b5cf6;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer">帶入金額 →</button>
      </div>
      <div class="row2">
        <div class="f"><label>預算金額 <span class="req">*</span></label>
          <input type="number" id="f-budget" required placeholder="0"></div>
        <div class="f"><label>幣別</label>
          <select id="f-cur">
            <option>TWD</option><option>CNY</option><option>THB</option><option>USD</option>
          </select></div>
      </div>
      <div class="f"><label>批次</label>
        <select id="f-batch">
          <option value="">— 不分批次 —</option>
          <option>第一批</option><option>追加批-1</option><option>追加批-2</option>
          <option>追加批-3</option><option>開發期（一次性）</option>
        </select></div>
    </div>
    <div class="card">
      <div class="ctitle">期間</div>
      <div class="row2">
        <div class="f"><label>年度</label>
          <input type="number" id="f-year" placeholder="2026"></div>
        <div class="f"><label>季度</label>
          <select id="f-quarter">
            <option>Q1</option><option>Q2</option><option>Q3</option><option>Q4</option><option>全年</option>
          </select></div>
      </div>
      <div class="f"><label>所在地</label>
        <select id="f-loc">
          <option>台北</option><option>北京</option><option>曼谷</option><option>全公司</option>
        </select></div>
      <div class="f"><label>填報人</label>
        <input id="f-owner" placeholder="你的名字"></div>
      <div class="f"><label>備註</label>
        <textarea id="f-note" placeholder="說明此預算項目的用途、依據..."></textarea></div>
    </div>
<button class="btn" type="submit" id="sbtn">提交</button>
</form>
<div class="result" id="res">
  <div class="result-icon" id="res-icon"></div>
  <div class="result-msg" id="res-msg"></div>
  <div class="result-sub" id="res-sub"></div>
</div>
<a class="back" href="index.html">← 返回填報中心</a>
</div>
<script>

const _PROXY="https://feishu-proxy.raychou6913.workers.dev";
const _AT="YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _TABLES={"project": "tblYBjAlemYPuNGy", "cashflow": "tblxaiogh3tYlZUz", "budget": "tblteo2QEO0jP8j9", "sales": "tblRtqmbO9TO3sYZ", "design": "tblTEoNLDvtYi4pX", "procure": "tblae5v8pGMXleJZ", "stock": "tblsmZ7S5cNiYN4Y", "contract": "tbltnJNDhRNwVkZC", "approval": "tblD6acV3m2ZXJHe", "product": "tblH1pYYlHBGSBHc", "ip_db": "tblHPNUTdcFa7tqs", "supplier": "tblgpiqW1yOa2DR4", "customer": "tblXMXDGZKw8KOsl", "design_vendor": "tblc8uH2yHbOAI4l", "logistics": "tbl1MeP2wUWHwenW", "daily_sales": "tblz7zvgbzOqknzm", "popup_venue": "tbldKRVsE4RcoZrD", "consignment": "tblypFKMeOARPFT1", "visit_log": "tblUzRSQgKLhlttk", "notice_board": "tblPtgudsOOlmJAx", "feedback": "tbl68ofUGp7FTjx8", "meeting": "tblEf71rCbLy3GGO", "venue_db": "tblHSG9gEJ53iO1l", "daily_briefing": "tbliwX6nFg6rryn7", "expense": "tblu2NkqBWyBSskG"};

async function _getToken(){
  const r=await fetch(_PROXY+"/auth/token",{
    method:"POST",headers:{"Content-Type":"application/json"},body:"{}"
  });
  if(!r.ok) throw new Error("Token HTTP "+r.status);
  const d=await r.json();
  if(d.code!==0) throw new Error("Token err: "+d.msg);
  return d.tenant_access_token;
}

async function _post(tableKey,fields){
  Object.keys(fields).forEach(k=>{ if(fields[k]===null||fields[k]===undefined) delete fields[k]; });
  const tk=await _getToken();
  const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES[tableKey]+"/records",{
    method:"POST",
    headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  if(!r.ok) throw new Error("HTTP "+r.status);
  const d=await r.json();
  if(d.code!==0) throw new Error("["+d.code+"] "+(d.msg||"API error"));
  return d;
}

async function _getProjects(typeFilter){
  const tk=await _getToken();
  const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["project"]+"/records?page_size=100",{
    headers:{"Authorization":"Bearer "+tk}
  });
  const d=await r.json();
  if(d.code!==0) return [];
  const items=(d.data?.items||[]).map(rec=>{
    const f=rec.fields||{};
    const n=f["項目名稱"];
    if(!n) return null;
    const name=Array.isArray(n)?n[0]?.text||"":String(n);
    const tv=f["業務類型"];
    const type=Array.isArray(tv)?tv[0]?.text||"":String(tv||"");
    return {name,type};
  }).filter(Boolean);
  if(typeFilter) return items.filter(p=>p.type===typeFilter).map(p=>p.name);
  return items.map(p=>p.name);
}

function _ts(dateStr){ return dateStr?new Date(dateStr).getTime():null; }

async function _loadProjectSelect(selectId,typeFilter){
  const sel=document.getElementById(selectId);
  if(!sel) return;
  try{
    const list=await _getProjects(typeFilter);
    sel.innerHTML='<option value="">— 選擇項目（選填）—</option>';
    list.forEach(name=>{
      const o=document.createElement("option");
      o.value=name; o.textContent=name;
      sel.appendChild(o);
    });
    const opt=document.createElement("option");
    opt.value="__new__"; opt.textContent="＋ 新增項目（跳轉）";
    sel.appendChild(opt);
    sel.onchange=()=>{
      if(sel.value==="__new__") window.open("project.html","_blank");
    };
  }catch(e){
    sel.innerHTML='<option value="">（無法載入項目列表）</option>';
    const txt=document.createElement("input");
    txt.type="text"; txt.placeholder="請手動輸入項目名稱";
    txt.style.cssText="width:100%;margin-top:6px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;color:#0f172a;font-size:14px";
    txt.id=selectId+"_fallback";
    sel.parentNode.appendChild(txt);
  }
}

function _projVal(selectId){
  const sel=document.getElementById(selectId);
  const fb=document.getElementById(selectId+"_fallback");
  if(fb) return fb.value.trim();
  return sel?.value==="__new__"?"":sel?.value||"";
}

function _dateToTs(v){ return v?new Date(v).getTime():null; }

async function _uploadImages(files,tk){
  const res=[];
  for(const f of files){
    const fd=new FormData();
    fd.append("file_name",f.name);
    fd.append("parent_type","bitable_image");
    fd.append("parent_node",_AT);
    fd.append("size",String(f.size));
    fd.append("file",f);
    const r=await fetch(_PROXY+"/open-apis/drive/v1/medias/upload_all",{
      method:"POST",headers:{"Authorization":"Bearer "+tk},body:fd
    });
    const d=await r.json();
    if(d.code!==0) throw new Error("圖片上傳失敗："+f.name+" ("+d.msg+")");
    res.push({file_token:d.data.file_token,name:f.name});
  }
  return res;
}

function _bindImgPreview(inputId,previewId){
  const inp=document.getElementById(inputId);
  if(!inp) return;
  inp.addEventListener("change",function(){
    const box=document.getElementById(previewId);
    box.innerHTML="";
    Array.from(this.files).forEach(f=>{
      const wrap=document.createElement("div");
      wrap.style.cssText="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:6px;width:90px;text-align:center;font-size:11px;color:#64748b;overflow:hidden;flex-shrink:0";
      if(f.type.startsWith("image/")){
        const img=document.createElement("img");
        img.src=URL.createObjectURL(f);
        img.style.cssText="width:78px;height:58px;object-fit:cover;border-radius:4px;margin-bottom:4px;display:block";
        wrap.appendChild(img);
      }
      const nm=document.createElement("div");
      nm.style.cssText="white-space:nowrap;overflow:hidden;text-overflow:ellipsis";
      nm.textContent=f.name;
      wrap.appendChild(nm);
      box.appendChild(wrap);
    });
  });
}

// 登入驗證 + 自動帶入填報人
window.addEventListener("DOMContentLoaded",function(){
  const s=JSON.parse(localStorage.getItem("wujie_session")||"null");
  if(!s||Date.now()>s.expires){
    localStorage.removeItem("wujie_session");
    location.replace("../login.html");
    return;
  }
  ["f-who","f-owner"].forEach(id=>{
    const el=document.getElementById(id);
    if(el&&!el.value) el.value=s.name;
  });
});

const _isPopup=new URLSearchParams(location.search).get('ctx')==='popup';
window._ctxTypeFilter=_isPopup?'快閃店':null;
if(_isPopup)document.getElementById('popup-mode-banner').style.display='block';

const _BN={
  '生產製造':['模具費','打樣費','大貨生產費','包材費','品檢費','工廠備料費'],
  '開發費用':['產品開發費','設計費','版費','3D建模費','樣品製作費'],
  '版權費用':['版稅（按出貨計）','版稅（按零售計）','MG保底金','授權費','版權代理佣金'],
  '採購':['採購成本','商品進貨費','樣品費','原材料費','備貨金'],
  '行銷':['社群廣告費','KOL合作費','活動宣傳費','印刷品製作費','展覽宣傳費'],
  '運營':['辦公室租金','水電費','辦公用品','軟體訂閱費','雜支'],
  '人事':['薪資費用','獎金','勞健保費用','外包人員費'],
  '差旅':['機票費','住宿費','交通費','餐費','簽證費'],
  '展場':['展位費','展場佈置費','道具費','設備租借費','施工費'],
  '物流':['運費','倉儲費','報關費','包材費','最後一哩配送'],
  '設計':['設計費','版費','修改費','外包設計費'],
  '其他支出':['雜費','應急備用金','未分類支出'],
  '預計收入':['批發銷售收入','零售銷售收入','代理佣金','授權金收入'],
  '場地費':['場地租金','保證金','場地服務費','水電管理費','場地清潔費'],
  '贊助收入':['品牌贊助金','展位贊助費','冠名贊助收入','媒體置換'],
  '寄售分潤':['品牌方寄售分潤','代售商品分潤','寄售結算款'],
  '展場布置':['展架製作費','道具費','裝飾材料費','施工費','燈光費'],
  '人員差旅':['機票費','住宿費','日常差旅補貼','簽證費','交通費'],
  '行銷推廣':['社群廣告投放','KOL合作費','印刷品製作','活動海報設計','公關費'],
  '物流倉儲':['貨運費','倉儲費','包材費','報關費','最後一哩配送'],
  '其他':['雜費','應急備用金','未分類支出'],
};
function _updBN(){
  const cat=document.getElementById('f-cat').value;
  const dl=document.getElementById('f-name-list');
  dl.innerHTML=(_BN[cat]||[]).map(function(n){return '<option value="'+n+'">';}).join('');
  document.getElementById('royal-helper').style.display=(cat==='版權費用')?'block':'none';
}
function _calcRoyal(){
  const retail=parseFloat(document.getElementById('rh-retail').value)||0;
  const rate=parseFloat(document.getElementById('rh-rate').value)||0;
  const qty=parseFloat(document.getElementById('rh-qty').value)||0;
  document.getElementById('rh-result').value=Math.round(retail*rate/100*qty)||'';
}
function _applyRoyal(){
  const v=document.getElementById('rh-result').value;
  if(v)document.getElementById('f-budget').value=v;
}
_loadProjectSelect("proj-sel",window._ctxTypeFilter||null);
if(_isPopup){
  document.getElementById("f-cat").innerHTML=
    '<option>場地費</option><option>贊助收入</option><option>寄售分潤</option>'+
    '<option>展場布置</option><option>人員差旅</option><option>行銷推廣</option>'+
    '<option>物流倉儲</option><option>其他</option>';
}
_updBN();
document.getElementById("frm").onsubmit=async(e)=>{
  e.preventDefault();
  const proj=_projVal("proj-sel");
  if(!proj){ alert("請先選擇關聯項目"); return; }
  const btn=document.getElementById("sbtn");
  const res=document.getElementById("res");
  btn.disabled=true; btn.textContent="提交中...";
  res.style.display="none";
  try{
    const budget=parseFloat(document.getElementById("f-budget").value)||0;
    if(!budget){ alert("請填寫預算金額"); return; }
    const batch=document.getElementById("f-batch").value;
    const fields={
      "預算名稱":   document.getElementById("f-name").value,
      "類別":       document.getElementById("f-cat").value,
      "預算性質":   document.getElementById("f-nature").value,
      "所在地":     document.getElementById("f-loc").value,
      "幣別":       document.getElementById("f-cur").value,
      "年度":       parseFloat(document.getElementById("f-year").value)||new Date().getFullYear(),
      "季度":       document.getElementById("f-quarter").value,
      "預算金額":   budget,
      "已使用金額": 0,
      "剩餘預算":   budget,
      "執行率%":    0,
      "備註":       "["+proj+"] "+document.getElementById("f-note").value,
    };
    if(batch)fields["批次"]=batch;
    await _post("budget", fields);
    res.className="result ok"; res.style.display="block";
    document.getElementById("res-icon").textContent="✅";
    document.getElementById("res-msg").textContent="預算已建立！";
    document.getElementById("res-sub").textContent="項目「"+proj+"」新增一筆預算，可繼續新增其他項目";
    document.getElementById("frm").reset();
    _loadProjectSelect("proj-sel",window._ctxTypeFilter||null);
    if(_isPopup){
      document.getElementById("f-cat").innerHTML=
        '<option>場地費</option><option>贊助收入</option><option>寄售分潤</option>'+
        '<option>展場布置</option><option>人員差旅</option><option>行銷推廣</option>'+
        '<option>物流倉儲</option><option>其他</option>';
    }
    _updBN();
  }catch(err){
    res.className="result err"; res.style.display="block";
    document.getElementById("res-icon").textContent="❌";
    document.getElementById("res-msg").textContent="提交失敗";
    document.getElementById("res-sub").textContent=err.message;
    console.error(err);
  }finally{
    btn.disabled=false; btn.textContent="提交";
  }
};
</script>
</body></html>
