<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>💵 預算編列 — 蕪解</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-bottom:48px}
.hdr{background:#8b5cf615;border-bottom:2px solid #8b5cf6;padding:18px 20px;display:flex;align-items:center;gap:12px}
.hdr-icon{font-size:26px}.hdr-title{font-size:19px;font-weight:700;color:#0f172a}
.hdr-sub{font-size:13px;color:#64748b;margin-top:2px}
.wrap{max-width:860px;margin:24px auto;padding:0 14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px #0000000a}
.ctitle{font-size:12px;font-weight:700;color:#8b5cf6;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.f{margin-bottom:12px}
.f label{display:block;font-size:13px;color:#64748b;margin-bottom:5px;font-weight:600}
.f input,.f select,.f textarea{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;color:#0f172a;font-size:14px;outline:none;transition:border .15s}
.f input:focus,.f select:focus{border-color:#8b5cf6;background:#fff}
.row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.req{color:#8b5cf6}
.hint{font-size:11px;color:#94a3b8;margin-top:3px}
/* ── 明細表格 ── */
.line-table{width:100%;border-collapse:collapse;font-size:13px}
.line-table th{background:#f5f3ff;color:#7c3aed;font-weight:700;padding:8px 10px;text-align:left;font-size:11px;white-space:nowrap;border-bottom:2px solid #ddd6fe}
.line-table td{padding:5px 4px;vertical-align:middle;border-bottom:1px solid #f1f5f9}
.line-table tr:last-child td{border-bottom:none}
.line-table input,.line-table select{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:7px;padding:7px 8px;color:#0f172a;font-size:13px;outline:none;width:100%}
.line-table input:focus,.line-table select:focus{border-color:#8b5cf6;background:#fff}
.line-table input[type=number]{text-align:right}
.note-inp{font-size:12px!important;color:#64748b!important;padding:5px 8px!important}
.del-btn{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:17px;padding:4px 6px;line-height:1;border-radius:6px}
.del-btn:hover{color:#ef4444;background:#fef2f2}
.copy-btn{background:none;border:none;color:#c4b5fd;cursor:pointer;font-size:14px;padding:4px 6px;line-height:1;border-radius:6px}
.copy-btn:hover{color:#8b5cf6;background:#f5f3ff}
.add-row-btn{background:#f5f3ff;border:1.5px dashed #c4b5fd;border-radius:8px;color:#7c3aed;font-size:13px;font-weight:600;cursor:pointer;padding:10px;width:100%;margin-top:8px;transition:background .15s}
.add-row-btn:hover{background:#ede9fe}
.total-bar{display:flex;gap:16px;align-items:center;padding:12px 14px;background:#f5f3ff;border-radius:10px;margin-top:12px;flex-wrap:wrap}
.total-item{font-size:13px;color:#64748b}
.total-item b{color:#0f172a;font-size:15px}
.total-item.income b{color:#10b981}
.total-item.expense b{color:#f97316}
.total-item.margin b{color:#8b5cf6}
/* ── 版稅計算器 ── */
.royal-box{background:#faf5ff;border:1px solid #ddd6fe;border-radius:10px;padding:12px 14px;margin-bottom:12px}
.royal-box-title{font-size:12px;font-weight:700;color:#7c3aed;margin-bottom:8px}
.royal-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end}
.royal-row input{background:#fff;border:1.5px solid #ddd6fe;border-radius:7px;padding:7px 10px;color:#0f172a;font-size:13px;outline:none;width:100%}
.royal-row input:focus{border-color:#8b5cf6}
.royal-apply{background:#8b5cf6;color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
/* ── Submit ── */
.btn{width:100%;background:#8b5cf6;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:6px}
.btn:hover{opacity:.88;transform:translateY(-1px)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.result{display:none;border-radius:12px;padding:20px;text-align:center;margin-top:14px;border:1px solid}
.result.ok{background:#f0fdf4;border-color:#10b981;color:#166534}
.result.err{background:#fef2f2;border-color:#ef4444;color:#991b1b}
.result-icon{font-size:32px;margin-bottom:8px}.result-msg{font-size:15px;font-weight:700}.result-sub{font-size:12px;margin-top:4px;opacity:.8}
.back{display:block;text-align:center;color:#64748b;font-size:15px;font-weight:500;margin-top:24px;text-decoration:none;padding:10px}
.back:hover{color:#8b5cf6}
@media(max-width:700px){.row4{grid-template-columns:1fr 1fr}.row3{grid-template-columns:1fr 1fr}.royal-row{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.row4{grid-template-columns:1fr}.row3{grid-template-columns:1fr}.row2{grid-template-columns:1fr}}
#_confirm-ov,#_result-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:none;align-items:center;justify-content:center;padding:16px}
#_confirm-ov.show,#_result-ov.show{display:flex}
#_confirm-box{background:#fff;border-radius:16px;padding:26px 24px 20px;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
#_confirm-ttl{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:4px}
#_confirm-sub{font-size:12px;color:#94a3b8;margin-bottom:14px}
#_confirm-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
#_confirm-tbl tr{border-bottom:1px solid #f1f5f9}
#_confirm-tbl td{padding:8px 4px;vertical-align:top}
#_confirm-tbl td:first-child{color:#64748b;width:38%;font-weight:500;padding-right:12px;white-space:nowrap}
#_confirm-tbl td:last-child{color:#0f172a;font-weight:600;word-break:break-word}
._cbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
._cbtns button{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700}
#_conf-no{background:#f1f5f9;color:#475569}
#_conf-yes{background:#8b5cf6;color:#fff}
#_result-box{background:#fff;border-radius:16px;padding:30px 24px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.r-icon{font-size:44px;margin-bottom:10px}
.r-title{font-size:18px;font-weight:700;color:#1e293b;margin-bottom:20px}
#_res-view{display:block;padding:11px;background:#8b5cf6;color:#fff;border-radius:9px;text-decoration:none;font-weight:700;font-size:14px;margin-bottom:8px}
#_res-again{width:100%;padding:11px;background:#f1f5f9;color:#475569;border:none;border-radius:9px;cursor:pointer;font-weight:700;font-size:14px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-icon">💵</div>
  <div><div class="hdr-title">預算編列</div>
  <div class="hdr-sub">蕪解創意 · 一次填入整個項目的所有預算明細</div></div>
</div>
<div id="popup-mode-banner" style="display:none;background:#fff7ed;border-bottom:2px solid #f59e0b;padding:9px 20px;font-size:13px;font-weight:700;color:#92400e">🏪 快閃店模式 — 類別已切換為快閃店專屬</div>
<div class="wrap">

<!-- ① 項目基本資訊 -->
<div class="card" style="border-top:3px solid #8b5cf6">
  <div class="ctitle">📋 項目資訊（套用至所有明細）</div>
  <div class="row2">
    <div class="f">
      <label>選擇項目 <span class="req">*</span></label>
      <select id="proj-sel"><option value="">載入中...</option></select>
    </div>
    <div class="f">
      <label>批次</label>
      <select id="g-batch">
        <option value="">— 不分批次 —</option>
        <option>第一批</option><option>追加批-1</option><option>追加批-2</option>
        <option>追加批-3</option><option>開發期（一次性）</option>
      </select>
    </div>
  </div>
  <div class="row3">
    <div class="f"><label>年度</label><input type="number" id="g-year" placeholder="2026"></div>
    <div class="f"><label>季度</label>
      <select id="g-quarter"><option>Q1</option><option>Q2</option><option>Q3</option><option>Q4</option><option>全年</option></select>
    </div>
    <div class="f"><label>所在地</label>
      <select id="g-loc"><option>台北</option><option>北京</option><option>曼谷</option><option>全公司</option></select>
    </div>
  </div>
  <div class="row3">
    <div class="f"><label>填報人</label><input id="g-who" placeholder="你的名字"></div>
    <div class="f"><label>預設幣別（新列自動套用）</label>
      <select id="g-defcur"><option>TWD</option><option>CNY</option><option>THB</option><option>USD</option></select>
    </div>
    <div class="f"><label>整批備註（選填）</label><input id="g-note" placeholder="例：吉伊卡哇第一批完整預算"></div>
  </div>
</div>

<!-- ② 版稅計算器 -->
<div class="royal-box" id="royal-box" style="display:none">
  <div class="royal-box-title">🧮 版稅計算器（計算後點「→ 帶入」填入所選列的金額）</div>
  <div class="royal-row">
    <div><label style="font-size:11px;color:#7c3aed;font-weight:600;display:block;margin-bottom:4px">零售價</label>
      <input type="number" id="rh-retail" placeholder="單件售價" oninput="_calcR()"></div>
    <div><label style="font-size:11px;color:#7c3aed;font-weight:600;display:block;margin-bottom:4px">版稅率 %</label>
      <input type="number" id="rh-rate" placeholder="12" step="0.1" oninput="_calcR()"></div>
    <div><label style="font-size:11px;color:#7c3aed;font-weight:600;display:block;margin-bottom:4px">數量</label>
      <input type="number" id="rh-qty" placeholder="件數" oninput="_calcR()"></div>
    <button class="royal-apply" type="button" onclick="_applyR()">→ 帶入</button>
  </div>
  <div style="margin-top:6px;font-size:12px;color:#7c3aed">計算結果：<b id="rh-result" style="font-size:14px">0</b></div>
</div>

<!-- ③ 預算明細表 -->
<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div class="ctitle" style="margin:0">📊 預算明細（可多筆）</div>
    <span id="row-count" style="font-size:12px;color:#94a3b8">0 筆</span>
  </div>
  <div style="overflow-x:auto">
    <table class="line-table">
      <thead><tr>
        <th style="width:28px">#</th>
        <th style="min-width:160px">預算名稱</th>
        <th style="min-width:120px">類別</th>
        <th style="min-width:70px">性質</th>
        <th style="min-width:90px;text-align:right">單價</th>
        <th style="min-width:80px;text-align:right">數量</th>
        <th style="min-width:110px;text-align:right">金額（單價×數量）</th>
        <th style="min-width:70px">幣別</th>
        <th style="min-width:150px">計算說明（選填）</th>
        <th style="width:56px"></th>
      </tr></thead>
      <tbody id="line-tbody"></tbody>
    </table>
  </div>
  <button type="button" class="add-row-btn" onclick="addRow()">＋ 新增一筆明細</button>
  <div class="total-bar" id="total-bar">
    <span class="total-item expense">支出合計：<b id="t-exp">0</b></span>
    <span class="total-item income">收入合計：<b id="t-inc">0</b></span>
    <span class="total-item">淨額：<b id="t-net">0</b></span>
    <span class="total-item margin">毛利率：<b id="t-margin">—</b></span>
  </div>
</div>

<button class="btn" id="sbtn" type="button" onclick="submitAll()">一鍵提交所有明細</button>
<div class="result" id="res">
  <div class="result-icon" id="res-icon"></div>
  <div class="result-msg" id="res-msg"></div>
  <div class="result-sub" id="res-sub"></div>
</div>
<a class="back" href="index.html">← 返回填報中心</a>
</div>

<script>

const _PROXY="https://feishu-proxy.raychou6913.workers.dev";
const _AT="YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _TABLES={"project": "tblYBjAlemYPuNGy", "cashflow": "tblxaiogh3tYlZUz", "budget": "tblteo2QEO0jP8j9", "sales": "tblRtqmbO9TO3sYZ", "design": "tblTEoNLDvtYi4pX", "procure": "tblae5v8pGMXleJZ", "stock": "tblsmZ7S5cNiYN4Y", "contract": "tbltnJNDhRNwVkZC", "approval": "tblD6acV3m2ZXJHe", "product": "tblH1pYYlHBGSBHc", "ip_db": "tblHPNUTdcFa7tqs", "supplier": "tblgpiqW1yOa2DR4", "customer": "tblXMXDGZKw8KOsl", "design_vendor": "tblc8uH2yHbOAI4l", "logistics": "tbl1MeP2wUWHwenW", "daily_sales": "tblz7zvgbzOqknzm", "popup_venue": "tbldKRVsE4RcoZrD", "consignment": "tblypFKMeOARPFT1", "visit_log": "tblUzRSQgKLhlttk", "notice_board": "tblPtgudsOOlmJAx", "feedback": "tbl68ofUGp7FTjx8", "meeting": "tblEf71rCbLy3GGO", "venue_db": "tblHSG9gEJ53iO1l", "daily_briefing": "tbliwX6nFg6rryn7", "expense": "tblu2NkqBWyBSskG", "follow_up": "tblyO9Cz2nUx6q46", "roles": "tblEj5GSDYUrKGY9"};

async function _getToken(){
  const r=await fetch(_PROXY+"/auth/token",{
    method:"POST",headers:{"Content-Type":"application/json"},body:"{}"
  });
  if(!r.ok) throw new Error("Token HTTP "+r.status);
  const d=await r.json();
  if(d.code!==0) throw new Error("Token err: "+d.msg);
  return d.tenant_access_token;
}

async function _post(tableKey,fields){
  Object.keys(fields).forEach(k=>{ if(fields[k]===null||fields[k]===undefined) delete fields[k]; });
  const tk=await _getToken();
  const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES[tableKey]+"/records",{
    method:"POST",
    headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  if(!r.ok) throw new Error("HTTP "+r.status);
  const d=await r.json();
  if(d.code!==0) throw new Error("["+d.code+"] "+(d.msg||"API error"));
  return d;
}

function _showConfirm(title,rows,onConfirm){
  const ov=document.getElementById("_confirm-ov");
  if(!ov){onConfirm();return;}
  document.getElementById("_confirm-ttl").textContent=title;
  document.getElementById("_confirm-tbl").innerHTML=rows.filter(([,v])=>v).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join("");
  ov.classList.add("show");
  document.getElementById("_conf-no").onclick=()=>ov.classList.remove("show");
  document.getElementById("_conf-yes").onclick=()=>{ov.classList.remove("show");onConfirm();};
}
function _showResult(rid,viewPage,onReset){
  const ov=document.getElementById("_result-ov");
  if(!ov)return;
  const ridEl=document.getElementById("_res-rid");
  if(ridEl) ridEl.textContent=rid||"";
  const vl=document.getElementById("_res-view");
  if(vl){if(viewPage&&rid){vl.href=viewPage+"?rid="+rid;vl.style.display="block";}else{vl.style.display="none";}}
  document.getElementById("_res-again").onclick=()=>{ov.classList.remove("show");if(onReset)onReset();};
  ov.classList.add("show");
}

async function _getProjects(typeFilter){
  const tk=await _getToken();
  const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["project"]+"/records?page_size=100",{
    headers:{"Authorization":"Bearer "+tk}
  });
  const d=await r.json();
  if(d.code!==0) return [];
  const items=(d.data?.items||[]).map(rec=>{
    const f=rec.fields||{};
    const n=f["項目名稱"];
    if(!n) return null;
    const name=Array.isArray(n)?n[0]?.text||"":String(n);
    const tv=f["業務類型"];
    const type=Array.isArray(tv)?tv[0]?.text||"":String(tv||"");
    const iv=f["IP品牌"];
    const ip=Array.isArray(iv)?iv[0]?.text||"":String(iv||"");
    return {name,type,ip};
  }).filter(Boolean);
  if(typeFilter) return items.filter(p=>p.type===typeFilter);
  return items;
}

// 從項目名稱快速查 IP（_getProjects 結果快取）
let _projCache=null;
async function _getProjMeta(name){
  if(!_projCache) _projCache=await _getProjects(null);
  return _projCache.find(p=>p.name===name)||null;
}

function _ts(dateStr){ return dateStr?new Date(dateStr).getTime():null; }

let _ipCache=null;
async function _getIpBrands(){
  if(_ipCache) return _ipCache;
  const tk=await _getToken();
  const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["ip_db"]+"/records?page_size=100",{
    headers:{"Authorization":"Bearer "+tk}
  });
  const d=await r.json();
  if(d.code!==0) return [];
  _ipCache=(d.data?.items||[]).map(rec=>{
    const f=rec.fields||{};
    const nv=f["IP名稱"]; const name=Array.isArray(nv)?nv[0]?.text||"":String(nv||"");
    const lv=f["版權方"]; const licensor=Array.isArray(lv)?lv[0]?.text||"":String(lv||"");
    const av=f["版權代理商"]; const agent=Array.isArray(av)?av[0]?.text||"":String(av||"");
    // cascadeLicensor = 代理商（若有）, 否則原廠；合約版權方需與此一致
    const cascadeLicensor=agent||licensor;
    return name?{name,licensor,agent,cascadeLicensor}:null;
  }).filter(Boolean);
  return _ipCache;
}

async function _loadIpSelect(selectId){
  const sel=document.getElementById(selectId);
  if(!sel) return;
  try{
    const list=await _getIpBrands();
    const prev=sel.value;
    sel.innerHTML='<option value="">— 選擇 IP 品牌 —</option>';
    list.forEach(ip=>{
      const o=document.createElement("option");
      o.value=ip.name; o.textContent=ip.name;
      if(ip.licensor) o.dataset.licensor=ip.licensor;
      sel.appendChild(o);
    });
    const other=document.createElement("option"); other.value="其他"; other.textContent="其他";
    sel.appendChild(other);
    // re-apply IP from linked project select if already chosen
    const projSel=document.getElementById("f-proj");
    const projIp=projSel?.options[projSel.selectedIndex]?.dataset?.ip;
    if(projIp) sel.value=projIp;
    else if(prev) sel.value=prev;
    const _syncLicensor=()=>{
      const chosen=sel.options[sel.selectedIndex];
      ["f-licensor","m-licensor"].forEach(id=>{
        const el=document.getElementById(id);
        if(el) el.value=chosen?.dataset?.licensor||"";
      });
    };
    sel.addEventListener("change",_syncLicensor);
    _syncLicensor();
  }catch(e){}
}

let _contractCache=null;
async function _getContracts(ipFilter){
  if(!_contractCache){
    const tk=await _getToken();
    const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["contract"]+"/records?page_size=200",{
      headers:{"Authorization":"Bearer "+tk}
    });
    const d=await r.json();
    if(d.code!==0){_contractCache=[];return [];}
    _contractCache=(d.data?.items||[]).map(rec=>{
      const f=rec.fields||{};
      const _t=v=>Array.isArray(v)?v[0]?.text||"":String(v||"");
      const _n=v=>{const r=parseFloat(_t(v));return isNaN(r)?0:r;};
      const name=_t(f["合約名稱"]);
      if(!name) return null;
      return {
        name, ip:_t(f["IP品牌"]), licensor:_t(f["版權方"]),
        status:_t(f["合約狀態"]), cats:_t(f["授權品類"]), region:_t(f["授權地區"]),
        amount:_n(f["保底金額"]), flatFee:_n(f["一次性授權費"]), cur:_t(f["幣別"])||"USD",
        royalRetail:_n(f["授權金_零售%"]), royalWholesale:_n(f["授權金_批發%"]),
        wholesaleRatio:_n(f["批發折數"]),
        startTs:_n(f["簽署日期"]), endTs:_n(f["到期日期"])
      };
    }).filter(Boolean);
  }
  return ipFilter?_contractCache.filter(c=>c.ip===ipFilter):_contractCache;
}

async function _loadContractSelect(selectId,ipFilter){
  const sel=document.getElementById(selectId);
  if(!sel) return;
  try{
    const list=await _getContracts(ipFilter);
    const prev=sel.value;
    sel.innerHTML='<option value="">— 選擇合約 —</option>';
    list.forEach(c=>{
      const o=document.createElement("option");
      const statusLabel=c.status?" ["+c.status+"]":"";
      o.value=c.name; o.textContent=c.name+statusLabel;
      o.dataset.ip=c.ip; o.dataset.licensor=c.licensor;
      o.dataset.status=c.status; o.dataset.cats=c.cats; o.dataset.region=c.region;
      o.dataset.amount=c.amount||0; o.dataset.cur=c.cur||"TWD";
      o.dataset.startTs=c.startTs||""; o.dataset.endTs=c.endTs||"";
      sel.appendChild(o);
    });
    if(list.length===0){
      const empty=document.createElement("option"); empty.disabled=true;
      empty.textContent="（尚無此 IP 的合約）"; sel.appendChild(empty);
    }
    if(prev) sel.value=prev;
    const _syncContract=()=>{
      const ch=sel.options[sel.selectedIndex];
      const _set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
      _set("f-ip",ch?.dataset?.ip||""); _set("m-ip",ch?.dataset?.ip||"");
      _set("f-licensor",ch?.dataset?.licensor||""); _set("m-licensor",ch?.dataset?.licensor||"");
      _set("f-cats",ch?.dataset?.cats||""); _set("m-cats",ch?.dataset?.cats||"");
      _set("f-contract-region",ch?.dataset?.region||"");
      const badge=document.getElementById("contract-status-badge");
      if(badge&&ch?.dataset?.status){
        const s=ch.dataset.status;
        const safe=["已簽署","執行中"];
        badge.style.display="inline-block";
        badge.textContent=s;
        badge.style.cssText+=";padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;"+
          (safe.includes(s)?"background:#f0fdf4;color:#166534;border:1px solid #10b981":"background:#fff7ed;color:#92400e;border:1px solid #f59e0b");
      }else if(badge){badge.style.display="none";}
    };
    sel.addEventListener("change",_syncContract);
    _syncContract();
  }catch(e){}
}

async function _loadProjectSelect(selectId,typeFilter){
  const sel=document.getElementById(selectId);
  if(!sel) return;
  try{
    const list=await _getProjects(typeFilter);
    sel.innerHTML='<option value="">— 選擇項目（選填）—</option>';
    list.forEach(proj=>{
      const o=document.createElement("option");
      o.value=proj.name; o.textContent=proj.name;
      if(proj.ip) o.dataset.ip=proj.ip;
      sel.appendChild(o);
    });
    const opt=document.createElement("option");
    opt.value="__new__"; opt.textContent="＋ 新增項目（跳轉）";
    sel.appendChild(opt);
    const _fillIp=()=>{
      const chosen=sel.options[sel.selectedIndex];
      const ipEl=document.getElementById("f-ip");
      if(ipEl && chosen && chosen.dataset.ip) ipEl.value=chosen.dataset.ip;
    };
    sel.onchange=()=>{
      if(sel.value==="__new__"){ window.open("project.html","_blank"); return; }
      _fillIp();
    };
    // URL param 自動帶入項目（從填報中心點擊卡片跳轉時使用）
    const urlProj=new URLSearchParams(location.search).get("proj");
    if(urlProj){
      const found=[...sel.options].find(o=>o.value===urlProj);
      if(found){sel.value=urlProj;sel.dispatchEvent(new Event("change"));}
    } else _fillIp();
  }catch(e){
    sel.innerHTML='<option value="">（無法載入項目列表）</option>';
    const txt=document.createElement("input");
    txt.type="text"; txt.placeholder="請手動輸入項目名稱";
    txt.style.cssText="width:100%;margin-top:6px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;color:#0f172a;font-size:14px";
    txt.id=selectId+"_fallback";
    sel.parentNode.appendChild(txt);
    const urlProj=new URLSearchParams(location.search).get("proj");
    if(urlProj) txt.value=urlProj;
  }
}

function _projVal(selectId){
  const sel=document.getElementById(selectId);
  const fb=document.getElementById(selectId+"_fallback");
  if(fb) return fb.value.trim();
  return sel?.value==="__new__"?"":sel?.value||"";

async function _uploadImages(files,tk){
  const res=[];
  for(const f of files){
    const fd=new FormData();
    fd.append("file_name",f.name);
    fd.append("parent_type","bitable_image");
    fd.append("parent_node",_AT);
    fd.append("size",String(f.size));
    fd.append("file",f);
    const r=await fetch(_PROXY+"/open-apis/drive/v1/medias/upload_all",{
      method:"POST",headers:{"Authorization":"Bearer "+tk},body:fd
    });
    const d=await r.json();
    if(d.code!==0) throw new Error("圖片上傳失敗："+f.name+" ("+d.msg+")");
    res.push({file_token:d.data.file_token,name:f.name});
  }
  return res;
}

function _catOptions(selected){

function _dlId(idx){return 'dl-'+idx;}

function _autoAmt(idx){
  const unit=parseFloat(document.getElementById('unit-'+idx)?.value)||0;
  const qty=parseFloat(document.getElementById('qty-'+idx)?.value)||0;
  if(unit&&qty){
    document.getElementById('amt-'+idx).value=(unit*qty).toFixed(2);
    updTotal();
  }
}

function addRow(catDefault,nameDefault,natDefault,amtDefault,curDefault,noteDefault,unitDefault,qtyDefault){
  const idx=++_rowIdx;
  const cat=catDefault||CATS[0];
  const dl=_dlId(idx);
  const cur=curDefault||_defCur();
  const tbody=document.getElementById('line-tbody');
  const tr=document.createElement('tr');
  tr.id='row-'+idx;
  const curOpts=['TWD','CNY','THB','USD'].map(c=>`<option${c===cur?' selected':''}>${c}</option>`).join('');
  tr.innerHTML=`
    <td style="color:#94a3b8;font-size:12px;text-align:center">${tbody.rows.length+1}</td>
    <td><input list="${dl}" placeholder="請選擇或自填" value="${nameDefault||''}" oninput="updTotal()" id="nm-${idx}">
        <datalist id="${dl}">${(BN[cat]||[]).map(n=>`<option value="${n}">`).join('')}</datalist></td>
    <td><select onchange="_catChange(${idx},this)" id="cat-${idx}">${_catOptions(cat)}</select></td>
    <td><select id="nat-${idx}" onchange="updTotal()">
          <option${(natDefault||'支出')==='支出'?' selected':''}>支出</option>
          <option${natDefault==='收入'?' selected':''}>收入</option>
        </select></td>
    <td><input type="number" min="0" step="0.01" placeholder="—" value="${unitDefault||''}"
         id="unit-${idx}" oninput="_autoAmt(${idx})" style="text-align:right"></td>
    <td><input type="number" min="0" step="1" placeholder="—" value="${qtyDefault||''}"
         id="qty-${idx}" oninput="_autoAmt(${idx})" style="text-align:right"></td>
    <td><input type="number" min="0" step="0.01" placeholder="0" value="${amtDefault||''}"
         id="amt-${idx}" oninput="updTotal()" onfocus="_setRoyalTarget(${idx})" style="text-align:right;font-weight:600;background:#fafaf5"></td>
    <td><select id="cur-${idx}">${curOpts}</select></td>
    <td><input class="note-inp" placeholder="計算依據說明" value="${noteDefault||''}" id="rownote-${idx}"></td>

function copyRow(idx){

    document.getElementById('cat-'+idx)?.value,
    document.getElementById('nm-'+idx)?.value,
    document.getElementById('nat-'+idx)?.value,

    document.getElementById('cur-'+idx)?.value,
    document.getElementById('rownote-'+idx)?.value,
    document.getElementById('unit-'+idx)?.value,
    document.getElementById('qty-'+idx)?.value
  );
}

function _catChange(idx,sel){
  const cat=sel.value;
  document.getElementById(_dlId(idx)).innerHTML=(BN[cat]||[]).map(n=>`<option value="${n}">`).join('');
  const isRoyal=(cat==='版權費用');
  document.getElementById('royal-box').style.display=isRoyal?'block':'none';
  if(isRoyal)_royalTargetRow=idx;
  updTotal();
}

function _setRoyalTarget(idx){
  const cat=document.getElementById('cat-'+idx)?.value;
  if(cat==='版權費用'){_royalTargetRow=idx;document.getElementById('royal-box').style.display='block';}
}

function delRow(idx){
  const el=document.getElementById('row-'+idx);
  if(el)el.remove();
  _renum();updTotal();
}

function _renum(){
  const rows=document.getElementById('line-tbody').rows;
  for(let i=0;i<rows.length;i++){
    const td=rows[i].querySelector('td:first-child');
    if(td)td.textContent=i+1;
  }
  document.getElementById('row-count').textContent=rows.length+' 筆';
}

function updTotal(){
  let exp=0,inc=0;
  document.getElementById('line-tbody').querySelectorAll('tr').forEach(tr=>{
    const id=tr.id.replace('row-','');
    const amt=parseFloat(document.getElementById('amt-'+id)?.value)||0;
    const nat=document.getElementById('nat-'+id)?.value;
    if(nat==='收入')inc+=amt;else exp+=amt;
  });
  const net=inc-exp;
  document.getElementById('t-exp').textContent=exp.toLocaleString();
  document.getElementById('t-inc').textContent=inc.toLocaleString();
  const nb=document.getElementById('t-net');
  nb.textContent=(net>=0?'+':'')+net.toLocaleString();
  nb.style.color=net>=0?'#10b981':'#ef4444';
  const mb=document.getElementById('t-margin');
  if(inc>0){
    const pct=Math.round(net/inc*100);
    mb.textContent=pct+'%';
    mb.style.color=pct>=30?'#10b981':pct>=15?'#f59e0b':'#ef4444';
  }else{mb.textContent='—';mb.style.color='#94a3b8';}
}

function _calcR(){
  const r=parseFloat(document.getElementById('rh-retail').value)||0;
  const rt=parseFloat(document.getElementById('rh-rate').value)||0;
  const q=parseFloat(document.getElementById('rh-qty').value)||0;
  const v=Math.round(r*rt/100*q);
  document.getElementById('rh-result').textContent=v.toLocaleString();
  if(_royalTargetRow){const el=document.getElementById('amt-'+_royalTargetRow);if(el&&v){el.value=v;updTotal();}}
}
function _applyR(){
  if(!_royalTargetRow){alert('請先點擊要帶入的金額欄位');return;}
  const r=parseFloat(document.getElementById('rh-retail').value)||0;
  const rt=parseFloat(document.getElementById('rh-rate').value)||0;
  const q=parseFloat(document.getElementById('rh-qty').value)||0;
  const v=Math.round(r*rt/100*q);
  if(!v){alert('請先填寫版稅計算器的數值');return;}
  const el=document.getElementById('amt-'+_royalTargetRow);
  if(el){el.value=v;updTotal();}
}

async function submitAll(){
  const proj=_projVal('proj-sel');
  if(!proj){alert('請先選擇關聯項目');return;}
  const rows=[...document.getElementById('line-tbody').rows];
  if(!rows.length){alert('請至少新增一筆明細');return;}
  // validate
  for(const tr of rows){
    const id=tr.id.replace('row-','');
    const amt=parseFloat(document.getElementById('amt-'+id)?.value)||0;
    if(!amt){
      document.getElementById('amt-'+id).focus();
      alert('第 '+tr.querySelector('td:first-child').textContent+' 筆：金額不能為 0');
      return;
    }
  }
  // Build summary for confirm
  const _totalAmt=rows.reduce((s,tr)=>{const id=tr.id.replace('row-','');return s+(parseFloat(document.getElementById('amt-'+id)?.value)||0);},0);
  const _yr=document.getElementById('g-year').value;
  const _qtr=document.getElementById('g-quarter').value;
  const _loc=document.getElementById('g-loc').value;
  const _crows=[
    ["關聯項目", proj],
    ["年度 / 季度", _yr+" "+_qtr],
    ["所在地", _loc],
    ["明細筆數", rows.length+" 筆"],
    ["金額合計（估）", _totalAmt.toLocaleString()],
    ["填報人", document.getElementById('g-who').value],
  ];
  _showConfirm("確認提交預算",_crows,async()=>{
  const btn=document.getElementById('sbtn');
  const res=document.getElementById('res');
  btn.disabled=true;btn.textContent='提交中 (0/'+rows.length+')...';res.style.display='none';
  try{
    const tk=await _getToken();
    const yr=parseFloat(document.getElementById('g-year').value)||new Date().getFullYear();
    const qtr=document.getElementById('g-quarter').value;
    const loc=document.getElementById('g-loc').value;
    const who=document.getElementById('g-who').value;
    const gNote=document.getElementById('g-note').value;
    const batch=document.getElementById('g-batch').value;
    const records=rows.map(tr=>{
      const id=tr.id.replace('row-','');
      const budget=parseFloat(document.getElementById('amt-'+id).value)||0;
      const name=document.getElementById('nm-'+id).value||document.getElementById('cat-'+id).value;
      const rowNote=document.getElementById('rownote-'+id)?.value||'';
      const noteStr="["+proj+"] "+(rowNote?rowNote+(gNote?' | '+gNote:''):gNote||who||"");
      const unit=parseFloat(document.getElementById('unit-'+id)?.value)||null;
      const qty=parseFloat(document.getElementById('qty-'+id)?.value)||null;
      const fields={
        "預算名稱":   name,
        "類別":       document.getElementById('cat-'+id).value,
        "預算性質":   document.getElementById('nat-'+id).value,
        "所在地":     loc,
        "幣別":       document.getElementById('cur-'+id).value,
        "年度":       yr,
        "季度":       qtr,
        "預算金額":   budget,
        "已使用金額": 0,
        "備註":       noteStr,
      };
      if(unit!==null)fields["單價"]=unit;
      if(qty!==null)fields["數量"]=qty;
      if(batch)fields["批次"]=batch;
      return {fields};
    });
    const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["budget"]+"/records/batch_create",{
      method:"POST",
      headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
      body:JSON.stringify({records})
    });
    const d=await r.json();
    if(d.code!==0)throw new Error("["+d.code+"] "+(d.msg||"API error"));
    _showResult("","",(()=>{
      document.getElementById('line-tbody').innerHTML='';
      _rowIdx=0;_renum();updTotal();
      _loadProjectSelect('proj-sel',window._ctxTypeFilter||null);
    }));
    document.getElementById("_res-view").href="view_budget_summary.html";
    document.getElementById("_res-view").textContent="查看預算總覽 →";
    document.getElementById("_res-view").style.display="block";
    document.getElementById("_res-rid").textContent="已提交 "+records.length+" 筆";
  }catch(err){
    res.className="result err";res.style.display="block";
    document.getElementById("res-icon").textContent="❌";
    document.getElementById("res-msg").textContent="提交失敗";
    document.getElementById("res-sub").textContent=err.message+" ｜ 請截圖回報管理員";
    console.error(err);
  }finally{
    btn.disabled=false;btn.textContent="一鍵提交所有明細";
  }
  }); // end _showConfirm
}
