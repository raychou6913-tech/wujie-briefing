<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>產品開發進度 — 蕪解</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.hdr{background:#1e293b;padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hdr-title{font-size:17px;font-weight:700;color:#f1f5f9;flex:1}
.hdr-sub{font-size:12px;color:#94a3b8}
.btn-new{background:#8b5cf6;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer}
.btn-new:hover{background:#7c3aed}
.btn-back{color:#94a3b8;font-size:13px;text-decoration:none;margin-right:8px}
.board{display:flex;gap:12px;padding:16px;overflow-x:auto;min-height:calc(100vh - 120px);align-items:flex-start}
.lane{min-width:260px;max-width:280px;flex-shrink:0}
.lane-hdr{border-radius:10px 10px 0 0;padding:10px 14px;display:flex;align-items:center;gap:6px}
.lane-title{font-size:13px;font-weight:700;color:#fff;flex:1}
.lane-count{font-size:11px;background:rgba(255,255,255,.25);color:#fff;border-radius:10px;padding:1px 8px;font-weight:700}
.lane-body{background:#e8edf4;border-radius:0 0 10px 10px;padding:8px;min-height:200px}
.card{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px #0000001a;cursor:pointer;transition:box-shadow .15s}
.card:hover{box-shadow:0 3px 12px #0000001f}
.card-ip{font-size:10px;font-weight:700;color:#fff;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:6px}
.card-name{font-size:13px;font-weight:700;color:#0f172a;margin-bottom:4px;line-height:1.4}
.card-proj{font-size:11px;color:#64748b;margin-bottom:6px}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.card-days{font-size:10px;color:#94a3b8}
.card-act{font-size:11px;font-weight:700;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;color:#fff}
.lane-add{background:none;border:1.5px dashed #94a3b8;border-radius:8px;width:100%;padding:8px;font-size:12px;color:#94a3b8;cursor:pointer;margin-top:4px}
.lane-add:hover{border-color:#6366f1;color:#6366f1}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:#00000060;z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px #00000030}
.modal-title{font-size:16px;font-weight:800;color:#0f172a;margin-bottom:4px}
.modal-sub{font-size:12px;color:#64748b;margin-bottom:18px}
.mf{margin-bottom:14px}
.mf label{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:5px}
.mf input,.mf select,.mf textarea{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:14px;color:#0f172a;outline:none}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:#6366f1;background:#fff}
.mf textarea{resize:vertical;min-height:80px}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.btn-cancel{flex:1;background:#f1f5f9;color:#64748b;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer}
.btn-submit{flex:2;background:#6366f1;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.btn-approve{flex:2;background:#10b981;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer}
.btn-reject{flex:1;background:#ef4444;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer}
.stage-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:10px}
.hint{font-size:11px;color:#94a3b8;margin-top:3px}
.img-preview{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.img-thumb{width:72px;height:72px;object-fit:cover;border-radius:6px;border:1px solid #e2e8f0}
.profit-row{background:#f0fdf4;border-radius:8px;padding:10px 12px;font-size:13px;margin-top:8px}
.profit-row span{color:#10b981;font-weight:700}
</style>
</head>

<script>
const _AT="YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _PP="tblfX6fsMshb7KL0";
const _PROJ_TBL="tblYBjAlemYPuNGy";
const _IP_TBL="tblHPNUTdcFa7tqs";
const _DESIGN_TBL="tblTEoNLDvtYi4pX";
const PROXY="https://feishu-proxy.raychou6913.workers.dev";
const STAGES=["\u5275\u610f\u63d0\u6848", "\u5167\u90e8\u7acb\u9805\u78ba\u8a8d", "\u7248\u6b0a\u9001\u5be9", "\u63a1\u8cfc\u8a62\u50f9", "\u6253\u6a23\u9a57\u6536", "\u5927\u8ca8\u78ba\u8a8d"];
const COLORS={"\u5275\u610f\u63d0\u6848": "#8b5cf6", "\u5167\u90e8\u7acb\u9805\u78ba\u8a8d": "#f59e0b", "\u7248\u6b0a\u9001\u5be9": "#ec4899", "\u63a1\u8cfc\u8a62\u50f9": "#f97316", "\u6253\u6a23\u9a57\u6536": "#06b6d4", "\u5927\u8ca8\u78ba\u8a8d": "#10b981"};
const ICONS={"\u5275\u610f\u63d0\u6848": "\ud83d\udca1", "\u5167\u90e8\u7acb\u9805\u78ba\u8a8d": "\u2705", "\u7248\u6b0a\u9001\u5be9": "\ud83d\udcdc", "\u63a1\u8cfc\u8a62\u50f9": "\ud83d\uded2", "\u6253\u6a23\u9a57\u6536": "\ud83d\udd2c", "\u5927\u8ca8\u78ba\u8a8d": "\ud83d\ude80"};

let _tk="",_tkExp=0;
async function _tok(){
  if(_tk&&Date.now()<_tkExp) return _tk;
  const r=await fetch(PROXY+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
  const d=await r.json();
  if(d.code!==0) throw new Error("token fail");
  _tk=d.tenant_access_token; _tkExp=Date.now()+7000000;
  return _tk;
}
async function _get(tbl,extra=""){
  const tk=await _tok();
  const items=[]; let cur="";
  while(true){
    const url=PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+tbl+"/records?page_size=100"+extra+(cur?"&page_token="+cur:"");
    const d=(await fetch(url,{headers:{"Authorization":"Bearer "+tk}}).then(r=>r.json()));
    if(d.code!==0) break;
    items.push(...(d.data?.items||[]));
    if(!d.data?.has_more) break;
    cur=d.data.page_token;
  }
  return items;
}
async function _update(rid,fields){
  const tk=await _tok();
  // strip empty
  Object.keys(fields).forEach(k=>{if(fields[k]===null||fields[k]===undefined||fields[k]==="")delete fields[k];});
  const r=await fetch(PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_PP+"/records/"+rid,{
    method:"PUT",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  return await r.json();
}
async function _create(fields){
  const tk=await _tok();
  Object.keys(fields).forEach(k=>{if(fields[k]===null||fields[k]===undefined||fields[k]==="")delete fields[k];});
  const r=await fetch(PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_PP+"/records",{
    method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  return await r.json();
}
async function _upload(file){
  const tk=await _tok();
  const fd=new FormData();
  fd.append("file",file,file.name);
  fd.append("file_name",file.name);
  fd.append("parent_type","bitable_file");
  fd.append("parent_node",_AT);
  fd.append("size",String(file.size));
  const r=await fetch(PROXY+"/open-apis/drive/v1/medias/upload_all",{
    method:"POST",headers:{"Authorization":"Bearer "+tk},body:fd
  });
  const d=await r.json();
  return d.code===0?d.data.file_token:null;
}
async function _uploadAll(inputId){
  const el=document.getElementById(inputId);
  if(!el||!el.files||!el.files.length) return [];
  const tokens=[];
  for(const f of Array.from(el.files)){
    const t=await _upload(f);
    if(t) tokens.push({file_token:t});
  }
  return tokens;
}

// ── Preview helpers ───────────────────────────────
function _previewSetup(inputId,previewId){
  const inp=document.getElementById(inputId);
  const prv=document.getElementById(previewId);
  if(!inp||!prv) return;
  inp.addEventListener("change",()=>{
    prv.innerHTML="";
    Array.from(inp.files).forEach(f=>{
      if(!f.type.startsWith("image/")) return;
      const reader=new FileReader();
      reader.onload=e=>{const img=document.createElement("img");img.className="img-thumb";img.src=e.target.result;prv.appendChild(img);};
      reader.readAsDataURL(f);
    });
  });
}

// ── State ─────────────────────────────────────────
let _records=[]; let _curRid=null;
function _fv(f,k){const v=f[k];return Array.isArray(v)?v[0]?.text||"":String(v||"");}

// ── Board render ──────────────────────────────────
function _daysSince(ts){
  if(!ts) return 0;
  return Math.floor((Date.now()-ts)/(1000*86400));
}
function _renderBoard(){
  const board=document.getElementById("board");
  const byStage={};
  STAGES.forEach(s=>byStage[s]=[]);
  _records.forEach(r=>{
    const st=_fv(r.fields,"當前階段")||"創意提案";
    if(byStage[st]) byStage[st].push(r);
  });
  board.innerHTML="";
  STAGES.forEach(stage=>{
    const c=COLORS[stage]; const ic=ICONS[stage];
    const cards=byStage[stage]||[];
    const session=JSON.parse(localStorage.getItem("wujie_session")||"{}");
    let laneHTML="";
    cards.forEach(r=>{
      const f=r.fields;
      const name=_fv(f,"產品名稱"); const ip=_fv(f,"IP品牌"); const proj=_fv(f,"關聯項目");
      const days=_daysSince(r.created_time);
      const actionLabel=_actionLabel(stage,f);
      const actionColor=actionLabel?c:"#94a3b8";
      laneHTML+=`<div class="card" onclick="openDetail('${r.record_id}')">
        <span class="card-ip" style="background:${c}">${ip||"—"}</span>
        <div class="card-name">${name}</div>
        ${proj?`<div class="card-proj">📋 ${proj}</div>`:""}
        <div class="card-meta">
          <span class="card-days">${days}天前提交</span>
          ${actionLabel?`<button class="card-act" style="background:${actionColor}" onclick="event.stopPropagation();openStageAction('${r.record_id}','${stage}')">${actionLabel}</button>`:""}
        </div>
      </div>`;
    });
    const lane=document.createElement("div");
    lane.className="lane";
    lane.innerHTML=`<div class="lane-hdr" style="background:${c}">
      <span style="font-size:16px">${ic}</span>
      <span class="lane-title">${stage}</span>
      <span class="lane-count">${cards.length}</span>
    </div>
    <div class="lane-body">${laneHTML}
      ${stage==="創意提案"?`<button class="lane-add" onclick="openNewConcept()">＋ 新增提案</button>`:""}
    </div>`;
    board.appendChild(lane);
  });
}

function _actionLabel(stage,f){
  const session=JSON.parse(localStorage.getItem("wujie_session")||"{}");
  const role=session.role||""; const name=session.name||"";
  const isMgmt=["Ray","Shawn"].includes(name)||["超級管理員","管理層","總部管理中心"].includes(role);
  const isProcure=["賴哥","木子"].includes(name);
  const isDesign=["Bevis","詩彤"].includes(name);
  const isSales=["Den","Meaw","安然","董亮","德寶"].includes(name)||role==="業務";
  if(stage==="內部立項確認"&&isMgmt&&_fv(f,"立項狀態")==="待確認") return "立項確認";
  if(stage==="版權送審") return "更新送審";
  if(stage==="採購詢價") return "更新詢價";
  if(stage==="打樣驗收") return "更新驗收";
  if(stage==="大貨確認") return "確認";
  return null;
}

// ── Stage action dispatch ─────────────────────────

    document.getElementById("sp-design").value=_fv(f,"打樣確認_設計")||"待確認";

  }
}

// ── Stage next-step logic ─────────────────────────
function _nextStage(current,fields){
  if(current==="創意提案") return "內部立項確認";
  if(current==="內部立項確認"&&fields["立項狀態"]==="已核准") return "版權送審";
  if(current==="版權送審"&&_fv(fields,"版權送審狀態")==="已通過") return "採購詢價";
  if(current==="採購詢價"&&_fv(fields,"採購詢價狀態")==="已確認供應商") return "打樣驗收";
  if(current==="打樣驗收"&&_fv(fields,"打樣確認_管理")==="已通過"&&_fv(fields,"打樣確認_設計")==="已通過") return "大貨確認";
  if(current==="大貨確認"&&["大貨確認_管理","大貨確認_採購","大貨確認_設計","大貨確認_銷售"].every(k=>_fv(fields,k)==="已確認")) return "已完成";
  return current;
}

    "建議零售價": price, "預計銷量": qty, "預估成本_件": cost, "幣別": cur,

// ── Profit calc ───────────────────────────────────
function _calcProfit(){
  const price=parseFloat(document.getElementById("ap-price")?.value)||0;
  const qty=parseFloat(document.getElementById("ap-qty")?.value)||0;
  const cost=parseFloat(document.getElementById("ap-cost")?.value)||0;
  const el=document.getElementById("ap-profit-row");
  if(!el) return;
  if(price&&qty&&cost){
    const gross=Math.round((price-cost)*qty);
    const pct=Math.round((price-cost)/price*100);
    el.innerHTML=`預計毛利：<span>${gross.toLocaleString()} / 毛利率 ${pct}%</span>`;
  }else el.innerHTML="預計毛利：— 請填入以上數字計算";
}

// ── Init ──────────────────────────────────────────
async function _reload(){
  _records=await _get(_PP);
  try{
    const ds=await _get(_DESIGN_TBL);
    window._dsMap={};
    ds.forEach(r=>{
      const f=r.fields||{};
      const proj=Array.isArray(f["項目關聯"])?f["項目關聯"][0]?.text||"":String(f["項目關聯"]||"");
      if(!proj) return;
      if(!window._dsMap[proj]) window._dsMap[proj]=[];
      window._dsMap[proj].push(r);
    });
  }catch(e){window._dsMap={};}
  _renderBoard();
}
const _DS_STAGES=["2D設計","四視圖","3D建模","打樣送審","包裝設計","包裝送審","展架設計","展架送審","大貨樣送審"];
async function _loadDesignHistory(proj){
  const el=document.getElementById("rg-design-history");
  if(!el) return;
  const SC={"已通過":"#10b981","已拒絕":"#ef4444","修改中":"#f59e0b","已提交":"#6366f1","待提交":"#94a3b8"};
  const recs=(window._dsMap&&window._dsMap[proj])||[];
  if(!recs.length){el.innerHTML='<div style="color:#94a3b8;font-size:12px;padding:6px 0">尚無送審記錄，請點右上角「＋ 新增」建立第一筆</div>';return;}
  el.innerHTML=recs.slice().sort((a,b)=>{
    const ia=_DS_STAGES.indexOf(_fv(a.fields,"送審階段")||"");
    const ib=_DS_STAGES.indexOf(_fv(b.fields,"送審階段")||"");
    return ia-ib;
  }).map(r=>{
    const f=r.fields;
    const stage=_fv(f,"送審階段"); const status=_fv(f,"審核狀態"); const note=_fv(f,"修改備註");
    const sc=SC[status]||"#94a3b8";
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #fce7f3;flex-wrap:wrap">
      <span style="font-size:11px;color:#64748b;min-width:68px;flex-shrink:0">${stage||"—"}</span>
      <span style="font-size:11px;background:${sc}18;color:${sc};border-radius:4px;padding:2px 7px;font-weight:600;flex-shrink:0">${status||"—"}</span>
      ${note?`<span style="font-size:11px;color:#94a3b8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${note}</span>`:""}
    </div>`;
  }).join("");
}

async function _loadSelects(){

  const ipSel=document.getElementById("n-ip");

}
