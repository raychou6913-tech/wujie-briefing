<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>📰 市場情報日報 — 蕪解</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-bottom:48px}
.hdr{background:#0f172a;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-title{font-size:19px;font-weight:700;color:#fff}
.hdr-sub{font-size:13px;color:#94a3b8;margin-top:2px}
.btn-back{background:#ffffff20;color:#fff;border:1px solid #ffffff30;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block}
.toolbar{padding:12px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid #e2e8f0}
.toolbar-row2{padding:8px 20px 10px;display:flex;gap:8px;align-items:center;background:#fff;border-bottom:1px solid #e2e8f0}
.filter-sel{padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;background:#f8fafc;outline:none;cursor:pointer}
.filter-sel:focus{border-color:#6366f1}
.search-inp{flex:1;min-width:160px;padding:7px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;background:#f8fafc;outline:none}
.search-inp:focus{border-color:#6366f1}
.search-inp::placeholder{color:#94a3b8}
.date-nav{display:flex;align-items:center;gap:6px}
.date-nav button{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;color:#374151}
.date-nav button:hover{background:#e2e8f0}
.date-nav button:disabled{opacity:.35;cursor:default}
.date-sel{padding:6px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-weight:600;background:#f8fafc;outline:none;cursor:pointer;min-width:120px}
.date-sel:focus{border-color:#6366f1}
.stat-bar{padding:7px 20px;background:#fff;border-bottom:1px solid #f1f5f9;font-size:12px;color:#64748b;display:flex;align-items:center;gap:8px}
.search-badge{display:none;background:#6366f120;color:#6366f1;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
.wrap{padding:20px;max-width:900px;margin:0 auto}
.section-hdr{display:flex;align-items:center;gap:8px;margin:24px 0 12px;padding-bottom:8px;border-bottom:2px solid #e2e8f0}
.section-icon{font-size:20px}
.section-title{font-size:15px;font-weight:700;color:#0f172a}
.section-count{font-size:12px;color:#94a3b8;margin-left:4px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:14px;transition:box-shadow .15s}
.card:hover{box-shadow:0 4px 16px #00000012}
.card-inner{display:flex;gap:0}
.card-img{width:120px;min-width:120px;height:90px;object-fit:cover;background:#f1f5f9}
.card-img-placeholder{width:120px;min-width:120px;height:90px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:28px;color:#cbd5e1}
.card-body{padding:12px 16px;flex:1;min-width:0}
.card-title{font-size:14px;font-weight:700;color:#0f172a;line-height:1.4;margin-bottom:4px}
.card-summary{font-size:13px;color:#475569;line-height:1.6;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.card-link{font-size:12px;color:#6366f1;text-decoration:none;font-weight:600}
.card-link:hover{text-decoration:underline}
.badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700}
.empty{text-align:center;padding:60px;color:#94a3b8;font-size:14px}
mark{background:#fef08a;border-radius:2px;padding:0 1px}
@media(max-width:600px){.card-img,.card-img-placeholder{display:none}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left">
    <div style="font-size:26px">📰</div>
    <div><div class="hdr-title">市場情報日報</div>
    <div class="hdr-sub" id="hdr-sub">載入中...</div></div>
  </div>
  <a href="../home.html" class="btn-back">← 首頁</a>
</div>
<div class="toolbar">
  <div class="date-nav">
    <button onclick="shiftDate(-1)" id="btn-prev">‹ 前一天</button>
    <select class="date-sel" id="date-sel" onchange="jumpDate(this.value)"></select>
    <button onclick="shiftDate(1)" id="btn-next">後一天 ›</button>
  </div>
  <select class="filter-sel" id="cat-filter" onchange="renderPage()">
    <option value="">全部欄目</option>
    <option>產業趨勢</option><option>IP重要動態</option>
    <option>產品創意</option><option>展會資訊</option>
  </select>
  <button class="btn-back" onclick="loadData()" style="color:#374151;background:#f1f5f9;border-color:#e2e8f0">↻ 重新整理</button>
</div>
<div class="toolbar-row2">
  <input class="search-inp" id="search-inp" type="search" placeholder="🔍 搜尋標題或摘要關鍵字..." oninput="renderPage()">
</div>
<div class="stat-bar" id="stat-bar"><span id="stat-text">— 筆</span><span class="search-badge" id="search-badge"></span></div>
<div class="wrap" id="wrap"><div class="empty">載入中...</div></div>
<script>
const _PROXY="https://feishu-proxy.raychou6913.workers.dev";
const _AT="YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _TBL="tbliwX6nFg6rryn7";
let allRecords=[];
let _curDate="";
let _allDates=[];
const CAT_ICON={"產業趨勢":"📊","IP重要動態":"🎌","產品創意":"🛍️","展會資訊":"🏟️"};
const IMP_COLOR={"🔴 高":"#ef4444","🟡 中":"#f59e0b","🟢 低":"#10b981"};
(function(){
  const s=JSON.parse(localStorage.getItem("wujie_session")||"null");
  if(!s||Date.now()>s.expires){localStorage.removeItem("wujie_session");location.replace("../login.html");}
})();
function fv(f,k){
  const v=f[k];
  if(v===null||v===undefined||v==="")return"";
  if(Array.isArray(v))return v.map(x=>typeof x==="object"?(x.link||x.text||x.name||""):String(x)).join("");
  if(typeof v==="object")return v.link||v.text||v.name||"";
  return String(v);
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function highlight(text,kw){
  if(!kw)return esc(text);
  const re=new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi");
  const parts=text.split(re);
  const matches=text.match(re)||[];
  let result="";
  parts.forEach((part,i)=>{result+=esc(part);if(matches[i])result+=`<mark>${esc(matches[i])}</mark>`;});
  return result;
}
async function loadData(){
  document.getElementById("wrap").innerHTML='<div class="empty">載入中...</div>';
  try{
    const r=await fetch(_PROXY+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
    const td=await r.json();
    if(td.code!==0)throw new Error("Token err");
    const tk=td.tenant_access_token;
    let items=[],pt=null;
    do{
      const url=_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TBL+"/records?page_size=100"+(pt?"&page_token="+pt:"");
      const res=await fetch(url,{headers:{"Authorization":"Bearer "+tk}});
      const d=await res.json();
      if(d.code!==0)throw new Error(d.msg);
      items=items.concat(d.data?.items||[]);
      pt=d.data?.has_more?d.data.page_token:null;
    }while(pt);
    allRecords=items;
    _allDates=[...new Set(items.map(i=>fv(i.fields,"日期")).filter(Boolean))].sort().reverse();
    _curDate=_allDates[0]||new Date().toISOString().slice(0,10);
    rebuildDateSel();
    renderPage();
  }catch(e){
    document.getElementById("wrap").innerHTML='<div class="empty">⚠️ 載入失敗：'+e.message+'</div>';
  }
}
function rebuildDateSel(){
  const sel=document.getElementById("date-sel");
  sel.innerHTML=_allDates.map(d=>`<option value="${d}"${d===_curDate?" selected":""}>${d}</option>`).join("");
  const idx=_allDates.indexOf(_curDate);
  document.getElementById("btn-prev").disabled=(idx===_allDates.length-1);
  document.getElementById("btn-next").disabled=(idx===0);
}
function jumpDate(d){
  _curDate=d;
  rebuildDateSel();
  renderPage();
}
function shiftDate(dir){
  const idx=_allDates.indexOf(_curDate);
  const ni=idx+(dir>0?-1:1);
  if(ni<0||ni>=_allDates.length)return;
  _curDate=_allDates[ni];
  rebuildDateSel();
  renderPage();
}
function renderPage(){
  const catF=document.getElementById("cat-filter").value;
  const kw=(document.getElementById("search-inp").value||"").trim();
  const isSearch=kw.length>0;
  let recs=allRecords.filter(i=>{
    if(!isSearch&&fv(i.fields,"日期")!==_curDate)return false;
    if(catF&&fv(i.fields,"欄目")!==catF)return false;
    if(isSearch){
      const hay=(fv(i.fields,"標題")+fv(i.fields,"摘要")).toLowerCase();
      if(!hay.includes(kw.toLowerCase()))return false;
    }
    return true;
  });
  const badge=document.getElementById("search-badge");
  const _navIdx=_allDates.indexOf(_curDate);
  document.getElementById("btn-prev").disabled=isSearch||(_navIdx===_allDates.length-1);
  document.getElementById("btn-next").disabled=isSearch||(_navIdx===0);
  document.getElementById("date-sel").disabled=isSearch;
  if(isSearch){
    document.getElementById("hdr-sub").textContent="搜尋："+kw+(catF?" ／ "+catF:"");
    document.getElementById("stat-text").textContent="共 "+recs.length+" 則符合"+(catF?"（欄目："+catF+"）":"");
    badge.style.display="inline-block";badge.textContent="搜尋模式";
  }else{
    document.getElementById("hdr-sub").textContent=_curDate+" 情報日報";
    document.getElementById("stat-text").textContent="共 "+recs.length+" 則（"+_curDate+"）"+(catF?" ／ "+catF:"");
    badge.style.display="none";
  }
  const CATS=catF?[catF]:["產業趨勢","IP重要動態","產品創意","展會資訊"];
  let html="";
  if(isSearch){
    const grouped={};
    for(const i of recs){const c=fv(i.fields,"欄目")||"其他";(grouped[c]=grouped[c]||[]).push(i);}
    for(const cat of [...CATS,"其他"]){
      const items=grouped[cat]||[];
      if(!items.length)continue;
      html+=renderSection(cat,items,kw);
    }
  }else{
    for(const cat of CATS){
      const items=recs.filter(i=>fv(i.fields,"欄目")===cat);
      if(!items.length)continue;
      html+=renderSection(cat,items,"");
    }
  }
  document.getElementById("wrap").innerHTML=html||(isSearch?'<div class="empty">😕 找不到符合「'+esc(kw)+'」的情報</div>':'<div class="empty">😕 今日暫無情報</div>');
}
function renderSection(cat,items,kw){
  let s=`<div class="section-hdr">
    <span class="section-icon">${CAT_ICON[cat]||"📌"}</span>
    <span class="section-title">${esc(cat)}</span>
    <span class="section-count">${items.length} 則</span></div>`;
  for(const i of items){
    const f=i.fields||{};
    const title=fv(f,"標題")||"(無標題)";
    const summary=fv(f,"摘要")||"";
    const link=fv(f,"來源連結")||"";
    const imgRaw=fv(f,"圖片連結")||"";
    const img=imgRaw.startsWith("http")?imgRaw:"";
    const imp=fv(f,"重要程度")||"";
    const ic=IMP_COLOR[imp]||"";
    const dateTag=kw?`<span style="font-size:11px;color:#94a3b8;margin-right:6px">${esc(fv(f,"日期"))}</span>`:"";
    const safeLink=link.startsWith("http")?link:"";
    s+=`<div class="card">
      <div class="card-inner">
        ${img?`<img class="card-img" src="${img}" onerror="this.style.display='none'" alt="">`:
               `<div class="card-img-placeholder">${CAT_ICON[cat]||"📌"}</div>`}
        <div class="card-body">
          <div class="card-title">${safeLink?`<a href="${safeLink}" target="_blank" rel="noopener noreferrer" style="color:#0f172a;text-decoration:none">${highlight(title,kw)}</a>`:highlight(title,kw)}</div>
          <div class="card-summary">${highlight(summary,kw)}</div>
          <div class="card-footer">
            <div style="display:flex;align-items:center;gap:6px">${dateTag}${safeLink?`<a class="card-link" href="${safeLink}" target="_blank" rel="noopener noreferrer">🔗 查看來源</a>`:`<span></span>`}</div>
            ${imp?`<span class="badge" style="background:${ic}20;color:${ic}">${esc(imp)}</span>`:""}
          </div>
        </div>
      </div></div>`;
  }
  return s;
}
loadData();
</script>
</body></html>
