<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>報價單生成器 — 蕪解創意</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-bottom:60px}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;box-shadow:0 1px 4px #0000000a}
.topbar-title{font-size:16px;font-weight:700;color:#0f172a}
.btn{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-print{background:#10b981;color:#fff}
.btn-clear{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0}
.wrap{max-width:800px;margin:20px auto;padding:0 14px}
/* preview card */
.quote-card{background:#fff;color:#1e293b;border-radius:14px;padding:36px 40px;box-shadow:0 4px 32px #0004}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid #e2e8f0}
.q-company{font-size:20px;font-weight:800;color:#1e293b}
.q-company-sub{font-size:11px;color:#64748b;margin-top:3px}
.q-title{text-align:right}
.q-title h2{font-size:26px;font-weight:800;color:#6366f1;letter-spacing:2px}
.q-title .q-no{font-size:12px;color:#64748b;margin-top:4px}
.q-meta{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.q-meta-box{background:#f8fafc;border-radius:8px;padding:14px}
.q-meta-label{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.q-meta-field{width:100%;border:none;background:transparent;font-size:13px;color:#1e293b;outline:none;padding:2px 0}
.q-meta-field::placeholder{color:#cbd5e1}
table{width:100%;border-collapse:collapse;margin-bottom:16px}
thead{background:#f1f5f9}
th{padding:10px 12px;font-size:11px;font-weight:700;color:#64748b;text-align:left;text-transform:uppercase;letter-spacing:.4px}
td{padding:9px 12px;font-size:13px;color:#334155;border-bottom:1px solid #f1f5f9}
td input{border:none;background:transparent;width:100%;font-size:13px;color:#334155;outline:none}
td input::placeholder{color:#cbd5e1}
.td-num input{text-align:right}
.td-subtotal{text-align:right;font-weight:600;color:#1e293b}
.add-row{display:flex;align-items:center;gap:8px;margin-bottom:24px;cursor:pointer;color:#6366f1;font-size:13px;font-weight:600}
.add-row:hover{color:#4f46e5}
.totals{display:flex;justify-content:flex-end;margin-bottom:24px}
.totals-box{min-width:240px}
.total-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;color:#475569}
.total-row.grand{border-top:2px solid #1e293b;margin-top:6px;padding-top:10px;font-size:16px;font-weight:800;color:#1e293b}
.q-footer{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px;padding-top:20px;border-top:1px solid #e2e8f0}
.sign-box{background:#f8fafc;border-radius:8px;padding:14px}
.sign-label{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:24px}
.sign-line{border-top:1px solid #94a3b8;margin-top:8px;padding-top:6px;font-size:11px;color:#94a3b8}
.q-terms{margin-top:20px;padding:14px;background:#fafafa;border-radius:8px;border-left:3px solid #6366f1}
.q-terms-label{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.q-terms textarea{width:100%;border:none;background:transparent;font-size:12px;color:#475569;resize:none;outline:none;min-height:48px}
/* edit controls (hidden when printing) */
.edit-ctrl{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px #0000000a}
.edit-label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.ef{margin-bottom:10px}
.ef label{font-size:13px;color:#64748b;display:block;margin-bottom:4px;font-weight:600}
.ef input,.ef select,.ef textarea{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 12px;color:#0f172a;font-size:13px;outline:none}
.ef textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media print{
  body{background:#fff;padding:0}
  .topbar,.edit-ctrl,.add-row,.del-row{display:none!important}
  .quote-card{box-shadow:none;border-radius:0;padding:20px}
  td input,textarea,.q-meta-field{pointer-events:none}
  @page{margin:15mm}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">🧾 報價單生成器</div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-clear" onclick="clearAll()">清除重填</button>
    <button class="btn btn-print" onclick="window.print()">列印 / 存 PDF</button>
  </div>
</div>

<div class="wrap">
<!-- 編輯控制區 -->
<div class="edit-ctrl">
  <div class="edit-label">報價單設定</div>
  <div class="row2">
    <div class="ef"><label>報價編號</label><input id="ctrl-no" placeholder="QT-2026-001" oninput="sync()"></div>
    <div class="ef"><label>報價日期</label><input type="date" id="ctrl-date" oninput="sync()"></div>
  </div>
  <div class="row2">
    <div class="ef"><label>有效期至</label><input type="date" id="ctrl-valid" oninput="sync()"></div>
    <div class="ef"><label>幣別</label>
      <select id="ctrl-cur" onchange="sync()">
        <option value="TWD">TWD 新台幣</option>
        <option value="CNY">CNY 人民幣</option>
        <option value="USD">USD 美元</option>
        <option value="THB">THB 泰銖</option>
      </select></div>
  </div>
  <div class="row2">
    <div class="ef"><label>稅率 (%，0 = 未稅）</label><input type="number" id="ctrl-tax" value="0" min="0" max="100" oninput="calcTotals()"></div>
    <div class="ef"><label>付款條件</label>
      <select id="ctrl-term" onchange="sync()">
        <option>預付款</option><option>貨到付款</option><option>Net 30</option>
        <option>Net 60</option><option>50% 訂金，50% 出貨前</option><option>其他</option>
      </select></div>
  </div>
</div>

<!-- 報價單預覽 -->
<div class="quote-card" id="quote">
  <div class="q-header">
    <div>
      <div class="q-company">蕪解創意有限公司</div>
      <div class="q-company-sub">WUJIE CREATIVE CO., LTD.</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:6px">📧 raychou6913@gmail.com</div>
    </div>
    <div class="q-title">
      <h2>報 價 單</h2>
      <div class="q-no">No. <span id="q-no">QT-2026-001</span></div>
      <div class="q-no">日期：<span id="q-date"></span></div>
      <div class="q-no">有效期至：<span id="q-valid"></span></div>
    </div>
  </div>

  <div class="q-meta">
    <div class="q-meta-box">
      <div class="q-meta-label">致</div>
      <input class="q-meta-field" id="q-client" placeholder="客戶名稱">
      <input class="q-meta-field" id="q-client-addr" placeholder="地址">
      <input class="q-meta-field" id="q-client-contact" placeholder="聯絡人 / 電話">
    </div>
    <div class="q-meta-box">
      <div class="q-meta-label">備注</div>
      <textarea class="q-meta-field" id="q-remark" placeholder="專案名稱、IP品牌、交期說明..."></textarea>
    </div>
  </div>

  <table id="items-table">
    <thead>
      <tr>
        <th style="width:32px">#</th>
        <th>品名 / 描述</th>
        <th style="width:120px">規格</th>
        <th style="width:70px;text-align:right">數量</th>
        <th style="width:100px;text-align:right">單價</th>
        <th style="width:110px;text-align:right">小計</th>
        <th style="width:32px" class="del-row"></th>
      </tr>
    </thead>
    <tbody id="items-body"></tbody>
  </table>

  <div class="add-row" onclick="addRow()">＋ 新增品項</div>

  <div class="totals">
    <div class="totals-box">
      <div class="total-row"><span>小計</span><span id="t-sub">—</span></div>
      <div class="total-row" id="tax-row"><span>稅 (<span id="t-taxpct">0</span>%)</span><span id="t-tax">—</span></div>
      <div class="total-row grand"><span>合計 <span id="t-cur">TWD</span></span><span id="t-total">—</span></div>
    </div>
  </div>

  <div class="q-terms">
    <div class="q-terms-label">付款條件 & 備注</div>
    <div style="font-size:12px;color:#475569;margin-bottom:4px">付款方式：<span id="q-term">預付款</span></div>
    <textarea id="q-notes" placeholder="其他說明事項、交期條款、運費說明..."></textarea>
  </div>

  <div class="q-footer">
    <div class="sign-box">
      <div class="sign-label">授權簽署</div>
      <div style="height:32px"></div>
      <div class="sign-line">簽名 / 公司章</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:4px">蕪解創意有限公司</div>
    </div>
    <div class="sign-box">
      <div class="sign-label">客戶確認</div>
      <div style="height:32px"></div>
      <div class="sign-line">簽名 / 公司章</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:4px">日期：_______________</div>
    </div>
  </div>
</div>
</div>

<script>
let rowCount=0;
const fmt=(n,cur)=>{
  const sym={TWD:"NT$",CNY:"¥",USD:"US$",THB:"฿"}[cur]||cur+" ";
  return sym+n.toLocaleString("zh-TW",{minimumFractionDigits:0,maximumFractionDigits:0});
};

function addRow(){
  rowCount++;
  const tbody=document.getElementById("items-body");
  const tr=document.createElement("tr");
  tr.id="row-"+rowCount;
  tr.innerHTML=`
    <td>${rowCount}</td>
    <td><input placeholder="品名 / 描述" oninput="calcTotals()"></td>
    <td><input placeholder="規格"></td>
    <td class="td-num"><input type="number" value="1" min="0" oninput="calcTotals()" style="text-align:right;width:60px"></td>
    <td class="td-num"><input type="number" value="0" min="0" oninput="calcTotals()" style="text-align:right;width:90px"></td>
    <td class="td-subtotal" id="sub-${rowCount}">—</td>
    <td class="del-row"><span onclick="delRow('row-${rowCount}')" style="cursor:pointer;color:#64748b;font-size:16px">✕</span></td>
  `;
  tbody.appendChild(tr);
  calcTotals();
}

function delRow(id){
  document.getElementById(id)?.remove();
  calcTotals();
}

function calcTotals(){
  const cur=document.getElementById("ctrl-cur").value;
  const taxPct=parseFloat(document.getElementById("ctrl-tax").value)||0;
  let sub=0;
  document.querySelectorAll("#items-body tr").forEach(tr=>{
    const inputs=tr.querySelectorAll("input[type=number]");
    const qty=parseFloat(inputs[0]?.value)||0;
    const price=parseFloat(inputs[1]?.value)||0;
    const st=qty*price;
    sub+=st;
    const stCell=tr.querySelector(".td-subtotal");
    if(stCell) stCell.textContent=st>0?fmt(st,cur):"—";
  });
  const tax=sub*taxPct/100;
  const total=sub+tax;
  document.getElementById("t-cur").textContent=cur;
  document.getElementById("t-sub").textContent=sub>0?fmt(sub,cur):"—";
  document.getElementById("t-taxpct").textContent=taxPct;
  document.getElementById("t-tax").textContent=tax>0?fmt(tax,cur):"—";
  document.getElementById("t-total").textContent=total>0?fmt(total,cur):"—";
  document.getElementById("tax-row").style.display=taxPct>0?"flex":"none";
}

function sync(){
  document.getElementById("q-no").textContent=document.getElementById("ctrl-no").value||"—";
  document.getElementById("q-date").textContent=document.getElementById("ctrl-date").value||"—";
  document.getElementById("q-valid").textContent=document.getElementById("ctrl-valid").value||"—";
  document.getElementById("q-term").textContent=document.getElementById("ctrl-term").value;
  calcTotals();
}

function clearAll(){
  if(!confirm("確定清除所有內容重新填寫？")) return;
  document.getElementById("items-body").innerHTML="";
  rowCount=0;
  ["ctrl-no","ctrl-date","ctrl-valid","q-client","q-client-addr","q-client-contact","q-remark","q-notes"]
    .forEach(id=>{ const el=document.getElementById(id); if(el) el.value=""; });
  document.getElementById("ctrl-cur").value="TWD";
  document.getElementById("ctrl-term").value="預付款";
  document.getElementById("ctrl-tax").value="0";
  sync();
  addRow(); addRow(); addRow();
}

// Init
const today=new Date().toISOString().split("T")[0];
const validDate=new Date(Date.now()+30*864e5).toISOString().split("T")[0];
document.getElementById("ctrl-date").value=today;
document.getElementById("ctrl-valid").value=validDate;
const yr=new Date().getFullYear();
const mo=String(new Date().getMonth()+1).padStart(2,"0");
document.getElementById("ctrl-no").value=`QT-${yr}${mo}-001`;
sync();
addRow(); addRow(); addRow();
</script>
</body></html>
