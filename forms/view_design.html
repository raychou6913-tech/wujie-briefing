<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎨 設計送審進度 — 蕪解</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-bottom:48px}
.breadcrumb{background:#fff;border-bottom:1px solid #f1f5f9;padding:7px 20px;font-size:12px;color:#94a3b8;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.breadcrumb a{color:#64748b;text-decoration:none}.breadcrumb a:hover{color:#ec4899}.breadcrumb .sep{color:#cbd5e1;margin:0 1px}.breadcrumb .cur{color:#0f172a;font-weight:600}
.hdr{background:#ec489915;border-bottom:2px solid #ec4899;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-icon{font-size:26px}.hdr-title{font-size:19px;font-weight:700;color:#0f172a}
.hdr-sub{font-size:13px;color:#64748b;margin-top:2px}
.hdr-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-add{background:#ec4899;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}
.btn-back{background:#fff;color:#64748b;border:1px solid #e2e8f0;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block}
.toolbar{padding:14px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid #e2e8f0}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;color:#0f172a;background:#f8fafc;outline:none}
.search-wrap input:focus{border-color:#ec4899;background:#fff}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:15px;pointer-events:none}
.filter-sel{padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;background:#f8fafc;outline:none;cursor:pointer}
.filter-sel:focus{border-color:#ec4899}
.stat-bar{padding:8px 20px;background:#fff;border-bottom:1px solid #f1f5f9;font-size:12px;color:#64748b;display:flex;justify-content:space-between;align-items:center}
.view-toggle{display:flex;gap:4px}
.vbtn{background:#f1f5f9;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:14px;color:#64748b}
.vbtn.active{background:#ec4899;color:#fff}
.wrap{padding:20px}
#card-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.db-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px;box-shadow:0 1px 4px #0000000a;transition:transform .15s,box-shadow .15s}
.db-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px #00000010}
.db-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.db-card-title{font-size:15px;font-weight:700;color:#0f172a;line-height:1.3}
.db-card-sub{font-size:12px;color:#64748b;margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.db-card-body{font-size:13px;color:#475569;line-height:1.6;margin-top:8px}
.db-card-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid #f1f5f9}
.db-card-footer{font-size:11px;color:#94a3b8;margin-top:8px}
#table-view{overflow-x:auto;display:none}
.dt{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px #0000000a}
.dt th{background:#f8fafc;color:#64748b;font-weight:600;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;border-bottom:1px solid #e2e8f0}
.dt td{padding:11px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle;color:#374151}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:#f8fafc}
.empty{text-align:center;padding:48px;color:#94a3b8;font-size:14px}
@media(max-width:600px){#card-view{grid-template-columns:1fr}}
.db-card{cursor:pointer}
#detail-modal{display:none;position:fixed;inset:0;background:#0009;z-index:9999;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.detail-box{background:#fff;border-radius:18px;max-width:580px;width:100%;margin:auto;padding:24px 24px 20px;position:relative}
.df-row{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid #f1f5f9}
.df-key{font-size:12px;color:#94a3b8;min-width:96px;flex-shrink:0;padding-top:2px;font-weight:500}
.df-val{font-size:14px;color:#0f172a;flex:1;word-break:break-word;line-height:1.6}
</style>
</head>
<body>
<div class="breadcrumb">
  <a href="../home.html">🏠 首頁</a><span class="sep">›</span>
  <a href="../db_browser.html">資料庫</a><span class="sep">›</span>
  <span class="cur">設計送審進度</span>
</div>
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-icon">🎨</div>
    <div><div class="hdr-title">設計送審進度</div>
    <div class="hdr-sub" id="hdr-count">載入中...</div></div>
  </div>
  <div class="hdr-actions">
    <a href="design.html" class="btn-add">＋ 新增資料</a>
    <a href="../db_browser.html" class="btn-back">← 資料庫</a>
  </div>
</div>
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search-box" placeholder="搜尋關鍵字..." oninput="_dbFilter()">
  </div>
  <select class="filter-sel" data-field="審核狀態" onchange="applyFilter()">
          <option value="">全部狀態</option><option>待提交</option><option>已提交</option>
          <option>修改中</option><option>已通過</option><option>已拒絕</option></select>
        <select class="filter-sel" data-field="IP品牌" onchange="applyFilter()">
          <option value="">全部 IP</option><option>Snoopy</option><option>Mofusand</option>
          <option>Chiikawa</option><option>Labubu</option><option>Fuggler</option>
          <option>EVE點點</option><option>其他</option></select>
  <button class="btn-back" onclick="loadData()" style="white-space:nowrap">↻ 重新整理</button>
</div>
<div class="stat-bar">
  <span id="stat-text">— 筆資料</span>
  <div class="view-toggle">
    <button class="vbtn active" id="btn-card" onclick="setView('card')">⊞ 卡片</button>
    <button class="vbtn" id="btn-table" onclick="setView('table')">☰ 表格</button>
    
  </div>
</div>
<div class="wrap">
  <div id="card-view"><div class="empty">載入中...</div></div>
  <div id="table-view">
    <table class="dt">
      <thead><tr><th>設計名稱</th><th>IP品牌</th><th>階段</th><th>狀態</th><th>版本</th><th>設計師</th><th>提交日期</th><th>附件</th></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
  
</div>
<div id="detail-modal" onclick="if(event.target===this)closeDetail()">
  <div class="detail-box">
    <button onclick="closeDetail()" style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8;line-height:1">✕</button>
    <div style="font-size:17px;font-weight:700;margin-bottom:16px;padding-right:32px" id="detail-title">詳細資訊</div>
    <div id="detail-body"></div>
    <div style="position:sticky;bottom:0;background:#fff;padding:12px 0 4px;margin-top:8px;border-top:1px solid #f1f5f9">
      <button onclick="closeDetail()" style="width:100%;background:#f1f5f9;border:none;border-radius:8px;padding:10px;font-size:14px;color:#64748b;cursor:pointer;font-weight:500">關閉</button>
    </div>
  </div>
</div>
<script>
const _PROXY="https://feishu-proxy.raychou6913.workers.dev";
const _AT="YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _TABLES={"project": "tblYBjAlemYPuNGy", "cashflow": "tblxaiogh3tYlZUz", "budget": "tblteo2QEO0jP8j9", "sales": "tblRtqmbO9TO3sYZ", "design": "tblTEoNLDvtYi4pX", "procure": "tblae5v8pGMXleJZ", "stock": "tblsmZ7S5cNiYN4Y", "contract": "tbltnJNDhRNwVkZC", "approval": "tblD6acV3m2ZXJHe", "product": "tblH1pYYlHBGSBHc", "ip_db": "tblHPNUTdcFa7tqs", "supplier": "tblgpiqW1yOa2DR4", "customer": "tblXMXDGZKw8KOsl", "design_vendor": "tblc8uH2yHbOAI4l", "logistics": "tbl1MeP2wUWHwenW", "daily_sales": "tblz7zvgbzOqknzm", "popup_venue": "tbldKRVsE4RcoZrD", "consignment": "tblypFKMeOARPFT1", "visit_log": "tblUzRSQgKLhlttk", "notice_board": "tblPtgudsOOlmJAx", "feedback": "tbl68ofUGp7FTjx8", "meeting": "tblEf71rCbLy3GGO", "venue_db": "tblHSG9gEJ53iO1l", "daily_briefing": "tbliwX6nFg6rryn7", "expense": "tblu2NkqBWyBSskG", "follow_up": "tblyO9Cz2nUx6q46", "roles": "tblEj5GSDYUrKGY9"};
let allRecords=[];
let _filteredRecs=[];
(function(){
  const s=JSON.parse(localStorage.getItem("wujie_session")||"null");
  if(!s||Date.now()>s.expires){localStorage.removeItem("wujie_session");location.replace("../login.html");}
})();
async function loadData(){
  document.getElementById("card-view").innerHTML='<div class="empty">載入中...</div>';
  document.getElementById("table-body").innerHTML="";
  document.getElementById("hdr-count").textContent="載入中...";
  try{
    const tr=await fetch(_PROXY+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
    const td=await tr.json();
    if(td.code!==0)throw new Error("Token err");
    const tk=td.tenant_access_token;
    let items=[],pt=null;
    do{
      const url=_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["design"]+"/records?page_size=100"+(pt?"&page_token="+pt:"");
      const res=await fetch(url,{headers:{"Authorization":"Bearer "+tk}});
      const d=await res.json();
      if(d.code!==0)throw new Error("API err: "+d.msg);
      items=items.concat(d.data?.items||[]);
      pt=d.data?.has_more?d.data.page_token:null;
    }while(pt);
    allRecords=items;
    document.getElementById("hdr-count").textContent="共 "+items.length+" 筆資料";
    
    applyFilter();
  }catch(e){
    document.getElementById("card-view").innerHTML='<div class="empty">⚠️ 載入失敗：'+e.message+'</div>';
    document.getElementById("hdr-count").textContent="載入失敗";
  }
}
function fv(f,k){
  const v=f[k];
  if(v===null||v===undefined||v==="")return"";
  if(typeof v==="number"){if(v>1000000000000)return new Date(v).toLocaleDateString("zh-TW");return String(v);}
  if(Array.isArray(v))return v.map(x=>typeof x==="object"?(x.link||x.text||x.name||""):String(x)).join("");
  if(typeof v==="object")return v.link||v.text||v.name||String(v);
  return String(v);
}
function _esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
let _dbFilterTimer=null;
function _dbFilter(){clearTimeout(_dbFilterTimer);_dbFilterTimer=setTimeout(applyFilter,250);}
function applyFilter(){
  const q=document.getElementById("search-box").value.trim().toLowerCase();
  const filterVals={};
  document.querySelectorAll(".filter-sel").forEach(s=>{if(s.dataset.field&&s.value)filterVals[s.dataset.field]=s.value;});
  const sf=["\u8a2d\u8a08\u540d\u7a31", "IP\u54c1\u724c", "\u9001\u5be9\u968e\u6bb5", "\u8a2d\u8a08\u5e2b/\u4f9b\u61c9\u5546", "\u5be9\u6838\u65b9"];
  const filtered=allRecords.filter(item=>{
    const f=item.fields||{};
    if(q&&!sf.some(k=>fv(f,k).toLowerCase().includes(q)))return false;
    for(const[k,v]of Object.entries(filterVals)){if(fv(f,k)!==v)return false;}
    return true;
  });
  document.getElementById("stat-text").textContent=filtered.length+" / "+allRecords.length+" 筆";
  _filteredRecs=filtered;
  const el=document.getElementById("card-view");
  el.innerHTML=filtered.length?filtered.map(i=>cardHTML(i.fields||{},i.record_id||"")).join(""):'<div class="empty">😕 找不到符合的資料</div>';
  const tb=document.getElementById("table-body");
  tb.innerHTML=filtered.length?filtered.map(i=>rowHTML(i.fields||{},i.record_id||"")).join(""):'<tr><td colspan="99" class="empty">😕 找不到符合的資料</td></tr>';
  document.querySelectorAll('#card-view .db-card').forEach((c,i)=>{
    if(_filteredRecs[i]){c.style.cursor='pointer';c.onclick=()=>openDetail(_filteredRecs[i].record_id);}
  });
  document.querySelectorAll('#table-body tr').forEach((r,i)=>{
    if(_filteredRecs[i]){r.style.cursor='pointer';r.onclick=()=>openDetail(_filteredRecs[i].record_id);}
  });
  
}
function setView(v){
  document.getElementById("card-view").style.display=v==="card"?"grid":"none";
  document.getElementById("table-view").style.display=v==="table"?"block":"none";
  const tl=document.getElementById("timeline-view");if(tl)tl.style.display=v==="timeline"?"block":"none";
  document.getElementById("btn-card").className="vbtn"+(v==="card"?" active":"");
  document.getElementById("btn-table").className="vbtn"+(v==="table"?" active":"");
  const tlb=document.getElementById("btn-timeline");if(tlb)tlb.className="vbtn"+(v==="timeline"?" active":"");
  localStorage.setItem("wj_view_design",v);
}
(function(){const sv=localStorage.getItem("wj_view_design");if(sv&&document.getElementById("btn-"+sv))setView(sv);})();
async function openDetail(rid){
  const rec=allRecords.find(r=>r.record_id===rid);
  if(!rec)return;
  const f=rec.fields||{};
  const body=document.getElementById("detail-body");
  const attKeys=[];
  let html="";
  for(const[k,v] of Object.entries(f)){
    if(v===null||v===undefined||v==="")continue;
    const isAtt=Array.isArray(v)&&v.length>0&&typeof v[0]==="object"&&v[0].file_token;
    if(isAtt){
      attKeys.push(k);
      const sid="att_"+rid.replace(/[^a-z0-9]/gi,"_")+"_"+k.replace(/[^a-z0-9]/gi,"_");
      html+=`<div class="df-row"><div class="df-key">${_esc(k)}</div><div class="df-val" id="${sid}"><span style="color:#94a3b8;font-size:13px">載入圖片中...</span></div></div>`;
    }else{
      const _val=fv(f,k);
      const _disp=_val.startsWith("http")?`<a href="${_esc(_val)}" target="_blank" rel="noopener noreferrer" style="color:#6366f1;word-break:break-all">${_esc(_val.slice(0,80)+(_val.length>80?"…":""))}</a>`:_esc(_val);
      html+=`<div class="df-row"><div class="df-key">${_esc(k)}</div><div class="df-val" style="white-space:pre-wrap">${_disp}</div></div>`;
    }
  }
  body.innerHTML=html||'<div style="color:#94a3b8;padding:20px 0;text-align:center">無資料</div>';
  document.getElementById("detail-modal").style.display="flex";
  if(attKeys.length>0){
    try{
      const tr=await fetch(_PROXY+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
      const td=await tr.json();
      const tk=td.tenant_access_token;
      for(const k of attKeys){
        const atts=f[k];
        const tokens=atts.map(a=>a.file_token).join(",");
        const r=await fetch(_PROXY+"/open-apis/drive/v1/medias/batch_get_tmp_download_url?file_tokens="+tokens,{headers:{"Authorization":"Bearer "+tk}});
        const data=await r.json();
        const urls=data.data?.tmp_download_urls||[];
        const sid="att_"+rid.replace(/[^a-z0-9]/gi,"_")+"_"+k.replace(/[^a-z0-9]/gi,"_");
        const el=document.getElementById(sid);
        if(!el)continue;
        el.innerHTML=urls.map(u=>{
          const att=atts.find(a=>a.file_token===u.file_token)||{};
          const name=att.name||"";
          const isImg=/\.(jpg|jpeg|png|gif|webp)$/i.test(name);
          return isImg
            ?`<img src="${u.tmp_download_url}" alt="${name}" style="max-width:100%;max-height:260px;border-radius:8px;margin:4px 0;display:block" loading="lazy">`
            :`<a href="${u.tmp_download_url}" target="_blank" style="color:#6366f1;font-size:13px;display:block;margin:4px 0">📎 ${name||"下載附件"}</a>`;
        }).join("")||'<span style="color:#94a3b8;font-size:13px">（無附件）</span>';
      }
    }catch(e){
      attKeys.forEach(k=>{
        const sid="att_"+rid.replace(/[^a-z0-9]/gi,"_")+"_"+k.replace(/[^a-z0-9]/gi,"_");
        const el=document.getElementById(sid);
        if(el)el.innerHTML='<span style="color:#ef4444;font-size:13px">圖片載入失敗</span>';
      });
    }
  }
}
function closeDetail(){
  document.getElementById("detail-modal").style.display="none";
}

const SD={"待提交":"#94a3b8","已提交":"#6366f1","修改中":"#f59e0b","已通過":"#10b981","已拒絕":"#ef4444"};
const SS={"概念設計":"#a855f7","2D設計":"#3b82f6","包裝設計":"#f59e0b","立體設計":"#f97316","樣品確認":"#06b6d4","版權方提交":"#6366f1","版權方批准":"#10b981","量產確認":"#84cc16","印刷打樣":"#ec4899"};
function cardHTML(f){
  const st=fv(f,"審核狀態")||"—",sc=SD[st]||"#64748b";
  const sg=fv(f,"送審階段")||"—",sgc=SS[sg]||"#64748b";
  const hasImg=Array.isArray(f["設計圖附件"])&&f["設計圖附件"].length>0;
  return `<div class="db-card">
    <div class="db-card-top">
      <div><div class="db-card-title">${fv(f,"設計名稱")||"—"}</div>
      <div class="db-card-sub">${fv(f,"IP品牌")||""} · ${fv(f,"版本號")||"—"}</div></div>
      <span class="badge" style="background:${sc};color:#fff">${st}</span>
    </div>
    <div class="db-card-body">
      <div style="margin-bottom:6px"><span class="badge" style="background:${sgc}20;color:${sgc}">${sg}</span></div>
      <div>👤 設計師：${fv(f,"設計師/供應商")||"—"}</div>
      <div>🏢 審核方：${fv(f,"審核方")||"—"}</div>
      ${fv(f,"修改備註")?`<div style="margin-top:6px;font-size:12px;color:#94a3b8">${fv(f,"修改備註").slice(0,60)}${fv(f,"修改備註").length>60?"...":""}</div>`:""}
    </div>
    <div class="db-card-row">
      <span style="font-size:12px;color:#64748b">提交：${fv(f,"提交日期")||"—"}</span>
      ${hasImg?`<span style="font-size:12px;color:#ec4899">🖼 設計稿 ×${f["設計圖附件"].length}</span>`:`<span style="font-size:12px;color:#94a3b8">無附件</span>`}
    </div>
  </div>`;
}
function rowHTML(f){
  const st=fv(f,"審核狀態")||"—",sc=SD[st]||"#64748b";
  const sg=fv(f,"送審階段")||"—",sgc=SS[sg]||"#64748b";
  const hasImg=Array.isArray(f["設計圖附件"])&&f["設計圖附件"].length>0;
  return `<tr>
    <td style="font-weight:600">${fv(f,"設計名稱")||"—"}</td>
    <td>${fv(f,"IP品牌")||"—"}</td>
    <td><span class="badge" style="background:${sgc}20;color:${sgc}">${sg}</span></td>
    <td><span class="badge" style="background:${sc};color:#fff">${st}</span></td>
    <td style="color:#64748b">${fv(f,"版本號")||"—"}</td>
    <td style="color:#64748b">${fv(f,"設計師/供應商")||"—"}</td>
    <td style="color:#64748b">${fv(f,"提交日期")||"—"}</td>
    <td>${hasImg?`<span style="color:#ec4899">🖼 ${f["設計圖附件"].length}張</span>`:"—"}</td>
  </tr>`;
}

loadData();
</script>
</body></html>
