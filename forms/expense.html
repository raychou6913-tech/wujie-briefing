<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🧾 費用申請 — 蕪解</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-bottom:48px}
.breadcrumb{background:#fff;border-bottom:1px solid #f1f5f9;padding:7px 20px;font-size:12px;color:#94a3b8;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.breadcrumb a{color:#64748b;text-decoration:none}.breadcrumb a:hover{color:#f97316}.breadcrumb .sep{color:#cbd5e1;margin:0 1px}.breadcrumb .cur{color:#0f172a;font-weight:600}
.hdr{background:#f9731612;border-bottom:2px solid #f97316;padding:18px 20px;display:flex;align-items:center;gap:12px}
.hdr-icon{font-size:26px}.hdr-title{font-size:19px;font-weight:700;color:#0f172a}
.hdr-sub{font-size:13px;color:#64748b;margin-top:2px}
.wrap{max-width:620px;margin:24px auto;padding:0 14px}
.card{background:#ffffff;border:1px solid #e2e8f0;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px #0000000a}
.ctitle{font-size:12px;font-weight:700;color:#f97316;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.f{margin-bottom:13px}
.f label{display:block;font-size:13px;color:#64748b;margin-bottom:5px;font-weight:600}
.f input,.f select,.f textarea{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;color:#0f172a;font-size:14px;outline:none;transition:border .15s}
.f input:focus,.f select:focus,.f textarea:focus{border-color:#f97316;background:#fff}
.f textarea{min-height:72px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.req{color:#f97316}
.hint{font-size:11px;color:#94a3b8;margin-top:3px}
.btn{width:100%;background:#f97316;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:all .15s}
.btn:hover{opacity:.88;transform:translateY(-1px)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.result{display:none;border-radius:12px;padding:20px;text-align:center;margin-top:14px;border:1px solid}
.result.ok{background:#f0fdf4;border-color:#10b981;color:#166534}
.result.err{background:#fef2f2;border-color:#ef4444;color:#991b1b}
.result-icon{font-size:32px;margin-bottom:8px}
.result-msg{font-size:15px;font-weight:700}
.result-sub{font-size:12px;margin-top:4px;opacity:.8;word-break:break-all}
.back{display:block;text-align:center;color:#64748b;font-size:15px;font-weight:500;margin-top:24px;text-decoration:none;padding:10px}
.back:hover{color:#f97316}
@media(max-width:480px){.row2{grid-template-columns:1fr}}
#_confirm-ov,#_result-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:none;align-items:center;justify-content:center;padding:16px}
#_confirm-ov.show,#_result-ov.show{display:flex}
#_confirm-box{background:#fff;border-radius:16px;padding:26px 24px 20px;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
#_confirm-ttl{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:4px}
#_confirm-sub{font-size:12px;color:#94a3b8;margin-bottom:14px}
#_confirm-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
#_confirm-tbl tr{border-bottom:1px solid #f1f5f9}
#_confirm-tbl td{padding:8px 4px;vertical-align:top}
#_confirm-tbl td:first-child{color:#64748b;width:38%;font-weight:500;padding-right:12px;white-space:nowrap}
#_confirm-tbl td:last-child{color:#0f172a;font-weight:600;word-break:break-word}
._cbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
._cbtns button{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:opacity .15s}
#_conf-no{background:#f1f5f9;color:#475569}
#_conf-yes{background:#f97316;color:#fff}
#_conf-yes:hover{opacity:.85}
#_result-box{background:#fff;border-radius:16px;padding:30px 24px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.r-icon{font-size:44px;margin-bottom:10px}
.r-title{font-size:18px;font-weight:700;color:#1e293b;margin-bottom:6px}
.r-rid{font-size:11px;color:#94a3b8;margin-bottom:20px;font-family:monospace}
#_res-view{display:block;padding:11px;background:#f97316;color:#fff;border-radius:9px;text-decoration:none;font-weight:700;font-size:14px;margin-bottom:8px}
#_res-again{width:100%;padding:11px;background:#f1f5f9;color:#475569;border:none;border-radius:9px;cursor:pointer;font-weight:700;font-size:14px}
</style>
</head>
<body>
<div class="breadcrumb">
  <a href="../home.html">🏠 首頁</a><span class="sep">›</span>
  <a href="index.html">填報中心</a><span class="sep">›</span>
  <span class="cur">費用申請</span>
</div>
<div class="hdr">
  <div class="hdr-icon">🧾</div>
  <div><div class="hdr-title">費用申請</div>
  <div class="hdr-sub">蕪解創意 · 填報後即時同步管理儀表板</div></div>
</div>
<div id="popup-mode-banner" style="display:none;background:#fff7ed;border-bottom:2px solid #f59e0b;padding:9px 20px;font-size:13px;font-weight:700;color:#92400e;letter-spacing:.2px">🏪 快閃店模式 — 項目選單已篩選為快閃店專屬項目</div>
<div class="wrap">
<form id="frm">

    <div class="card" style="border-color:#f97316">
      <div class="ctitle" style="color:#f97316">📋 關聯項目（選填）</div>
      <div class="f">
        <label>選擇項目</label>
        <select id="proj-sel"><option value="">載入中...</option></select>
        <div class="hint">薪資、租金、水電等固定成本可選「全公司固定成本」；若不選則預設歸入固定成本</div>
      </div>
      <div id="budget-ref" style="display:none;margin-top:12px">
        <div style="font-size:12px;font-weight:700;color:#f97316;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">本項目預算對照（含稅）</div>
        <div id="budget-ref-body" style="font-size:13px;color:#94a3b8">載入中...</div>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">費用申請明細</div>
      <div class="row2">
        <div class="f"><label>費用類別 <span class="req">*</span></label>
          <select id="f-cat" required>
            <option>生產製造</option><option>開發費用</option><option>版權費用</option>
            <option>採購</option><option>行銷</option><option>物流</option><option>倉儲</option>
            <option>運營</option><option>薪資發放</option><option>辦公室租金</option>
            <option>人事</option><option>差旅</option>
            <option>展場</option><option>水電雜費</option><option>其他支出</option>
          </select></div>
        <div class="f"><label>批次</label>
          <select id="f-batch">
            <option value="">— 不分批次 —</option>
            <option>第一批</option><option>追加批-1</option><option>追加批-2</option>
            <option>追加批-3</option><option>開發期（一次性）</option>
          </select></div>
      </div>
      <div class="row2">
        <div class="f"><label>申請金額（含稅）<span class="req">*</span></label>
          <input type="number" id="f-amount" required placeholder="0" step="0.01"></div>
        <div class="f"><label>幣別</label>
          <select id="f-cur">
            <option>CNY</option><option>TWD</option><option>THB</option><option>USD</option>
          </select></div>
      </div>
      <div class="hint" style="margin-top:-6px;margin-bottom:10px">所有金額均含稅</div>
      <div id="mg-pool" style="display:none;margin-top:4px;padding:12px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px">
        <div style="font-size:12px;font-weight:700;color:#dc2626;margin-bottom:8px">🏦 版權資金池（MG保底金追蹤）</div>
        <div id="mg-pool-body" style="font-size:13px;color:#64748b">載入中...</div>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">供應商 & 付款條件</div>
      <div class="f"><label>供應商</label>
        <select id="f-supplier">
          <option value="">— 載入供應商清單 —</option>
        </select>
        <div class="hint">找不到對應供應商？請先至「供應商資料庫」提交新增申請</div>
      </div>
      <div class="row2">
        <div class="f"><label>付款方式</label>
          <select id="f-paymethod">
            <option value="">— 請選擇 —</option>
            <option>電匯 T/T</option><option>現金</option><option>支票</option>
            <option>月結</option><option>預付款</option><option>分期</option>
          </select></div>
        <div class="f"><label>帳期（天）</label>
          <input type="number" id="f-payterm" placeholder="例：30（即月結30天）" min="0"></div>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">申請資訊</div>
      <div class="row2">
        <div class="f"><label>費用發生日期 <span class="req">*</span></label>
          <input type="date" id="f-date" required>
          <div class="hint">填費用實際發生（或預計付款）的日期，今天已自動帶入</div></div>
        <div class="f"><label>申請人</label>
          <input id="f-who" placeholder="你的名字"></div>
      </div>
      <div class="f"><label>備註 / 說明</label>
        <textarea id="f-note" placeholder="費用用途、發票資訊、特殊說明..."></textarea></div>
    </div>
<button class="btn" type="submit" id="sbtn">提交</button>
</form>
<div class="result" id="res">
  <div class="result-icon" id="res-icon"></div>
  <div class="result-msg" id="res-msg"></div>
  <div class="result-sub" id="res-sub"></div>
</div>
<a class="back" href="index.html">← 返回填報中心</a>
</div>
<!-- confirm modal -->
<div id="_confirm-ov"><div id="_confirm-box">
  <div id="_confirm-ttl">確認送出</div>
  <div id="_confirm-sub">請確認以下資料正確無誤</div>
  <table id="_confirm-tbl"></table>
  <div class="_cbtns"><button id="_conf-no">返回修改</button><button id="_conf-yes">確認送出</button></div>
</div></div>
<!-- result overlay -->
<div id="_result-ov"><div id="_result-box">
  <div class="r-icon">✅</div>
  <div class="r-title">提交成功！</div>
  <div class="r-rid">Record: <span id="_res-rid"></span></div>
  <a id="_res-view" target="_blank">查看提交記錄 →</a>
  <button id="_res-again">再填一筆</button>
</div></div>
<script>

const _PROXY="https://feishu-proxy.raychou6913.workers.dev";
const _AT="YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _TABLES={"project": "tblYBjAlemYPuNGy", "cashflow": "tblxaiogh3tYlZUz", "budget": "tblteo2QEO0jP8j9", "sales": "tblRtqmbO9TO3sYZ", "design": "tblTEoNLDvtYi4pX", "procure": "tblae5v8pGMXleJZ", "stock": "tblsmZ7S5cNiYN4Y", "contract": "tbltnJNDhRNwVkZC", "approval": "tblD6acV3m2ZXJHe", "product": "tblH1pYYlHBGSBHc", "ip_db": "tblHPNUTdcFa7tqs", "supplier": "tblgpiqW1yOa2DR4", "customer": "tblXMXDGZKw8KOsl", "design_vendor": "tblc8uH2yHbOAI4l", "logistics": "tbl1MeP2wUWHwenW", "daily_sales": "tblz7zvgbzOqknzm", "popup_venue": "tbldKRVsE4RcoZrD", "consignment": "tblypFKMeOARPFT1", "visit_log": "tblUzRSQgKLhlttk", "notice_board": "tblPtgudsOOlmJAx", "feedback": "tbl68ofUGp7FTjx8", "meeting": "tblEf71rCbLy3GGO", "venue_db": "tblHSG9gEJ53iO1l", "daily_briefing": "tbliwX6nFg6rryn7", "expense": "tblu2NkqBWyBSskG", "follow_up": "tblyO9Cz2nUx6q46", "roles": "tblEj5GSDYUrKGY9"};

async function _getToken(){
  const r=await fetch(_PROXY+"/auth/token",{
    method:"POST",headers:{"Content-Type":"application/json"},body:"{}"
  });
  if(!r.ok) throw new Error("Token HTTP "+r.status);
  const d=await r.json();
  if(d.code!==0) throw new Error("Token err: "+d.msg);
  return d.tenant_access_token;
}

async function _post(tableKey,fields){
  Object.keys(fields).forEach(k=>{ if(fields[k]===null||fields[k]===undefined) delete fields[k]; });
  const tk=await _getToken();
  const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES[tableKey]+"/records",{
    method:"POST",
    headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  if(!r.ok) throw new Error("HTTP "+r.status);
  const d=await r.json();
  if(d.code!==0) throw new Error("["+d.code+"] "+(d.msg||"API error"));
  return d;
}

function _showConfirm(title,rows,onConfirm){
  const ov=document.getElementById("_confirm-ov");
  if(!ov){onConfirm();return;}
  document.getElementById("_confirm-ttl").textContent=title;
  document.getElementById("_confirm-tbl").innerHTML=rows.filter(([,v])=>v).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join("");
  ov.classList.add("show");
  document.getElementById("_conf-no").onclick=()=>ov.classList.remove("show");
  document.getElementById("_conf-yes").onclick=()=>{ov.classList.remove("show");onConfirm();};
}
function _showResult(rid,viewPage,onReset){
  const ov=document.getElementById("_result-ov");
  if(!ov)return;
  const ridEl=document.getElementById("_res-rid");
  if(ridEl) ridEl.textContent=rid||"";
  const vl=document.getElementById("_res-view");
  if(vl){if(viewPage&&rid){vl.href=viewPage+"?rid="+rid;vl.style.display="block";}else{vl.style.display="none";}}
  document.getElementById("_res-again").onclick=()=>{ov.classList.remove("show");if(onReset)onReset();};
  ov.classList.add("show");
}

async function _getProjects(typeFilter){
  const tk=await _getToken();
  const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["project"]+"/records?page_size=100",{
    headers:{"Authorization":"Bearer "+tk}
  });
  const d=await r.json();
  if(d.code!==0) return [];
  const items=(d.data?.items||[]).map(rec=>{
    const f=rec.fields||{};
    const n=f["項目名稱"];
    if(!n) return null;
    const name=Array.isArray(n)?n[0]?.text||"":String(n);
    const tv=f["業務類型"];
    const type=Array.isArray(tv)?tv[0]?.text||"":String(tv||"");
    const iv=f["IP品牌"];
    const ip=Array.isArray(iv)?iv[0]?.text||"":String(iv||"");
    const lv=f["所在地"];
    const loc=Array.isArray(lv)?lv[0]?.text||"":String(lv||"");
    return {name,type,ip,loc};
  }).filter(Boolean);
  if(typeFilter) return items.filter(p=>p.type===typeFilter);
  return items;
}

// 從項目名稱快速查 IP（_getProjects 結果快取）
let _projCache=null;
async function _getProjMeta(name){
  if(!_projCache) _projCache=await _getProjects(null);
  return _projCache.find(p=>p.name===name)||null;
}

function _ts(dateStr){ return dateStr?new Date(dateStr).getTime():null; }

let _ipCache=null;
async function _getIpBrands(){
  if(_ipCache) return _ipCache;
  const tk=await _getToken();
  const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["ip_db"]+"/records?page_size=100",{
    headers:{"Authorization":"Bearer "+tk}
  });
  const d=await r.json();
  if(d.code!==0) return [];
  _ipCache=(d.data?.items||[]).map(rec=>{
    const f=rec.fields||{};
    const nv=f["IP名稱"]; const name=Array.isArray(nv)?nv[0]?.text||"":String(nv||"");
    const lv=f["版權方"]; const licensor=Array.isArray(lv)?lv[0]?.text||"":String(lv||"");
    const av=f["版權代理商"]; const agent=Array.isArray(av)?av[0]?.text||"":String(av||"");
    // cascadeLicensor = 代理商（若有）, 否則原廠；合約版權方需與此一致
    const cascadeLicensor=agent||licensor;
    return name?{name,licensor,agent,cascadeLicensor}:null;
  }).filter(Boolean);
  return _ipCache;
}

async function _loadIpSelect(selectId){
  const sel=document.getElementById(selectId);
  if(!sel) return;
  try{
    const list=await _getIpBrands();
    const prev=sel.value;
    sel.innerHTML='<option value="">— 選擇 IP 品牌 —</option>';
    list.forEach(ip=>{
      const o=document.createElement("option");
      o.value=ip.name; o.textContent=ip.name;
      if(ip.licensor) o.dataset.licensor=ip.licensor;
      sel.appendChild(o);
    });
    const other=document.createElement("option");
    other.value="__new_ip__"; other.textContent="＋ 新增 IP / 版權方資訊";
    other.style.cssText="color:#6366f1;font-weight:700";
    sel.appendChild(other);
    // re-apply IP from linked project select, URL param, or previous value
    const projSel=document.getElementById("f-proj");
    const projIp=projSel?.options[projSel.selectedIndex]?.dataset?.ip;
    const urlIp=new URLSearchParams(location.search).get("ip");
    if(projIp) sel.value=projIp;
    else if(urlIp) sel.value=urlIp;
    else if(prev) sel.value=prev;
    const _syncLicensor=()=>{
      if(sel.value==="__new_ip__"){
        window.open("ip_db.html","_blank");
        sel.selectedIndex=0; return;
      }
      const chosen=sel.options[sel.selectedIndex];
      ["f-licensor","m-licensor"].forEach(id=>{
        const el=document.getElementById(id);
        if(el) el.value=chosen?.dataset?.licensor||"";
      });
    };
    sel.addEventListener("change",_syncLicensor);
    _syncLicensor();
  }catch(e){}
}

let _contractCache=null;
async function _getContracts(ipFilter){
  if(!_contractCache){
    const tk=await _getToken();
    const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["contract"]+"/records?page_size=200",{
      headers:{"Authorization":"Bearer "+tk}
    });
    const d=await r.json();
    if(d.code!==0){_contractCache=[];return [];}
    _contractCache=(d.data?.items||[]).map(rec=>{
      const f=rec.fields||{};
      const _t=v=>Array.isArray(v)?v[0]?.text||"":String(v||"");
      const _n=v=>{const r=parseFloat(_t(v));return isNaN(r)?0:r;};
      const name=_t(f["合約名稱"]);
      if(!name) return null;
      return {
        name, ip:_t(f["IP品牌"]), licensor:_t(f["對方公司"])||_t(f["版權方"]),
        status:_t(f["合約狀態"]), cats:_t(f["授權品類"]), region:_t(f["授權地區"]),
        amount:_n(f["保底金額"]), flatFee:_n(f["一次性授權費"]), cur:_t(f["幣別"])||"USD",
        royalRetail:_n(f["授權金_零售%"]), royalWholesale:_n(f["授權金_批發%"]),
        wholesaleRatio:_n(f["批發折數"]),
        startTs:_n(f["簽署日期"]), endTs:_n(f["到期日期"])
      };
    }).filter(Boolean);
  }
  return ipFilter?_contractCache.filter(c=>c.ip===ipFilter):_contractCache;
}

async function _loadContractSelect(selectId,ipFilter){
  const sel=document.getElementById(selectId);
  if(!sel) return;
  try{
    const list=await _getContracts(ipFilter);
    const prev=sel.value;
    sel.innerHTML='<option value="">— 選擇合約 —</option>';
    list.forEach(c=>{
      const o=document.createElement("option");
      const statusLabel=c.status?" ["+c.status+"]":"";
      o.value=c.name; o.textContent=c.name+statusLabel;
      o.dataset.ip=c.ip; o.dataset.licensor=c.licensor;
      o.dataset.status=c.status; o.dataset.cats=c.cats; o.dataset.region=c.region;
      o.dataset.amount=c.amount||0; o.dataset.cur=c.cur||"TWD";
      o.dataset.startTs=c.startTs||""; o.dataset.endTs=c.endTs||"";
      o.dataset.royalRetail=c.royalRetail||0; o.dataset.royalWholesale=c.royalWholesale||0;
      o.dataset.flatFee=c.flatFee||0;
      sel.appendChild(o);
    });
    if(list.length===0){
      const empty=document.createElement("option"); empty.disabled=true;
      empty.textContent="（尚無此 IP 的合約）"; sel.appendChild(empty);
    }
    if(prev) sel.value=prev;
    const _syncContract=()=>{
      const ch=sel.options[sel.selectedIndex];
      const _set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
      _set("f-ip",ch?.dataset?.ip||""); _set("m-ip",ch?.dataset?.ip||"");
      _set("f-licensor",ch?.dataset?.licensor||""); _set("m-licensor",ch?.dataset?.licensor||"");
      _set("f-cats",ch?.dataset?.cats||""); _set("m-cats",ch?.dataset?.cats||"");
      _set("f-contract-region",ch?.dataset?.region||"");
      const badge=document.getElementById("contract-status-badge");
      if(badge&&ch?.dataset?.status){
        const s=ch.dataset.status;
        const safe=["已簽署","執行中"];
        badge.style.display="inline-block";
        badge.textContent=s;
        badge.style.cssText+=";padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;"+
          (safe.includes(s)?"background:#f0fdf4;color:#166534;border:1px solid #10b981":"background:#fff7ed;color:#92400e;border:1px solid #f59e0b");
      }else if(badge){badge.style.display="none";}
    };
    sel.addEventListener("change",_syncContract);
    _syncContract();
  }catch(e){}
}

async function _loadProjectSelect(selectId,typeFilter){
  const sel=document.getElementById(selectId);
  if(!sel) return;
  try{
    const list=await _getProjects(typeFilter);
    sel.innerHTML='<option value="">— 選擇項目（選填）—</option>';
    list.forEach(proj=>{
      const o=document.createElement("option");
      o.value=proj.name; o.textContent=proj.name;
      if(proj.ip) o.dataset.ip=proj.ip;
      if(proj.loc) o.dataset.loc=proj.loc;
      sel.appendChild(o);
    });
    const opt=document.createElement("option");
    opt.value="__new__"; opt.textContent="＋ 新增項目（跳轉）";
    sel.appendChild(opt);
    const _fillIp=()=>{
      const chosen=sel.options[sel.selectedIndex];
      const ipEl=document.getElementById("f-ip");
      if(ipEl && chosen && chosen.dataset.ip) ipEl.value=chosen.dataset.ip;
    };
    sel.onchange=()=>{
      if(sel.value==="__new__"){ window.open("project.html","_blank"); return; }
      _fillIp();
      const chosen=sel.options[sel.selectedIndex];
      const locEl=document.getElementById("g-loc");
      if(locEl&&chosen&&chosen.dataset.loc){
        const opt=[...locEl.options].find(o=>o.value===chosen.dataset.loc);
        if(opt) locEl.value=chosen.dataset.loc;
      }
    };
    // URL param 自動帶入項目（從填報中心點擊卡片跳轉時使用）
    const urlProj=new URLSearchParams(location.search).get("proj");
    if(urlProj){
      const found=[...sel.options].find(o=>o.value===urlProj);
      if(found){sel.value=urlProj;sel.dispatchEvent(new Event("change"));}
    } else _fillIp();
  }catch(e){
    sel.innerHTML='<option value="">（無法載入項目列表）</option>';
    const txt=document.createElement("input");
    txt.type="text"; txt.placeholder="請手動輸入項目名稱";
    txt.style.cssText="width:100%;margin-top:6px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;color:#0f172a;font-size:14px";
    txt.id=selectId+"_fallback";
    sel.parentNode.appendChild(txt);
    const urlProj=new URLSearchParams(location.search).get("proj");
    if(urlProj) txt.value=urlProj;
  }
}

function _projVal(selectId){
  const sel=document.getElementById(selectId);
  const fb=document.getElementById(selectId+"_fallback");
  if(fb) return fb.value.trim();
  return sel?.value==="__new__"?"":sel?.value||"";
}

async function _uploadImages(files,tk){
  const res=[];
  for(const f of files){
    const fd=new FormData();
    fd.append("file_name",f.name);
    fd.append("parent_type","bitable_image");
    fd.append("parent_node",_AT);
    fd.append("size",String(f.size));
    fd.append("file",f);
    const r=await fetch(_PROXY+"/open-apis/drive/v1/medias/upload_all",{
      method:"POST",headers:{"Authorization":"Bearer "+tk},body:fd
    });
    const d=await r.json();
    if(d.code!==0) throw new Error("圖片上傳失敗："+f.name+" ("+d.msg+")");
    res.push({file_token:d.data.file_token,name:f.name});
  }
  return res;
}

function _bindImgPreview(inputId,previewId){
  const inp=document.getElementById(inputId);
  if(!inp) return;

        img.style.cssText="width:78px;height:58px;object-fit:cover;border-radius:4px;margin-bottom:4px;display:block";

      const nm=document.createElement("div");

}

async function loadBudgetRef(projName){
  const box=document.getElementById("budget-ref");
  const body=document.getElementById("budget-ref-body");
  box.style.display="block";
  body.innerHTML="<span style='color:#94a3b8'>載入中...</span>";
  try{
    const tk=await _getToken();
    const r=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["budget"]+"/records?page_size=200",{
      headers:{"Authorization":"Bearer "+tk}
    });
    const d=await r.json();
    if(d.code!==0) throw new Error(d.msg);
    const items=(d.data?.items||[]).filter(item=>{
      const pn=item.fields?.["項目關聯"];
      const n=Array.isArray(pn)?pn[0]?.text||"":String(pn||"");
      return n===projName;
    });
    if(!items.length){body.innerHTML="<span style='color:#94a3b8;font-size:13px'>此項目尚無預算記錄</span>";return;}
    let html='<table style="width:100%;font-size:12px;border-collapse:collapse">';
    html+='<tr style="background:#fff7ed"><th style="padding:5px 8px;text-align:left;color:#64748b;font-weight:600">預算名稱</th><th style="padding:5px 8px;text-align:left;color:#64748b;font-weight:600">類別</th><th style="padding:5px 8px;text-align:right;color:#64748b;font-weight:600">預算金額</th><th style="padding:5px 8px;text-align:left;color:#64748b;font-weight:600">幣別</th></tr>';
    items.forEach(item=>{
      const f=item.fields||{};
      const bname=Array.isArray(f["預算名稱"])?f["預算名稱"][0]?.text||"":String(f["預算名稱"]||"");
      const cat=Array.isArray(f["類別"])?f["類別"][0]?.text||"":String(f["類別"]||"");
      const amt=parseFloat(f["預算金額"]||0);
      const cur=Array.isArray(f["幣別"])?f["幣別"][0]?.text||"":String(f["幣別"]||"");
      html+=`<tr style="border-bottom:1px solid #fde8d8"><td style="padding:5px 8px">${bname}</td><td style="padding:5px 8px;color:#64748b">${cat}</td><td style="padding:5px 8px;text-align:right;font-weight:600;color:#f97316">${amt.toLocaleString()}</td><td style="padding:5px 8px;color:#64748b">${cur}</td></tr>`;
    });
    html+='</table>';
    body.innerHTML=html;
  }catch(e){
    body.innerHTML="<span style='color:#ef4444;font-size:12px'>載入失敗</span>";
  }
}

async function loadMGPool(projName){
  const box=document.getElementById("mg-pool");
  const body=document.getElementById("mg-pool-body");
  box.style.display="block";
  body.innerHTML="<span style='color:#94a3b8'>載入中...</span>";
  try{
    const tk=await _getToken();
    // 1. 取項目MG保底金
    const rp=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["project"]+"/records?page_size=200",{
      headers:{"Authorization":"Bearer "+tk}
    });
    const dp=await rp.json();
    let mg=0,mgCur="CNY";
    (dp.data?.items||[]).forEach(item=>{
      const f=item.fields||{};
      const n=Array.isArray(f["項目名稱"])?f["項目名稱"][0]?.text||"":String(f["項目名稱"]||"");
      if(n===projName){
        mg=parseFloat(f["保底金額"]||0);
        mgCur=Array.isArray(f["幣別"])?f["幣別"][0]?.text||"CNY":String(f["幣別"]||"CNY");
      }
    });
    // 2. 取該項目已有版權費用合計
    const re=await fetch(_PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_TABLES["expense"]+"/records?page_size=500",{
      headers:{"Authorization":"Bearer "+tk}
    });
    const de=await re.json();
    let used=0;
    (de.data?.items||[]).forEach(item=>{
      const f=item.fields||{};
      const pn=Array.isArray(f["關聯項目"])?f["關聯項目"][0]?.text||"":String(f["關聯項目"]||"");
      const cat=Array.isArray(f["費用類別"])?f["費用類別"][0]?.text||"":String(f["費用類別"]||"");
      if(pn===projName&&cat==="版權費用") used+=parseFloat(f["實際金額"]||0);
    });
    const remaining=mg-used;
    const curAmt=parseFloat(document.getElementById("f-amount").value)||0;
    const afterThis=used+curAmt;
    const overMG=mg>0&&afterThis>mg;
    const pct=mg>0?Math.min(100,(used/mg*100)).toFixed(1):0;
    const bar=mg>0?`<div style="background:#fecaca;border-radius:4px;height:6px;margin:6px 0"><div style="background:${overMG?"#ef4444":"#f97316"};width:${pct}%;height:100%;border-radius:4px;transition:width .3s"></div></div>`:"";
    const statusLabel=mg<=0?"（項目未設MG保底金）":overMG?
      `<span style="background:#fef2f2;color:#dc2626;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:700">⚠️ 超出MG，需補繳</span>`:
      `<span style="background:#f0fdf4;color:#16a34a;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:700">✅ 抵扣MG範圍內</span>`;
    body.innerHTML=`
      <table style="width:100%;font-size:12px;border-collapse:collapse">
        <tr><td style="padding:3px 0;color:#64748b;width:110px">MG保底金</td>
            <td style="padding:3px 0;font-weight:700;color:#dc2626">${mg>0?mg.toLocaleString()+" "+mgCur:"未設定"}</td></tr>
        <tr><td style="padding:3px 0;color:#64748b">已累計版權費用</td>
            <td style="padding:3px 0;color:#f97316;font-weight:600">${used.toLocaleString()} ${mgCur}</td></tr>
        <tr><td style="padding:3px 0;color:#64748b">剩餘可用</td>
            <td style="padding:3px 0;font-weight:700;color:${remaining<0?"#ef4444":"#16a34a"}">${remaining.toLocaleString()} ${mgCur}</td></tr>
      </table>
      ${bar}
      <div style="margin-top:6px">${statusLabel}</div>`;
  }catch(e){
    body.innerHTML="<span style='color:#ef4444;font-size:12px'>載入失敗："+e.message+"</span>";
  }
}

document.getElementById("frm").onsubmit=async(e)=>{
  e.preventDefault();
  const proj=_projVal("proj-sel")||"全公司固定成本";
  const amount=parseFloat(document.getElementById("f-amount").value)||0;
  if(!amount){alert("請填寫申請金額");return;}
  const btn=document.getElementById("sbtn");
  const res=document.getElementById("res");
  btn.disabled=true;btn.textContent="提交中...";res.style.display="none";
  try{
    const batch=document.getElementById("f-batch").value;
    const supplier=document.getElementById("f-supplier").value;
    const paymethod=document.getElementById("f-paymethod").value;
    const payterm=document.getElementById("f-payterm").value;
    const fields={
      "關聯項目": proj,
      "費用類別": document.getElementById("f-cat").value,
      "實際金額": amount,
      "幣別":     document.getElementById("f-cur").value,
      "發生日期": new Date(document.getElementById("f-date").value).getTime(),
      "填報人":   document.getElementById("f-who").value,
      "備註":     document.getElementById("f-note").value,
    };
    if(batch) fields["批次"]=batch;
    if(supplier&&supplier!=="__new__") fields["供應商"]=supplier;
    if(paymethod) fields["付款方式"]=paymethod;
    if(payterm) fields["帳期（天）"]=parseInt(payterm);
    if(document.getElementById("f-cat").value==="版權費用"){
      const mgBody=document.getElementById("mg-pool-body")?.textContent||"";
      if(mgBody) fields["備註"]=(fields["備註"]?fields["備註"]+" | ":"")+(mgBody.includes("超出MG")?"超出MG補繳":"抵扣MG");
    }
    await _post("expense", fields);
    res.className="result ok";res.style.display="block";
    document.getElementById("res-icon").textContent="✅";
    document.getElementById("res-msg").textContent="費用申請已提交！";
    document.getElementById("res-sub").textContent="項目「"+proj+"」新增一筆費用申請";
    document.getElementById("frm").reset();
    _loadProjectSelect("proj-sel",window._ctxTypeFilter||null);
    document.getElementById("budget-ref").style.display="none";
    const t2=new Date();
    document.getElementById("f-date").value=t2.getFullYear()+"-"+String(t2.getMonth()+1).padStart(2,"0")+"-"+String(t2.getDate()).padStart(2,"0");
    loadSuppliers();
  }catch(err){
    res.className="result err";res.style.display="block";
    document.getElementById("res-icon").textContent="❌";
    document.getElementById("res-msg").textContent="提交失敗";
    document.getElementById("res-sub").textContent=err.message+" ｜ 請截圖回報管理員";
    console.error(err);
  }finally{
    btn.disabled=false;btn.textContent="提交";
  }
};
