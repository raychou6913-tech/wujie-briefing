<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解 ERP · 產品開發流水線</title>
<style>
:root{
  --bg:#0b0c10;--surface:#111318;--card:#181a22;--card2:#1e2130;
  --border:#222535;--border-hi:#363b58;
  --txt-hi:#e8eaf8;--txt-mid:#7880a8;--txt-lo:#3d4268;
  --accent:#818cf8;--ok:#22c55e;--ok-dim:#22c55e18;
  --warn:#f59e0b;--warn-dim:#f59e0b18;--danger:#ef4444;--danger-dim:#ef444418;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt-hi);font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;min-height:100vh;padding-bottom:80px;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:8px;}
.brand-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 7px var(--accent);}
.brand-name{font-size:14px;font-weight:700;}
.brand-sub{font-size:11px;color:var(--txt-mid);}
.nav-back{font-size:12px;color:var(--txt-mid);text-decoration:none;padding:6px 10px;border:1px solid var(--border);border-radius:6px;min-height:34px;display:flex;align-items:center;}

/* ── KPI BAR ── */
.kpi-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap;}
.kpi-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;flex:1;min-width:calc(50% - 5px);}
.kpi-label{font-size:9px;color:var(--txt-lo);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.kpi-val{font-size:20px;font-weight:800;line-height:1;}
.kpi-sub{font-size:10px;color:var(--txt-mid);margin-top:3px;}

/* ── PROJECT PICKER ── */
.proj-strip{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.proj-pill{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--txt-mid);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;min-height:36px;}
.proj-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.proj-pill .pp-status{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.pp-active{background:var(--ok);}
.pp-warn{background:var(--warn);}
.pp-wait{background:var(--txt-lo);}

.main{max-width:720px;margin:0 auto;padding:16px;}
.section-title{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--txt-mid);text-transform:uppercase;margin-bottom:10px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}

/* ── PROJECT HEADER ── */
.proj-header{margin-bottom:16px;}
.proj-title{font-size:18px;font-weight:800;margin-bottom:4px;}
.proj-meta{font-size:11px;color:var(--txt-mid);margin-bottom:10px;line-height:1.6;}
.type-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;background:var(--accent);color:#fff;vertical-align:middle;margin-left:6px;}
.type-nonfig{background:#10b981;}

/* ── PROGRESS BAR ── */
.stage-bar{display:flex;gap:3px;margin-bottom:6px;}
.sb-seg{flex:1;height:6px;border-radius:3px;background:var(--border);}
.sb-done{background:var(--ok);}
.sb-active{background:var(--accent);}
.sb-blocked{background:var(--danger);}
.stage-bar-labels{display:flex;gap:3px;margin-bottom:14px;}
.sbl{flex:1;font-size:8px;color:var(--txt-lo);text-align:center;overflow:hidden;white-space:nowrap;}
.sbl.done{color:var(--ok);}
.sbl.active{color:var(--accent);}

/* ── TIMELINE ── */
.timeline{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:0;position:relative;}
.tl-left{width:80px;flex-shrink:0;padding:4px 12px 4px 0;text-align:right;}
.tl-num{font-size:9px;color:var(--txt-lo);font-weight:700;}
.tl-name{font-size:11px;color:var(--txt-mid);font-weight:600;margin-top:2px;}
.tl-owner{font-size:9px;color:var(--txt-lo);margin-top:2px;}
.tl-connector{width:24px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:6px;}
.tl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.dot-done{background:var(--ok);}
.dot-active{background:var(--accent);box-shadow:0 0 8px var(--accent);}
.dot-blocked{background:var(--danger);}
.dot-wait{background:var(--border-hi);}
.tl-line{flex:1;width:2px;background:var(--border);min-height:20px;}
.tl-right{flex:1;padding:0 0 20px 4px;}
.tl-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:2px;}
.tl-card.tc-done{border-color:#22c55e30;}
.tl-card.tc-active{border-color:var(--accent);}
.tl-card.tc-blocked{border-color:var(--danger);}
.tl-card.tc-wait{opacity:.45;}
.tc-status{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.tc-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;}
.tcb-done{background:var(--ok-dim);color:var(--ok);}
.tcb-active{background:#818cf820;color:var(--accent);}
.tcb-blocked{background:var(--danger-dim);color:var(--danger);}
.tcb-wait{background:var(--border);color:var(--txt-lo);}
.tc-date{font-size:10px;color:var(--txt-mid);margin-left:auto;}
.tc-desc{font-size:12px;color:var(--txt-hi);line-height:1.6;margin-bottom:8px;}
.tc-parallel{background:var(--card);border-radius:8px;padding:10px;margin-bottom:8px;}
.tcp-title{font-size:9px;color:var(--txt-lo);font-weight:700;margin-bottom:6px;text-transform:uppercase;}
.tcp-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.tcp-label{font-size:11px;color:var(--txt-mid);}
.tcp-status{font-size:9px;font-weight:700;padding:1px 6px;border-radius:6px;}
.tcs-ok{background:var(--ok-dim);color:var(--ok);}
.tcs-active{background:#818cf820;color:var(--accent);}
.tcs-wait{background:var(--border);color:var(--txt-lo);}
.tc-actions{display:flex;gap:6px;flex-wrap:wrap;}
.tc-btn{font-size:11px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;border:1px solid;min-height:34px;}
.tcb-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.tcb-warn{background:var(--warn-dim);border-color:var(--warn);color:var(--warn);}
.tcb-ghost{background:transparent;border-color:var(--border-hi);color:var(--txt-mid);}

/* ── NEW PROJECT FORM ── */
.inp{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--txt-hi);padding:10px 12px;border-radius:8px;font-size:14px;margin-bottom:8px;}
.inp::placeholder{color:var(--txt-lo);}
select.inp option{background:var(--card2);}
.btn-ok{background:var(--ok-dim);border:1px solid var(--ok);color:var(--ok);padding:10px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;width:100%;min-height:44px;}

/* ── EMPTY ── */
.empty{text-align:center;padding:32px 16px;color:var(--txt-lo);}
.empty-icon{font-size:28px;margin-bottom:8px;}

@media(min-width:600px){
  .kpi-chip{min-width:calc(33% - 7px);}
  .main{padding:20px 24px;}
  .topbar,.kpi-bar,.proj-strip{padding-left:24px;padding-right:24px;}
  .tl-left{width:100px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <span class="brand-name">蕪解 ERP</span>
      <span class="brand-sub"> 產品開發流水線</span>
    </div>
  </div>
  <a class="nav-back" href="erp-war-room.html">← 戰情室</a>
</div>

<!-- ── KPI BAR ── -->
<div class="kpi-bar">
  <div class="kpi-chip">
    <div class="kpi-label">進行中項目</div>
    <div class="kpi-val" id="kpi-active" style="color:var(--accent)">—</div>
    <div class="kpi-sub" id="kpi-active-sub">—</div>
  </div>
  <div class="kpi-chip">
    <div class="kpi-label">等版權方回覆</div>
    <div class="kpi-val" id="kpi-waiting" style="color:var(--warn)">—</div>
    <div class="kpi-sub">送審中</div>
  </div>
  <div class="kpi-chip">
    <div class="kpi-label">本月可進大貨</div>
    <div class="kpi-val" id="kpi-ready" style="color:var(--ok)">—</div>
    <div class="kpi-sub">打樣已通過</div>
  </div>
</div>

<!-- ── PROJECT STRIP ── -->
<div class="proj-strip" id="proj-strip">
  <div style="color:var(--txt-lo);font-size:12px;padding:8px;">載入中...</div>
</div>

<div class="main">
  <div id="proj-detail">
    <div class="empty"><div class="empty-icon">👆</div>選擇上方項目查看流水線</div>
  </div>

  <!-- 新增項目 -->
  <div style="margin-top:8px;">
    <button class="tcb-ghost tc-btn" style="width:100%;min-height:44px;" onclick="toggleNewForm()">+ 新增產品開發項目</button>
    <div id="new-form" style="display:none;" class="card" style="margin-top:8px;">
      <div class="section-title">新增項目</div>
      <input class="inp" id="nf-name" placeholder="產品名稱">
      <select class="inp" id="nf-ip">
        <option value="">選擇 IP 品牌</option>
        <option>Snoopy</option><option>Mofusand</option><option>Muziktiger</option>
        <option>Opanchu</option><option>Chiikawa</option><option>SHRUG</option><option>其他</option>
      </select>
      <select class="inp" id="nf-type">
        <option value="">產品類型</option>
        <option>公仔</option><option>非公仔</option>
      </select>
      <input class="inp" id="nf-price" type="number" placeholder="建議零售價（RMB）">
      <input class="inp" id="nf-qty" type="number" placeholder="預計銷量">
      <button class="btn-ok" onclick="createProject()">✓ 建立項目</button>
      <div id="nf-result" style="display:none;margin-top:8px;font-size:12px;text-align:center;"></div>
    </div>
  </div>
</div>

<script>
const _P  = "https://feishu-proxy.raychou6913.workers.dev";
const _AT = "YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _TBL = "tblfX6fsMshb7KL0";
let _tk=null, _projects=[], _activeId=null;

(function(){
  const s=JSON.parse(localStorage.getItem("wujie_session")||"null");
  if(!s||Date.now()>s.expires){localStorage.removeItem("wujie_session");location.replace("login.html");}
})();

async function _getToken(){
  if(_tk) return _tk;
  const r=await fetch(_P+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
  const d=await r.json();
  _tk=d.tenant_access_token;
  setTimeout(()=>_tk=null,110*60*1000);
  return _tk;
}
function _fv(f,k){
  const v=f[k];
  if(!v&&v!==0) return "";
  if(Array.isArray(v)) return v.map(x=>typeof x==="object"?(x.text||x.link||JSON.stringify(x)):String(x)).join("");
  if(typeof v==="object") return v.text||v.link||"";
  return String(v);
}
async function _getRecords(filter=""){
  const tk=await _getToken();
  const url=`${_P}/open-apis/bitable/v1/apps/${_AT}/tables/${_TBL}/records?page_size=100${filter?"&filter="+encodeURIComponent(filter):""}`;
  const r=await fetch(url,{headers:{"Authorization":"Bearer "+tk}});
  const d=await r.json();
  return d.data?.items||[];
}
async function _updateRecord(rid,fields){
  const tk=await _getToken();
  const r=await fetch(`${_P}/open-apis/bitable/v1/apps/${_AT}/tables/${_TBL}/records/${rid}`,{
    method:"PUT",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  return r.json();
}
async function _createRecord(fields){
  const tk=await _getToken();
  const r=await fetch(`${_P}/open-apis/bitable/v1/apps/${_AT}/tables/${_TBL}/records`,{
    method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  return r.json();
}

/* ── STAGE DEFINITIONS ── */
const STAGES_FIGURINE=[
  {key:"主題確認",label:"主題",owner:"Ray/安然/Shawn"},
  {key:"概念視覺",label:"概念圖",owner:"詩彤/Forge"},
  {key:"2D送審",label:"2D送審",owner:"珮玲"},
  {key:"3D建模",label:"3D建模",owner:"Bevis/外包"},
  {key:"打樣送審",label:"打樣",owner:"採購寄出"},
  {key:"上色打樣",label:"上色",owner:"採購寄出"},
  {key:"大貨生產",label:"大貨",owner:"採購/設計"},
];
const STAGES_NONFIG=[
  {key:"主題確認",label:"主題",owner:"Ray/安然/Shawn"},
  {key:"概念視覺",label:"概念圖",owner:"詩彤/Forge"},
  {key:"產品設計送審",label:"設計送審",owner:"珮玲"},
  {key:"打樣送審",label:"打樣",owner:"採購"},
  {key:"大貨生產",label:"大貨",owner:"採購/設計"},
];

function getStages(f){
  return _fv(f,"產品類型")==="非公仔"?STAGES_NONFIG:STAGES_FIGURINE;
}

function stageIndex(f){
  const stages=getStages(f);
  const cur=_fv(f,"當前階段");
  const idx=stages.findIndex(s=>s.key===cur);
  return idx>=0?idx:0;
}

/* ── LOAD ── */
async function loadProjects(){
  try{
    _projects=await _getRecords();
    renderStrip();
    updateKPIs();
    if(_projects.length>0) selectProject(_projects[0].record_id);
  }catch(e){
    document.getElementById('proj-strip').innerHTML='<div style="color:var(--danger);font-size:12px;padding:8px;">載入失敗：'+e.message+'</div>';
  }
}

function updateKPIs(){
  const active=_projects.filter(p=>{
    const st=_fv(p.fields,"立項狀態");
    return st!=="已完成"&&st!=="暫緩";
  }).length;
  document.getElementById('kpi-active').textContent=active;
  document.getElementById('kpi-active-sub').textContent='共 '+_projects.length+' 個項目';

  const waiting=_projects.filter(p=>_fv(p.fields,"版權送審狀態")==="等待回覆").length;
  document.getElementById('kpi-waiting').textContent=waiting;

  const ready=_projects.filter(p=>{
    const f=p.fields;
    return _fv(f,"打樣狀態")==="通過"&&_fv(f,"立項狀態")!=="大貨生產中"&&_fv(f,"立項狀態")!=="已完成";
  }).length;
  document.getElementById('kpi-ready').textContent=ready;
}

function renderStrip(){
  const strip=document.getElementById('proj-strip');
  if(!_projects.length){strip.innerHTML='<div style="color:var(--txt-lo);font-size:12px;padding:8px;">尚無項目</div>';return;}
  strip.innerHTML=_projects.map(p=>{
    const f=p.fields;
    const st=_fv(f,"版權送審狀態");
    const dotCls=st==="等待回覆"?"pp-warn":_fv(f,"立項狀態")==="已完成"?"pp-wait":"pp-active";
    return `<button class="proj-pill" id="pill-${p.record_id}" onclick="selectProject('${p.record_id}')">
      <span class="pp-status ${dotCls}"></span>${_fv(f,"產品名稱")||'未命名'}
    </button>`;
  }).join('');
}

function selectProject(rid){
  _activeId=rid;
  document.querySelectorAll('.proj-pill').forEach(p=>{
    p.classList.toggle('active',p.id==='pill-'+rid);
  });
  const proj=_projects.find(p=>p.record_id===rid);
  if(proj) renderDetail(proj);
}

/* ── RENDER DETAIL ── */
function renderDetail(proj){
  const f=proj.fields; const rid=proj.record_id;
  const stages=getStages(f);
  const isFig=_fv(f,"產品類型")!=="非公仔";
  const curIdx=stageIndex(f);

  // Progress bar
  const barSegs=stages.map((s,i)=>{
    const cls=i<curIdx?"sb-done":i===curIdx?"sb-active":"";
    return `<div class="sb-seg ${cls}"></div>`;
  }).join('');
  const barLabels=stages.map((s,i)=>{
    const cls=i<curIdx?"done":i===curIdx?"active":"";
    return `<div class="sbl ${cls}">${s.label}</div>`;
  }).join('');

  // Timeline items
  const timelineHtml=stages.map((s,i)=>{
    const isDone=i<curIdx;
    const isActive=i===curIdx;
    const dotCls=isDone?"dot-done":isActive?"dot-active":"dot-wait";
    const cardCls=isDone?"tc-done":isActive?"tc-active":"tc-wait";
    const badgeCls=isDone?"tcb-done":isActive?"tcb-active":"tcb-wait";
    const badgeTxt=isDone?"✓ 完成":isActive?"⚡ 進行中":"待解鎖";

    let content='';
    if(isActive){
      // Show current stage details
      content=buildActiveStageContent(f,rid,s,i,isFig);
    } else if(isDone){
      content=`<div class="tc-desc" style="color:var(--txt-mid);">已完成</div>`;
    }

    return `<div class="tl-item">
      <div class="tl-left">
        <div class="tl-num">Stage ${String(i+1).padStart(2,'0')}</div>
        <div class="tl-name">${s.key}</div>
        <div class="tl-owner">${s.owner}</div>
      </div>
      <div class="tl-connector">
        <div class="tl-dot ${dotCls}"></div>
        ${i<stages.length-1?'<div class="tl-line"></div>':''}
      </div>
      <div class="tl-right">
        ${isActive||isDone?`<div class="tl-card ${cardCls}">
          <div class="tc-status"><span class="tc-badge ${badgeCls}">${badgeTxt}</span></div>
          ${content}
        </div>`:''}
      </div>
    </div>`;
  }).join('');

  // Price/volume info
  const price=_fv(f,"建議零售價");
  const qty=_fv(f,"預計銷量");
  const cost=_fv(f,"預估成本_件");

  document.getElementById('proj-detail').innerHTML=`
    <div class="proj-header">
      <div class="proj-title">${_fv(f,"產品名稱")||'未命名'}
        <span class="type-tag ${isFig?'':'type-nonfig'}">${isFig?'公仔':'非公仔'}</span>
      </div>
      <div class="proj-meta">
        IP：${_fv(f,"IP品牌")||'—'} ·
        立項狀態：${_fv(f,"立項狀態")||'進行中'} ·
        版權送審：${_fv(f,"版權送審狀態")||'—'}
        ${price?'<br>建議售價：¥'+price+' · 預計銷量：'+qty+'件 · 成本/件：¥'+cost:''}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="tc-btn tcb-ghost" onclick="window.location.href='erp-anran.html'">📋 版權送審記錄</button>
        <button class="tc-btn tcb-ghost" onclick="window.location.href='erp-procurement.html'">📦 採購詢價</button>
      </div>
    </div>

    <div class="stage-bar">${barSegs}</div>
    <div class="stage-bar-labels">${barLabels}</div>

    <div class="timeline">${timelineHtml}</div>
  `;
}

function buildActiveStageContent(f,rid,stage,idx,isFig){
  const key=stage.key;
  let html='';

  if(key==="主題確認"){
    html=`<div class="tc-desc">確認 IP 品牌、目標品類、主題方向。管理層三方共識後解鎖下一步。</div>
    <div class="tc-actions">
      <button class="tc-btn tcb-primary" onclick="advanceStage('${rid}','概念視覺')">✓ 主題已確認 → 進概念圖</button>
    </div>`;
  } else if(key==="概念視覺"){
    html=`<div class="tc-desc">詩彤/珮玲 在 Forge 生成概念圖，Bevis 核准後進入版權送審。</div>
    <div class="tc-actions">
      <button class="tc-btn tcb-primary" onclick="advanceStage('${rid}',isFig?'2D送審':'產品設計送審')">✓ Bevis 已核准 → 進送審</button>
      <button class="tc-btn tcb-ghost" onclick="window.open('index.html')">⚡ 前往 Forge 生圖</button>
    </div>`;
  } else if(key==="2D送審"||key==="產品設計送審"){
    const reviewSt=_fv(f,"版權送審狀態")||"未提交";
    const round=_fv(f,"送審輪次")||"1";
    html=`<div class="tc-desc">珮玲提交 ${isFig?"2D四視圖":"產品設計稿"} 給版權方，目前第 ${round} 輪送審。</div>
    <div style="font-size:11px;color:var(--txt-mid);margin-bottom:8px;">版權送審狀態：<strong style="color:${reviewSt==="通過"?"var(--ok)":reviewSt==="等待回覆"?"var(--warn)":"var(--txt-hi)"}">${reviewSt||"未提交"}</strong></div>
    ${_fv(f,"版權回饋說明")?`<div class="tc-desc" style="color:var(--warn);">版權方意見：${_fv(f,"版權回饋說明")}</div>`:''}
    <div class="tc-actions">
      <button class="tc-btn tcb-primary" onclick="updateReview('${rid}','通過')" ${reviewSt==="通過"?"style='opacity:.5;cursor:default;'":""}>✓ 版權方通過</button>
      <button class="tc-btn tcb-warn" onclick="updateReview('${rid}','修改中')">⚠ 需修改</button>
    </div>`;
  } else if(key==="3D建模"){
    const st3d=_fv(f,"3D建模狀態")||"未啟動";
    html=`<div class="tc-parallel">
      <div class="tcp-title">平行進度</div>
      <div class="tcp-row"><span class="tcp-label">3D建模（外包）</span><span class="tcp-status ${st3d==="已完成"?"tcs-ok":st3d==="進行中"?"tcs-active":"tcs-wait"}">${st3d}</span></div>
      <div class="tcp-row"><span class="tcp-label">包裝設計</span><span class="tcp-status ${_fv(f,"包裝設計狀態")==="已完成"?"tcs-ok":_fv(f,"包裝設計狀態")==="進行中"?"tcs-active":"tcs-wait"}">${_fv(f,"包裝設計狀態")||"未啟動"}</span></div>
      <div class="tcp-row"><span class="tcp-label">採購第一次詢價</span><span class="tcp-status ${_fv(f,"採購詢價狀態")==="完成"?"tcs-ok":_fv(f,"採購詢價狀態")==="進行中"?"tcs-active":"tcs-wait"}">${_fv(f,"採購詢價狀態")||"待啟動"}</span></div>
    </div>
    <div class="tc-actions">
      <button class="tc-btn tcb-primary" onclick="update3D('${rid}')">✓ 3D模型完成，送審</button>
    </div>`;
  } else if(key==="打樣送審"||key==="上色打樣"){
    const pSt=_fv(f,"打樣狀態")||"未啟動";
    html=`<div class="tc-desc">採購寄出實體打樣給版權方，等待確認。</div>
    <div style="font-size:11px;color:var(--txt-mid);margin-bottom:8px;">打樣狀態：<strong style="color:${pSt==="通過"?"var(--ok)":"var(--warn)"}">${pSt}</strong></div>
    <div class="tc-actions">
      <button class="tc-btn tcb-primary" onclick="updatePrintSample('${rid}','通過')">✓ 版權方打樣通過</button>
      <button class="tc-btn tcb-ghost" onclick="window.location.href='erp-procurement.html'">📦 採購台填寄樣單號</button>
    </div>`;
  } else if(key==="大貨生產"){
    const confirmMgmt=_fv(f,"大貨確認_管理");
    const confirmProc=_fv(f,"大貨確認_採購");
    const confirmDes=_fv(f,"大貨確認_設計");
    const confirmSales=_fv(f,"大貨確認_銷售");
    html=`<div class="tc-parallel">
      <div class="tcp-title">大貨四方確認</div>
      <div class="tcp-row"><span class="tcp-label">管理層</span><span class="tcp-status ${confirmMgmt?"tcs-ok":"tcs-wait"}">${confirmMgmt||"待確認"}</span></div>
      <div class="tcp-row"><span class="tcp-label">採購</span><span class="tcp-status ${confirmProc?"tcs-ok":"tcs-wait"}">${confirmProc||"待確認"}</span></div>
      <div class="tcp-row"><span class="tcp-label">設計</span><span class="tcp-status ${confirmDes?"tcs-ok":"tcs-wait"}">${confirmDes||"待確認"}</span></div>
      <div class="tcp-row"><span class="tcp-label">銷售</span><span class="tcp-status ${confirmSales?"tcs-ok":"tcs-wait"}">${confirmSales||"待確認"}</span></div>
    </div>
    <div class="tc-actions">
      <button class="tc-btn tcb-primary" onclick="confirmBulk('${rid}')">✓ 本廳確認大貨</button>
    </div>`;
  }
  return html;
}

/* ── ACTIONS ── */
const s=JSON.parse(localStorage.getItem("wujie_session")||"{}");

async function advanceStage(rid,nextStage){
  await _updateRecord(rid,{"當前階段":nextStage});
  await reload();
}
async function updateReview(rid,status){
  const fields={"版權送審狀態":status};
  if(status==="通過"){
    // Advance to next stage
    const proj=_projects.find(p=>p.record_id===rid);
    if(proj){
      const stages=getStages(proj.fields);
      const cur=stageIndex(proj.fields);
      if(cur+1<stages.length) fields["當前階段"]=stages[cur+1].key;
    }
  }
  await _updateRecord(rid,fields);
  await reload();
}
async function update3D(rid){
  await _updateRecord(rid,{"3D建模狀態":"已完成","當前階段":"打樣送審","版權送審狀態":"等待回覆"});
  await reload();
}
async function updatePrintSample(rid,status){
  const fields={"打樣狀態":status};
  if(status==="通過"){
    const proj=_projects.find(p=>p.record_id===rid);
    if(proj){
      const stages=getStages(proj.fields);
      const cur=stageIndex(proj.fields);
      if(cur+1<stages.length) fields["當前階段"]=stages[cur+1].key;
    }
  }
  await _updateRecord(rid,fields);
  await reload();
}
async function confirmBulk(rid){
  const dept=s.dept||"";
  const field=dept.includes("採購")?"大貨確認_採購":dept.includes("設計")?"大貨確認_設計":dept.includes("業務")?"大貨確認_銷售":"大貨確認_管理";
  await _updateRecord(rid,{[field]:"已確認"});
  await reload();
}
async function reload(){
  _projects=await _getRecords();
  renderStrip();
  updateKPIs();
  if(_activeId) selectProject(_activeId);
}

/* ── NEW PROJECT ── */
function toggleNewForm(){
  const f=document.getElementById('new-form');
  f.style.display=f.style.display==='none'?'block':'none';
}
async function createProject(){
  const name=document.getElementById('nf-name').value.trim();
  const ip=document.getElementById('nf-ip').value;
  const type=document.getElementById('nf-type').value;
  if(!name||!ip||!type){alert("請填寫名稱、IP品牌和產品類型");return;}
  const res=document.getElementById('nf-result');
  res.style.display='block';res.style.color='var(--txt-mid)';res.textContent='建立中...';
  const fields={
    "產品名稱":name,"IP品牌":ip,"產品類型":type,
    "當前階段":"主題確認","立項狀態":"進行中",
    "建議零售價":Number(document.getElementById('nf-price').value)||null,
    "預計銷量":Number(document.getElementById('nf-qty').value)||null,
  };
  Object.keys(fields).forEach(k=>{if(fields[k]===null)delete fields[k];});
  const d=await _createRecord(fields);
  if(d.code===0){
    res.style.color='var(--ok)';res.textContent='✅ 已建立！';
    document.getElementById('nf-name').value='';
    toggleNewForm();
    await reload();
  }else{res.style.color='var(--danger)';res.textContent='失敗：'+JSON.stringify(d);}
}

/* ── INIT ── */
loadProjects();
</script>
