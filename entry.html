<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解系統入口</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.hdr{background:#1e293b;border-bottom:1px solid #334155;padding:18px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr-logo{font-size:30px}
.hdr-title{font-size:18px;font-weight:700;color:#f1f5f9}
.hdr-sub{font-size:12px;color:#64748b;margin-top:2px}
.hdr-ver{font-size:11px;background:#1e293b;border:1px solid #334155;color:#64748b;padding:4px 10px;border-radius:6px;text-decoration:none}
.hdr-ver:hover{border-color:#6366f1;color:#a5b4fc}
/* returning bar */
.ret-bar{background:#1e293b40;border-bottom:1px solid #334155;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ret-txt{font-size:13px;color:#94a3b8;flex:1}
.ret-name{color:#a5b4fc;font-weight:600}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:#6366f1;color:#fff}
.btn-ghost{background:transparent;border:1px solid #334155;color:#94a3b8}
.btn-ghost:hover{border-color:#6366f1;color:#a5b4fc}
/* main */
.wrap{max-width:700px;margin:0 auto;padding:28px 16px 60px}
.step-label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
/* dept grid */
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:28px}
.dept-card{background:#1e293b;border:2px solid #334155;border-radius:14px;padding:18px 14px;text-align:center;cursor:pointer;transition:all .18s}
.dept-card:hover{border-color:#475569;transform:translateY(-2px)}
.dept-card.selected{background:#1e293b}
.dept-icon{font-size:26px;margin-bottom:8px}
.dept-name{font-size:14px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.dept-count{font-size:11px;color:#64748b}
/* name grid */
.name-section{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.name-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.name-btn{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 18px;cursor:pointer;font-size:14px;color:#e2e8f0;transition:all .15s}
.name-btn:hover{border-color:#6366f1;color:#a5b4fc}
.name-btn.selected{color:#fff;border-color:transparent}
/* enter btn */
.enter-wrap{text-align:center;margin-top:8px}
.btn-enter{background:#6366f1;color:#fff;padding:14px 48px;border-radius:12px;font-size:16px;font-weight:700;border:none;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px #6366f140}
.btn-enter:hover{background:#4f46e5;transform:translateY(-1px);box-shadow:0 6px 28px #6366f160}
/* footer */
.footer{text-align:center;padding:20px;border-top:1px solid #1e293b;margin-top:40px;display:flex;justify-content:center;gap:24px}
.footer a{color:#475569;font-size:12px;text-decoration:none}
.footer a:hover{color:#94a3b8}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">🏢</div>
    <div>
      <div class="hdr-title">蕪解創意管理系統</div>
      <div class="hdr-sub">選擇你的部門與名字以進入系統</div>
    </div>
  </div>
  <a class="hdr-ver" href="changelog.html">v1.4 更新記錄</a>
</div>

<div class="ret-bar" id="ret-bar" style="display:none">
  <div class="ret-txt">上次身份：<span class="ret-name" id="ret-name"></span></div>
  <button class="btn btn-primary" onclick="continueUser()">直接進入</button>
  <button class="btn btn-ghost" onclick="switchUser()">切換身份</button>
</div>

<div class="wrap">
  <div class="step-label">步驟 1 — 選擇你的部門</div>
  <div class="dept-grid" id="dept-grid"></div>

  <div class="name-section" id="name-section" style="display:none">
    <div class="step-label">步驟 2 — 選擇你的名字</div>
    <div class="name-grid" id="name-grid"></div>
  </div>

  <div class="enter-wrap" id="enter-wrap" style="display:none">
    <button class="btn-enter" onclick="enterSystem()">進入系統 →</button>
  </div>
</div>

<div class="footer">
  <a href="changelog.html">📋 版本更新記錄</a>
  <a href="dashboard.html">📊 管理儀表板</a>
  <a href="forms/index.html">📝 填報中心</a>
</div>

<script>
const EMP   = {"管理層": ["Ray", "安然", "Shawn"], "創意/設計": ["Bevis", "珮玲", "詩彤", "小川"], "採購": ["賴哥", "木子"], "業務/銷售": ["董亮", "德寶"], "倉庫/物流": ["高維"], "財務/行政": ["躍明", "楊子"], "電商/行銷": ["春雷", "佳音"]};
const COLORS= {"管理層": "#6366f1", "創意/設計": "#ec4899", "採購": "#f97316", "業務/銷售": "#10b981", "倉庫/物流": "#f59e0b", "財務/行政": "#8b5cf6", "電商/行銷": "#06b6d4"};
const ICONS = {"管理層": "👑", "創意/設計": "🎨", "採購": "🛒", "業務/銷售": "🎯", "倉庫/物流": "📦", "財務/行政": "💰", "電商/行銷": "📱"};
let selDept=null, selName=null;

const saved=JSON.parse(localStorage.getItem("wujie_user")||"null");
if(saved&&saved.name){
  document.getElementById("ret-bar").style.display="flex";
  document.getElementById("ret-name").textContent=saved.name+"（"+saved.dept+"）";
}

function renderDepts(){
  document.getElementById("dept-grid").innerHTML=Object.keys(EMP).map(d=>{
    const c=COLORS[d]||"#64748b";
    return `<div class="dept-card" data-dept="${d}" style="--c:${c}" onclick="selectDept('${d}',this)">
      <div class="dept-icon">${ICONS[d]||"👤"}</div>
      <div class="dept-name">${d}</div>
      <div class="dept-count">${EMP[d].length} 人</div>
    </div>`;
  }).join("");
}

function selectDept(dept,el){
  selDept=dept; selName=null;
  const c=COLORS[dept]||"#6366f1";
  document.querySelectorAll(".dept-card").forEach(x=>{
    x.classList.remove("selected");
    x.style.borderColor="#334155";
    x.style.background="#1e293b";
  });
  el.classList.add("selected");
  el.style.borderColor=c;
  el.style.background=c+"18";
  document.getElementById("name-grid").innerHTML=EMP[dept].map(n=>
    `<div class="name-btn" onclick="selectName('${n}',this)">${n}</div>`
  ).join("");
  document.getElementById("name-section").style.display="block";
  document.getElementById("enter-wrap").style.display="none";
  document.getElementById("name-section").scrollIntoView({behavior:"smooth"});
}

function selectName(name,el){
  selName=name;
  const c=COLORS[selDept]||"#6366f1";
  document.querySelectorAll(".name-btn").forEach(x=>{
    x.classList.remove("selected");
    x.style.background="#1e293b";
    x.style.color="#e2e8f0";
    x.style.borderColor="#334155";
  });
  el.classList.add("selected");
  el.style.background=c;
  el.style.color="#fff";
  el.style.borderColor="transparent";
  document.getElementById("enter-wrap").style.display="block";
}

function enterSystem(){
  if(!selDept||!selName) return;
  localStorage.setItem("wujie_user",JSON.stringify({name:selName,dept:selDept,ts:Date.now()}));
  location.href=selDept==="管理層"?"project_manager.html":"forms/index.html";
}

function continueUser(){
  if(!saved) return;
  location.href=saved.dept==="管理層"?"project_manager.html":"forms/index.html";
}

function switchUser(){
  localStorage.removeItem("wujie_user");
  document.getElementById("ret-bar").style.display="none";
}

renderDepts();
</script>
</body></html>
