<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解 ERP · 採購台</title>
<style>
:root{
  --bg:#0b0c10;--surface:#111318;--card:#181a22;--card2:#1e2130;
  --border:#222535;--border-hi:#363b58;
  --txt-hi:#e8eaf8;--txt-mid:#7880a8;--txt-lo:#3d4268;
  --accent:#818cf8;--ok:#22c55e;--ok-dim:#22c55e18;
  --warn:#f59e0b;--warn-dim:#f59e0b18;--danger:#ef4444;--danger-dim:#ef444418;
  --amber:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt-hi);font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;min-height:100vh;padding-bottom:80px;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:8px;}
.brand-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 7px var(--amber);}
.brand-name{font-size:14px;font-weight:700;}
.brand-sub{font-size:11px;color:var(--txt-mid);}
.nav-back{font-size:12px;color:var(--txt-mid);text-decoration:none;padding:6px 10px;border:1px solid var(--border);border-radius:6px;min-height:34px;display:flex;align-items:center;}

/* ── KPI BAR ── */
.kpi-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap;}
.kpi-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;flex:1;min-width:calc(50% - 5px);}
.kpi-label{font-size:9px;color:var(--txt-lo);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.kpi-val{font-size:20px;font-weight:800;line-height:1;}
.kpi-sub{font-size:10px;color:var(--txt-mid);margin-top:3px;}

/* ── TABS ── */
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{padding:12px 14px;font-size:12px;font-weight:600;color:var(--txt-mid);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;min-height:44px;}
.tab.active{color:var(--txt-hi);border-bottom-color:var(--amber);}

.main{max-width:720px;margin:0 auto;padding:16px;}
.section-title{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--txt-mid);text-transform:uppercase;margin-bottom:10px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}

/* ── AI UPLOAD HERO ── */
.upload-hero{background:var(--card);border:2px dashed var(--border-hi);border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;transition:.15s;margin-bottom:14px;}
.upload-hero:hover,.upload-hero.drag-over{border-color:var(--accent);background:var(--card2);}
.upload-icon{font-size:40px;margin-bottom:10px;}
.upload-title{font-size:16px;font-weight:800;margin-bottom:6px;}
.upload-sub{font-size:12px;color:var(--txt-mid);line-height:1.6;}
.paste-hint{font-size:11px;color:var(--txt-lo);margin-top:10px;padding:6px 12px;background:var(--card2);border-radius:8px;display:inline-block;}

/* ── PARSE RESULT ── */
.parse-card{background:var(--card2);border:1px solid var(--border-hi);border-radius:12px;padding:16px;margin-bottom:14px;}
.parse-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.ai-badge{background:#818cf820;border:1px solid var(--accent);color:var(--accent);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.parse-title{font-size:13px;font-weight:700;flex:1;}
.parse-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.pf{background:var(--card);border-radius:8px;padding:10px;}
.pf-label{font-size:9px;color:var(--txt-lo);margin-bottom:3px;}
.pf-val{font-size:14px;font-weight:700;}
.pf-val.warn{color:var(--warn);}
.pf-val[contenteditable]{border-bottom:1px dashed var(--border-hi);outline:none;min-width:40px;}

/* ── PROCURE LIST ── */
.proc-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.pc-name{font-size:13px;font-weight:700;}
.pc-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;}
.pcb-active{background:#3b82f620;color:#60a5fa;}
.pcb-done{background:var(--ok-dim);color:var(--ok);}
.pcb-pending{background:var(--warn-dim);color:var(--warn);}
.pc-meta{font-size:11px;color:var(--txt-mid);margin-bottom:8px;}
.pc-price{font-size:16px;font-weight:800;margin-bottom:8px;}
.pc-detail{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
.pc-tag{font-size:10px;color:var(--txt-mid);background:var(--card);padding:3px 8px;border-radius:6px;}

/* ── SAMPLE TRACKING ── */
.sample-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.sc-urgent{border-left:3px solid var(--danger);}
.sc-pending{border-left:3px solid var(--warn);}
.sc-done{border-left:3px solid var(--ok);}

/* ── BUTTONS ── */
.btn{font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer;border:1px solid;min-height:38px;}
.btn-primary{background:var(--amber);border-color:var(--amber);color:#000;}
.btn-ok{background:var(--ok-dim);border-color:var(--ok);color:var(--ok);}
.btn-ghost{background:transparent;border-color:var(--border-hi);color:var(--txt-mid);}

/* ── SUPPLIER ── */
.supplier-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.supplier-row:last-child{border:none;}
.sup-icon{width:36px;height:36px;border-radius:8px;background:var(--warn-dim);border:1px solid var(--warn);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.sup-body{flex:1;}
.sup-name{font-size:13px;font-weight:600;}
.sup-meta{font-size:10px;color:var(--txt-mid);margin-top:2px;}

/* ── INPUT ── */
.inp{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--txt-hi);padding:10px 12px;border-radius:8px;font-size:14px;margin-bottom:8px;}
.inp::placeholder{color:var(--txt-lo);}
select.inp option{background:var(--card2);}

/* ── EMPTY ── */
.empty{text-align:center;padding:28px 16px;color:var(--txt-lo);}
.empty-icon{font-size:26px;margin-bottom:6px;}

@media(min-width:600px){
  .kpi-chip{min-width:calc(33% - 7px);}
  .parse-grid{grid-template-columns:repeat(3,1fr);}
  .main{padding:20px 24px;}
  .topbar,.kpi-bar,.tab-bar{padding-left:24px;padding-right:24px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <span class="brand-name">蕪解 ERP</span>
      <span class="brand-sub"> 採購台</span>
    </div>
  </div>
  <a class="nav-back" href="erp-war-room.html">← 戰情室</a>
</div>

<!-- ── KPI BAR ── -->
<div class="kpi-bar">
  <div class="kpi-chip">
    <div class="kpi-label">本月採購金額</div>
    <div class="kpi-val" id="kpi-total" style="color:var(--warn)">載入中</div>
    <div class="kpi-sub" id="kpi-total-sub">—</div>
  </div>
  <div class="kpi-chip">
    <div class="kpi-label">待 Ray 批核</div>
    <div class="kpi-val" id="kpi-pending" style="color:var(--accent)">—</div>
    <div class="kpi-sub">採購審批佇列</div>
  </div>
  <div class="kpi-chip">
    <div class="kpi-label">打樣待寄出</div>
    <div class="kpi-val" id="kpi-samples" style="color:var(--ok)">—</div>
    <div class="kpi-sub">需寄版權方確認</div>
  </div>
</div>

<!-- ── TABS ── -->
<div class="tab-bar">
  <button class="tab active" onclick="switchTab(this,'tab-ai')">🤖 AI 解析</button>
  <button class="tab" onclick="switchTab(this,'tab-queue')">📋 採購佇列</button>
  <button class="tab" onclick="switchTab(this,'tab-samples')">📦 打樣寄出</button>
  <button class="tab" onclick="switchTab(this,'tab-suppliers')">🏭 供應商</button>
</div>

<div class="main">

  <!-- ══ TAB 1: AI 解析 ══ -->
  <div id="tab-ai">
    <input type="file" id="quote-file" accept="image/*,.pdf" style="display:none" onchange="handleFile(this.files[0])">

    <div class="upload-hero" id="upload-zone"
      onclick="document.getElementById('quote-file').click()"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="event.preventDefault();this.classList.remove('drag-over');handleFile(event.dataTransfer.files[0])">
      <div class="upload-icon">📸</div>
      <div class="upload-title">拍照 / 截圖 / PDF 丟進來</div>
      <div class="upload-sub">AI 自動讀取供應商、品項、單價、MOQ、交期、付款條件</div>
      <div class="paste-hint">💡 微信截圖直接 Ctrl+V 貼上</div>
    </div>

    <div id="parse-result" style="display:none;"></div>

    <div id="submit-area" style="display:none;">
      <button class="btn btn-primary" style="width:100%;font-size:14px;min-height:48px;" onclick="submitToRay()">🚀 確認後送 Ray 批核</button>
      <div id="submit-result" style="display:none;margin-top:8px;font-size:12px;text-align:center;padding:8px;border-radius:8px;"></div>
      <div style="font-size:10px;color:var(--txt-lo);text-align:center;margin-top:6px;">⚠ 數字必須親自確認，採購出錯代價大</div>
    </div>
  </div>

  <!-- ══ TAB 2: 採購佇列 ══ -->
  <div id="tab-queue" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span class="section-title" style="margin:0;">採購記錄</span>
      <button onclick="loadQueue()" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--txt-mid);cursor:pointer;">重新整理</button>
    </div>
    <div id="queue-list"><div class="empty"><div class="empty-icon">📋</div>載入中...</div></div>
  </div>

  <!-- ══ TAB 3: 打樣寄出 ══ -->
  <div id="tab-samples" style="display:none;">
    <div class="section-title">待寄出打樣追蹤</div>
    <div id="sample-list"><div class="empty"><div class="empty-icon">📦</div>載入中...</div></div>

    <div class="card" style="margin-top:8px;">
      <div class="section-title">填報寄出紀錄</div>
      <input class="inp" id="smp-product" placeholder="產品名稱 / IP品牌">
      <input class="inp" id="smp-type" placeholder="打樣類型（素模/上色/大貨樣）">
      <input class="inp" id="smp-tracking" placeholder="快遞單號">
      <input class="inp" id="smp-date" type="date">
      <button class="btn btn-ok" style="width:100%;" onclick="submitSample()">✓ 記錄寄出</button>
      <div id="smp-result" style="display:none;margin-top:8px;font-size:12px;text-align:center;"></div>
    </div>
  </div>

  <!-- ══ TAB 4: 供應商 ══ -->
  <div id="tab-suppliers" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span class="section-title" style="margin:0;">供應商名單</span>
      <button onclick="loadSuppliers()" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--txt-mid);cursor:pointer;">重新整理</button>
    </div>
    <div class="card">
      <div id="supplier-list"><div class="empty"><div class="empty-icon">🏭</div>載入中...</div></div>
    </div>
  </div>

</div>

<script>
const _P   = "https://feishu-proxy.raychou6913.workers.dev";
const _AT  = "YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _TBLS = {
  approval:  "tblD6acV3m2ZXJHe",
  procure:   "tblae5v8pGMXleJZ",
  pipeline:  "tblfX6fsMshb7KL0",
  supplier:  "tblgpiqW1yOa2DR4",
};
const GEMINI_KEY = "AIzaSyBC51Yef5FtCESl2AF7A3X1WKIfoc0Bojo";
const GEMINI_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+GEMINI_KEY;
let _tk=null, _quoteData=null;

/* ── SESSION ── */
(function(){
  const s=JSON.parse(localStorage.getItem("wujie_session")||"null");
  if(!s||Date.now()>s.expires){localStorage.removeItem("wujie_session");location.replace("login.html");}
})();

/* ── PASTE ── */
document.addEventListener('paste',e=>{
  const items=e.clipboardData?.items||[];
  for(const item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      handleFile(item.getAsFile());
      break;
    }
  }
});

/* ── TOKEN + HELPERS ── */
async function _getToken(){
  if(_tk) return _tk;
  const r=await fetch(_P+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
  const d=await r.json();
  _tk=d.tenant_access_token;
  setTimeout(()=>_tk=null,110*60*1000);
  return _tk;
}
function _fv(f,k){
  const v=f[k];
  if(!v&&v!==0) return "";
  if(Array.isArray(v)) return v.map(x=>typeof x==="object"?(x.text||x.link||JSON.stringify(x)):String(x)).join("");
  if(typeof v==="object") return v.text||v.link||"";
  return String(v);
}
async function _getRecords(tbl,filter=""){
  const tk=await _getToken();
  const url=`${_P}/open-apis/bitable/v1/apps/${_AT}/tables/${tbl}/records?page_size=100${filter?"&filter="+encodeURIComponent(filter):""}`;
  const r=await fetch(url,{headers:{"Authorization":"Bearer "+tk}});
  const d=await r.json();
  return d.data?.items||[];
}
async function _createRecord(tbl,fields){
  const tk=await _getToken();
  const r=await fetch(`${_P}/open-apis/bitable/v1/apps/${_AT}/tables/${tbl}/records`,{
    method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  return r.json();
}

/* ── TABS ── */
const ALL_TABS=['tab-ai','tab-queue','tab-samples','tab-suppliers'];
function switchTab(btn,tabId){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ALL_TABS.forEach(id=>document.getElementById(id).style.display=id===tabId?'':'none');
  if(tabId==='tab-queue') loadQueue();
  if(tabId==='tab-samples') loadSamples();
  if(tabId==='tab-suppliers') loadSuppliers();
}

/* ── KPI ── */
async function loadKPIs(){
  try{
    const [approvals,procs]=await Promise.all([
      _getRecords(_TBLS.approval,'CurrentValue.[審批類型]="採購審批"'),
      _getRecords(_TBLS.procure)
    ]);
    const pendingCount=approvals.filter(a=>_fv(a.fields,"審批狀態")==="待審批").length;
    document.getElementById('kpi-pending').textContent=pendingCount;

    const total=procs.reduce((s,p)=>{
      const st=_fv(p.fields,"採購狀態");
      if(st==="進行中"||st==="已完成") return s+Number(_fv(p.fields,"議定價格")||0);
      return s;
    },0);
    document.getElementById('kpi-total').textContent=total>0?'¥'+_fmt(total):'¥0';
    document.getElementById('kpi-total-sub').textContent=procs.length+'筆採購記錄';

    // 打樣待寄出：採購中 且 打樣寄出日期空
    const samplePending=procs.filter(p=>{
      const f=p.fields;
      return _fv(f,"採購類型")==="打樣"&&!_fv(f,"打樣寄出日期");
    }).length;
    document.getElementById('kpi-samples').textContent=samplePending||0;
  }catch(e){}
}
function _fmt(n){return n>=10000?(n/10000).toFixed(1)+'萬':n.toLocaleString();}

/* ── FILE HANDLING ── */
function handleFile(file){
  if(!file) return;
  const res=document.getElementById('parse-result');
  const sub=document.getElementById('submit-area');
  res.style.display='block'; sub.style.display='none';
  res.innerHTML=`<div class="parse-card"><div style="text-align:center;padding:20px;color:var(--txt-mid);"><div style="font-size:32px;margin-bottom:8px">🤖</div>AI 讀取中 · ${file.name||'截圖'}<br><small style="font-size:11px;color:var(--txt-lo)">自動識別品項、單價、交期...</small></div></div>`;
  const reader=new FileReader();
  reader.onload=async e=>{
    const base64=e.target.result.split(',')[1];
    const mime=file.type||'image/jpeg';
    try{
      const p=await callGemini(base64,mime,file.name||'截圖');
      _quoteData=p;
      renderResult(p,file.name||'截圖');
      sub.style.display='block';
    }catch(err){
      res.innerHTML=`<div class="parse-card"><div style="color:var(--danger);padding:16px;">解析失敗：${err.message}</div></div>`;
    }
  };
  reader.readAsDataURL(file);
}

async function callGemini(base64,mime,name){
  const prompt=`你是採購AI助理。從報價單圖片/PDF精確提取以下欄位，返回JSON（找不到填null）：
{"supplier":"供應商名稱","item":"品項名稱","unit_price":"單價（僅數字）","qty":"建議數量（僅數字）","total":"總金額（僅數字）","currency":"幣別(RMB/TWD/USD等)","moq":"最小起訂量（僅數字）","lead_time_days":"交期工作天（僅數字）","payment_terms":"付款條件說明","delivery_date":"預計交貨日期","notes":"其他備注"}
只返回JSON。`;
  const body={contents:[{parts:[{text:prompt},{inline_data:{mime_type:mime,data:base64}}]}],generationConfig:{temperature:0.1,maxOutputTokens:512}};
  const r=await fetch(GEMINI_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d=await r.json();
  const text=d.candidates?.[0]?.content?.parts?.[0]?.text||"";
  const m=text.match(/\{[\s\S]*\}/);
  if(!m) throw new Error("AI 無法識別此報價單格式");
  return JSON.parse(m[0]);
}

function renderResult(p,name){
  const safe=v=>(v!=null&&v!=="")?""+v:"—";
  document.getElementById('parse-result').innerHTML=`
  <div class="parse-card">
    <div class="parse-header">
      <span class="ai-badge">✨ AI 解析完成</span>
      <span class="parse-title">${name}</span>
      <span style="font-size:10px;color:var(--warn)">請賴哥確認數字</span>
    </div>
    <div class="parse-grid">
      <div class="pf"><div class="pf-label">供應商</div><div class="pf-val">${safe(p.supplier)}</div></div>
      <div class="pf"><div class="pf-label">品項</div><div class="pf-val">${safe(p.item)}</div></div>
      <div class="pf"><div class="pf-label">單價（${p.currency||'RMB'}）</div><div class="pf-val warn">¥ ${safe(p.unit_price)}</div></div>
      <div class="pf"><div class="pf-label">數量</div><div class="pf-val pf-val" id="q-qty" contenteditable="true">${safe(p.qty)}</div></div>
      <div class="pf"><div class="pf-label">MOQ</div><div class="pf-val">${safe(p.moq)}</div></div>
      <div class="pf"><div class="pf-label">總金額</div><div class="pf-val warn" style="font-size:16px;">¥ ${safe(p.total)}</div></div>
      <div class="pf"><div class="pf-label">交期（工作天）</div><div class="pf-val">${safe(p.lead_time_days)} 天</div></div>
      <div class="pf"><div class="pf-label">付款條件</div><div class="pf-val" style="font-size:11px;">${safe(p.payment_terms)}</div></div>
      <div class="pf"><div class="pf-label">預計交貨日</div><div class="pf-val" style="font-size:11px;">${safe(p.delivery_date)}</div></div>
    </div>
    ${p.notes?`<div style="font-size:11px;color:var(--txt-mid);margin-bottom:4px;">📝 ${p.notes}</div>`:''}
    <div style="font-size:10px;color:var(--txt-lo);">數字可直接點擊修改</div>
  </div>`;
}

/* ── SUBMIT TO RAY ── */
async function submitToRay(){
  if(!_quoteData){alert("請先上傳報價單");return;}
  const btn=document.querySelector('.btn-primary');
  const res=document.getElementById('submit-result');
  btn.disabled=true;btn.textContent='送出中...';
  const p=_quoteData;
  const s=JSON.parse(localStorage.getItem("wujie_session")||"{}");
  const now=new Date();
  const fields={
    "審批標題":`採購審批 · ${p.item||'?'} · ${p.supplier||'?'}`,
    "審批類型":"採購審批",
    "申請人":s.name||"賴哥",
    "申請日期":now.getTime(),
    "申請說明":`供應商：${p.supplier||'?'}\n品項：${p.item||'?'}\n數量：${p.qty||'?'}\n單價：¥${p.unit_price||'?'}\n總金額：¥${p.total||'?'} ${p.currency||'RMB'}\nMOQ：${p.moq||'?'}\n交期：${p.lead_time_days||'?'}天\n付款條件：${p.payment_terms||'?'}\n預計交貨：${p.delivery_date||'?'}${p.notes?'\n備注：'+p.notes:''}`,
    "金額":p.total?Number(String(p.total).replace(/[^0-9.]/g,'')):null,
    "幣別":p.currency||"RMB",
    "審批狀態":"待審批",
  };
  Object.keys(fields).forEach(k=>{if(fields[k]===null||fields[k]==="")delete fields[k];});
  const d=await _createRecord(_TBLS.approval,fields);
  res.style.display='block';
  if(d.code===0){
    res.style.cssText="background:var(--ok-dim);color:var(--ok);padding:8px;border-radius:8px;font-size:12px;text-align:center;";
    res.textContent='✅ 已送 Ray 批核！戰情室佇列已更新。';
    btn.textContent='✓ 已送出';
    loadKPIs();
  }else{
    res.style.cssText="color:var(--danger);font-size:12px;text-align:center;";
    res.textContent='送出失敗：'+(d.msg||JSON.stringify(d));
    btn.disabled=false;btn.textContent='重試';
  }
}

/* ── QUEUE ── */
async function loadQueue(){
  const el=document.getElementById('queue-list');
  try{
    const items=await _getRecords(_TBLS.procure);
    if(!items.length){el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>尚無採購記錄</div>';return;}
    el.innerHTML=items.map(i=>{
      const f=i.fields;
      const st=_fv(f,"採購狀態")||"進行中";
      const badgeCls=st==="已完成"?"pcb-done":st==="待審批"?"pcb-pending":"pcb-active";
      const type=_fv(f,"採購類型");
      const price=Number(_fv(f,"議定價格")||0);
      return `<div class="proc-card">
        <div class="pc-top">
          <span class="pc-name">${_fv(f,"採購品項")||'—'}</span>
          <span class="pc-badge ${badgeCls}">${st}</span>
        </div>
        <div class="pc-meta">${_fv(f,"項目關聯")||''} ${type?'· '+type:''}</div>
        ${price?`<div class="pc-price">¥ ${price.toLocaleString()} <span style="font-size:11px;color:var(--txt-mid)">${_fv(f,"幣別")||''}</span></div>`:''}
        <div class="pc-detail">
          ${_fv(f,"MOQ")?`<span class="pc-tag">MOQ ${_fv(f,"MOQ")}</span>`:''}
          ${_fv(f,"交期_工作天")?`<span class="pc-tag">交期 ${_fv(f,"交期_工作天")}天</span>`:''}
          ${_fv(f,"付款條件")?`<span class="pc-tag">${_fv(f,"付款條件")}</span>`:''}
          ${_fv(f,"預計到貨日")?`<span class="pc-tag">到貨 ${new Date(Number(_fv(f,"預計到貨日"))).toLocaleDateString('zh-TW')}</span>`:''}
        </div>
        <div style="font-size:10px;color:var(--txt-mid)">負責：${_fv(f,"負責人")||'—'} ${_fv(f,"選定供應商")?'· 供應商：'+_fv(f,"選定供應商"):''}</div>
      </div>`;
    }).join('');
  }catch(e){el.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div>載入失敗</div>';}
}

/* ── SAMPLES ── */
async function loadSamples(){
  const el=document.getElementById('sample-list');
  try{
    const items=await _getRecords(_TBLS.procure,'CurrentValue.[採購類型]="打樣"');
    if(!items.length){el.innerHTML='<div class="empty"><div class="empty-icon">✅</div>無待寄出打樣</div>';return;}
    el.innerHTML=items.map(i=>{
      const f=i.fields;
      const sent=_fv(f,"打樣寄出日期");
      const tracking=_fv(f,"寄樣快遞單號");
      const cls=sent?'sc-done':!tracking?'sc-pending':'sc-urgent';
      const statusTxt=sent?'已寄出':tracking?'有單號未確認寄出':'待安排寄出';
      const statusColor=sent?'var(--ok)':tracking?'var(--warn)':'var(--danger)';
      return `<div class="sample-card ${cls}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
          <span style="font-size:13px;font-weight:700;">${_fv(f,"採購品項")||'—'}</span>
          <span style="font-size:10px;font-weight:700;color:${statusColor}">${statusTxt}</span>
        </div>
        <div style="font-size:11px;color:var(--txt-mid);margin-bottom:6px;">${_fv(f,"項目關聯")||''} · 數量：${_fv(f,"採購數量")||'—'}</div>
        ${tracking?`<div style="font-size:11px;color:var(--txt-hi);">快遞單號：${tracking}</div>`:''}
        ${sent?`<div style="font-size:10px;color:var(--ok);">寄出日期：${new Date(Number(sent)).toLocaleDateString('zh-TW')}</div>`:''}
        ${!sent?`<div style="font-size:10px;color:var(--warn);margin-top:4px;">⚠ 版權方須收到打樣才能進下一輪送審</div>`:''}
      </div>`;
    }).join('');
  }catch(e){el.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div>載入失敗</div>';}
}

async function submitSample(){
  const product=document.getElementById('smp-product').value.trim();
  const type=document.getElementById('smp-type').value.trim();
  const tracking=document.getElementById('smp-tracking').value.trim();
  const date=document.getElementById('smp-date').value;
  if(!product||!tracking){alert("請填寫產品名稱和快遞單號");return;}
  const res=document.getElementById('smp-result');
  res.style.display='block';res.style.color='var(--txt-mid)';res.textContent='記錄中...';
  const fields={
    "採購品項":product,"採購類型":"打樣",
    "寄樣快遞單號":tracking,
    "採購狀態":"進行中","備註":type||"",
  };
  if(date) fields["打樣寄出日期"]=new Date(date).getTime();
  const d=await _createRecord(_TBLS.procure,fields);
  if(d.code===0){
    res.style.color='var(--ok)';res.textContent='✅ 已記錄！';
    document.getElementById('smp-product').value='';
    document.getElementById('smp-tracking').value='';
    loadSamples();loadKPIs();
  }else{res.style.color='var(--danger)';res.textContent='失敗：'+JSON.stringify(d);}
}

/* ── SUPPLIERS ── */
async function loadSuppliers(){
  const el=document.getElementById('supplier-list');
  try{
    const items=await _getRecords(_TBLS.supplier);
    if(!items.length){el.innerHTML='<div class="empty"><div class="empty-icon">🏭</div>尚無供應商記錄</div>';return;}
    el.innerHTML=items.map(i=>{
      const f=i.fields;
      const name=_fv(f,"供應商名稱")||_fv(f,"標題")||'—';
      return `<div class="supplier-row">
        <div class="sup-icon">🏭</div>
        <div class="sup-body">
          <div class="sup-name">${name}</div>
          <div class="sup-meta">${[_fv(f,"品類"),_fv(f,"所在地"),_fv(f,"聯絡人")].filter(Boolean).join(' · ')}</div>
        </div>
        ${_fv(f,"合作評分")?`<div style="font-size:12px;color:var(--warn);">★${_fv(f,"合作評分")}</div>`:''}
      </div>`;
    }).join('');
  }catch(e){el.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div>載入失敗</div>';}
}

/* ── INIT ── */
loadKPIs();
