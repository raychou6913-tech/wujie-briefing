<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解 ERP · Today</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0b12;
  --bg-soft:#13151f;
  --surface:#1a1d29;
  --surface-2:#22253a;
  --border:#2a2d42;
  --border-hi:#3d4268;
  --txt-hi:#f5f6ff;
  --txt-mid:#9ca3c5;
  --txt-lo:#5d6388;
  --accent:#a78bfa;
  --accent-glow:#c4b5fd;
  --accent-warm:#fb923c;
  --ok:#34d399;
  --ok-soft:#34d39915;
  --warn:#fbbf24;
  --warn-soft:#fbbf2415;
  --danger:#f87171;
  --danger-soft:#f8717115;
}
body{background:radial-gradient(ellipse 80% 50% at 50% -10%,#a78bfa10 0%,var(--bg) 60%);color:var(--txt-hi);font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Inter',sans-serif;min-height:100vh;padding-bottom:60px;letter-spacing:-.005em;}

/* MOCKUP BANNER */
.mockup-banner{background:linear-gradient(90deg,#a78bfa20,#fb923c20);border-bottom:1px solid #a78bfa30;padding:8px 20px;font-size:11px;font-weight:600;color:var(--accent-glow);letter-spacing:.04em;text-align:center;}

/* TOPBAR */
.topbar{padding:18px 24px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-logo{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#a78bfa,#fb923c);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;}
.brand-text{font-size:15px;font-weight:700;letter-spacing:-.01em;}
.brand-sub{font-size:10px;color:var(--txt-lo);font-weight:500;letter-spacing:.06em;text-transform:uppercase;}
.user-block{display:flex;align-items:center;gap:10px;}
.user-pic{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;}

/* PERSONA SWITCHER (mockup-only) */
.persona-bar{margin:0 24px 24px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.persona-label{font-size:10px;color:var(--txt-lo);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-right:6px;}
.persona-btn{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--txt-mid);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit;display:flex;align-items:center;gap:8px;}
.persona-btn:hover{border-color:var(--border-hi);color:var(--txt-hi);}
.persona-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 16px #a78bfa30;}
.persona-emoji{font-size:14px;}

/* MAIN */
.main{max-width:760px;margin:0 auto;padding:0 24px;}

/* HERO GREETING */
.hero{margin-bottom:32px;}
.hero-time{font-size:11px;color:var(--txt-lo);font-weight:500;margin-bottom:8px;letter-spacing:.04em;}
.hero-greeting{font-size:32px;font-weight:800;letter-spacing:-.02em;line-height:1.2;margin-bottom:6px;}
.hero-greeting .accent{background:linear-gradient(90deg,var(--accent-glow),var(--accent-warm));-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero-sub{font-size:14px;color:var(--txt-mid);font-weight:500;}

/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:700;color:var(--txt-lo);letter-spacing:.12em;text-transform:uppercase;margin:24px 0 14px;display:flex;align-items:center;gap:10px;}
.sec-count{background:var(--surface);border:1px solid var(--border);padding:2px 9px;border-radius:20px;font-size:10px;color:var(--txt-mid);font-weight:700;letter-spacing:.04em;}

/* TODO CARD — main visual */
.todo-list{display:flex;flex-direction:column;gap:10px;}
.todo{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 20px;display:flex;gap:14px;align-items:flex-start;cursor:pointer;transition:transform .15s,border-color .15s,background .15s;position:relative;overflow:hidden;}
.todo:hover{transform:translateY(-1px);border-color:var(--border-hi);background:var(--surface-2);}
.todo.urgent{border-left:none;}
.todo.urgent::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--danger),#fb7185);}
.todo.urgent{padding-left:24px;}
.todo.warn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--warn);}
.todo.warn{padding-left:23px;}
.todo.normal::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);}
.todo.normal{padding-left:23px;}
.todo.waiting{opacity:.75;}
.todo.waiting::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--txt-lo);}
.todo.waiting{padding-left:23px;}

.todo-icon{width:42px;height:42px;border-radius:12px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.todo.urgent .todo-icon{background:var(--danger-soft);}
.todo.warn .todo-icon{background:var(--warn-soft);}
.todo.normal .todo-icon{background:#a78bfa15;}

.todo-body{flex:1;min-width:0;}
.todo-meta-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.todo-tag{font-size:9px;font-weight:800;padding:3px 8px;border-radius:5px;letter-spacing:.06em;text-transform:uppercase;}
.tag-urgent{background:var(--danger-soft);color:var(--danger);}
.tag-warn{background:var(--warn-soft);color:var(--warn);}
.tag-time{background:var(--surface-2);color:var(--txt-mid);}

.todo-title{font-size:15px;font-weight:700;letter-spacing:-.005em;margin-bottom:4px;line-height:1.4;}
.todo-why{font-size:12px;color:var(--txt-mid);line-height:1.5;}
.todo-why .person{color:var(--accent-glow);font-weight:600;}

.todo-action{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.todo-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit;}
.todo-btn:hover{background:var(--accent-glow);}
.todo-btn.ghost{background:transparent;border:1px solid var(--border-hi);color:var(--txt-mid);}
.todo-btn.ghost:hover{background:var(--surface-2);color:var(--txt-hi);}
.todo-est{font-size:10px;color:var(--txt-lo);font-weight:500;}

/* NUMBERS BLOCK */
.numbers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;}
.number-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;}
.number-label{font-size:11px;color:var(--txt-mid);font-weight:600;margin-bottom:8px;letter-spacing:.02em;}
.number-val{font-size:28px;font-weight:800;letter-spacing:-.02em;line-height:1;margin-bottom:6px;}
.number-val.ok{color:var(--ok);}
.number-val.warn{color:var(--warn);}
.number-meta{font-size:11px;color:var(--txt-lo);font-weight:500;}
.number-bar{margin-top:10px;height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;}
.number-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-glow));border-radius:3px;transition:width .8s ease;}
.number-bar-fill.ok{background:linear-gradient(90deg,var(--ok),#6ee7b7);}
.number-bar-fill.warn{background:linear-gradient(90deg,var(--warn),#fcd34d);}

/* RELATIONS BLOCK */
.relations{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;}
.rel-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--border);}
.rel-row:first-of-type{border-top:none;padding-top:4px;}
.rel-row:last-of-type{padding-bottom:4px;}
.rel-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0;}
.rel-info{flex:1;min-width:0;}
.rel-text{font-size:13px;color:var(--txt-hi);font-weight:500;line-height:1.5;}
.rel-text .accent{color:var(--accent-glow);font-weight:700;}
.rel-meta{font-size:11px;color:var(--txt-lo);margin-top:2px;}
.rel-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;flex-shrink:0;}

/* MORE LINK */
.more-link{display:block;text-align:center;font-size:12px;color:var(--txt-mid);text-decoration:none;padding:14px;margin-top:8px;border:1px dashed var(--border);border-radius:12px;transition:.15s;cursor:pointer;}
.more-link:hover{color:var(--txt-hi);border-color:var(--border-hi);background:var(--surface);}

/* MICRO-ANIMATION */
@keyframes pulse-soft{0%,100%{box-shadow:0 0 0 0 var(--danger-soft);}50%{box-shadow:0 0 0 6px transparent;}}
.todo.urgent::before{animation:pulse-soft 2.5s ease-in-out infinite;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-logo" id="brand-logo">蕪</div>
    <div>
      <div class="brand-text">蕪解</div>
      <div class="brand-sub">My Today</div>
    </div>
  </div>
  <div class="user-block">
    <a id="go-hall-btn" href="erp-lobby.html" style="font-size:11px;color:#fff;background:var(--accent);text-decoration:none;padding:6px 12px;border-radius:6px;font-weight:600;">→ 進工作台</a>
    <a href="erp-lobby.html" style="font-size:11px;color:var(--txt-mid);text-decoration:none;padding:5px 10px;border:1px solid var(--border);border-radius:6px;">⌂ 大廳</a>
    <a href="login.html" onclick="localStorage.removeItem('erp_sess');return true;" style="font-size:11px;color:var(--txt-mid);text-decoration:none;padding:5px 10px;border:1px solid var(--border);border-radius:6px;">登出</a>
    <div class="user-pic" id="user-pic"></div>
  </div>
</div>

<div class="main">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-time" id="hero-time">2026 年 5 月 10 日 · 星期日</div>
    <div class="hero-greeting" id="hero-greeting"></div>
    <div class="hero-sub" id="hero-sub"></div>
  </div>

  <!-- TODAY'S 3 THINGS -->
  <div class="sec-title">
    今天要做的事
    <span class="sec-count" id="todo-count">3 件</span>
  </div>
  <div class="todo-list" id="todo-list"></div>
  <a class="more-link" id="more-todo">本週還有 5 件 · 點開看完整清單 →</a>

  <!-- YOUR NUMBERS -->
  <div class="sec-title">你的數字</div>
  <div class="numbers-grid" id="numbers-grid"></div>

  <!-- RELATIONS -->
  <div class="sec-title">
    別人在等你
    <span class="sec-count" id="rel-count">2 件</span>
  </div>
  <div class="relations" id="relations"></div>

  <div class="sec-title">你在等別人</div>
  <div class="relations" id="waiting-on"></div>

</div>

<script>
const PROXY = 'https://feishu-proxy.raychou6913.workers.dev';
const APP = 'Sg7ObNELHaAdZzshGIFjWPVhpce';
const TBL = {
  approval: 'tbl4OBNvsNkqS4mQ',  // 審批記錄
  project: 'tblPLJ2dLkdkWUAa',   // 項目排期
  design: 'tblSgCcB2aFcsPaw',    // 設計送審
  budget: 'tblmlUoyZ6Bip6S3',    // 預算管理
};
const USER_COLOR = {
  Ray:'#a78bfa', 安然:'#4f46e5', Shawn:'#22c55e',
  賴哥:'#f59e0b', 木子:'#d97706',
  Bevis:'#818cf8', 詩彤:'#9333ea', 珮玲:'#6d28d9',
  高維:'#10b981', 老董:'#f97316', 德寶:'#06b6d4',
  楊子:'#0284c7', Leo:'#0284c7', 躍明:'#0284c7',
  堯哥:'#a78bfa',
};
const PALETTES = USER_COLOR;  // 兼容舊變數名

// ───── 飛書資料抓取 ─────
async function feishuToken(){
  try{
    const r = await fetch(PROXY+'/auth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    return (await r.json()).tenant_access_token;
  }catch(e){ return null; }
}
async function feishuQuery(tblId, tk){
  try{
    const r = await fetch(`${PROXY}/open-apis/bitable/v1/apps/${APP}/tables/${tblId}/records?page_size=200`, {
      headers:{'Authorization':'Bearer '+tk}
    });
    const d = await r.json();
    return d.data?.items || [];
  }catch(e){ return []; }
}
const _fv = x => (x && typeof x === 'object' && x.value!==undefined) ? x.value : x;
const _f = (rec, key) => _fv(rec.fields?.[key]);

function fmtMoney(amt, ccy){
  const sym = {USD:'US$',HKD:'HK$',TWD:'NT$',THB:'฿',CNY:'¥',RMB:'¥'}[ccy]||(ccy||'¥');
  return `${sym}${Math.round(amt||0).toLocaleString()}`;
}
function daysAgo(ts){
  if(!ts) return '';
  const d = Math.round((Date.now() - ts) / 86400000);
  if(d <= 0) return '今天';
  if(d === 1) return '1 天';
  return `${d} 天`;
}

// ───── 為單一使用者組裝 today data ─────
async function buildTodayData(sess){
  const tk = await feishuToken();
  if(!tk) return null;
  const [approvals, projects, designs] = await Promise.all([
    feishuQuery(TBL.approval, tk),
    feishuQuery(TBL.project, tk),
    feishuQuery(TBL.design, tk),
  ]);

  const myName = sess.name;
  const todos = [];
  const rels = [];
  const waiting = [];

  // 1. 等我審批的審批記錄
  const myApprovalsPending = approvals.filter(r => {
    return _f(r,'審批人') === myName && _f(r,'審批狀態') === '待審批';
  });
  myApprovalsPending.forEach(r => {
    const applicant = _f(r,'申請人') || '?';
    const type = _f(r,'審批類型') || '申請';
    const amount = _f(r,'金額') || 0;
    const ccy = _f(r,'幣別') || 'CNY';
    const dateStr = daysAgo(_f(r,'申請日期'));
    const recId = r.record_id;
    todos.push({
      tier: dateStr.includes('天') && parseInt(dateStr)>=3 ? 'urgent' : 'warn',
      icon: '💰',
      tag: dateStr+'前送來',
      est: '5 分鐘',
      title: _f(r,'審批標題') || _f(r,'標題') || `${type} ${fmtMoney(amount, ccy)}`,
      why: `<span class="person">${applicant}</span> 送出 · ${fmtMoney(amount, ccy)} · 對應項目：${_f(r,'對應項目')||'未指定'}`,
      btn: '看詳情批核',
      action: `erp-war-room.html?approval=${recId}`,
    });
    rels.push({
      who: applicant,
      color: USER_COLOR[applicant] || '#94a3b8',
      text: `<span class="accent">${applicant}</span> 送了 ${type}：${fmtMoney(amount, ccy)}`,
      meta: `已等 ${dateStr} · 對應：${_f(r,'對應項目')||'—'}`,
      stat: dateStr,
      statCls: parseInt(dateStr)>=3 ? 'tag-urgent' : 'tag-warn',
    });
  });

  // 2. 我送出但還在等別人批的
  const mySent = approvals.filter(r => _f(r,'申請人') === myName && _f(r,'審批狀態') === '待審批');
  mySent.forEach(r => {
    const approver = _f(r,'審批人') || 'Ray';
    waiting.push({
      who: approver,
      color: USER_COLOR[approver] || '#94a3b8',
      text: `<span class="accent">${approver}</span> 還沒批你的 ${_f(r,'審批類型')||'申請'}`,
      meta: `送出 ${daysAgo(_f(r,'申請日期'))} · ${fmtMoney(_f(r,'金額'), _f(r,'幣別'))}`,
      stat: daysAgo(_f(r,'申請日期')),
      statCls: 'tag-time',
    });
  });

  // 3. 我負責的項目「待 Ray 確認」
  if(myName !== 'Ray'){
    const myPendingProjects = projects.filter(p =>
      _f(p,'負責人') === myName && _f(p,'狀態') === '待 Ray 確認');
    myPendingProjects.forEach(p => {
      const rid = p.record_id;
      todos.push({
        tier: 'warn',
        icon: '📌',
        tag: '等 Ray 確認',
        est: '—',
        title: `${_f(p,'項目名稱')} — 等 Ray baseline 鎖定`,
        why: `你建的項目還沒被 Ray review。預計收入 ${fmtMoney(_f(p,'預計收入'), _f(p,'幣別'))}`,
        btn: '看項目',
        action: `erp-war-room.html?project=${rid}`,
      });
      waiting.push({
        who:'Ray', color:USER_COLOR.Ray,
        text:`<span class="accent">Ray</span> 還沒確認你建的「${_f(p,'項目名稱')}」`,
        meta:`預計收入 ${fmtMoney(_f(p,'預計收入'), _f(p,'幣別'))}`,
        stat:'待確認', statCls:'tag-time',
      });
    });
  }

  // 4. Ray 視角：所有待確認項目
  if(myName === 'Ray'){
    const allPendingProjects = projects.filter(p => _f(p,'狀態') === '待 Ray 確認');
    allPendingProjects.forEach(p => {
      const rid = p.record_id;
      const owner = _f(p,'負責人') || '?';
      todos.push({
        tier:'urgent', icon:'✅', tag:'你的確認',
        est:'3 分鐘',
        title: `${_f(p,'項目名稱')} — baseline 鎖定`,
        why: `<span class="person">${owner}</span> 建立 · 預計收入 ${fmtMoney(_f(p,'預計收入'), _f(p,'幣別'))} · IP：${_f(p,'IP品牌')||'?'}`,
        btn:'去確認',
        action:`erp-war-room.html?project=${rid}`,
      });
      rels.push({
        who: owner, color: USER_COLOR[owner] || '#94a3b8',
        text:`<span class="accent">${owner}</span> 等你 baseline「${_f(p,'項目名稱')}」`,
        meta:`預計淨利 ${fmtMoney(_f(p,'預計淨利'), _f(p,'幣別'))}`,
        stat:'今天', statCls:'tag-urgent',
      });
    });
  }

  // ── 數字 ──
  const numbers = [];
  // 通用：本月通過/送出審批數
  const thisMonth = new Date(); thisMonth.setDate(1); thisMonth.setHours(0,0,0,0);
  const thisMonthApprovals = approvals.filter(r => (_f(r,'申請日期')||0) >= thisMonth.getTime());
  if(myName === 'Ray'){
    const totalProjs = projects.length;
    const pendProjs = projects.filter(p => _f(p,'狀態')==='待 Ray 確認').length;
    numbers.push({
      label:'進行中項目', val: `${totalProjs} 個`,
      meta: `其中 ${pendProjs} 個等你 baseline 確認`,
      cls: pendProjs>0?'warn':'ok', barW: Math.min(totalProjs*10,100), barCls: pendProjs>0?'warn':'ok',
    });
    numbers.push({
      label:'本月送來批的', val: `${myApprovalsPending.length} 筆`,
      meta:'按時批核，避免卡同事',
      cls:'', barW: Math.min(myApprovalsPending.length*15,100), barCls:'',
    });
  } else {
    numbers.push({
      label:'本月你送出的審批', val: `${mySent.length} 筆`,
      meta:'等別人批',
      cls:'', barW: Math.min(mySent.length*15,100), barCls:'',
    });
    const myProjs = projects.filter(p => _f(p,'負責人') === myName).length;
    numbers.push({
      label:'你負責的項目', val: `${myProjs} 個`,
      meta:'進行中',
      cls:'', barW: Math.min(myProjs*20,100), barCls:'',
    });
  }

  return { todos, rels, waiting, numbers };
}

// ───── 渲染 ─────
function renderToday(d, sess){
  const myColor = USER_COLOR[sess.name] || '#a78bfa';
  document.getElementById('user-pic').textContent = (sess.name||'?')[0];
  document.getElementById('user-pic').style.background = myColor;

  const hour = new Date().getHours();
  const hi = hour<5?'凌晨好':hour<12?'早安':hour<18?'下午好':'晚安';
  const totalCount = d.todos.length;
  const greetTxt = totalCount===0
    ? `<span class="accent">沒有等你的事</span>，享受一下難得的清閒`
    : `今天有 <span class="accent">${totalCount} 件事</span> 要做`;
  document.getElementById('hero-greeting').innerHTML = `${hi}，${sess.name}，${greetTxt}`;
  document.getElementById('hero-sub').textContent = totalCount===0
    ? '可以提前看看本週的事，或新建項目'
    : '系統依你的角色，挑出真正需要你動手的事';

  // Todos
  document.getElementById('todo-count').textContent = `${totalCount} 件`;
  if(totalCount === 0){
    document.getElementById('todo-list').innerHTML = `
      <div style="text-align:center;padding:30px;color:var(--txt-lo);font-size:13px;">
        ✨ 沒有等你的待辦<br>
        <a href="erp-project-new.html" style="display:inline-block;margin-top:10px;color:var(--accent);text-decoration:none;">＋ 新增項目</a>
      </div>`;
  } else {
    document.getElementById('todo-list').innerHTML = d.todos.map(t => `

}

function getSession(){
  try{
    const s = JSON.parse(localStorage.getItem('erp_sess')||'null');
    if(!s || Date.now() - s.ts > 7*86400000) return null;
    return s;
  }catch(e){ return null; }
}

async function initToday(){
  const sess = getSession();
  if(!sess){ location.replace('login.html'); return; }
  document.querySelector('.brand-sub').textContent = `${sess.name} · My Today`;
  // 「→ 進工作台」按鈕指向角色對應廳
  const hallUrl = USER_TO_HALL[sess.user] || sess.hall || 'erp-lobby.html';
  const hallBtn = document.getElementById('go-hall-btn');
  if(hallBtn) hallBtn.href = hallUrl;
  // Loading state
  document.getElementById('hero-greeting').innerHTML = `載入中…`;
  document.getElementById('hero-sub').textContent = '從飛書抓你今天的事';
  document.getElementById('user-pic').textContent = (sess.name||'?')[0];
  document.getElementById('user-pic').style.background = USER_COLOR[sess.name] || '#a78bfa';

  try{
    const data = await buildTodayData(sess);
    if(!data) throw new Error('飛書連線失敗');
    renderToday(data, sess);
  }catch(e){
    console.error('today error', e);
    document.querySelector('.main').innerHTML = `
      <div class="hero">
        <div class="hero-time">${document.getElementById('hero-time').textContent}</div>
        <div class="hero-greeting">嗨 <span class="accent">${sess.name}</span></div>
        <div class="hero-sub">飛書連線暫時失敗 — 請進大廳開始工作</div>
      </div>
      <a href="erp-lobby.html" style="display:inline-block;margin-top:20px;padding:14px 28px;background:var(--accent);color:#fff;border-radius:12px;font-weight:700;text-decoration:none;">→ 去大廳</a>`;
  }
}

initToday();
