<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解 ERP · 安然中控台</title>
<style>
:root{
  --bg:#0b0c10;--surface:#111318;--card:#181a22;--card2:#1e2130;
  --border:#222535;--border-hi:#363b58;
  --txt-hi:#e8eaf8;--txt-mid:#7880a8;--txt-lo:#3d4268;
  --accent:#818cf8;--ok:#22c55e;--ok-dim:#22c55e18;
  --warn:#f59e0b;--warn-dim:#f59e0b18;--danger:#ef4444;--danger-dim:#ef444418;
  --hk:#e879f9;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt-hi);font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;min-height:100vh;padding-bottom:80px;}

/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:8px;}
.brand-dot{width:7px;height:7px;border-radius:50%;background:var(--hk);box-shadow:0 0 7px var(--hk);}
.brand-name{font-size:14px;font-weight:700;}
.brand-sub{font-size:11px;color:var(--txt-mid);}
.nav-back{font-size:12px;color:var(--txt-mid);text-decoration:none;padding:6px 10px;border:1px solid var(--border);border-radius:6px;min-height:34px;display:flex;align-items:center;}

/* ── KPI BAR (always visible) ── */
.kpi-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap;}
.kpi-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;flex:1;min-width:calc(50% - 5px);}
.kpi-label{font-size:9px;color:var(--txt-lo);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.kpi-val{font-size:20px;font-weight:800;line-height:1;}
.kpi-sub{font-size:10px;color:var(--txt-mid);margin-top:3px;}
.kpi-bar-inner{width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;}
.kpi-fill{height:100%;border-radius:2px;background:var(--ok);transition:width .6s;}

/* ── TABS ── */
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{padding:12px 14px;font-size:12px;font-weight:600;color:var(--txt-mid);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;min-height:44px;}
.tab.active{color:var(--txt-hi);border-bottom-color:var(--hk);}

/* ── MAIN ── */
.main{max-width:720px;margin:0 auto;padding:16px;}
.section-title{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--txt-mid);text-transform:uppercase;margin-bottom:10px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}

/* ── ORDER CARDS ── */
.order-status-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.ost{font-size:11px;font-weight:600;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--txt-mid);cursor:pointer;min-height:34px;}
.ost.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.order-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.oc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.oc-client{font-size:14px;font-weight:700;}
.oc-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;}
.ocb-pending{background:var(--warn-dim);color:var(--warn);}
.ocb-shipping{background:#3b82f620;color:#60a5fa;}
.ocb-collect{background:var(--ok-dim);color:var(--ok);}
.oc-detail{font-size:11px;color:var(--txt-mid);margin-bottom:8px;}
.oc-amount{font-size:16px;font-weight:800;margin-bottom:8px;}
.oc-progress{display:flex;gap:4px;align-items:center;margin-bottom:10px;}
.ocp-step{font-size:9px;padding:2px 6px;border-radius:4px;}
.ocp-done{background:var(--ok-dim);color:var(--ok);}
.ocp-active{background:var(--accent);color:#fff;}
.ocp-wait{background:var(--border);color:var(--txt-lo);}
.oc-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer;border:1px solid;min-height:38px;}
.btn-ok{background:var(--ok-dim);border-color:var(--ok);color:var(--ok);}
.btn-warn{background:var(--warn-dim);border-color:var(--warn);color:var(--warn);}
.btn-ghost{background:transparent;border-color:var(--border-hi);color:var(--txt-mid);}

/* ── APPROVAL QUEUE ── */
.approval-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.ai-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.ai-title{font-size:13px;font-weight:700;}
.ai-type{font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;background:#818cf820;color:var(--accent);}
.ai-meta{font-size:11px;color:var(--txt-mid);margin-bottom:10px;}
.ai-desc{font-size:12px;color:var(--txt-hi);margin-bottom:10px;line-height:1.5;}
.ai-actions{display:flex;gap:8px;}

/* ── CONTRACT ROWS ── */
.contract-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.contract-row:last-child{border:none;}
.ct-icon{width:38px;height:38px;border-radius:9px;background:#e879f920;border:1px solid #e879f940;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ct-body{flex:1;min-width:0;}
.ct-name{font-size:13px;font-weight:600;}
.ct-meta{font-size:10px;color:var(--txt-mid);margin-top:2px;}
.ct-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;}
.ctb-ok{background:var(--ok-dim);color:var(--ok);}
.ctb-warn{background:var(--warn-dim);color:var(--warn);}
.ctb-danger{background:var(--danger-dim);color:var(--danger);}
.ct-expiry{font-size:10px;color:var(--txt-mid);margin-top:2px;}

/* ── CONTRACT UPLOAD ── */
.contract-upload{border:2px dashed var(--border-hi);border-radius:10px;padding:24px;text-align:center;cursor:pointer;margin-bottom:14px;}
.contract-upload:hover{border-color:var(--hk);background:var(--card2);}
.cu-icon{font-size:28px;margin-bottom:6px;}
.cu-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.cu-sub{font-size:11px;color:var(--txt-mid);}

/* ── PARSE RESULT ── */
.apr-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.apr-ai{background:#e879f920;border:1px solid var(--hk);color:var(--hk);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.apr-title{font-size:12px;font-weight:600;flex:1;}
.key-terms{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.kt-cell{background:var(--card);border-radius:6px;padding:8px 10px;}
.kt-label{font-size:9px;color:var(--txt-lo);margin-bottom:2px;}
.kt-val{font-size:13px;font-weight:700;}
.kt-val.warn{color:var(--warn);}
.kt-val.danger{color:var(--danger);}

/* ── QUERY ── */
.query-box{background:var(--card2);border:1px solid var(--border-hi);border-radius:10px;padding:14px;margin-top:14px;}
.qb-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--txt-hi);outline:none;margin-bottom:8px;}
.qb-input::placeholder{color:var(--txt-lo);}
.qb-btn{width:100%;background:var(--hk);border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;color:#000;cursor:pointer;min-height:44px;}
.qb-result{margin-top:10px;padding:12px;background:var(--card);border-radius:8px;font-size:12px;color:var(--txt-hi);line-height:1.7;display:none;}
.qb-result strong{color:var(--hk);}

/* ── CASHFLOW ── */
.cf-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.cf-row:last-child{border:none;}
.cf-company{font-size:13px;font-weight:600;}
.cf-date{font-size:10px;color:var(--txt-mid);margin-top:2px;}
.cf-balance{text-align:right;}
.cf-val{font-size:15px;font-weight:800;}
.cf-currency{font-size:10px;color:var(--txt-mid);margin-top:1px;}

/* ── EXPIRY ALERTS ── */
.expiry-item{background:var(--card2);border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid var(--warn);}
.expiry-item.danger{border-left-color:var(--danger);}
.expiry-item.ok{border-left-color:var(--ok);}
.ei-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.ei-name{font-size:13px;font-weight:700;}
.ei-days{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:32px 16px;color:var(--txt-lo);}
.empty-icon{font-size:28px;margin-bottom:8px;}

/* ── DESKTOP OVERRIDES ── */
@media(min-width:600px){
  .kpi-chip{min-width:calc(33% - 7px);}
  .key-terms{grid-template-columns:repeat(3,1fr);}
  .main{padding:20px 24px;}
  .topbar{padding:0 24px;}
  .kpi-bar{padding:14px 24px;}
  .tab-bar{padding:0 24px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <span class="brand-name">蕪解 ERP</span>
      <span class="brand-sub"> 安然中控台</span>
    </div>
  </div>
  <a class="nav-back" href="erp-war-room.html">← 戰情室</a>
</div>

<!-- ══ KPI BAR ══ -->
<div class="kpi-bar">
  <div class="kpi-chip">
    <div class="kpi-label">本月業績達標</div>
    <div class="kpi-val" id="kpi-revenue" style="color:var(--ok)">載入中</div>

  </div>
  <div class="kpi-chip">
    <div class="kpi-label">全集團現金餘額</div>
    <div class="kpi-val" id="kpi-cash" style="color:var(--accent)">載入中</div>

<!-- ══ TAB BAR ══ -->
<div class="tab-bar">

</div>

<div class="main">

  <!-- ══ TAB 1: 待辦 ══ -->
  <div id="tab-todo">

    <!-- 批發訂單佇列 -->
    <div class="section-title">批發訂單佇列</div>
    <div class="order-status-tabs">

      <button class="ost" onclick="filterOrders(this,'出貨中')">出貨中 <span id="cnt-shipping">—</span></button>

        <button style="font-size:10px;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--txt-mid);cursor:pointer;min-height:32px;" onclick="quickQuery('哪些合約保底金還沒付清？')">未付保底？</button>

        <div class="empty-state"><div class="empty-icon">📋</div>載入合約中...</div>
      </div>
    </div>

  </div>

  <!-- ══ TAB 4: 到期提醒 ══ -->

    <div class="card">

        <div class="empty-state"><div class="empty-icon">⏰</div>載入中...</div>
      </div>
    </div>
  </div>

</div><!-- /main -->

<script>
const _P  = "https://feishu-proxy.raychou6913.workers.dev";
const _AT = "YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _TBLS = {
  approval:  "tblD6acV3m2ZXJHe",
  contract:  "tbltnJNDhRNwVkZC",
  sales:     "tblRtqmbO9TO3sYZ",
  budget:    "tblteo2QEO0jP8j9",
  cashflow:  "tblxaiogh3tYlZUz",
};
const GEMINI_KEY = "AIzaSyBC51Yef5FtCESl2AF7A3X1WKIfoc0Bojo";
const GEMINI_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+GEMINI_KEY;
let _tk=null, _parsedResult=null, _currentFileName="", _allOrders=[], _currentFilter="待確認";

/* ── SESSION ── */
(function(){
  const s=JSON.parse(localStorage.getItem("wujie_session")||"null");
  if(!s||Date.now()>s.expires){localStorage.removeItem("wujie_session");location.replace("login.html");}
})();

/* ── TOKEN ── */
async function _getToken(){
  if(_tk) return _tk;
  const r=await fetch(_P+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
  const d=await r.json();
  _tk=d.tenant_access_token;
  setTimeout(()=>_tk=null,110*60*1000);
  return _tk;
}
function _fv(f,k){
  const v=f[k];
  if(!v&&v!==0) return "";
  if(Array.isArray(v)) return v.map(x=>typeof x==="object"?(x.text||x.link||JSON.stringify(x)):String(x)).join("");
  if(typeof v==="object") return v.text||v.link||"";
  return String(v);
}
async function _getRecords(tbl,filter=""){
  const tk=await _getToken();
  const url=`${_P}/open-apis/bitable/v1/apps/${_AT}/tables/${tbl}/records?page_size=100${filter?"&filter="+encodeURIComponent(filter):""}`;
  const r=await fetch(url,{headers:{"Authorization":"Bearer "+tk}});
  const d=await r.json();
  return d.data?.items||[];
}
async function _updateRecord(tbl,rid,fields){
  const tk=await _getToken();
  const r=await fetch(`${_P}/open-apis/bitable/v1/apps/${_AT}/tables/${tbl}/records/${rid}`,{
    method:"PUT",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  return r.json();
}
async function _createRecord(tbl,fields){
  const tk=await _getToken();
  const r=await fetch(`${_P}/open-apis/bitable/v1/apps/${_AT}/tables/${tbl}/records`,{
    method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  return r.json();
}

/* ── TABS ── */
const ALL_TABS=['tab-todo','tab-cashflow','tab-contracts','tab-expiry'];
function switchTab(btn,tabId){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ALL_TABS.forEach(id=>document.getElementById(id).style.display=id===tabId?'':'none');
  if(tabId==='tab-cashflow') loadCashflow();
  if(tabId==='tab-contracts') loadContracts();
  if(tabId==='tab-expiry') loadExpiry();
}

/* ── KPI LOAD ── */
async function loadKPIs(){
  try{
    // 業績：本月銷售總額 vs 預算目標
    const now=new Date();
    const [orders,budgets]=await Promise.all([
      _getRecords(_TBLS.sales),
      _getRecords(_TBLS.budget)
    ]);
    // 收入目標：找本月或本年的收入目標
    const revBudget=budgets.find(b=>{
      const f=b.fields;
      return _fv(f,"預算科目")==="收入目標"&&(String(_fv(f,"年度"))===String(now.getFullYear()));
    });
    const target=revBudget?Number(_fv(revBudget.fields,"預算金額")||0):0;
    // 實際收入：本月已確認訂單金額
    const actual=orders.reduce((s,o)=>{
      const f=o.fields;
      const status=_fv(f,"訂單狀態");
      if(status==="已完成"||status==="出貨中"||status==="待收款"){
        return s+Number(_fv(f,"總金額")||0);
      }
      return s;
    },0);
    const pct=target>0?Math.min(100,Math.round(actual/target*100)):0;
    document.getElementById('kpi-revenue').textContent=actual>0?'¥'+_fmt(actual):'¥0';
    document.getElementById('kpi-revenue-sub').textContent=target>0?`目標 ¥${_fmt(target)}（${pct}%）`:'預算待 Shawn 設定';
    document.getElementById('kpi-revenue-bar').style.width=pct+'%';
    document.getElementById('kpi-revenue-bar').style.background=pct>=80?'var(--ok)':pct>=50?'var(--warn)':'var(--danger)';

    // 應收款：未全款收清的訂單
    const ar=orders.reduce((s,o)=>{
      const f=o.fields;
      const cs=_fv(f,"收款狀態");
      if(cs!=="全款已收"&&cs!=="") return s+Number(_fv(f,"總金額")||0);
      return s;
    },0);
    const arCnt=orders.filter(o=>_fv(o.fields,"收款狀態")!=="全款已收"&&_fv(o.fields,"收款狀態")!=="").length;
    document.getElementById('kpi-ar').textContent='¥'+_fmt(ar);
    document.getElementById('kpi-ar-sub').textContent=arCnt>0?`${arCnt} 筆待收款`:'暫無未收款';

  }catch(e){
    document.getElementById('kpi-revenue').textContent='—';
    document.getElementById('kpi-ar').textContent='—';
  }

  // 現金流合計
  try{
    const cf=await _getRecords(_TBLS.cashflow);
    // 取每家公司最新一筆，匯總
    const latest={};
    cf.forEach(r=>{
      const f=r.fields;
      const co=_fv(f,"所屬公司")||_fv(f,"辦公室")||"其他";
      const ts=Number(_fv(f,"日期")||0);
      if(!latest[co]||ts>latest[co].ts) latest[co]={ts,balance:Number(_fv(f,"期末餘額")||0),currency:_fv(f,"幣別")||"RMB"};
    });
    const total=Object.values(latest).reduce((s,v)=>s+v.balance,0);
    const cnt=Object.keys(latest).length;
    document.getElementById('kpi-cash').textContent='¥'+_fmt(total);
    document.getElementById('kpi-cash-sub').textContent=cnt>0?`${cnt} 家公司已填報`:'尚無現金流記錄';
  }catch(e){
    document.getElementById('kpi-cash').textContent='—';
  }
}

function _fmt(n){
  if(n>=10000) return (n/10000).toFixed(1)+'萬';
  return n.toLocaleString();
}

/* ── ORDERS ── */
async function loadOrders(){
  try{
    _allOrders=await _getRecords(_TBLS.sales);
    // 計算各狀態數量
    const pending=_allOrders.filter(o=>_fv(o.fields,"訂單狀態")==="待確認").length;
    const shipping=_allOrders.filter(o=>_fv(o.fields,"訂單狀態")==="出貨中").length;
    const collect=_allOrders.filter(o=>_fv(o.fields,"訂單狀態")==="待收款").length;
    document.getElementById('cnt-pending').textContent=pending||0;
    document.getElementById('cnt-shipping').textContent=shipping||0;
    document.getElementById('cnt-collect').textContent=collect||0;
    renderOrders(_currentFilter);
  }catch(e){
    document.getElementById('order-list').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div>載入失敗</div>`;
  }
}

function filterOrders(btn,status){
  document.querySelectorAll('.ost').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  _currentFilter=status;
  renderOrders(status);
}

function renderOrders(filter){
  const list=document.getElementById('order-list');
  const items=filter==='all'?_allOrders:_allOrders.filter(o=>_fv(o.fields,"訂單狀態")===filter);
  if(!items.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">✅</div>${filter==='all'?'暫無訂單':'此狀態暫無訂單'}</div>`;
    return;
  }
  list.innerHTML=items.map(o=>{
    const f=o.fields; const rid=o.record_id;
    const status=_fv(f,"訂單狀態");
    const badgeCls=status==="待確認"?"ocb-pending":status==="出貨中"?"ocb-shipping":"ocb-collect";
    const amt=Number(_fv(f,"總金額")||0);
    const ccy=_fv(f,"幣別")||"¥";
    const cs=_fv(f,"收款狀態")||"未收款";
    const steps=[
      {label:"接單",done:true},
      {label:"訂金",done:cs!=="未收款"},
      {label:"出貨",done:status==="出貨中"||status==="待收款"||status==="已完成"},
      {label:"收款",done:cs==="全款已收"},
    ];
    const stepsHtml=steps.map(s=>`<span class="ocp-step ${s.done?'ocp-done':status!=="待確認"&&!s.done?'ocp-active':'ocp-wait'}">${s.label}</span>`).join('');
    const actions=status==="待確認"
      ?`<button class="btn btn-ok" onclick="confirmOrder('${rid}')">✓ 確認訂單</button>`
      :status==="出貨中"
      ?`<button class="btn btn-ok" onclick="markShipped('${rid}')">📦 填物流單號</button>`
      :status==="待收款"
      ?`<button class="btn btn-ok" onclick="markPaid('${rid}','tail')">💰 確認尾款到帳</button>`
      :'';
    return `<div class="order-card">
      <div class="oc-top">
        <span class="oc-client">${_fv(f,"客戶名稱")||'未知客戶'}</span>
        <span class="oc-badge ${badgeCls}">${status}</span>
      </div>
      <div class="oc-detail">${_fv(f,"產品/項目")||''} · ${_fv(f,"IP品牌")||''} · 數量 ${_fv(f,"數量")||'—'}</div>
      <div class="oc-amount">${ccy} ${amt.toLocaleString()}</div>
      <div class="oc-progress">${stepsHtml}</div>
      <div style="font-size:10px;color:var(--txt-mid);margin-bottom:8px;">收款狀態：${cs} · 負責業務：${_fv(f,"負責業務")||'—'}</div>
      ${actions?`<div class="oc-actions">${actions}<button class="btn btn-ghost" onclick="viewOrder('${rid}')">查看</button></div>`:''}
    </div>`;
  }).join('');
}

async function confirmOrder(rid){
  if(!confirm("確認此訂單？")) return;
  await _updateRecord(_TBLS.sales,rid,{"訂單狀態":"出貨中","收款狀態":"訂金已收"});
  loadOrders(); loadKPIs();
}
function markShipped(rid){
  const logistic=prompt("輸入物流單號：");
  if(!logistic) return;
  _updateRecord(_TBLS.sales,rid,{"物流單號":logistic,"訂單狀態":"待收款"}).then(()=>{loadOrders();loadKPIs();});
}
async function markPaid(rid){
  if(!confirm("確認尾款已到帳？")) return;
  await _updateRecord(_TBLS.sales,rid,{"收款狀態":"全款已收","訂單狀態":"已完成"});
  loadOrders(); loadKPIs();
}
function viewOrder(rid){
  const o=_allOrders.find(o=>o.record_id===rid);
  if(!o) return;
  const f=o.fields;
  alert(`客戶：${_fv(f,"客戶名稱")}\n產品：${_fv(f,"產品/項目")}\n金額：${_fv(f,"幣別")} ${_fv(f,"總金額")}\n批發折扣：${_fv(f,"批發折扣")||"—"}\n帳期：${_fv(f,"帳期")||"—"}\n備注：${_fv(f,"備註")||"—"}`);
}

/* ── CASHFLOW ── */
async function loadCashflow(){
  try{
    const items=await _getRecords(_TBLS.cashflow);
    // 每家公司取最新
    const latest={};
    items.forEach(r=>{
      const f=r.fields;
      const co=_fv(f,"所屬公司")||_fv(f,"辦公室")||"未分類";
      const ts=Number(_fv(f,"日期")||0);
      if(!latest[co]||ts>latest[co].ts) latest[co]={ts,f,rid:r.record_id};
    });
    const el=document.getElementById('cashflow-list');
    const entries=Object.entries(latest);
    if(!entries.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📊</div>尚無現金流記錄<br><small style="font-size:11px">請在下方填報</small></div>';return;}
    const companies=["北京蕪解","台灣悍草","UJ BKK","香港JV","深圳子公司"];
    let html=companies.map(co=>{
      const item=latest[co];
      if(!item) return `<div class="cf-row"><div><div class="cf-company">${co}</div><div class="cf-date" style="color:var(--txt-lo)">尚未填報</div></div><div class="cf-balance"><div class="cf-val" style="color:var(--txt-lo)">—</div></div></div>`;
      const f=item.f;
      const bal=Number(_fv(f,"期末餘額")||0);
      const ccy=_fv(f,"幣別")||"";
      const dateMs=Number(_fv(f,"日期")||0);
      const date=dateMs?new Date(dateMs).toLocaleDateString('zh-TW'):'—';
      const color=bal<0?'var(--danger)':bal<50000?'var(--warn)':'var(--ok)';
      return `<div class="cf-row">
        <div><div class="cf-company">${co}</div><div class="cf-date">最後更新 ${date}</div></div>
        <div class="cf-balance"><div class="cf-val" style="color:${color}">${ccy} ${bal.toLocaleString()}</div></div>
      </div>`;
    }).join('');
    // 其他未在名單的
    entries.filter(([co])=>!companies.includes(co)).forEach(([co,item])=>{
      const f=item.f;
      const bal=Number(_fv(f,"期末餘額")||0);
      html+=`<div class="cf-row"><div><div class="cf-company">${co}</div></div><div class="cf-balance"><div class="cf-val">${_fv(f,"幣別")} ${bal.toLocaleString()}</div></div></div>`;
    });
    el.innerHTML=html;
  }catch(e){
    document.getElementById('cashflow-list').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div>載入失敗</div>';
  }
}

async function submitCashflow(){
  const company=document.getElementById('cf-company').value;
  const currency=document.getElementById('cf-currency').value;
  const balance=Number(document.getElementById('cf-balance').value);
  const income=Number(document.getElementById('cf-income').value||0);
  const expense=Number(document.getElementById('cf-expense').value||0);
  if(!company||!balance){alert("請填寫公司和期末餘額");return;}
  const res=document.getElementById('cf-result');
  res.style.display='block';res.style.color='var(--txt-mid)';res.textContent='提交中...';
  const fields={"所屬公司":company,"幣別":currency,"期末餘額":balance,"日期":Date.now(),"填報人":JSON.parse(localStorage.getItem("wujie_session")||"{}").name||"安然"};
  if(income) fields["本期收入"]=income;
  if(expense) fields["本期支出"]=expense;
  const d=await _createRecord(_TBLS.cashflow,fields);
  if(d.code===0){
    res.style.color='var(--ok)';res.textContent='✅ 已提交';
    document.getElementById('cf-balance').value='';
    document.getElementById('cf-income').value='';
    document.getElementById('cf-expense').value='';
    loadCashflow(); loadKPIs();
  }else{res.style.color='var(--danger)';res.textContent='失敗：'+JSON.stringify(d);}
}

/* ── EXPIRY ── */
async function loadExpiry(){
  try{
    const items=await _getRecords(_TBLS.contract);
    const el=document.getElementById('expiry-list');
    const now=Date.now();
    const soon=items.filter(i=>{
      const f=i.fields;
      const endMs=Number(_fv(f,"合約結束日")||_fv(f,"到期日期")||0);
      return endMs>0&&(endMs-now)<(180*864e5);
    }).sort((a,b)=>{
      const ae=Number(_fv(a.fields,"合約結束日")||_fv(a.fields,"到期日期")||0);
      const be=Number(_fv(b.fields,"合約結束日")||_fv(b.fields,"到期日期")||0);
      return ae-be;
    });
    if(!soon.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">✅</div>180天內無到期合約</div>';return;}
    el.innerHTML=soon.map(i=>{
      const f=i.fields;
      const ip=_fv(f,"IP品牌")||_fv(f,"合約名稱");
      const endMs=Number(_fv(f,"合約結束日")||_fv(f,"到期日期")||0);
      const days=Math.round((endMs-now)/864e5);
      const cls=days<0?'danger':days<30?'danger':days<90?'':'ok';
      const color=days<0?'var(--danger)':days<30?'var(--danger)':days<90?'var(--warn)':'var(--ok)';
      return `<div class="expiry-item ${cls}">
        <div class="ei-top">
          <span class="ei-name">${ip}</span>
          <span class="ei-days" style="background:${color}20;color:${color}">${days<0?'已到期':days+'天後到期'}</span>
        </div>
        <div style="font-size:11px;color:var(--txt-mid);">${_fv(f,"版權方")||''} · ${_fv(f,"授權區域")||''} · 到期：${new Date(endMs).toLocaleDateString('zh-TW')}</div>
        ${days<90&&days>0?`<div style="font-size:11px;color:var(--warn);margin-top:4px;">⚠ 請安然確認是否續約</div>`:''}
      </div>`;
    }).join('');
  }catch(e){
    document.getElementById('expiry-list').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div>載入失敗</div>';
  }
}

/* ── CONTRACT AI PARSE ── */
function handleFileDrop(e){const f=e.dataTransfer.files[0];if(f)processFile(f);}
function handleFileUpload(input){if(input.files[0])processFile(input.files[0]);}
async function processFile(file){
  _currentFileName=file.name;
  const demo=document.getElementById('parse-demo');
  demo.style.display='block';
  demo.innerHTML=`<div style="padding:20px;text-align:center;color:var(--txt-mid);"><div style="font-size:28px;margin-bottom:8px">🤖</div>AI 解析中 · ${file.name}</div>`;
  try{
    const base64=await fileToBase64(file);
    const mimeType=file.type||(file.name.endsWith('.pdf')?'application/pdf':'image/jpeg');
    const parsed=await callGeminiParse(base64,mimeType,file.name);
    _parsedResult=parsed;
    showParseResult(parsed,file.name);
  }catch(e){
    demo.innerHTML=`<div style="padding:16px;color:var(--danger);font-size:13px">解析失敗：${e.message}</div>`;
  }
}
function fileToBase64(file){
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
}
async function callGeminiParse(base64,mimeType,fileName){
  const prompt=`你是蕪解創意的AI合約解析助理。從IP授權合約中精確抽取關鍵條款，以JSON格式返回。
欄位（找不到填null）：{"ip_name":"IP名稱","licensor":"版權方","territory":"授權地區","categories":"授權品類","start_date":"YYYY-MM-DD","end_date":"YYYY-MM-DD","mg_annual":"年保底金額（數字）","royalty_rate":"版稅率","currency":"幣別","first_payment":"首期付款說明","penalty":"違約條款摘要","notes":"其他重要條款"}
只返回JSON。`;
  const body={contents:[{parts:[{text:prompt},{inline_data:{mime_type:mimeType,data:base64}}]}],generationConfig:{temperature:0.1,maxOutputTokens:1024}};
  const r=await fetch(GEMINI_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d=await r.json();
  const text=d.candidates?.[0]?.content?.parts?.[0]?.text||"";
  const m=text.match(/\{[\s\S]*\}/);
  if(!m) throw new Error("AI 無法解析此文件");
  return JSON.parse(m[0]);
}
function showParseResult(p,fileName){
  const safe=v=>v||'—';
  document.getElementById('parse-demo').innerHTML=`
    <div class="apr-header">
      <span class="apr-ai">✨ AI 解析完成</span>
      <span class="apr-title">${fileName}</span>
    </div>
    <div class="key-terms">
      <div class="kt-cell"><div class="kt-label">IP 名稱</div><div class="kt-val">${safe(p.ip_name)}</div></div>
      <div class="kt-cell"><div class="kt-label">保底金（MG）</div><div class="kt-val warn">${p.mg_annual?p.currency+' '+p.mg_annual+'/年':'—'}</div></div>
      <div class="kt-cell"><div class="kt-label">版稅率</div><div class="kt-val">${safe(p.royalty_rate)}</div></div>
      <div class="kt-cell"><div class="kt-label">授權期限</div><div class="kt-val">${safe(p.start_date)} ~ ${safe(p.end_date)}</div></div>
      <div class="kt-cell"><div class="kt-label">授權區域</div><div class="kt-val">${safe(p.territory)}</div></div>
      <div class="kt-cell"><div class="kt-label">首期付款</div><div class="kt-val danger" style="font-size:11px">${safe(p.first_payment)}</div></div>
    </div>
    ${p.penalty?`<div style="font-size:11px;color:var(--txt-mid);margin-bottom:10px">⚠ 違約：${p.penalty}</div>`:''}
    <div class="oc-actions">
      <button class="btn btn-ok" onclick="saveContractToFeishu()">✓ 確認存入合約庫</button>
      <button class="btn btn-ghost">✏ 人工修改</button>
    </div>
    <div id="save-result" style="display:none;margin-top:8px;font-size:12px;text-align:center;"></div>
    <div style="font-size:10px;color:var(--txt-lo);margin-top:8px;">⚠ 安然必須人工確認——入庫後全系統查詢以此為準</div>`;
}
async function saveContractToFeishu(){
  if(!_parsedResult) return;
  const p=_parsedResult;
  const el=document.getElementById('save-result');
  el.style.display='block';el.style.color='var(--txt-mid)';el.textContent='存入中...';
  try{
    const fields={"IP品牌":p.ip_name||_currentFileName,"版權方":p.licensor||"","授權區域":p.territory||"","授權品類":p.categories||"","幣別":p.currency||"RMB","保底金額":p.mg_annual?Number(String(p.mg_annual).replace(/[^0-9.]/g,'')):null,"版稅率":p.royalty_rate||"","主要條款摘要":p.penalty||"","特殊條款":p.notes||"","合約狀態":"有效"};
    if(p.start_date) fields["簽約日期"]=new Date(p.start_date).getTime();
    if(p.end_date) fields["到期日期"]=new Date(p.end_date).getTime();
    Object.keys(fields).forEach(k=>{if(fields[k]===null||fields[k]==="")delete fields[k];});
    const d=await _createRecord(_TBLS.contract,fields);
    if(d.code===0){el.style.color='var(--ok)';el.textContent='✅ 已存入合約庫！';}
    else{el.style.color='var(--danger)';el.textContent='存入失敗：'+JSON.stringify(d);}
  }catch(e){el.style.color='var(--danger)';el.textContent='存入失敗：'+e.message;}
}

/* ── CONTRACT QUERY ── */
function quickQuery(q){document.getElementById('qb-in').value=q;runContractQuery();}
async function runContractQuery(){
  const q=document.getElementById('qb-in').value.trim();
  const el=document.getElementById('qb-result');
  const btn=document.getElementById('qb-btn');
  if(!q) return;
  btn.disabled=true;btn.textContent='查詢中...';
  el.style.display='block';el.innerHTML='<span style="color:var(--txt-mid)">AI 查詢中...</span>';
  try{
    const items=await _getRecords(_TBLS.contract);
    const contracts=items.map(i=>{
      const f=i.fields;
      return `IP:${_fv(f,"IP品牌")} 版權方:${_fv(f,"版權方")} 區域:${_fv(f,"授權區域")} 保底:${_fv(f,"幣別")}${_fv(f,"保底金額")}/年 版稅:${_fv(f,"版稅率")} 到期:${_fv(f,"到期日期")||_fv(f,"合約結束日")} 狀態:${_fv(f,"合約狀態")}`;
    }).filter(s=>s.length>20).join("\n");
    const prompt=`你是蕪解創意合約知識庫助理。根據合約資料精確回答問題，引用具體數字，不超過100字。\n合約資料：\n${contracts||"（尚無記錄）"}\n問題：${q}`;
    const r=await fetch(GEMINI_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.1,maxOutputTokens:300}})});
    const d=await r.json();
    const ans=d.candidates?.[0]?.content?.parts?.[0]?.text||"查詢失敗";
    el.innerHTML=ans.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  }catch(e){el.innerHTML=`<span style="color:var(--danger)">查詢失敗：${e.message}</span>`;}
  btn.disabled=false;btn.textContent='問 AI';
}

/* ── INIT ── */
loadKPIs();
loadOrders();
loadApprovals();
</script>
