<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解 ERP · 工作流地圖</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --paper:#fafaf8;
  --paper-soft:#f2f2ef;
  --line:#e8e8e3;
  --ink:#0a0a0a;
  --ink-mid:#666;
  --ink-lo:#999;
  --ink-faint:#ccc;
  --brand:#ff6b35;
  --brand-soft:#fff4ef;
  --ease:cubic-bezier(0.32,0.72,0,1);
  --ok:#22c55e;
  --warn:#f59e0b;
  --danger:#ef4444;
  --info:#0891b2;
}
body{
  background:var(--paper);color:var(--ink);
  font-family:"Inter","Helvetica Neue","PingFang TC","Noto Sans TC",-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  letter-spacing:-.003em;
  min-height:100vh;
}
.topbar{
  background:var(--paper);border-bottom:1px solid var(--line);
  padding:0 28px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.tb-back{
  background:none;border:1px solid var(--line);border-radius:8px;
  padding:6px 14px;font-size:12px;color:var(--ink-mid);
  cursor:pointer;font-family:inherit;
  transition:border-color .2s var(--ease);
}
.tb-back:hover{border-color:var(--ink-faint);}
.tb-title{font-size:15px;font-weight:800;letter-spacing:-.01em;}
.tb-sub{font-size:10px;color:var(--ink-lo);margin-left:6px;letter-spacing:.06em;}
.tb-right{display:flex;align-items:center;gap:12px;}

.main{height:calc(100vh - 56px);}
.canvas-wrap{
  background:var(--paper-soft);position:relative;overflow:auto;height:100%;
}
.flow-tabs{
  position:sticky;top:0;background:var(--paper);
  border-bottom:1px solid var(--line);
  padding:10px 20px;display:flex;gap:6px;flex-wrap:wrap;
  z-index:10;
}
.flow-tab{
  background:transparent;border:1px solid var(--line);border-radius:18px;
  padding:6px 14px;font-size:11px;font-weight:600;
  color:var(--ink-mid);cursor:pointer;font-family:inherit;
  transition:all .2s var(--ease);white-space:nowrap;
}
.flow-tab:hover{border-color:var(--ink-faint);color:var(--ink);}
.flow-tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}

#canvas{
  display:block;margin:24px auto;background:#fff;
  border:1px solid var(--line);border-radius:14px;
}

.detail-panel{
  width:340px;background:#fff;border-left:1px solid var(--line);
  padding:24px 22px;overflow-y:auto;
  display:flex;flex-direction:column;
  position:relative;transition:width .25s var(--ease);
}
.detail-panel.collapsed{width:36px;padding:24px 4px;overflow:hidden;}
.detail-panel.collapsed .detail-content{display:none;}
.panel-toggle{
  position:absolute;top:14px;left:8px;
  background:var(--paper-soft);border:1px solid var(--line);
  border-radius:6px;width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:11px;color:var(--ink-mid);
  transition:background .15s var(--ease);
  z-index:2;
}
.panel-toggle:hover{background:var(--line);}
.detail-panel.collapsed .panel-toggle{left:6px;}
.detail-panel.collapsed .panel-toggle-icon::before{content:'◀';}
.panel-toggle-icon::before{content:'▶';}
/* drag handle for free resize */
.panel-resize{
  position:absolute;top:0;left:-3px;width:6px;height:100%;
  cursor:col-resize;z-index:3;
}
.detail-panel.collapsed .panel-resize{display:none;}
.detail-empty{
  color:var(--ink-lo);font-size:13px;text-align:center;
  margin-top:80px;line-height:1.7;
}
.detail-empty-emoji{font-size:32px;display:block;margin-bottom:12px;}
.detail-section{margin-bottom:18px;}
.detail-label{
  font-size:9px;font-weight:700;color:var(--ink-lo);
  letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px;
}
.detail-value{font-size:13px;line-height:1.6;color:var(--ink);}
.detail-title{font-size:18px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;}
.detail-owner{
  display:inline-block;font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:12px;
  background:var(--brand-soft);color:var(--brand);
  margin-right:6px;
}
.detail-sla{
  display:inline-block;font-size:11px;color:var(--ink-mid);
  padding:3px 10px;border-radius:12px;background:var(--paper-soft);
}
.detail-stale{
  display:inline-block;font-size:11px;color:var(--warn);font-weight:700;
  padding:3px 10px;border-radius:12px;background:#f59e0b14;
  margin-left:6px;
}
.detail-desc{
  font-size:13px;color:var(--ink-mid);line-height:1.7;
  background:var(--paper-soft);padding:12px 14px;border-radius:10px;
}
.detail-action{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;background:var(--paper-soft);border-radius:10px;
  font-size:12px;cursor:pointer;
  transition:background .15s var(--ease);
  text-decoration:none;color:var(--ink);
  margin-bottom:6px;
}
.detail-action:hover{background:var(--line);}
.detail-action-icon{font-size:14px;}
.detail-action-arrow{margin-left:auto;color:var(--ink-lo);}

.optimize-box{
  margin-top:auto;padding-top:18px;border-top:1px solid var(--line);
}
.optimize-textarea{
  width:100%;background:var(--paper-soft);border:1px solid var(--line);
  border-radius:8px;padding:10px;font-size:12px;
  font-family:inherit;color:var(--ink);resize:vertical;
  min-height:60px;outline:none;
}
.optimize-textarea:focus{border-color:var(--brand);background:#fff;}
.optimize-btn{
  width:100%;background:var(--brand);color:#fff;
  border:none;border-radius:8px;padding:9px;
  font-size:12px;font-weight:700;cursor:pointer;
  margin-top:8px;font-family:inherit;
  transition:opacity .2s var(--ease);
}
.optimize-btn:hover{opacity:.85;}

.notes-list{margin-top:12px;}
.note-item{
  background:var(--paper-soft);border-radius:8px;
  padding:8px 10px;margin-bottom:6px;font-size:11px;
  color:var(--ink-mid);line-height:1.6;position:relative;
}
.note-meta{font-size:9px;color:var(--ink-lo);margin-bottom:3px;letter-spacing:.04em;}
.note-del{
  position:absolute;top:6px;right:8px;background:none;border:none;
  color:var(--ink-faint);font-size:11px;cursor:pointer;
}
.note-del:hover{color:var(--danger);}

/* Card-based workflow map */
.wf-viewport{
  position:relative;overflow:hidden;
  background:#fff;
  background-image:radial-gradient(circle, rgba(0,0,0,.06) 1px, transparent 1px);
  background-size:20px 20px;
  border:1px solid var(--line);border-radius:14px;
  height:calc(100vh - 180px);
  cursor:grab;
  margin:12px;
}
.wf-viewport.panning{cursor:grabbing;}
body.wf-connecting .wf-viewport{cursor:crosshair;}
body.wf-connecting .wf-card{cursor:crosshair !important;}
body.wf-connecting .wf-card[data-id]:hover{outline:2px solid var(--brand);outline-offset:2px;}
.wf-canvas-host{
  position:relative;
  /* 拿掉自己白底+邊框 → zoom 只縮卡片+箭頭，白板本身不縮 */
  transform-origin:0 0;
}
.wf-arrows{
  position:absolute;top:0;left:0;
  pointer-events:none;
}
.wf-card{
  position:absolute;width:172px;background:#fff;
  border:1.5px solid var(--ink-faint);border-radius:10px;
  padding:10px 12px;font-size:11px;cursor:grab;
  transition:border-color .2s var(--ease), box-shadow .2s var(--ease), width .2s var(--ease);
}
.wf-card:hover{border-color:var(--brand);}
.wf-card.selected{
  border-color:var(--brand);background:var(--brand-soft);
  z-index:50;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.wf-card.dragging{
  box-shadow:0 12px 32px rgba(0,0,0,.15);border-color:var(--brand);
  z-index:100;cursor:grabbing;
}
/* 全景卡：只讀視覺，淡藍底提示「衍生視圖」 */
.wf-card.wf-overview{background:#f8fafc;}
.wf-card.wf-overview.selected{background:#eff6ff;border-color:#3b82f6;}
.wf-card.wf-overview .wf-title,
.wf-card.wf-overview .wf-owner,
.wf-card.wf-overview .wf-sla [contenteditable],
.wf-card.wf-overview .wf-card-desc{
  cursor:inherit !important;background:transparent !important;
}
.wf-card .wf-title{
  font-size:13px;font-weight:800;letter-spacing:-.01em;color:var(--ink);
  outline:none;line-height:1.3;margin-bottom:4px;cursor:inherit;
}
.wf-card .wf-owner{font-size:10px;font-weight:700;color:var(--brand);outline:none;cursor:inherit;}
.wf-card .wf-sla{font-size:10px;color:var(--ink-lo);margin-top:1px;cursor:inherit;}
.wf-card .wf-sla [contenteditable]{outline:none;cursor:inherit;}
/* 展開後才能編輯 */
.wf-card.selected .wf-title,
.wf-card.selected .wf-owner,
.wf-card.selected .wf-sla [contenteditable]{cursor:text;}
.wf-card.selected [contenteditable="true"]:focus{background:#fff8f3;border-radius:4px;outline:1px solid var(--brand);outline-offset:1px;}
.wf-card .wf-action-icon{
  position:absolute;top:6px;left:10px;font-size:11px;
  color:var(--brand);font-weight:700;pointer-events:none;
}
.wf-card .wf-note-icon{
  position:absolute;top:6px;left:28px;font-size:12px;pointer-events:none;
}
.wf-card-close{
  position:absolute;top:4px;right:4px;
  background:#fff;border:1px solid var(--ink-faint);border-radius:50%;
  width:20px;height:20px;padding:0;font-size:10px;color:var(--ink-mid);
  cursor:pointer;font-family:inherit;
  display:none;line-height:1;
  z-index:51;
}
.wf-card.selected .wf-card-close{display:flex;align-items:center;justify-content:center;}
.wf-card-close:hover{border-color:var(--danger);color:var(--danger);background:#fff;}

/* 刪除卡片按鈕（hover 才出現，紅色警示）*/
.wf-card-del{
  position:absolute;bottom:6px;left:6px;
  background:#fff;border:1px solid #fca5a5;border-radius:6px;
  width:22px;height:22px;padding:0;font-size:11px;color:var(--danger);
  cursor:pointer;font-family:inherit;
  display:none;line-height:1;align-items:center;justify-content:center;
  z-index:52;
}
.wf-card:hover .wf-card-del,
.wf-card.selected .wf-card-del{display:flex;}
.wf-card.wf-overview .wf-card-del{display:none !important;}  /* 全景圖不可刪 */
.wf-card-del:hover{background:var(--danger);color:#fff;border-color:var(--danger);transform:scale(1.1);}

/* 連線按鈕（hover 才出現，藍色）*/
.wf-card-connect{
  position:absolute;bottom:6px;left:34px;
  background:#fff;border:1px solid #93c5fd;border-radius:6px;
  width:22px;height:22px;padding:0;font-size:11px;color:#3b82f6;
  cursor:pointer;font-family:inherit;
  display:none;line-height:1;align-items:center;justify-content:center;
  z-index:52;
}
.wf-card:hover .wf-card-connect,
.wf-card.selected .wf-card-connect{display:flex;}
.wf-card.wf-overview .wf-card-connect{display:none !important;}
.wf-card-connect:hover{background:#3b82f6;color:#fff;border-color:#3b82f6;transform:scale(1.1);}

/* 箭頭刪除按鈕（label 旁，hover 才出現）*/
.wf-edge-label-wrap{position:absolute;display:flex;align-items:center;gap:2px;transform:translate(-50%,-50%);}
.wf-edge-del{
  background:#fff;border:1px solid #fca5a5;border-radius:50%;
  width:14px;height:14px;font-size:9px;line-height:1;
  color:var(--danger);cursor:pointer;
  display:none;align-items:center;justify-content:center;
  padding:0;font-family:inherit;
}
.wf-edge-label-wrap:hover .wf-edge-del{display:flex;}
.wf-edge-del:hover{background:var(--danger);color:#fff;}

/* toolbar 新卡片按鈕 */
.wf-toolbar .wf-add-card{
  background:var(--brand);color:#fff;border-color:var(--brand);
  font-weight:700;
}
.wf-toolbar .wf-add-card:hover{background:#cc5420;border-color:#cc5420;color:#fff;}
.wf-toolbar .wf-reset{
  background:#fff;border-color:#fca5a5;color:var(--danger);
}
.wf-toolbar .wf-reset:hover{background:#fef2f2;border-color:var(--danger);color:var(--danger);}

/* Zoom controls */
.wf-zoom-group{display:inline-flex;align-items:center;gap:2px;border:1px solid var(--line);border-radius:6px;background:#fff;}
.wf-zoom-group button{
  background:transparent;border:none;border-radius:0;padding:4px 8px;
  font-size:13px;color:var(--ink-mid);cursor:pointer;
}
.wf-zoom-group button:hover{background:var(--paper-soft);color:var(--brand);}
.wf-zoom-group span{font-size:10px;color:var(--ink-mid);padding:0 6px;min-width:36px;text-align:center;font-weight:700;}

/* 展開區（selected 時顯示） */
.wf-card-details{display:none;}
.wf-card.selected .wf-card-details{
  display:block;margin-top:10px;padding-top:10px;
  border-top:1px solid var(--line);
}
.wf-card-label{
  font-size:9px;font-weight:700;color:var(--ink-lo);
  letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px;
}
.wf-card-desc{
  font-size:11px;color:var(--ink-mid);line-height:1.6;
  background:#fff;border-radius:6px;padding:8px 9px;
  outline:none;cursor:text;
  border:1px solid var(--line);min-height:36px;
}
.wf-card-desc:focus{background:#fff8f3;border-color:var(--brand);}
.wf-card-action{
  display:flex;align-items:center;gap:6px;
  margin-top:8px;padding:7px 9px;background:#fff;border:1px solid var(--line);
  border-radius:6px;font-size:11px;color:var(--ink);
  text-decoration:none;cursor:pointer;
}
.wf-card-action:hover{border-color:var(--brand);color:var(--brand);}
.wf-card-action-arrow{margin-left:auto;color:var(--ink-lo);}
.wf-card-opt{margin-top:10px;}
.wf-card-opt textarea{
  width:100%;background:#fff;border:1px solid var(--line);
  border-radius:6px;padding:6px 8px;font-size:11px;
  font-family:inherit;color:var(--ink);resize:vertical;
  min-height:42px;outline:none;
}
.wf-card-opt textarea:focus{border-color:var(--brand);}
.wf-card-opt-btn{
  width:100%;background:var(--brand);color:#fff;
  border:none;border-radius:6px;padding:6px;
  font-size:11px;font-weight:700;cursor:pointer;
  margin-top:5px;font-family:inherit;
}
.wf-card-opt-btn:hover{opacity:.85;}
.wf-card-notes{margin-top:8px;}
.wf-card-note{
  background:#fff;border:1px solid var(--line);border-radius:6px;
  padding:6px 8px;margin-bottom:4px;font-size:10px;
  color:var(--ink-mid);line-height:1.55;position:relative;
}
.wf-card-note .meta{font-size:9px;color:var(--ink-lo);margin-bottom:2px;}
.wf-card-note .del{
  position:absolute;top:4px;right:6px;background:none;border:none;
  color:var(--ink-faint);font-size:10px;cursor:pointer;
}
.wf-card-note .del:hover{color:var(--danger);}

.wf-edge-label{
  position:absolute;background:#fff;
  border:1px solid var(--line);border-radius:6px;
  padding:1px 6px;font-size:10px;color:var(--ink-mid);
  cursor:text;outline:none;white-space:nowrap;
  transform:translate(-50%, -50%);
  transition:opacity .15s, border-color .15s;
}
.wf-edge-label.alt{color:var(--danger);border-color:#fca5a5;background:#fef2f2;}
.wf-edge-label.empty{
  opacity:.85;font-size:14px;line-height:1;padding:3px 9px;
  background:var(--brand-soft);color:var(--brand);
  border-color:var(--brand);font-weight:800;cursor:pointer;
}
.wf-edge-label.empty:hover{opacity:1;background:#fff;}
.wf-edge-label:focus{border-color:var(--brand);opacity:1;background:#fff;}

.wf-toolbar{
  display:flex;gap:8px;align-items:center;
  padding:8px 20px;background:var(--paper-soft);
  border-bottom:1px solid var(--line);font-size:11px;color:var(--ink-mid);
}
.wf-toolbar button{
  background:#fff;border:1px solid var(--line);border-radius:6px;
  padding:4px 10px;font-size:11px;color:var(--ink-mid);
  cursor:pointer;font-family:inherit;
  transition:border-color .15s;
}
.wf-toolbar button:hover{border-color:var(--brand);color:var(--brand);}

/* 確認狀態系統 */
.wf-progress{
  display:inline-flex;gap:10px;align-items:center;
  padding:3px 12px;background:#fff;border:1px solid var(--line);
  border-radius:14px;font-size:11px;
}
.wf-progress span{font-weight:700;}
.wf-progress .ok{color:#22c55e;}
.wf-progress .fix{color:#ef4444;}
.wf-progress .pending{color:var(--ink-lo);}
.wf-progress-bar{
  width:80px;height:6px;background:var(--paper-soft);
  border-radius:3px;overflow:hidden;display:inline-block;
}
.wf-progress-bar .fill-ok{height:100%;background:#22c55e;float:left;}
.wf-progress-bar .fill-fix{height:100%;background:#ef4444;float:left;}

.wf-status{
  position:absolute;bottom:5px;right:5px;
  display:flex;gap:3px;
}
.wf-status-chip{
  font-size:9px;padding:2px 7px;border-radius:8px;line-height:1.2;
  border:1px solid var(--line);background:#fff;color:var(--ink-lo);
  cursor:pointer;user-select:none;font-weight:600;
  transition:all .15s var(--ease);
}
.wf-status-chip:hover{transform:scale(1.05);}
.wf-status-chip.active.ok{background:#dcfce7;color:#22c55e;border-color:#22c55e;}
.wf-status-chip.active.fix{background:#fef2f2;color:#ef4444;border-color:#ef4444;}
.wf-card.status-ok{border-color:#22c55e;background:#f0fdf4;}
.wf-card.status-fix{border-color:#ef4444;background:#fef2f2;}

/* 全景圖卡片完成率 badge */
.wf-overview-badge{
  position:absolute;top:6px;right:30px;
  font-size:10px;font-weight:700;
  padding:1px 7px;border-radius:8px;
  background:var(--paper-soft);color:var(--ink-mid);
}
.wf-overview-badge.done{background:#dcfce7;color:#22c55e;}
.wf-overview-badge.partial{background:#fff4ef;color:var(--brand);}
.wf-overview-badge.fix{background:#fef2f2;color:#ef4444;}

/* 待議清單 modal */
.wf-todo-modal{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;
}
.wf-todo-modal-inner{
  background:#fff;border-radius:14px;max-width:720px;width:100%;
  max-height:80vh;overflow-y:auto;padding:24px;
}
.wf-todo-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border:1px solid var(--line);border-radius:8px;margin-bottom:6px;
  cursor:pointer;font-size:12px;
}
.wf-todo-item:hover{border-color:var(--brand);background:var(--paper-soft);}
.wf-todo-item .flow-name{font-size:10px;color:var(--ink-lo);font-weight:700;width:120px;}
.wf-todo-item .card-name{flex:1;font-weight:700;}
.wf-todo-item .owner-tag{font-size:10px;color:var(--brand);}

.empty-flow{
  text-align:center;color:var(--ink-lo);font-size:13px;
  padding:60px 20px;line-height:1.8;
}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="tb-back" onclick="location.href='erp-lobby.html'">← 大廳</button>
    <span class="tb-title">🗺 工作流地圖</span>
    <span class="tb-sub">全公司業務流程 · 點節點看細節 · 標記要優化的環節</span>
  </div>
  <div class="tb-right">
    <span style="font-size:10px;color:var(--ink-lo);" id="optimize-count-display">0 個優化建議</span>
  </div>
</div>

<div class="main">
  <div class="canvas-wrap">
    <div class="flow-tabs" id="flow-tabs"></div>
    <div id="canvas-area"></div>
  </div>
</div>

<script>
// ── Session check ──
const _sess = JSON.parse(localStorage.getItem('erp_sess')||'null');
if(!_sess || Date.now()-_sess.ts > 7*86400000){ location.href='login.html'; }
const user = _sess ? _sess.user : '';
const name = _sess ? _sess.name : '';
// 工作流地圖管理層才看（Ray / Shawn / 安然）
if(_sess && !['ray','shawn','anran'].includes(user)){
  location.href = 'erp-lobby.html';
}

// ── 工作流 data ──
// 每節點 {id, title, owner, sla, x, y, desc, action?, stale?, comment?}
//   action 'flow:KEY' = 跳對應流程 tab；其他 = 跳 lobby modal
// 每邊 {from, to, label?, alt?(退回流程用 dashed red)}
const WORKFLOWS = {
  overview: {

// ── State ──
let currentFlow = 'overview';   // 預設打開全景圖
let selectedNodeId = null;

// ── Render flow tabs ──
function renderTabs(){
  const tabs = document.getElementById('flow-tabs');
  tabs.innerHTML = Object.entries(WORKFLOWS).map(([key, flow]) =>
    `<button class="flow-tab ${key===currentFlow?'active':''}" onclick="switchFlow('${key}')">${flow.title}</button>`
  ).join('');
}

function switchFlow(key){
  currentFlow = key;
  selectedNodeId = null;
  renderTabs();
  renderCanvas();
  updateUndoBtn();
}

// ── 編輯狀態 localStorage（每個流程獨立） ──
const NW = 172, NH = 92;
// ── 雲端 state (飛書「工作流地圖狀態」表，跨人 sync) ──
const WORKER_BASE_WF = 'https://feishu-proxy.raychou6913.workers.dev';
window._wfState = {};
window._wfLoaded = false;
async function loadWorkflowStateCloud(){
  try {
    const r = await fetch(`${WORKER_BASE_WF}/erp/workflow-state/all`);
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    window._wfState = d.states || {};
    window._wfLoaded = true;
    console.log('[wf-state] loaded', Object.keys(window._wfState).length, 'keys');
  } catch(e) { console.warn('[wf-state] load fail:', e); }
}
function _wfGet(key){
  const entry = window._wfState[key];
  if (!entry) return null;
  try { return JSON.parse(entry.value); } catch(e) { return null; }
}

// ── 儲存狀態指示器（toolbar 右上 #wf-save-status） ──
let _saveStatusFadeTimer;
let _pendingSaveCount = 0;
function setSaveStatus(state){
  const el = document.getElementById('wf-save-status');
  if (!el) return;
  el.style.opacity = '1';
  clearTimeout(_saveStatusFadeTimer);
  if (state === 'saving') {
    el.innerHTML = '<span style="color:#f59e0b;">⋯ 儲存中…</span>';
  } else if (state === 'saved') {
    const time = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
    el.innerHTML = `<span style="color:#22c55e;">✓ 已儲存 ${time}</span>`;
    _saveStatusFadeTimer = setTimeout(() => { el.style.opacity = '.4'; }, 4000);
  } else if (state === 'error') {
    el.innerHTML = '<span style="color:#ef4444;">✗ 儲存失敗（網路？）</span>';
  }
}

function _wfSet(key, value){
  // 立刻 cache（UI 立即 reflect）
  const json = typeof value === 'string' ? value : JSON.stringify(value);
  window._wfState[key] = { value: json, edited_by: name || user, edited_at: Date.now() };
  // 顯示「儲存中」
  _pendingSaveCount++;
  setSaveStatus('saving');
  // 背景 POST 飛書
  return fetch(`${WORKER_BASE_WF}/erp/workflow-state`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ key, value: json, actor: name || user })
  }).then(r => r.json()).then(d => {
    _pendingSaveCount--;
    if (d.ok) {
      if (_pendingSaveCount === 0) setSaveStatus('saved');
    } else {
      setSaveStatus('error');
      console.warn('[wf-state] save fail:', d);
    }
  }).catch(e => {
    _pendingSaveCount--;
    setSaveStatus('error');
    console.warn('[wf-state] save fail:', e);
  });
}
function getFlowOverrides(flowKey){
  return _wfGet('edits_'+flowKey+'_v1') || {};
}
function saveFlowOverrides(flowKey, edits){
  pushUndoIfNeeded(flowKey);
  _wfSet('edits_'+flowKey+'_v1', edits);
}

// ── Undo 系統（每流程獨立 stack）──
const _undoStack = {};
const _undoLimit = 30;
let _undoSuppress = false;
function pushUndoIfNeeded(flowKey){
  if(_undoSuppress) return;
  const cur = _wfGet('edits_'+flowKey+'_v1') || {};
  const json = JSON.stringify(cur);
  const stk = (_undoStack[flowKey] = _undoStack[flowKey] || []);
  if(stk.length && stk[stk.length-1] === json) return; // dedup
  stk.push(json);
  if(stk.length > _undoLimit) stk.shift();
  updateUndoBtn();
}
function undoCurrentFlow(){
  const stk = _undoStack[currentFlow] || [];
  if(stk.length === 0){ showStatusMsg('沒有可還原的動作'); return; }
  const prev = stk.pop();
  _undoSuppress = true;
  _wfSet('edits_'+currentFlow+'_v1', JSON.parse(prev));
  _undoSuppress = false;
  renderCanvas();
  updateUndoBtn();
  showStatusMsg('↶ 已還原上一步');
}
function updateUndoBtn(){
  const btn = document.getElementById('wf-undo-btn');
  if(!btn) return;
  const cnt = (_undoStack[currentFlow] || []).length;
  btn.disabled = cnt === 0;
  btn.textContent = cnt > 0 ? `↶ 還原（${cnt}）` : '↶ 還原';
}
// Cmd/Ctrl+Z 快捷鍵（focus 在 contenteditable / input / textarea 時走 native undo）
document.addEventListener('keydown', e => {
  if((e.metaKey || e.ctrlKey) && (e.key === 'z' || e.key === 'Z') && !e.shiftKey){
    if(document.activeElement && document.activeElement.matches('[contenteditable="true"], input, textarea')) return;
    e.preventDefault();
    undoCurrentFlow();
  }
});
function getMergedFlow(flowKey){
  const f = WORKFLOWS[flowKey];
  if(!f) return null;
  const o = getFlowOverrides(flowKey);
  const deletedIds = new Set(o.deleted_node_ids || []);
  const deletedEdgeKeys = new Set(o.deleted_edge_ids || []);
  // 過濾刪除 + apply patches
  const baseNodes = f.nodes
    .filter(n => !deletedIds.has(n.id))
    .map(n => Object.assign({}, n, (o.nodes||{})[n.id] || {}));
  // 加上 user 新增的卡（id 以 u_ 開頭）— 也要 apply 編輯 patches (title/owner/sla/desc/x/y)
  const addedNodes = (o.add_nodes || [])
    .filter(n => !deletedIds.has(n.id))
    .map(n => Object.assign({}, n, (o.nodes||{})[n.id] || {}));
  const nodes = [...baseNodes, ...addedNodes];
  const nodeIds = new Set(nodes.map(n => n.id));
  // edges：過濾掉 dangling（指向已刪卡的）+ 已刪 edge + apply label patches
  const baseEdges = f.edges
    .filter(e => nodeIds.has(e.from) && nodeIds.has(e.to))
    .filter(e => !deletedEdgeKeys.has(e.from + '|' + e.to))
    .map(e => {
      const k = e.from + '|' + e.to;
      return Object.assign({}, e, (o.edges||{})[k] || {});
    });
  // user 新增的 edges（add_edges array）
  const userEdges = (o.add_edges || [])
    .filter(e => nodeIds.has(e.from) && nodeIds.has(e.to))
    .filter(e => !deletedEdgeKeys.has(e.from + '|' + e.to))
    .map(e => {
      const k = e.from + '|' + e.to;
      return Object.assign({}, e, (o.edges||{})[k] || {}, { _user_added: true });
    });
  const edges = [...baseEdges, ...userEdges];
  return Object.assign({}, f, {nodes, edges});
}

// ── 新增 / 刪除箭頭 ──
function addEdge(fromId, toId){
  if (fromId === toId) { showStatusMsg('不能連到自己'); return; }
  const o = getFlowOverrides(currentFlow);
  o.add_edges = o.add_edges || [];
  // 檢查重複
  const existsSet = new Set([
    ...(WORKFLOWS[currentFlow].edges||[]).map(e => e.from+'|'+e.to),
    ...(o.add_edges||[]).map(e => e.from+'|'+e.to),
  ]);
  if (existsSet.has(fromId+'|'+toId)) { showStatusMsg('這條連線已存在'); return; }
  // 如果刪過反向 edge 也清掉 dual-delete
  o.deleted_edge_ids = (o.deleted_edge_ids || []).filter(k => k !== fromId+'|'+toId);
  o.add_edges.push({from: fromId, to: toId});
  saveFlowOverrides(currentFlow, o);
  renderCanvas();
}
function deleteEdge(fromId, toId){
  if (!confirm('刪除這條箭頭？')) return;
  const o = getFlowOverrides(currentFlow);
  // user 加的 → 從 add_edges 移除
  if ((o.add_edges||[]).find(e => e.from === fromId && e.to === toId)) {
    o.add_edges = o.add_edges.filter(e => !(e.from === fromId && e.to === toId));
  } else {
    // 原始 → 加 deleted_edge_ids
    o.deleted_edge_ids = o.deleted_edge_ids || [];
    if (!o.deleted_edge_ids.includes(fromId+'|'+toId)) o.deleted_edge_ids.push(fromId+'|'+toId);
  }
  saveFlowOverrides(currentFlow, o);
  renderCanvas();
}

// ── Pan / Zoom 視圖控制 ──
window._view = { x: 0, y: 0, scale: 1 };
function applyView(){
  const host = document.getElementById('wf-host');
  if (host) host.style.transform = `translate(${_view.x}px, ${_view.y}px) scale(${_view.scale})`;
  const lbl = document.getElementById('wf-zoom-label');
  if (lbl) lbl.textContent = Math.round(_view.scale*100) + '%';
}
function zoomBy(delta, originX, originY){
  const old = _view.scale;
  const ns = Math.max(0.3, Math.min(2.5, +(old + delta).toFixed(2)));
  if (ns === old) return;
  _view.x = originX - (originX - _view.x) * ns / old;
  _view.y = originY - (originY - _view.y) * ns / old;
  _view.scale = ns;
  applyView();
}
function zoomFromCenter(delta){
  const vp = document.getElementById('wf-viewport');
  if (!vp) return;
  const rect = vp.getBoundingClientRect();
  zoomBy(delta, rect.width/2, rect.height/2);
}
function resetView(){
  _view = { x: 0, y: 0, scale: 1 };
  applyView();
}
function patchNode(flowKey, nodeId, patch){

}
function patchEdge(flowKey, fromId, toId, patch){

  o.edges = o.edges || {};
  o.edges[fromId+'|'+toId] = Object.assign({}, o.edges[fromId+'|'+toId]||{}, patch);

}
// 自動排版：按主流 edges 拓樸排序 → grid 4 卡/行
// 保留所有 title / owner / desc / 邊註，只動 x / y
function autoLayoutCurrentFlow(){
  if (currentFlow === 'overview') { showStatusMsg('全景圖不自動排'); return; }
  if (!confirm('自動排版會重新排列「本流程」所有卡片位置（按順序 grid 4 卡/行）。\n\n你之前的內容 / 邊註 / 連線都不會動，只動位置。\n\n（如果效果不喜歡，可以按 ↶ 還原或 Cmd+Z 回上一步）\n\n確定要排嗎？')) return;
  const flow = getMergedFlow(currentFlow);
  if (!flow) return;
  const mainEdges = (flow.edges||[]).filter(e => !e.alt);
  // BFS 拓樸層級
  const inDeg = {}, adj = {};
  flow.nodes.forEach(n => { inDeg[n.id] = 0; adj[n.id] = []; });
  mainEdges.forEach(e => {
    if (inDeg[e.to] !== undefined) inDeg[e.to]++;
    if (adj[e.from]) adj[e.from].push(e.to);
  });
  const seen = new Set();
  const ordered = [];
  let frontier = flow.nodes.filter(n => inDeg[n.id] === 0).map(n => n.id);
  while (frontier.length) {
    const next = [];
    frontier.forEach(id => {
      if (seen.has(id)) return;
      seen.add(id);
      ordered.push(id);
      (adj[id]||[]).forEach(to => { if (!seen.has(to)) next.push(to); });
    });
    frontier = [...new Set(next)].filter(id => !seen.has(id));
  }
  // 補上孤立 / 循環卡（譬如純被 alt edge 連的變量卡）
  flow.nodes.forEach(n => { if (!seen.has(n.id)) ordered.push(n.id); });
  const xGap = 30, yGap = 50;
  const margin = 30;
  const maxCol = 4;
  const cellW = NW + xGap;
  const cellH = NH + yGap;
  const newPos = {};
  ordered.forEach((id, idx) => {
    const row = Math.floor(idx / maxCol);
    const col = idx % maxCol;
    newPos[id] = { x: margin + col * cellW, y: margin + row * cellH };
  });
  const o = getFlowOverrides(currentFlow);
  o.nodes = o.nodes || {};
  Object.entries(newPos).forEach(([id, pos]) => {
    o.nodes[id] = Object.assign({}, o.nodes[id]||{}, pos);
  });
  saveFlowOverrides(currentFlow, o);
  renderCanvas();
  showStatusMsg(`✓ 自動排版完成（${ordered.length} 卡片 / ${Math.ceil(ordered.length/maxCol)} 行）— 不滿意可 Cmd+Z 還原`);
}

function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── 可編輯欄位 binding：1.5s debounce auto-save + blur 立刻存 + Enter 立刻 commit ──
function _bindEditable(el, saveFn){
  if (!el) return;
  let timer;
  let lastSaved = el.textContent.trim();
  const trySave = (force) => {
    const v = el.textContent.trim();
    if (v === lastSaved) return;
    lastSaved = v;
    saveFn(v);
  };
  el.addEventListener('input', () => {
    clearTimeout(timer);
    setSaveStatus('saving');
    timer = setTimeout(() => trySave(), 1500); // 打字停 1.5 秒自動存
  });
  el.addEventListener('blur', () => {
    clearTimeout(timer);
    trySave();
  });
  el.addEventListener('keydown', ev => {
    if (ev.key === 'Enter' && !ev.shiftKey) {
      ev.preventDefault();
      clearTimeout(timer);
      trySave();
      el.blur(); // 跳出編輯
    }
  });
}

// ── 確認狀態系統（per flow+node，存 localStorage）──
const STATUS_KEY = 'status_v1';
function loadStatusMap(){ return _wfGet(STATUS_KEY) || {}; }
function saveStatusMap(m){ _wfSet(STATUS_KEY, m); }
function getCardStatus(flow, nodeId){ return loadStatusMap()[flow+':'+nodeId] || 'pending'; }
function setCardStatus(flow, nodeId, status){
  const m = loadStatusMap();
  const k = flow+':'+nodeId;
  if (status === 'pending') delete m[k]; else m[k] = status;
  saveStatusMap(m);
}
function flowProgress(flowKey){
  const flow = WORKFLOWS[flowKey];
  if (!flow) return { ok:0, fix:0, pending:0, total:0 };
  const m = loadStatusMap();
  let ok=0, fix=0, pending=0;
  flow.nodes.forEach(n => {
    const s = m[flowKey+':'+n.id] || 'pending';
    if (s === 'ok') ok++; else if (s === 'fix') fix++; else pending++;
  });
  return { ok, fix, pending, total: flow.nodes.length };
}

// ── 待議清單 modal（跨所有流程的 fix + pending 卡）──
function openTodoListModal(){
  const m = loadStatusMap();
  const items = [];
  Object.entries(WORKFLOWS).forEach(([k, flow]) => {
    if (k === 'overview') return;
    flow.nodes.forEach(n => {
      const s = m[k+':'+n.id] || 'pending';
      if (s !== 'ok') items.push({ flowKey:k, flowTitle:flow.title, node:n, status:s });
    });
  });
  // 優先排 fix → 然後 pending
  items.sort((a,b) => (a.status==='fix'?0:1) - (b.status==='fix'?0:1));
  const fixCount = items.filter(it => it.status === 'fix').length;
  const pendCount = items.filter(it => it.status === 'pending').length;
  const html = `
    <div class="wf-todo-modal" id="wf-todo-modal" onclick="if(event.target===this)this.remove()">

        </div>

  const maxY = Math.max(...flow.nodes.map(n => n.y)) + NH + 40;
  const W = Math.max(maxX, flow.width || 800);
  const H = Math.max(maxY, flow.height || 400) + 70; // +70 for top title

  const isOverview = currentFlow === 'overview';
  // 計算全公司或本流程進度

    Object.keys(WORKFLOWS).forEach(k => {
      if (k === 'overview') return;
      const p = flowProgress(k);
      totalOk += p.ok; totalFix += p.fix; totalAll += p.total;
    });
    const totalPend = totalAll - totalOk - totalFix;
    const pctOk = totalAll ? (totalOk/totalAll*100) : 0;
    const pctFix = totalAll ? (totalFix/totalAll*100) : 0;
    progressBlock = `<span class="wf-progress">
      <span class="ok">✓ ${totalOk}</span>
      <span class="fix">⚠ ${totalFix}</span>

    </span>`;
  } else {
    const p = flowProgress(currentFlow);
    const pctOk = p.total ? (p.ok/p.total*100) : 0;
    const pctFix = p.total ? (p.fix/p.total*100) : 0;
    progressBlock = `<span class="wf-progress">
      <span class="ok">✓ ${p.ok}</span>
      <span class="fix">⚠ ${p.fix}</span>

  host.innerHTML = `

    const card = document.createElement('div');
    card.className = 'wf-card' + (isSelected?' selected':'') + (isOverview?' wf-overview':'') + (cardStatus !== 'pending' ? ' status-'+cardStatus : '');
    card.style.left = n.x + 'px';
    card.style.top  = n.y + 'px';
    card.dataset.id = n.id;
    const ce = (isSelected && !isOverview) ? 'true' : 'false';  // 全景全 read-only
    const statusChipsHtml = isOverview ? '' : `
      <div class="wf-status">
        <span class="wf-status-chip ok ${cardStatus==='ok'?'active':''}" data-status="ok" title="點此標 OK（已確認）">✓</span>
        <span class="wf-status-chip fix ${cardStatus==='fix'?'active':''}" data-status="fix" title="點此標需議">⚠</span>
      </div>`;
    const detailsHtml = `
      <div class="wf-card-details">
        <div class="wf-card-label">細節${isOverview?'（自動同步自源頭流程）':''}</div>
        <div class="wf-card-desc" contenteditable="${ce}" spellcheck="false" data-field="desc">${escapeHtml(displayDesc)}</div>
        ${n.action ? (n.action.startsWith('flow:')
          ? `<button class="wf-card-action" data-jump-flow="${n.action.slice(5)}" style="border:1px solid var(--line);background:#fff;cursor:pointer;width:100%;text-align:left;"><span>🗺</span><span>看「${WORKFLOWS[n.action.slice(5)]?.title || n.action.slice(5)}」細節</span><span class="wf-card-action-arrow">→</span></button>`
          : `<a class="wf-card-action" href="erp-lobby.html#action-${n.action}"><span>⚡</span><span>跳大廳 · 開「${n.action}」</span><span class="wf-card-action-arrow">→</span></a>`)
        : ''}
        ${isOverview ? '' : `
        <div class="wf-card-opt">
          <div class="wf-card-label">💡 優化建議</div>
          <textarea data-opt-input placeholder="這環節要怎麼優化？"></textarea>
          <button class="wf-card-opt-btn" data-opt-btn>記下優化想法</button>
          <div class="wf-card-notes">
            ${nodeNotes.length === 0 ? '<div style="font-size:10px;color:var(--ink-lo);text-align:center;padding:8px;">尚無優化建議</div>' : nodeNotes.map(no => `
              <div class="wf-card-note">
                <button class="del" data-note-ts="${no.ts}">✕</button>
                <div class="meta">${no.by} · ${new Date(no.ts).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
                <div>${escapeHtml(no.text)}</div>
              </div>
            `).join('')}
          </div>
        </div>`}
      </div>`;
    card.innerHTML = `
      ${n.action ? '<span class="wf-action-icon">⚡</span>' : ''}
      ${nodeNotes.length ? '<span class="wf-note-icon">💡</span>' : ''}
      ${overviewBadge}
      <button class="wf-card-close" data-close-btn title="收起">✕</button>
      ${isOverview ? '' : '<button class="wf-card-del" data-del-btn title="刪除此卡片（含相關箭頭）">🗑</button>'}
      ${isOverview ? '' : '<button class="wf-card-connect" data-connect-btn title="連線到別張卡">⟶</button>'}
      <div class="wf-title" contenteditable="${ce}" spellcheck="false">${escapeHtml(displayTitle)}</div>
      <div class="wf-owner" contenteditable="${ce}" spellcheck="false">${escapeHtml(displayOwner)}</div>
      <div class="wf-sla">SLA: <span data-field="sla" contenteditable="${ce}" spellcheck="false">${escapeHtml(displaySla)}</span></div>
      ${detailsHtml}
      ${statusChipsHtml}
    `;
    // 編輯儲存（全部 ce 欄位）— 全景只讀不掛 listener
    if (!isOverview) {
      _bindEditable(card.querySelector('.wf-title'), v => patchNode(currentFlow, n.id, {title: v}));
      _bindEditable(card.querySelector('.wf-owner'), v => patchNode(currentFlow, n.id, {owner: v}));
      _bindEditable(card.querySelector('[data-field="sla"]'), v => patchNode(currentFlow, n.id, {sla: v}));
      const descEl = card.querySelector('[data-field="desc"]');
      if (descEl) _bindEditable(descEl, v => patchNode(currentFlow, n.id, {desc: v}));
    }
    // 優化按鈕
    const optBtn = card.querySelector('[data-opt-btn]');
    if (optBtn) optBtn.addEventListener('click', () => {
      const inp = card.querySelector('[data-opt-input]');
      const text = inp.value.trim();
      if (!text) return;
      const arr = loadNotes();
      arr.push({flow: currentFlow, nodeId: n.id, text, by: name, ts: Date.now()});
      saveNotes(arr);
      renderCanvas();
    });
    // 刪 note
    card.querySelectorAll('[data-note-ts]').forEach(b => {
      b.addEventListener('click', ev => {
        ev.stopPropagation();
        const ts = +b.dataset.noteTs;
        saveNotes(loadNotes().filter(no => no.ts !== ts));
        renderCanvas();
      });
    });
    // 收起按鈕
    const closeBtn = card.querySelector('[data-close-btn]');
    if (closeBtn) closeBtn.addEventListener('click', ev => {
      ev.stopPropagation();
      selectNode(null);
    });
    // 刪除按鈕
    const delBtn = card.querySelector('[data-del-btn]');
    if (delBtn) delBtn.addEventListener('click', ev => {
      ev.stopPropagation();
      deleteCard(n.id);
    });
    // 連線按鈕
    const connBtn = card.querySelector('[data-connect-btn]');
    if (connBtn) connBtn.addEventListener('click', ev => {
      ev.stopPropagation();
      startConnectMode(n.id);
    });
    // 跳對應 flow tab
    const jumpBtn = card.querySelector('[data-jump-flow]');
    if (jumpBtn) jumpBtn.addEventListener('click', ev => {
      ev.stopPropagation();
      switchFlow(jumpBtn.dataset.jumpFlow);
    });
    // 狀態 chip：點切換
    card.querySelectorAll('.wf-status-chip').forEach(chip => {
      chip.addEventListener('click', ev => {
        ev.stopPropagation();
        const target = chip.dataset.status;
        const current = getCardStatus(currentFlow, n.id);
        // 點同狀態 = 清回 pending；點不同 = 切到新狀態
        setCardStatus(currentFlow, n.id, current === target ? 'pending' : target);
        renderCanvas();
      });
    });
    // 卡片 click：非編輯區 + 非互動元素 → 選取/取消
    // 連線模式中：點卡 = 設目標
    card.addEventListener('click', e => {
      if (window._connectFromId) {
        e.stopPropagation();
        addEdge(window._connectFromId, n.id);
        endConnectMode();
        return;
      }
      if (e.target.closest('[contenteditable="true"]')) return;
      if (e.target.closest('textarea, button, a, .wf-status-chip, .wf-card-del, .wf-card-connect')) return;
      selectNode(n.id === selectedNodeId ? null : n.id);
    });
    // 拖拉：整張卡 mousedown 都觸發（除了編輯區 / 互動元素）
    card.addEventListener('mousedown', ev => {
      if (ev.target.closest('[contenteditable="true"]')) return;
      if (ev.target.closest('textarea, button, a, .wf-card-note, .wf-status-chip, .wf-card-del')) return;
      startDrag(card, n.id, ev);
    });
    hostEl.appendChild(card);
  });

  // Edges
  flow.edges.forEach(e => drawEdge(svgEl, hostEl, flow, e));

  // 點空白處（host / canvas-area）→ 收起 selected
  hostEl.addEventListener('click', e => {
    if (e.target === hostEl || e.target.tagName === 'svg' || e.target.tagName === 'SVG') {
      if (selectedNodeId) selectNode(null);
    }
  });

  // 綁 pan/zoom + 套用 view state
  bindPanZoom();
  applyView();
  updateUndoBtn();
}

function drawEdge(svgEl, hostEl, flow, e){
  const fromN = flow.nodes.find(n => n.id === e.from);
  const toN   = flow.nodes.find(n => n.id === e.to);
  if(!fromN || !toN) return;
  const fx = fromN.x + NW/2, fy = fromN.y + NH/2;
  const tx = toN.x + NW/2,   ty = toN.y + NH/2;
  let x1, y1, x2, y2;
  const dx = tx - fx, dy = ty - fy;
  if(Math.abs(dx) > Math.abs(dy)){
    x1 = fx + (dx > 0 ? NW/2 : -NW/2); y1 = fy;
    x2 = tx + (dx > 0 ? -NW/2 : NW/2); y2 = ty;
  } else {
    x1 = fx; y1 = fy + (dy > 0 ? NH/2 : -NH/2);
    x2 = tx; y2 = ty + (dy > 0 ? -NH/2 : NH/2);
  }
  const NS = 'http://www.w3.org/2000/svg';
  const line = document.createElementNS(NS, 'line');
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', x2); line.setAttribute('y2', y2);
  const baseStroke = e.alt ? '#ef4444' : '#ccc';
  line.setAttribute('stroke', baseStroke);
  line.setAttribute('stroke-width', e.alt ? 1 : 1.5);
  if(e.alt) line.setAttribute('stroke-dasharray', '5,3');
  line.setAttribute('marker-end', e.alt ? 'url(#arrow-alt)' : 'url(#arrow)');
  line.setAttribute('fill', 'none');
  line.style.pointerEvents = 'none';
  svgEl.appendChild(line);

  // 隱形 hit line（粗 14px 透明）→ 點線本身就能刪箭頭（全景圖除外）
  if (currentFlow !== 'overview') {
    const hitLine = document.createElementNS(NS, 'line');
    hitLine.setAttribute('x1', x1); hitLine.setAttribute('y1', y1);
    hitLine.setAttribute('x2', x2); hitLine.setAttribute('y2', y2);
    hitLine.setAttribute('stroke', 'transparent');
    hitLine.setAttribute('stroke-width', '14');
    hitLine.setAttribute('fill', 'none');
    hitLine.style.cursor = 'pointer';
    hitLine.style.pointerEvents = 'stroke';
    hitLine.addEventListener('mouseenter', () => {
      line.setAttribute('stroke', '#ff6b35');
      line.setAttribute('stroke-width', e.alt ? 2 : 2.5);
    });
    hitLine.addEventListener('mouseleave', () => {
      line.setAttribute('stroke', baseStroke);
      line.setAttribute('stroke-width', e.alt ? 1 : 1.5);
    });
    hitLine.addEventListener('click', ev => {
      ev.stopPropagation();
      deleteEdge(e.from, e.to);
    });
    svgEl.appendChild(hitLine);
  }

  // Editable label + 刪除箭頭按鈕（wrap container hover 才出現 ✕）
  const mx = (x1+x2)/2, my = (y1+y2)/2;
  const wrap = document.createElement('span');
  wrap.className = 'wf-edge-label-wrap';
  wrap.style.left = mx + 'px';
  wrap.style.top  = my + 'px';
  const labelEl = document.createElement('span');
  const isEmpty = !e.label;
  labelEl.className = 'wf-edge-label' + (e.alt?' alt':'') + (isEmpty?' empty':'');
  labelEl.contentEditable = 'true';
  labelEl.spellcheck = false;
  labelEl.textContent = e.label || '+';
  labelEl.style.transform = 'none';  // 容器已 translate
  labelEl.addEventListener('focus', () => {
    if(labelEl.classList.contains('empty')){
      labelEl.textContent = '';
      labelEl.classList.remove('empty');
    }
  });
  labelEl.addEventListener('blur', () => {
    const v = labelEl.textContent.trim();
    patchEdge(currentFlow, e.from, e.to, {label: v});
    if(!v){
      labelEl.classList.add('empty');
      labelEl.textContent = '+';
    }
  });
  wrap.appendChild(labelEl);
  // 全景圖箭頭不可刪
  if (currentFlow !== 'overview') {
    const delBtn = document.createElement('button');
    delBtn.className = 'wf-edge-del';
    delBtn.textContent = '✕';
    delBtn.title = '刪除這條箭頭';
    delBtn.addEventListener('click', ev => {
      ev.stopPropagation();
      deleteEdge(e.from, e.to);
    });
    wrap.appendChild(delBtn);
  }
  hostEl.appendChild(wrap);
}

// ── 拖拉 state（含 scale 補償）──
let dragState = null;
function startDrag(card, nodeId, ev){
  dragState = {
    card, nodeId,
    startMouseX: ev.clientX, startMouseY: ev.clientY,
    startLeft: parseFloat(card.style.left) || 0,
    startTop: parseFloat(card.style.top) || 0,
    moved: false,
  };
  document.body.style.userSelect = 'none';
}
document.addEventListener('mousemove', ev => {
  if(!dragState) return;
  // 移動超過 4px（scale 補償後）才算真拖拉
  const rawDx = ev.clientX - dragState.startMouseX;
  const rawDy = ev.clientY - dragState.startMouseY;
  if (!dragState.moved) {
    if (Math.abs(rawDx) < 4 && Math.abs(rawDy) < 4) return;
    dragState.moved = true;
    dragState.card.classList.add('dragging');
  }
  // 鼠標移動量 / scale → host 內邏輯座標的移動量
  const dx = rawDx / _view.scale;
  const dy = rawDy / _view.scale;
  dragState.card.style.left = Math.max(0, dragState.startLeft + dx) + 'px';
  dragState.card.style.top  = Math.max(0, dragState.startTop + dy) + 'px';
});
document.addEventListener('mouseup', () => {
  if(!dragState) return;
  const wasMoved = dragState.moved;
  if (wasMoved){
    const x = parseFloat(dragState.card.style.left) || 0;
    const y = parseFloat(dragState.card.style.top) || 0;
    patchNode(currentFlow, dragState.nodeId, {x, y});
    dragState.card.classList.remove('dragging');
  }
  document.body.style.userSelect = '';
  dragState = null;
  if (wasMoved) renderCanvas();
});

// ── Pan / Zoom 綁定（每次 renderCanvas 後重新綁）──
let _panState = null;
function bindPanZoom(){
  const vp = document.getElementById('wf-viewport');
  if (!vp) return;
  // wheel zoom (Ctrl/Meta + wheel)
  vp.addEventListener('wheel', ev => {
    if (!ev.ctrlKey && !ev.metaKey) return;
    ev.preventDefault();
    const rect = vp.getBoundingClientRect();
    zoomBy(-ev.deltaY * 0.0015, ev.clientX - rect.left, ev.clientY - rect.top);
  }, { passive: false });
  // drag-pan：點 viewport 背景（非 card / button / edge label）
  vp.addEventListener('mousedown', ev => {
    if (window._connectFromId) return;
    if (ev.target.closest('.wf-card, .wf-edge-label, .wf-toolbar, .wf-edge-label-wrap, button')) return;
    if (ev.button !== 0 && ev.button !== 1) return;
    _panState = { sx: ev.clientX, sy: ev.clientY, ox: _view.x, oy: _view.y };
    vp.classList.add('panning');
    ev.preventDefault();
  });
  // 點 viewport 空白處 → cancel connect mode
  vp.addEventListener('click', ev => {
    if (window._connectFromId && !ev.target.closest('.wf-card')) {
      endConnectMode();
    }
  });
}
document.addEventListener('mousemove', ev => {
  if (!_panState) return;
  _view.x = _panState.ox + (ev.clientX - _panState.sx);
  _view.y = _panState.oy + (ev.clientY - _panState.sy);
  applyView();
});
document.addEventListener('mouseup', () => {
  if (_panState) {
    _panState = null;
    const vp = document.getElementById('wf-viewport');
    if (vp) vp.classList.remove('panning');
  }
});

// ── Select node ──
function selectNode(id){
  selectedNodeId = id;
  renderCanvas();
}

// ── Notes management ──
function loadNotes(){ return _wfGet('notes_v1') || []; }
function saveNotes(arr){
  _wfSet('notes_v1', arr);
  updateOptCount();
}
function updateOptCount(){
  const cnt = loadNotes().length;
  const el = document.getElementById('optimize-count-display');
  if(el) el.textContent = `${cnt} 個優化建議`;
}

// ── Init（先載雲端 state 再 render）──
(async () => {
  await loadWorkflowStateCloud();
  renderTabs();
  renderCanvas();
  updateOptCount();
  // 每 30 秒重新拉雲端 state（Shawn 改 Ray 半分鐘內看得到）
  setInterval(async () => {
    await loadWorkflowStateCloud();
    renderCanvas();
    updateOptCount();
  }, 30000);
})();
</script>
