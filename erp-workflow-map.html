<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解 ERP · 工作流地圖</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --paper:#fafaf8;
  --paper-soft:#f2f2ef;
  --line:#e8e8e3;
  --ink:#0a0a0a;
  --ink-mid:#666;
  --ink-lo:#999;
  --ink-faint:#ccc;
  --brand:#ff6b35;
  --brand-soft:#fff4ef;
  --ease:cubic-bezier(0.32,0.72,0,1);
  --ok:#22c55e;
  --warn:#f59e0b;
  --danger:#ef4444;
  --info:#0891b2;
}
body{
  background:var(--paper);color:var(--ink);
  font-family:"Inter","Helvetica Neue","PingFang TC","Noto Sans TC",-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  letter-spacing:-.003em;
  min-height:100vh;
}
.topbar{
  background:var(--paper);border-bottom:1px solid var(--line);
  padding:0 28px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.tb-back{
  background:none;border:1px solid var(--line);border-radius:8px;
  padding:6px 14px;font-size:12px;color:var(--ink-mid);
  cursor:pointer;font-family:inherit;
  transition:border-color .2s var(--ease);
}
.tb-back:hover{border-color:var(--ink-faint);}
.tb-title{font-size:15px;font-weight:800;letter-spacing:-.01em;}
.tb-sub{font-size:10px;color:var(--ink-lo);margin-left:6px;letter-spacing:.06em;}
.tb-right{display:flex;align-items:center;gap:12px;}

.main{display:flex;height:calc(100vh - 56px);}
.canvas-wrap{
  flex:1;background:var(--paper-soft);position:relative;overflow:auto;
}
.flow-tabs{
  position:sticky;top:0;background:var(--paper);
  border-bottom:1px solid var(--line);
  padding:10px 20px;display:flex;gap:6px;flex-wrap:wrap;
  z-index:10;
}
.flow-tab{
  background:transparent;border:1px solid var(--line);border-radius:18px;
  padding:6px 14px;font-size:11px;font-weight:600;
  color:var(--ink-mid);cursor:pointer;font-family:inherit;
  transition:all .2s var(--ease);white-space:nowrap;
}
.flow-tab:hover{border-color:var(--ink-faint);color:var(--ink);}
.flow-tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}

#canvas{
  display:block;margin:24px auto;background:#fff;
  border:1px solid var(--line);border-radius:14px;
}

.detail-panel{
  width:340px;background:#fff;border-left:1px solid var(--line);
  padding:24px 22px;overflow-y:auto;
  display:flex;flex-direction:column;
  position:relative;transition:width .25s var(--ease);
}
.detail-panel.collapsed{width:36px;padding:24px 4px;overflow:hidden;}
.detail-panel.collapsed .detail-content{display:none;}
.panel-toggle{
  position:absolute;top:14px;left:8px;
  background:var(--paper-soft);border:1px solid var(--line);
  border-radius:6px;width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:11px;color:var(--ink-mid);
  transition:background .15s var(--ease);
  z-index:2;
}
.panel-toggle:hover{background:var(--line);}
.detail-panel.collapsed .panel-toggle{left:6px;}
.detail-panel.collapsed .panel-toggle-icon::before{content:'◀';}
.panel-toggle-icon::before{content:'▶';}
/* drag handle for free resize */
.panel-resize{
  position:absolute;top:0;left:-3px;width:6px;height:100%;
  cursor:col-resize;z-index:3;
}
.detail-panel.collapsed .panel-resize{display:none;}
.detail-empty{
  color:var(--ink-lo);font-size:13px;text-align:center;
  margin-top:80px;line-height:1.7;
}
.detail-empty-emoji{font-size:32px;display:block;margin-bottom:12px;}
.detail-section{margin-bottom:18px;}
.detail-label{
  font-size:9px;font-weight:700;color:var(--ink-lo);
  letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px;
}
.detail-value{font-size:13px;line-height:1.6;color:var(--ink);}
.detail-title{font-size:18px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;}
.detail-owner{
  display:inline-block;font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:12px;
  background:var(--brand-soft);color:var(--brand);
  margin-right:6px;
}
.detail-sla{
  display:inline-block;font-size:11px;color:var(--ink-mid);
  padding:3px 10px;border-radius:12px;background:var(--paper-soft);
}
.detail-stale{
  display:inline-block;font-size:11px;color:var(--warn);font-weight:700;
  padding:3px 10px;border-radius:12px;background:#f59e0b14;
  margin-left:6px;
}
.detail-desc{
  font-size:13px;color:var(--ink-mid);line-height:1.7;
  background:var(--paper-soft);padding:12px 14px;border-radius:10px;
}
.detail-action{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;background:var(--paper-soft);border-radius:10px;
  font-size:12px;cursor:pointer;
  transition:background .15s var(--ease);
  text-decoration:none;color:var(--ink);
  margin-bottom:6px;
}
.detail-action:hover{background:var(--line);}
.detail-action-icon{font-size:14px;}
.detail-action-arrow{margin-left:auto;color:var(--ink-lo);}

.optimize-box{
  margin-top:auto;padding-top:18px;border-top:1px solid var(--line);
}
.optimize-textarea{
  width:100%;background:var(--paper-soft);border:1px solid var(--line);
  border-radius:8px;padding:10px;font-size:12px;
  font-family:inherit;color:var(--ink);resize:vertical;
  min-height:60px;outline:none;
}
.optimize-textarea:focus{border-color:var(--brand);background:#fff;}
.optimize-btn{
  width:100%;background:var(--brand);color:#fff;
  border:none;border-radius:8px;padding:9px;
  font-size:12px;font-weight:700;cursor:pointer;
  margin-top:8px;font-family:inherit;
  transition:opacity .2s var(--ease);
}
.optimize-btn:hover{opacity:.85;}

.notes-list{margin-top:12px;}
.note-item{
  background:var(--paper-soft);border-radius:8px;
  padding:8px 10px;margin-bottom:6px;font-size:11px;
  color:var(--ink-mid);line-height:1.6;position:relative;
}
.note-meta{font-size:9px;color:var(--ink-lo);margin-bottom:3px;letter-spacing:.04em;}
.note-del{
  position:absolute;top:6px;right:8px;background:none;border:none;
  color:var(--ink-faint);font-size:11px;cursor:pointer;
}
.note-del:hover{color:var(--danger);}

/* SVG node styles */
.node{cursor:pointer;}
.node-rect{
  fill:#fff;stroke:var(--ink-faint);stroke-width:1.5;
  transition:all .18s var(--ease);
}
.node:hover .node-rect{stroke:var(--brand);}
.node.selected .node-rect{stroke:var(--brand);stroke-width:2.5;fill:var(--brand-soft);}
.node.stale .node-rect{stroke:var(--warn);}
.node-title{
  font-size:13px;font-weight:700;fill:var(--ink);
  pointer-events:none;
}
.node-owner{
  font-size:10px;fill:var(--brand);font-weight:700;
  pointer-events:none;
}
.node-sla{
  font-size:10px;fill:var(--ink-lo);
  pointer-events:none;
}
.node-actor-tag{
  font-size:9px;fill:var(--ink-mid);font-weight:600;
  pointer-events:none;
}

.edge{
  fill:none;stroke:var(--ink-faint);stroke-width:1.5;
}
.edge.alt{stroke:var(--danger);stroke-dasharray:5,3;stroke-width:1;}
.edge-label{
  font-size:10px;fill:var(--ink-mid);
  pointer-events:none;
}
.edge-label.alt{fill:var(--danger);}

.empty-flow{
  text-align:center;color:var(--ink-lo);font-size:13px;
  padding:60px 20px;line-height:1.8;
}
</style>
</head>

// ── State ──
let currentFlow = 'wholesale';
let selectedNodeId = null;

// ── Render flow tabs ──
function renderTabs(){
  const tabs = document.getElementById('flow-tabs');
  tabs.innerHTML = Object.entries(WORKFLOWS).map(([key, flow]) =>
    `<button class="flow-tab ${key===currentFlow?'active':''}" onclick="switchFlow('${key}')">${flow.title}</button>`
  ).join('');
}

function switchFlow(key){
  currentFlow = key;
  selectedNodeId = null;
  renderTabs();
  renderCanvas();
  renderDetail();
}

// ── Render SVG canvas ──
function renderCanvas(){
  const flow = WORKFLOWS[currentFlow];
  if(!flow){ document.getElementById('canvas-area').innerHTML = '<div class="empty-flow">這個流程還沒畫</div>'; return; }
  const W = flow.width, H = flow.height;
  // Build SVG
  let svg = `<svg id="canvas" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // arrow markers
  svg += `<defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ccc"/>
    </marker>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>`;
  // 流程標題 + 副標
  svg += `<text x="20" y="30" font-size="15" font-weight="800" fill="#0a0a0a" letter-spacing="-0.02em">${flow.title}</text>`;
  svg += `<text x="20" y="48" font-size="11" fill="#999">${flow.sub}</text>`;
  // Edges first (so nodes overlay)
  flow.edges.forEach(e => {
    const fromN = flow.nodes.find(n => n.id === e.from);
    const toN = flow.nodes.find(n => n.id === e.to);
    if(!fromN || !toN) return;
    const NW = 160, NH = 80;
    const fx = fromN.x + NW/2;
    const fy = fromN.y + NH/2;
    const tx = toN.x + NW/2;
    const ty = toN.y + NH/2;
    // edge from box edge to box edge (simple approximation)
    let x1, y1, x2, y2;
    const dx = tx - fx, dy = ty - fy;
    if(Math.abs(dx) > Math.abs(dy)){
      // horizontal
      x1 = fx + (dx > 0 ? NW/2 : -NW/2);
      y1 = fy;
      x2 = tx + (dx > 0 ? -NW/2 : NW/2);
      y2 = ty;
    } else {
      // vertical or diagonal
      x1 = fx;
      y1 = fy + (dy > 0 ? NH/2 : -NH/2);
      x2 = tx;
      y2 = ty + (dy > 0 ? -NH/2 : NH/2);
    }
    const markerId = e.alt ? 'arrow-alt' : 'arrow';
    svg += `<line class="edge ${e.alt?'alt':''}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" marker-end="url(#${markerId})"/>`;
    if(e.label){
      const mx = (x1+x2)/2, my = (y1+y2)/2 - 4;
      svg += `<text class="edge-label ${e.alt?'alt':''}" x="${mx}" y="${my}" text-anchor="middle">${e.label}</text>`;
    }
  });
  // Nodes
  const notes = loadNotes();
  flow.nodes.forEach(n => {
    const NW = 160, NH = 80;
    const hasNote = notes.filter(no => no.flow === currentFlow && no.nodeId === n.id).length > 0;
    const isSelected = n.id === selectedNodeId;
    svg += `<g class="node ${isSelected?'selected':''}" data-id="${n.id}" onclick="selectNode('${n.id}')">`;
    svg += `<rect class="node-rect" x="${n.x}" y="${n.y}" width="${NW}" height="${NH}" rx="10"/>`;
    svg += `<text class="node-title" x="${n.x+NW/2}" y="${n.y+24}" text-anchor="middle">${n.title}</text>`;
    svg += `<text class="node-owner" x="${n.x+NW/2}" y="${n.y+44}" text-anchor="middle">${n.owner}</text>`;
    svg += `<text class="node-sla" x="${n.x+NW/2}" y="${n.y+60}" text-anchor="middle">SLA: ${n.sla}</text>`;
    if(hasNote){
      svg += `<text x="${n.x+NW-12}" y="${n.y+16}" text-anchor="middle" font-size="13">💡</text>`;
    }
    if(n.action){
      svg += `<text x="${n.x+12}" y="${n.y+16}" font-size="10" fill="#ff6b35" font-weight="700">⚡</text>`;
    }
    svg += `</g>`;
  });
  svg += `</svg>`;
  document.getElementById('canvas-area').innerHTML = svg;
}

// ── Select node ──
function selectNode(id){
  selectedNodeId = id;
  renderCanvas();
  renderDetail();
}

// ── Toggle / resize panel ──
function togglePanel(){
  document.getElementById('detail-panel').classList.toggle('collapsed');
}
// Drag-to-resize
(function(){
  const handle = document.getElementById('panel-resize');
  const panel = document.getElementById('detail-panel');
  if(!handle || !panel) return;
  let startX = 0, startW = 0, dragging = false;
  handle.addEventListener('mousedown', e => {
    if(panel.classList.contains('collapsed')) return;
    dragging = true;
    startX = e.clientX;
    startW = panel.offsetWidth;
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
  });
  document.addEventListener('mousemove', e => {
    if(!dragging) return;
    const newW = Math.max(220, Math.min(640, startW + (startX - e.clientX)));
    panel.style.width = newW + 'px';
  });
  document.addEventListener('mouseup', () => {
    if(dragging){
      dragging = false;
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
    }
  });
})();

// ── Render detail panel ──
function renderDetail(){
  const panel = document.getElementById('detail-content');
  if(!selectedNodeId){
    panel.innerHTML = `<div class="detail-empty"><span class="detail-empty-emoji">👈</span>點左邊任一節點看細節<br><span style="font-size:11px;color:var(--ink-faint);">每個節點都可以標記「要優化」</span></div>`;
    return;
  }
  const flow = WORKFLOWS[currentFlow];
  const n = flow.nodes.find(x => x.id === selectedNodeId);
  if(!n) return;
  const notes = loadNotes().filter(no => no.flow === currentFlow && no.nodeId === selectedNodeId);
  panel.innerHTML = `
    <div class="detail-section">
      <div class="detail-label">流程環節</div>
      <div class="detail-title">${n.title}</div>
      <div>
        <span class="detail-owner">${n.owner}</span>
        <span class="detail-sla">⏱ SLA ${n.sla}</span>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">細節說明</div>
      <div class="detail-desc">${n.desc}</div>
    </div>
    ${n.action ? `
    <div class="detail-section">
      <div class="detail-label">對應 ERP 動作</div>
      <a class="detail-action" href="erp-lobby.html#action-${n.action}">
        <span class="detail-action-icon">⚡</span>
        <span>跳到大廳 · 開「${n.action}」modal</span>
        <span class="detail-action-arrow">→</span>
      </a>
    </div>
    ` : ''}
    <div class="optimize-box">
      <div class="detail-label">💡 我覺得這環節要優化</div>
      <textarea class="optimize-textarea" id="opt-input" placeholder="例：這環節等太久 / 該開發新工具 / 簡化流程..."></textarea>
      <button class="optimize-btn" onclick="addNote()">記下這個優化想法</button>
      <div class="notes-list" id="notes-list">
        ${notes.length === 0 ? '<div style="font-size:11px;color:var(--ink-lo);text-align:center;padding:14px;">尚無優化想法</div>' : notes.map(no => `
          <div class="note-item">
            <button class="note-del" onclick="delNote(${no.ts})">✕</button>
            <div class="note-meta">${no.by} · ${new Date(no.ts).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
            <div>${no.text.replace(/</g,'&lt;')}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ── Notes management ──
function loadNotes(){
  try { return JSON.parse(localStorage.getItem('workflow_notes_v1') || '[]'); } catch(e){ return []; }
}
function saveNotes(arr){
  localStorage.setItem('workflow_notes_v1', JSON.stringify(arr));
  updateOptCount();
}
function addNote(){
  const text = document.getElementById('opt-input').value.trim();
  if(!text) return;
  const notes = loadNotes();
  notes.push({flow:currentFlow, nodeId:selectedNodeId, text, by:name, ts:Date.now()});
  saveNotes(notes);
  document.getElementById('opt-input').value = '';
  renderCanvas();
  renderDetail();
}
function delNote(ts){
  const notes = loadNotes().filter(no => no.ts !== ts);
  saveNotes(notes);
  renderCanvas();
  renderDetail();
}
function updateOptCount(){
  const cnt = loadNotes().length;
  document.getElementById('optimize-count-display').textContent = `${cnt} 個優化建議`;
}

// ── Init ──
renderTabs();
renderCanvas();
renderDetail();
updateOptCount();
