<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解創意｜B2B 潛在客戶追蹤總表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d14;--card:#13131f;--border:#2a2a3e;--gold:#F2C94C;--blue:#4fc3f7;--text:#e0e0ec;--muted:#8888a8;--green:#28a745;--red:#dc3545;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC','Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:14px;}
h1{font-size:1.8em;color:var(--gold);text-align:center;padding:24px 0 8px;}
.subtitle{text-align:center;color:var(--muted);font-size:0.85em;margin-bottom:20px;}

/* Stats bar */
.stats{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:0 20px 16px;}
.stat-chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:0.82em;}
.stat-chip span{font-weight:700;margin-right:4px;}

/* Controls */
.controls{display:flex;flex-wrap:wrap;gap:10px;padding:0 20px 16px;align-items:center;}
.controls input{background:#1a1a2e;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 12px;font-size:0.85em;width:220px;}
.controls input:focus{outline:none;border-color:var(--gold);}
.filter-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 14px;font-size:0.8em;cursor:pointer;transition:all 0.2s;}
.filter-btn:hover,.filter-btn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600;}
.export-btn{margin-left:auto;background:#1a3a1a;border:1px solid var(--green);color:var(--green);border-radius:8px;padding:7px 16px;font-size:0.82em;cursor:pointer;}
.export-btn:hover{background:var(--green);color:#fff;}

/* Table */
.table-wrap{padding:0 20px 40px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:900px;}
th{background:#1a1a2e;color:var(--gold);padding:10px 12px;text-align:left;font-size:0.82em;font-weight:600;border-bottom:2px solid var(--border);white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid #1e1e2e;vertical-align:top;}
tr:hover td{background:rgba(255,255,255,0.02);}
tr.hidden{display:none;}

.grade-a{display:inline-block;background:rgba(220,53,69,0.15);color:#ff6b6b;border:1px solid #ff6b6b;border-radius:4px;padding:1px 7px;font-size:0.75em;font-weight:700;}
.grade-b{display:inline-block;background:rgba(255,193,7,0.12);color:#ffc107;border:1px solid #ffc107;border-radius:4px;padding:1px 7px;font-size:0.75em;font-weight:700;}

.status-select{background:#1a1a2e;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px;font-size:0.8em;cursor:pointer;width:88px;}
.status-select:focus{outline:none;}

.notes-field{background:#1a1a2e;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-size:0.8em;width:100%;min-width:140px;resize:vertical;min-height:34px;max-height:120px;}
.notes-field:focus{outline:none;border-color:var(--gold);}

.date-field{background:#1a1a2e;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 6px;font-size:0.78em;width:120px;}
.date-field:focus{outline:none;border-color:var(--gold);}

.pitch-btn{background:rgba(79,195,247,0.1);border:1px solid var(--blue);color:var(--blue);border-radius:6px;padding:3px 10px;font-size:0.75em;cursor:pointer;white-space:nowrap;}
.pitch-btn:hover{background:rgba(79,195,247,0.2);}

.pitch-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.pitch-modal.open{display:flex;}
.pitch-box{background:#13131f;border:1px solid var(--border);border-radius:14px;padding:24px;max-width:680px;width:100%;max-height:80vh;overflow-y:auto;position:relative;}
.pitch-box h3{color:var(--gold);margin-bottom:12px;font-size:1em;}
.pitch-box .lang-label{font-size:0.75em;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:1px;}
.pitch-box p{color:#c0c0d8;font-size:0.85em;line-height:1.75;}
.pitch-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:1.2em;cursor:pointer;}
.pitch-close:hover{color:#fff;}
.copy-pitch{margin-top:14px;background:rgba(123,94,248,0.15);border:1px solid #7b5ef8;color:#7b5ef8;border-radius:6px;padding:6px 14px;font-size:0.8em;cursor:pointer;}
.copy-pitch:hover{background:#7b5ef8;color:#fff;}

.contact-text{color:var(--blue);font-size:0.8em;}
.name-cell{font-weight:600;color:#e0e0ff;font-size:0.88em;}
.region-cell{color:var(--muted);font-size:0.8em;white-space:nowrap;}
.added-cell{color:#555577;font-size:0.75em;white-space:nowrap;}

.saved-flash{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;border-radius:8px;padding:8px 18px;font-size:0.82em;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;}
.saved-flash.show{opacity:1;}

@media(max-width:600px){
  h1{font-size:1.4em;}
  .controls input{width:100%;}
}
</style>
</head>
<body>

<h1>蕪解創意 B2B 潛在客戶追蹤總表</h1>
<div class="subtitle">累計追蹤：歐洲 · 北美 · 台港澳紐澳 ｜ 狀態自動儲存至本機</div>

<div class="stats" id="stats-bar"></div>

<div class="controls">
  <input type="text" id="search" placeholder="🔍 搜尋公司名稱 / 地區 / 備注...">
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="A">A 級</button>
  <button class="filter-btn" data-filter="B">B 級</button>
  <button class="filter-btn" data-filter="未聯繫">未聯繫</button>
  <button class="filter-btn" data-filter="已發信">已發信</button>
  <button class="filter-btn" data-filter="已回覆">已回覆</button>
  <button class="filter-btn" data-filter="談判中">談判中</button>
  <button class="filter-btn" data-filter="成交">成交</button>
  <button class="export-btn" onclick="exportCSV()">⬇ 匯出 CSV</button>
</div>

<div class="table-wrap">
<table id="prospect-table">
<thead>
  <tr>
    <th>#</th>
    <th>公司名稱</th>
    <th>地區</th>
    <th>級別</th>
    <th>聯繫方式</th>
    <th>狀態</th>
    <th>最後聯繫日期</th>
    <th>備注 / 回覆情況</th>
    <th>破冰 Pitch</th>
    <th>加入日期</th>
  </tr>
</thead>
<tbody id="table-body"></tbody>
</table>
</div>

<!-- Pitch Modal -->
<div class="pitch-modal" id="pitch-modal">
  <div class="pitch-box">
    <button class="pitch-close" onclick="closePitch()">✕</button>
    <h3 id="pitch-title"></h3>
    <div class="lang-label">中文 Pitch</div>
    <p id="pitch-zh"></p>
    <div class="lang-label">English Pitch</div>
    <p id="pitch-en"></p>
    <br>
    <button class="copy-pitch" onclick="copyPitch()">複製中文 Pitch</button>
    <button class="copy-pitch" style="margin-left:8px;" onclick="copyPitchEn()">Copy English Pitch</button>
  </div>
</div>

<div class="saved-flash" id="saved-flash">✓ 已儲存</div>

itch_zh": "尊敬的 ET-Group A/S 團隊，作為歐洲 Funko POP 批發分銷商，蕪解創意的史努比/花生漫畫、Opanchu和Maniani World正版盲盒公仔，能補充您現有的 Funko 產品線，使您的收藏品種類更加多元化。", "pitch_en": "Dear ET-Group A/S Team, our genuine licensed blind box figures from Snoopy/Peanuts and trending Asian IPs would complement your existing Funko range, diversifying your collectible offerings and tapping into new pop culture segments."}, {"id": "EU008", "name": "Animefigures.nl", "region": "荷蘭", "grade": "B", "added": "2026-04-22", "channel": "線上電商、實體零售", "contact": "contact@animefigures.nl", "basis": "荷蘭專營動漫手辦、Nendoroids、Funko Pops 線上+實體店", "pitch_zh": "尊敬的 Animefigures.nl 團隊，蕪解創意的史努比/花生漫畫及Opanchu、Maniani World正版授權盲盒公仔，可為您的網店和實體店提供全新正宗的產品系列，吸引您的動漫和手辦收藏家群體。", "pitch_en": "Dear Animefigures.nl Team, our genuine licensed blind box figures from Snoopy/Peanuts and Asian IPs like Opanchu and Maniani World could provide a fresh, authentic range to your webshop and physical store."}, {"id": "EU009", "name": "Japan Sama", "region": "法國", "grade": "B", "added": "2026-04-22", "channel": "線上電商、展會", "contact": "contact@japansama.fr", "basis": "從日本直接進口動漫手辦和周邊商品，在法國發貨，參與動漫展會", "pitch_zh": "尊敬的 Japan Sama 團隊，蕪解創意的史努比/花生漫畫、Opanchu、Maniani World正版盲盒公仔，以及Chiikawa、Mofusand（可平行輸入），將完美補充您現有的日本進口產品線。", "pitch_en": "Dear Japan Sama Team, our genuine licensed blind box figures from Snoopy/Peanuts and popular Asian IPs would perfectly complement your existing imported Japanese ranges, offering your customers fresh collectible options."}, {"id": "EU010", "name": "Manganim", "region": "法國", "grade": "B", "added": "2026-04-22", "channel": "實體零售、線上電商", "contact": "contact@manganim.fr", "basis": "專營漫畫和動漫周邊，含手辦、Pop! figures、配件等多種商品", "pitch_zh": "尊敬的 Manganim 團隊，蕪解創意的史努比/花生漫畫及Opanchu、Maniani World正版盲盒公仔，可豐富您現有的手辦選擇，吸引資深收藏家和新粉絲。", "pitch_en": "Dear Manganim Team, our genuine licensed blind box figures from Snoopy/Peanuts and Asian IPs can diversify your figurine selection, attracting both established collectors and new fans."}, {"id": "EU011", "name": "NDA Toys", "region": "英國", "grade": "B", "added": "2026-04-22", "channel": "批發商", "contact": "sales@ndatoys.com", "basis": "英國最大玩具批發商之一，有盲袋玩具部門，代理 Funko、Loungefly", "pitch_zh": "尊敬的 NDA Toys 團隊，作為英國領先玩具批發商，貴公司已有盲袋玩具部門，蕪解創意的史努比/花生漫畫、Opanchu、Maniani World正版盲盒公仔，以及備受追捧的亞洲IP（可平行輸入）將顯著提升您的批發業務。", "pitch_en": "Dear NDA Toys Team, as a leading UK toy wholesaler with an established Blind Bags Toys department, our genuine licensed 5cm/8cm blind box figures from Snoopy/Peanuts and popular Asian IPs (parallel import available) can significantly boost your wholesale offerings."}, {"id": "NA001", "name": "BlindBox Distribution", "region": "美國", "grade": "A", "added": "2026-04-23", "channel": "批發商（全美零售店、網店、禮品店）", "contact": "官網查詢表單", "basis": "美國專業盲盒和收藏玩具批發供應商，僅限批發，強調CPC認證和全球品牌", "pitch_zh": "蕪解創意是正版授權IP周邊批發商，專注於5cm/8cm盲盒公仔與掛件。我們擁有Snoopy等全球知名IP授權，以及Chiikawa、Mofusand等亞洲熱門潮玩IP。鑒於貴公司在美國盲盒市場的領先地位，相信能為您的產品線帶來極大豐富。", "pitch_en": "Wujie Creative is a licensed IP merchandise wholesaler specializing in 5cm/8cm blind box figures. We hold licenses for globally renowned IPs like Snoopy, plus popular Asian IPs such as Chiikawa and Mofusand. Given your leading position in the US blind box market, we look forward to exploring collaboration."}, {"id": "NA002", "name": "ACG Go Anime Wholesale", "region": "美國", "grade": "A", "added": "2026-04-23", "channel": "批發商/授權經銷商（北美）", "contact": "官網查詢表單", "basis": "動漫IP周邊授權批發經銷商，代理Labubu、Gashapon及盲盒，承擔美國進口關稅", "pitch_zh": "蕪解創意專注於熱門IP周邊，特別是5cm/8cm盲盒公仔與掛件。我們擁有Snoopy等全球知名IP，以及Chiikawa、Mofusand等深受亞洲市場喜愛的潮玩IP。鑒於貴公司在動漫周邊與盲盒領域的豐富經驗及北美強大分銷能力，相信合作能帶來巨大市場潛力。", "pitch_en": "Wujie Creative specializes in popular IP merchandise including globally recognized Snoopy and Asian IPs such as Chiikawa and Mofusand. Given your extensive experience in anime merchandise and strong North American distribution, we believe a partnership holds significant potential."}, {"id": "NA003", "name": "Calembou", "region": "美國", "grade": "A", "added": "2026-04-23", "channel": "批發商/電商（已在美國20+零售店銷售）", "contact": "partner@calembou.com", "basis": "潮流玩具和收藏品批發，主動尋求全球禮品店/玩具店/Dropshipping合作夥伴", "pitch_zh": "蕪解創意是正版IP周邊商品批發商，擁有多個熱門IP的5cm/8cm盲盒公仔與掛件，包括全球知名的Snoopy及亞洲潮玩如Chiikawa、Mofusand。鑒於貴公司在潮流玩具和盲盒批發領域的專長，我們相信差異化產品能帶來新商機。", "pitch_en": "Wujie Creative is a licensed IP merchandise wholesaler offering 5cm/8cm blind box figures for Snoopy and Asian trendy IPs like Chiikawa and Mofusand. Given your expertise in trendy toys and desire to expand globally, we believe our differentiated products can bring new business opportunities."}, {"id": "NA004", "name": "POP MART / MESO Collection", "region": "加拿大", "grade": "A", "added": "2026-04-23", "channel": "零售商（自有門店及Roboshops）/ 批發商", "contact": "官網查詢表單 / Pacific Mall Unit C17", "basis": "設計師玩具文化全球領導者，在多國有門店，代理MOLLY、Labubu、DIMOO等", "pitch_zh": "蕪解創意作為正版IP周邊批發商，旗下擁有Snoopy等經典IP，以及在亞洲市場表現強勁的Chiikawa、Mofusand等潮流IP。鑒於貴公司在設計師玩具及盲盒領域的領先地位，我們相信獨特產品能為您的加拿大市場帶來新鮮感與增長潛力。", "pitch_en": "Wujie Creative is a licensed IP merchandise wholesaler offering classic Snoopy and trending Asian IPs like Chiikawa and Mofusand. Given your leading position in designer toys and blind boxes, we believe our products can bring freshness and growth to your Canadian market."}, {"id": "NA005", "name": "AAA Anime", "region": "美國", "grade": "A", "added": "2026-04-23", "channel": "批發商（僅向零售商供貨）", "contact": "官網查詢表單/批發部門", "basis": "動漫周邊授權批發經銷商，與 Funko、Good Smile Company等主要公司合作", "pitch_zh": "蕪解創意專注於高品質IP周邊，特別是5cm/8cm盲盒公仔與掛件。我們擁有Snoopy等深受全球喜愛的IP，以及Chiikawa、Mofusand等在亞洲市場表現亮眼的潮流IP。鑒於貴公司作為動漫周邊零售商的領先經銷商地位，期待將獨特商品引入您的分銷網絡。", "pitch_en": "Wujie Creative specializes in high-quality IP merchandise including globally beloved Snoopy and trending Asian IPs like Chiikawa and Mofusand. Given your position as a leading anime merchandise distributor, we look forward to introducing our products into your distribution network."}, {"id": "NA006", "name": "Enesco Business Canada", "region": "加拿大", "grade": "B", "added": "2026-04-23", "channel": "批發商", "contact": "官網查詢表單", "basis": "禮品、收藏品、小雕像批發商，擁有超過30個流行娛樂IP授權", "pitch_zh": "蕪解創意提供多款正版IP的5cm/8cm盲盒公仔與掛件，包括經典IP Snoopy。鑒於貴公司在加拿大禮品和收藏品批發領域的廣泛影響力及對授權品牌的重視，相信我們的產品能為您的零售夥伴帶來新穎且受歡迎的選擇。", "pitch_en": "Wujie Creative offers 5cm/8cm blind box figures and keychains for licensed IPs including Snoopy. Given your extensive influence in Canadian gift and collectible wholesale and emphasis on licensed brands, our products can bring novel options to your retail partners."}, {"id": "NA007", "name": "Kidults Box", "region": "美國", "grade": "B", "added": "2026-04-23", "channel": "批發商（服務實體店、網店和活動組織者）", "contact": "官網查詢表單", "basis": "專注熱銷盲盒和收藏玩具批發，提供多樣化潮流收藏玩具", "pitch_zh": "蕪解創意是正版IP周邊批發商，專注於5cm/8cm盲盒公仔與掛件，擁有Snoopy等知名IP以及在亞洲市場廣受歡迎的Chiikawa、Mofusand等潮玩IP。鑒於貴公司在熱銷盲盒與潮流收藏品批發領域的專業性，相信我們的產品能帶來新一波的收藏熱潮。", "pitch_en": "Wujie Creative is a licensed IP merchandise wholesaler specializing in blind box figures for Snoopy and popular Asian IPs like Chiikawa and Mofusand. Given your expertise in hot-selling blind boxes, we believe our products can ignite a new wave of collecting among your customers."}, {"id": "NA008", "name": "Four Seasons General Merchandise", "region": "美國（北美）", "grade": "B", "added": "2026-04-23", "channel": "批發商（服務北美地區）", "contact": "官網查詢表單", "basis": "北美綜合商品批發商30年經驗，有「授權禮品和新奇商品」品類", "pitch_zh": "蕪解創意是正版IP周邊商品的批發商，特別擅長5cm/8cm盲盒公仔和掛件，擁有Snoopy等全球知名IP。鑒於貴公司作為北美領先的綜合商品批發商且擁有授權禮品品類，相信我們的IP周邊能為您的客戶群提供差異化選擇。", "pitch_en": "Wujie Creative is a wholesaler of licensed IP merchandise specializing in 5cm/8cm blind box figures including Snoopy. Given your position as a leading North American general merchandise distributor with a licensed gift category, our IP merchandise can offer popular and differentiated selections."}, {"id": "NA009", "name": "Playwell Canada", "region": "加拿大", "grade": "B", "added": "2026-04-23", "channel": "批發商（零售店和教育市場）", "contact": "官網查詢表單", "basis": "加拿大玩具批發35年，向零售店和教育用品目錄分銷，有擴展IP玩具需求", "pitch_zh": "蕪解創意專注於正版IP周邊商品，提供5cm/8cm盲盒公仔與掛件，包括深受喜愛的Snoopy IP。鑒於貴公司在加拿大玩具分銷市場的深厚經驗，相信我們的獨特IP周邊商品能為您的零售客戶帶來新的增長點。", "pitch_en": "Wujie Creative specializes in licensed IP merchandise including Snoopy blind box figures. Given your extensive Canadian toy distribution experience, our unique IP merchandise can bring new growth opportunities to your retail clients."}, {"id": "TW001", "name": "萬榮國際企業股份有限公司", "region": "台灣", "grade": "A", "added": "2026-04-24", "channel": "實體零售（Wonderful）、線上電商（Amuzinc）、批發商", "contact": "+886-2-2836-8698 / 台北市士林區德行西路7號10樓", "basis": "台灣最大日系收藏玩具經銷商，代理BANDAI、Good Smile Company等，銷售網絡遍及全台", "pitch_zh": "您好，我們是蕪解創意，一家專營正版授權IP周邊商品的批發商。注意到貴公司作為台灣最大的日系收藏玩具經銷商，在代理Bandai、Good Smile Company等品牌方面擁有卓越經驗，與我們的主力IP Snoopy/Peanuts及其他潮流IP（如Maniani World、Opanchu）高度契合。我們期待與貴公司建立正規授權代理合作關係。", "pitch_en": "Hello, we are Wujie Creative, a wholesaler specializing in genuine licensed IP merchandise. Noticing your position as Taiwan's largest Japanese collectible toy distributor with excellent experience in Bandai and Good Smile Company, this aligns perfectly with our key IPs including Snoopy/Peanuts and Maniani World. We look forward to establishing a formal partnership."}, {"id": "HK001", "name": "Animation International Limited", "region": "香港", "grade": "A", "added": "2026-04-24", "channel": "IP授權代理商、進出口商", "contact": "官網聯繫表單", "basis": "1979年成立，亞洲領先授權代理商，代理哆啦A夢、蠟筆小新、熊本熊等，廣泛被授權商網絡", "pitch_zh": "您好，我們是蕪解創意，一家專營正版授權IP周邊商品的批發商。貴公司作為亞洲領先的動畫IP授權代理商，在Doraemon等IP運營方面經驗豐富，我們相信蕪解創意旗下的Snoopy/Peanuts及飯糰與梅子等授權IP，能與貴公司現有業務產生協同效應。", "pitch_en": "Hello, we are Wujie Creative, a wholesaler specializing in genuine licensed IP merchandise. As a leading Asian animation IP licensing agent with experience in IPs like Doraemon, we believe our Snoopy/Peanuts and Onigiri & Ume IPs can create strong synergy with your existing business."}, {"id": "HK002", "name": "Toei Animation Enterprises Limited", "region": "香港", "grade": "A", "added": "2026-04-24", "channel": "IP授權代理商、進出口商", "contact": "HKTDC Sourcing頁面", "basis": "在香港、中國大陸、台灣、東南亞等亞洲多個市場經營授權和分銷業務", "pitch_zh": "您好，我們是蕪解創意，了解到東映動畫在亞洲市場的深厚影響力及多元 const STATUSES = ["未聯繫", "已發信", "已回覆", "談判中", "成交", "放棄"];
const STATUS_COLORS = {"未聯繫": "#555577", "已發信": "#2255aa", "已回覆": "#117755", "談判中": "#aa7700", "成交": "#228833", "放棄": "#883333"};
const LS_KEY = 'wujie_b2b_tracker';

function loadData() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch { return {}; }
}
function saveData(data) {
  localStorage.setItem(LS_KEY, JSON.stringify(data));
  const flash = document.getElementById('saved-flash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 1500);
}

let currentFilter = 'all';
let searchQuery = '';

function renderTable() {
  const data = loadData();
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  CLIENTS.forEach((c, i) => {
    const saved = data[c.id] || {};
    const status = saved.status || '未聯繫';
    const notes  = saved.notes  || '';
    const date   = saved.date   || '';

    // filter
    const matchFilter = currentFilter === 'all' ||
      currentFilter === c.grade ||
      currentFilter === status;
    const matchSearch = !searchQuery ||
      c.name.toLowerCase().includes(searchQuery) ||
      c.region.toLowerCase().includes(searchQuery) ||
      notes.toLowerCase().includes(searchQuery);

    const tr = document.createElement('tr');
    if (!matchFilter || !matchSearch) tr.classList.add('hidden');

    const statusColor = STATUS_COLORS[status] || '#555';
    const gradeHtml = c.grade === 'A'
      ? '<span class="grade-a">A 級</span>'
      : '<span class="grade-b">B 級</span>';

    const statusOptions = STATUSES.map(s =>
      `<option value="${s}"${s===status?' selected':''}>${s}</option>`
    ).join('');

    tr.innerHTML = `
      <td style="color:var(--muted);font-size:0.78em">${i+1}</td>
      <td class="name-cell">${c.name}</td>
      <td class="region-cell">${c.region}</td>
      <td>${gradeHtml}</td>
      <td class="contact-text" style="font-size:0.78em;max-width:140px;word-break:break-all">${c.contact}</td>
      <td>
        <select class="status-select" data-id="${c.id}" style="border-color:${statusColor};color:${statusColor}"
          onchange="onStatusChange(this)">
          ${statusOptions}
        </select>
      </td>
      <td>
        <input type="date" class="date-field" data-id="${c.id}" value="${date}"
          onchange="onDateChange(this)">
      </td>
      <td>
        <textarea class="notes-field" data-id="${c.id}" placeholder="備注、回覆內容..."
          onchange="onNotesChange(this)" oninput="autoResize(this)">${notes}</textarea>
      </td>
      <td>
        <button class="pitch-btn" onclick="showPitch('${c.id}')">查看 Pitch</button>
      </td>
      <td class="added-cell">${c.added}</td>
    `;
    tbody.appendChild(tr);
  });

  updateStats(data);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function onStatusChange(el) {
  const data = loadData();
  if (!data[el.dataset.id]) data[el.dataset.id] = {};
  data[el.dataset.id].status = el.value;
  el.style.color = STATUS_COLORS[el.value] || '#555';
  el.style.borderColor = STATUS_COLORS[el.value] || '#555';
  saveData(data);
  updateStats(data);
}

function onNotesChange(el) {
  const data = loadData();
  if (!data[el.dataset.id]) data[el.dataset.id] = {};
  data[el.dataset.id].notes = el.value;
  saveData(data);
}

function onDateChange(el) {
  const data = loadData();
  if (!data[el.dataset.id]) data[el.dataset.id] = {};
  data[el.dataset.id].date = el.value;
  saveData(data);
}

function updateStats(data) {
  const counts = {};
  STATUSES.forEach(s => counts[s] = 0);
  let total = CLIENTS.length;
  CLIENTS.forEach(c => {
    const s = (data[c.id] || {}).status || '未聯繫';
    counts[s] = (counts[s] || 0) + 1;
  });
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = `<div class="stat-chip" style="color:var(--gold)"><span>${total}</span>家客戶總計</div>` +
    STATUSES.map(s => `<div class="stat-chip" style="color:${STATUS_COLORS[s]}"><span>${counts[s]}</span>${s}</div>`).join('');
}

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTable();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  renderTable();
});

// Pitch modal
let currentPitchId = null;
function showPitch(id) {
  const c = CLIENTS.find(x => x.id === id);
  if (!c) return;
  currentPitchId = id;
  document.getElementById('pitch-title').textContent = c.name + ' — 破冰 Pitch';
  document.getElementById('pitch-zh').textContent = c.pitch_zh;
  document.getElementById('pitch-en').textContent = c.pitch_en;
  document.getElementById('pitch-modal').classList.add('open');
}
function closePitch() {
  document.getElementById('pitch-modal').classList.remove('open');
}
document.getElementById('pitch-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('pitch-modal')) closePitch();
});
function copyPitch() {
  const c = CLIENTS.find(x => x.id === currentPitchId);
  if (c) navigator.clipboard.writeText(c.pitch_zh).then(() => alert('✓ 中文 Pitch 已複製'));
}
function copyPitchEn() {
  const c = CLIENTS.find(x => x.id === currentPitchId);
  if (c) navigator.clipboard.writeText(c.pitch_en).then(() => alert('✓ English Pitch copied'));
}

// CSV export
function exportCSV() {
  const data = loadData();
  const headers = ['ID','公司名稱','地區','級別','聯繫方式','狀態','最後聯繫日期','備注','加入日期'];
  const rows = CLIENTS.map(c => {
    const saved = data[c.id] || {};
    return [c.id, c.name, c.region, c.grade, c.contact,
      saved.status||'未聯繫', saved.date||'', (saved.notes||'').replace(/\n/g,' '), c.added]
      .map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'B2B_Prospects_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

renderTable();
</script>
