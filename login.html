<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解創意 — 登入</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#f0f4ff 0%,#faf5ff 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 8px 40px #6366f120;border:1px solid #e0e7ff}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{font-size:44px;margin-bottom:10px}
.logo-name{font-size:22px;font-weight:800;color:#0f172a;letter-spacing:-.3px}
.logo-sub{font-size:12px;color:#94a3b8;margin-top:4px;letter-spacing:.3px}
.f{margin-bottom:16px}
.f label{display:block;font-size:13px;color:#64748b;font-weight:600;margin-bottom:6px}
.f input{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:15px;color:#0f172a;outline:none;transition:all .15s}
.f input:focus{border-color:#6366f1;background:#fff;box-shadow:0 0 0 3px #6366f115}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#94a3b8;font-size:18px;user-select:none;transition:color .15s}
.pw-eye:hover{color:#6366f1}
.remember{display:flex;align-items:center;gap:8px;font-size:13px;color:#64748b;margin-bottom:22px;cursor:pointer}
.remember input{width:16px;height:16px;accent-color:#6366f1}
.btn-login{width:100%;background:#6366f1;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.btn-login:hover{background:#4f46e5;box-shadow:0 4px 20px #6366f140;transform:translateY(-1px)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.err{background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:12px 14px;font-size:13px;color:#991b1b;margin-top:14px;display:none;text-align:center}
.ver{text-align:center;font-size:11px;color:#cbd5e1;margin-top:28px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏢</div>
    <div class="logo-name">蕪解創意</div>
    <div class="logo-sub">WUJIE CREATIVE · 管理系統</div>
  </div>
  <div class="f">
    <label>帳號</label>
    <input id="username" type="text" placeholder="輸入你的帳號" autocomplete="username" autocapitalize="none">
  </div>
  <div class="f">
    <label>密碼</label>
    <div class="pw-wrap">
      <input id="password" type="password" placeholder="輸入你的密碼" autocomplete="current-password">
      <span class="pw-eye" id="eye" onclick="togglePw()">👁</span>
    </div>
  </div>
  <label class="remember">
    <input type="checkbox" id="remember" checked> 記住登入（30 天）
  </label>
  <button class="btn-login" id="loginBtn" onclick="doLogin()">登入</button>
  <div class="err" id="err"></div>
  <div class="ver">v1.6 · 蕪解創意管理系統</div>
</div>
<script>
const PROXY="https://feishu-proxy.raychou6913.workers.dev";
const _AT="YlVkb0ACjacJVqsgRT5j4c6gpeh";
const _ROLES_TBL="tblEj5GSDYUrKGY9";

// 已登入直接跳轉
const _s=JSON.parse(localStorage.getItem("wujie_session")||"null");
if(_s&&Date.now()<_s.expires){
  location.replace("home.html");
}

document.getElementById("username").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("password").focus();});
document.getElementById("password").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});

function togglePw(){
  const inp=document.getElementById("password");
  inp.type=inp.type==="password"?"text":"password";
}

async function fetchRole(name){
  try{
    const tr=await fetch(PROXY+"/auth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
    const td=await tr.json();
    if(td.code!==0) return "一般員工";
    const tk=td.tenant_access_token;
    const url=PROXY+"/open-apis/bitable/v1/apps/"+_AT+"/tables/"+_ROLES_TBL+"/records?page_size=100";
    const rr=await fetch(url,{headers:{"Authorization":"Bearer "+tk}});
    const rd=await rr.json();
    if(rd.code!==0) return "一般員工";
    const items=rd.data?.items||[];
    for(const item of items){
      const f=item.fields||{};
      const n=Array.isArray(f["姓名"])?f["姓名"][0]?.text||"":String(f["姓名"]||"");
      if(n===name){
        const rv=f["角色"];
        return Array.isArray(rv)?rv[0]?.text||"一般員工":String(rv||"一般員工");
      }
    }
  }catch(e){}
  return "一般員工";
}

async function doLogin(){
  const username=document.getElementById("username").value.trim().toLowerCase();
  const password=document.getElementById("password").value;
  const remember=document.getElementById("remember").checked;
  const errEl=document.getElementById("err");
  errEl.style.display="none";
  if(!username||!password){errEl.textContent="請填寫帳號和密碼";errEl.style.display="block";return;}
  const btn=document.getElementById("loginBtn");
  btn.disabled=true; btn.textContent="登入中...";
  try{
    const r=await fetch(PROXY+"/login",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username,password})
    });
    const d=await r.json();
    if(!d.ok){errEl.textContent=d.msg||"帳號或密碼錯誤";errEl.style.display="block";return;}
    btn.textContent="讀取權限...";
    const role=await fetchRole(d.name);
    localStorage.setItem("wujie_session",JSON.stringify({
      name:d.name,dept:d.dept,username,role,
      expires:Date.now()+(remember?30:1)*86400000,
      loginTime:Date.now()
    }));
    location.replace("home.html");
  }catch(e){
    errEl.textContent="網路錯誤，請稍後重試";
    errEl.style.display="block";
  }finally{
    btn.disabled=false; btn.textContent="登入";
  }
}
</script>
</body></html>
