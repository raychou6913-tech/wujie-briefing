<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解 ERP · 登入</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0c10;--surface:#111318;--card:#181a22;--card2:#1e2130;
  --border:#222535;--border-hi:#363b58;
  --txt-hi:#e8eaf8;--txt-mid:#7880a8;--txt-lo:#3d4268;
  --accent:#818cf8;--ok:#22c55e;--danger:#ef4444;
}
body{background:var(--bg);color:var(--txt-hi);font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrap{width:100%;max-width:440px;}
.logo{text-align:center;margin-bottom:32px;}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);display:inline-block;margin-right:8px;vertical-align:middle;}
.logo-name{font-size:22px;font-weight:800;}
.logo-sub{font-size:10px;color:var(--txt-lo);margin-top:6px;letter-spacing:.12em;text-transform:uppercase;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;color:var(--txt-mid);font-weight:600;margin-bottom:6px;letter-spacing:.04em;}
.field input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--txt-hi);outline:none;transition:border-color .2s;}
.field input::placeholder{color:var(--txt-lo);}
.field input:focus{border-color:var(--accent);}
.btn-login{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .2s;}
.btn-login:hover{opacity:.88;}
.err{background:#ef444412;border:1px solid #ef444435;border-radius:8px;padding:9px 12px;font-size:12px;color:var(--danger);margin-bottom:14px;display:none;}
.err.show{display:block;}
.hint-title{font-size:10px;color:var(--txt-lo);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin:24px 0 10px;}
.acc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.acc{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:8px;}
.acc:hover{border-color:var(--border-hi);}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;}
.acc-name{font-size:11px;font-weight:700;}
.acc-role{font-size:9px;color:var(--txt-lo);}
.foot{text-align:center;font-size:10px;color:var(--txt-lo);margin-top:18px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div><span class="logo-dot"></span><span class="logo-name">蕪解 ERP</span></div>
    <div class="logo-sub">WUJIE CREATIVE · 管理系統 v2.0</div>
  </div>

  <div class="card">
    <div class="err" id="err">帳號或密碼不正確，請再試一次</div>
    <div class="field"><label>帳號</label><input id="usr" type="text" placeholder="輸入你的帳號" autocapitalize="none"></div>
    <div class="field"><label>密碼</label><input id="pwd" type="password" placeholder="wujie2026"></div>
    <button class="btn-login" onclick="doLogin()">登入</button>
  </div>

  <div class="hint-title">快速切換帳號（測試用）</div>
  <div class="acc-grid" id="acc-grid"></div>
  <div class="foot">所有帳號密碼：wujie2026</div>
</div>

<script>
const ACCS = {
  // ── 管理層 ──
  ray:     {pass:'wujie2026',name:'Ray',    role:'CEO・創辦人',       hall:'erp-war-room.html',    color:'#818cf8'},
  shawn:   {pass:'wujie2026',name:'Shawn',  role:'COO・曼谷',         hall:'erp-shawn.html',       color:'#22c55e'},
  anran:   {pass:'wujie2026',name:'安然',   role:'全球商務・北京GM',   hall:'erp-anran.html',       color:'#4f46e5'},
  yuming:  {pass:'wujie2026',name:'躍明',   role:'財務',               hall:'erp-finance.html',     color:'#0284c7'},
  // ── 設計/創意（台北）──
  bevis:   {pass:'wujie2026',name:'Bevis',  role:'設計主管',           hall:'erp-pipeline.html',    color:'#818cf8'},
  peilin:  {pass:'wujie2026',name:'珮玲',   role:'企劃・版權',         hall:'erp-peiling.html', color:'#6d28d9'},
  shetong: {pass:'wujie2026',name:'詩彤',   role:'設計師',             hall:'erp-shetong.html',     color:'#9333ea'},
  // ── 採購（北京）──
  laige:   {pass:'wujie2026',name:'賴哥',   role:'採購主管',           hall:'erp-procurement.html', color:'#f59e0b'},
  muzi:    {pass:'wujie2026',name:'木子',   role:'採購助理',           hall:'erp-procurement.html', color:'#d97706'},
  // ── 業務（北京）──
  laodong: {pass:'wujie2026',name:'老董',   role:'業務・北京',         hall:'erp-crm.html',         color:'#f97316'},
  debao:   {pass:'wujie2026',name:'德寶',   role:'業務・北京',         hall:'erp-crm.html',         color:'#ea580c'},
  // ── 電商（北京）──
  chunlei: {pass:'wujie2026',name:'春雷',   role:'電商・抖音小紅書',   hall:'erp-ecommerce.html',   color:'#06b6d4'},
  jiaying: {pass:'wujie2026',name:'佳音',   role:'電商・淘寶',         hall:'erp-ecommerce.html',   color:'#0891b2'},
  // ── 物流（北京）──
  gaowei:  {pass:'wujie2026',name:'高維',   role:'物流・報關',         hall:'erp-gaowei.html',          color:'#16a34a'},
  // ── 行政財務（北京）──
  yangzi:  {pass:'wujie2026',name:'楊子',   role:'HR・出納・行政',     hall:'erp-yangzi.html',      color:'#7c3aed'},
  // ── 財務（台灣）──
  leo:     {pass:'wujie2026',name:'Leo',    role:'出納・台灣',         hall:'erp-leo.html',         color:'#475569'},
};

const grid = document.getElementById('acc-grid');
Object.entries(ACCS).forEach(([id,a])=>{
  const d=document.createElement('div');
  d.className='acc';
  d.innerHTML=`<div class="av" style="background:${a.color}">${[...a.name][0]}</div><div><div class="acc-name">${a.name}</div><div class="acc-role">${a.role}</div></div>`;
  d.onclick=()=>{ document.getElementById('usr').value=id; document.getElementById('pwd').value=a.pass; doLogin(); };
  grid.appendChild(d);
});

function doLogin(){
  const usr=document.getElementById('usr').value.trim().toLowerCase();
  const pwd=document.getElementById('pwd').value;
  const a=ACCS[usr];
  if(!a||a.pass!==pwd){ document.getElementById('err').classList.add('show'); document.getElementById('pwd').value=''; return; }
  document.getElementById('err').classList.remove('show');
  localStorage.setItem('erp_sess',JSON.stringify({user:usr,name:a.name,role:a.role,hall:a.hall,color:a.color,ts:Date.now()}));
  location.href='erp-lobby.html';
}
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('usr').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pwd').focus();});

// Auto-redirect if valid session
const s=JSON.parse(localStorage.getItem('erp_sess')||'null');
if(s&&Date.now()-s.ts<7*86400000) location.href='erp-lobby.html';
</script>
</body>
</html>
