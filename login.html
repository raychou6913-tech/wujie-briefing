<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解 ERP · 登入</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* v4 design tokens */
  --paper:#fafaf8;
  --paper-soft:#f2f2ef;
  --line:#e8e8e3;
  --ink:#0a0a0a;
  --ink-mid:#666;
  --ink-lo:#999;
  --ink-faint:#ccc;
  --brand:#ff6b35;
  --brand-soft:#fff4ef;
  --ease:cubic-bezier(0.32,0.72,0,1);
  --ok:#22c55e;--danger:#ef4444;
  /* Legacy aliases */
  --bg:var(--paper);
  --surface:var(--paper);
  --card:#fff;
  --card2:var(--paper-soft);
  --border:var(--line);
  --border-hi:var(--ink-faint);
  --txt-hi:var(--ink);
  --txt-mid:var(--ink-mid);
  --txt-lo:var(--ink-lo);
  --accent:var(--brand);
}
body{
  background:var(--paper);color:var(--ink);
  font-family:"Inter","Helvetica Neue","PingFang TC","Noto Sans TC",-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01";
  letter-spacing:-.003em;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:40px 20px;
}
.wrap{width:100%;max-width:440px;}
.logo{text-align:center;margin-bottom:40px;}
.logo-row{display:inline-flex;align-items:flex-end;gap:3px;line-height:1;}
.logo-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--brand);
  align-self:flex-end;margin-bottom:4px;
}
.logo-name{
  font-family:"Helvetica Neue","Arial Black",sans-serif;
  font-weight:900;font-size:32px;letter-spacing:-.04em;
  color:var(--ink);
}
.logo-sub{
  font-family:"Helvetica Neue",sans-serif;
  font-size:9px;color:var(--ink-lo);font-weight:700;
  margin-top:10px;letter-spacing:.18em;text-transform:uppercase;
}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:32px;}
.field{margin-bottom:18px;}
.field label{
  display:block;
  font-family:"Helvetica Neue",sans-serif;
  font-size:9px;color:var(--ink-lo);font-weight:700;
  margin-bottom:8px;letter-spacing:.12em;text-transform:uppercase;
}
.field input{
  width:100%;background:var(--paper-soft);
  border:1px solid var(--line);border-radius:10px;
  padding:13px 14px;font-size:14px;color:var(--ink);
  outline:none;transition:border-color .22s var(--ease),background .22s var(--ease);
  font-family:inherit;
}
.field input::placeholder{color:var(--ink-faint);}
.field input:focus{border-color:var(--brand);background:#fff;}
.btn-login{
  width:100%;background:var(--brand);color:#fff;border:none;
  border-radius:10px;padding:14px;
  font-size:14px;font-weight:700;cursor:pointer;
  margin-top:4px;transition:opacity .2s var(--ease);
  font-family:inherit;letter-spacing:.02em;
}
.btn-login:hover{opacity:.85;}
.err{
  background:#ef444410;border:1px solid #ef444430;
  border-radius:8px;padding:10px 12px;
  font-size:12px;color:var(--danger);margin-bottom:14px;display:none;
}
.err.show{display:block;}
.hint-title{
  font-family:"Helvetica Neue",sans-serif;
  font-size:9px;color:var(--ink-faint);font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  margin:32px 0 12px;text-align:center;
}
.acc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.acc{
  background:#fff;border:1px solid var(--line);
  border-radius:10px;padding:10px 12px;cursor:pointer;
  transition:border-color .22s var(--ease),transform .22s var(--ease);
  display:flex;align-items:center;gap:10px;
}
.acc:hover{border-color:var(--ink-faint);transform:translateX(2px);}
.av{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:"Helvetica Neue",sans-serif;
  font-size:11px;font-weight:800;color:#fff;flex-shrink:0;
}
.acc-name{font-size:12px;font-weight:700;color:var(--ink);}
.acc-role{font-size:10px;color:var(--ink-mid);margin-top:1px;}
.foot{
  text-align:center;font-size:10px;color:var(--ink-lo);
  margin-top:16px;letter-spacing:.04em;
}
.acc-details{margin-top:24px;}
.acc-details > summary{
  cursor:pointer;list-style:none;
  text-align:center;
  font-family:"Helvetica Neue",sans-serif;
  font-size:9px;color:var(--ink-faint);font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  padding:8px;
  transition:color .22s var(--ease);
}
.acc-details > summary::-webkit-details-marker{display:none;}
.acc-details > summary:hover{color:var(--ink-lo);}
.acc-caret{
  display:inline-block;margin-left:6px;
  transition:transform .3s var(--ease);
}
.acc-details[open] > summary .acc-caret{transform:rotate(180deg);color:var(--brand);}
.acc-details[open] > summary{color:var(--ink-lo);margin-bottom:10px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-row"><span class="logo-name">wujie</span><span class="logo-dot"></span></div>
    <div class="logo-sub">蕪 解 創 意 · ERP</div>
  </div>

  <div class="card">
    <div class="err" id="err">帳號或密碼不正確，請再試一次</div>
    <div class="field"><label>帳號</label><input id="usr" type="text" placeholder="輸入你的帳號" autocapitalize="none"></div>
    <div class="field"><label>密碼</label><input id="pwd" type="password" placeholder="wujie2026"></div>
    <button class="btn-login" onclick="doLogin()">登入</button>
  </div>

  <details class="acc-details">
    <summary>測試切換帳號<span class="acc-caret">▾</span></summary>
    <div class="acc-grid" id="acc-grid"></div>
    <div class="foot">所有帳號密碼：wujie2026</div>
  </details>
</div>

<script>
const ACCS = {
  // ── 管理層 ──
  ray:     {pass:'wujie2026',name:'Ray',    role:'CEO・創辦人',       hall:'erp-war-room.html',    color:'#818cf8'},
  shawn:   {pass:'wujie2026',name:'Shawn',  role:'COO・曼谷',         hall:'erp-shawn.html',       color:'#22c55e'},
  anran:   {pass:'wujie2026',name:'安然',   role:'全球商務・北京GM',   hall:'erp-anran.html',       color:'#4f46e5'},
  yuming:  {pass:'wujie2026',name:'躍明',   role:'財務',               hall:'erp-finance.html',     color:'#0284c7'},
  // ── 設計/創意（台北）──
  bevis:   {pass:'wujie2026',name:'Bevis',  role:'設計主管',           hall:'erp-pipeline.html',    color:'#818cf8'},
  peilin:  {pass:'wujie2026',name:'珮玲',   role:'企劃・版權',         hall:'erp-peiling.html', color:'#6d28d9'},
  shetong: {pass:'wujie2026',name:'詩彤',   role:'設計師',             hall:'erp-shetong.html',     color:'#9333ea'},
  // ── 採購（北京）──
  laige:   {pass:'wujie2026',name:'賴哥',   role:'採購主管',           hall:'erp-procurement.html', color:'#f59e0b'},
  muzi:    {pass:'wujie2026',name:'木子',   role:'採購助理',           hall:'erp-procurement.html', color:'#d97706'},
  // ── 業務（北京）──
  laodong: {pass:'wujie2026',name:'老董',   role:'業務・北京',         hall:'erp-crm.html',         color:'#f97316'},
  debao:   {pass:'wujie2026',name:'德寶',   role:'業務・北京',         hall:'erp-crm.html',         color:'#ea580c'},
  // ── 電商（北京）──
  chunlei: {pass:'wujie2026',name:'春雷',   role:'電商・抖音小紅書',   hall:'erp-ecommerce.html',   color:'#06b6d4'},
  jiaying: {pass:'wujie2026',name:'佳音',   role:'電商・淘寶',         hall:'erp-ecommerce.html',   color:'#0891b2'},
  // ── 物流（北京）──
  gaowei:  {pass:'wujie2026',name:'高維',   role:'物流・報關',         hall:'erp-gaowei.html',          color:'#16a34a'},
  // ── 行政財務（北京）──
  yangzi:  {pass:'wujie2026',name:'楊子',   role:'HR・出納・行政',     hall:'erp-yangzi.html',      color:'#7c3aed'},
  // ── 財務（台灣）──
  leo:     {pass:'wujie2026',name:'Leo',    role:'出納・台灣',         hall:'erp-yangzi.html?entity=tw',         color:'#475569'},
};

const grid = document.getElementById('acc-grid');
Object.entries(ACCS).forEach(([id,a])=>{
  const d=document.createElement('div');
  d.className='acc';
  d.innerHTML=`<div class="av" style="background:${a.color}">${[...a.name][0]}</div><div><div class="acc-name">${a.name}</div><div class="acc-role">${a.role}</div></div>`;
  d.onclick=()=>{ document.getElementById('usr').value=id; document.getElementById('pwd').value=a.pass; doLogin(); };
  grid.appendChild(d);
});

function doLogin(){
  const usr=document.getElementById('usr').value.trim().toLowerCase();
  const pwd=document.getElementById('pwd').value;
  const a=ACCS[usr];
  if(!a||a.pass!==pwd){ document.getElementById('err').classList.add('show'); document.getElementById('pwd').value=''; return; }
  document.getElementById('err').classList.remove('show');
  localStorage.setItem('erp_sess',JSON.stringify({user:usr,name:a.name,role:a.role,hall:a.hall,color:a.color,ts:Date.now()}));
  location.href='erp-lobby.html';
}
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('usr').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pwd').focus();});

// Auto-redirect if valid session
const s=JSON.parse(localStorage.getItem('erp_sess')||'null');
if(s&&Date.now()-s.ts<7*86400000) location.href='erp-lobby.html';
</script>
</body>
</html>
