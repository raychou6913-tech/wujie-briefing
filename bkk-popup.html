<!DOCTYPE html>
<html lang="zh-TW">
<head>

<title>UJ BKK · 快閃店流水線</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0c10;--surface:#111318;--card:#181a22;--card2:#1e2130;
  --border:#222535;--border-hi:#363b58;
  --txt-hi:#e8eaf8;--txt-mid:#7880a8;--txt-lo:#3d4268;
  --bkk:#9333ea;--bkk-glow:#c084fc;--bkk-dim:#9333ea18;
  --ok:#22c55e;--ok-dim:#22c55e18;
  --warn:#f59e0b;--warn-dim:#f59e0b18;
  --danger:#ef4444;--danger-dim:#ef444418;
}
body{background:var(--bg);color:var(--txt-hi);font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Inter',sans-serif;min-height:100vh;padding-bottom:80px;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.tb-left{display:flex;align-items:center;gap:10px;}
.brand-mark{display:flex;align-items:center;gap:8px;}
.brand-dot{width:7px;height:7px;border-radius:50%;background:var(--bkk-glow);box-shadow:0 0 8px var(--bkk-glow);}
.brand-name{font-size:14px;font-weight:800;}
.hall-chip{background:var(--bkk-dim);border:1px solid #9333ea40;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700;color:var(--bkk-glow);}
.tb-right{display:flex;align-items:center;gap:8px;}
.btn-sm{font-size:10px;font-weight:700;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--txt-mid);text-decoration:none;cursor:pointer;}
.btn-sm:hover{color:var(--txt-hi);border-color:var(--border-hi);}
.btn-sm.danger{border-color:var(--danger);color:var(--danger);}
.btn-sm.primary{background:var(--bkk);color:#fff;border-color:var(--bkk);}

.main{max-width:1080px;margin:0 auto;padding:18px 24px;}

.page-hdr{margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;}
.page-title{font-size:22px;font-weight:800;}
.page-sub{font-size:11px;color:var(--txt-mid);margin-top:4px;line-height:1.6;}

/* FILTER TABS */
.filter-row{display:flex;gap:6px;margin-bottom:18px;}
.filter-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--txt-mid);font-size:11px;font-weight:700;cursor:pointer;}
.filter-btn.active{background:var(--bkk-dim);border-color:#9333ea60;color:var(--bkk-glow);}

/* POPUP CARD */
.popup-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:12px;}
.popup-card.live{border-color:#22c55e40;}
.popup-card.prep{border-color:#f59e0b40;}
.popup-card.plan{border-color:#9333ea30;}
.popup-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:10px;}
.popup-head-left{flex:1;min-width:0;}
.popup-name{font-size:15px;font-weight:800;}
.popup-meta{font-size:11px;color:var(--txt-mid);margin-top:4px;line-height:1.5;}
.popup-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.popup-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;}
.b-ip{background:var(--bkk-dim);color:var(--bkk-glow);}
.b-target{background:var(--card2);color:var(--txt-mid);}
.popup-status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;flex-shrink:0;}
.s-live{background:var(--ok-dim);color:var(--ok);}
.s-prep{background:var(--warn-dim);color:var(--warn);}
.s-plan{background:var(--bkk-dim);color:var(--bkk-glow);}
.s-wrap{background:#94a3b818;color:#94a3b8;}

/* PIPELINE TRACK */
.pl-track{display:flex;align-items:center;gap:0;margin:18px 0 12px;position:relative;}
.pl-step{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.pl-dot{width:26px;height:26px;border-radius:50%;background:var(--card2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--txt-lo);transition:.15s;z-index:2;}
.pl-step.done .pl-dot{background:var(--ok);border-color:var(--ok);color:#fff;}
.pl-step.current .pl-dot{background:var(--bkk);border-color:var(--bkk-glow);color:#fff;box-shadow:0 0 14px #9333ea60;}
.pl-step.future .pl-dot{opacity:.45;}
.pl-label{font-size:9px;font-weight:700;color:var(--txt-mid);margin-top:6px;text-align:center;line-height:1.3;}
.pl-step.done .pl-label{color:var(--ok);}
.pl-step.current .pl-label{color:var(--bkk-glow);}
.pl-line{position:absolute;top:13px;height:2px;background:var(--border);z-index:1;}
.pl-line.done{background:var(--ok);}

/* CURRENT TASK BOX */
.cur-task{background:#9333ea12;border:1px solid #9333ea40;border-radius:10px;padding:12px 14px;margin-top:6px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.ct-info{flex:1;min-width:0;}
.ct-label{font-size:9px;color:var(--bkk-glow);font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.ct-text{font-size:13px;font-weight:700;color:var(--txt-hi);margin-top:3px;}
.ct-meta{font-size:10px;color:var(--txt-mid);margin-top:3px;}
.ct-action{background:var(--bkk);color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}

/* DETAIL ACCORDION */
.pl-toggle{font-size:11px;color:var(--bkk-glow);cursor:pointer;font-weight:700;text-align:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.pl-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.pl-detail.open{display:block;}

/* STAGE DETAIL CARD */
.stage-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.stage-card.done{border-left:3px solid var(--ok);}
.stage-card.current{border-left:3px solid var(--bkk);}
.stage-card.future{border-left:3px solid var(--border-hi);opacity:.7;}
.sc-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:10px;}
.sc-name{font-size:12px;font-weight:800;}
.sc-stat{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;}
.sc-stat.done{background:var(--ok-dim);color:var(--ok);}
.sc-stat.current{background:var(--bkk-dim);color:var(--bkk-glow);}
.sc-stat.future{background:var(--card2);color:var(--txt-lo);border:1px solid var(--border);}
.sc-meta{font-size:10px;color:var(--txt-mid);margin-bottom:8px;}

/* ATTACHMENTS */
.att-list{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.att-row{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--txt-mid);background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 9px;}
.att-icon{flex-shrink:0;font-size:12px;}
.att-name{flex:1;min-width:0;color:var(--txt-hi);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.att-meta{flex-shrink:0;font-size:9px;color:var(--txt-lo);}
.att-stat{flex-shrink:0;font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;}
.att-stat.ok{background:var(--ok-dim);color:var(--ok);}
.att-stat.pending{background:var(--warn-dim);color:var(--warn);}

/* AUDIT TRAIL */
.audit-row{display:flex;gap:8px;font-size:10px;color:var(--txt-mid);padding:5px 0;border-top:1px solid var(--border);}
.audit-row:first-child{border-top:none;}
.audit-time{color:var(--txt-lo);min-width:80px;}

/* NEW POPUP MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:#000a;z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal-sheet{background:var(--surface);border:1px solid var(--border-hi);border-radius:16px;width:100%;max-width:540px;padding:22px;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:800;margin-bottom:6px;}
.modal-sub{font-size:11px;color:var(--txt-mid);margin-bottom:16px;line-height:1.6;}
.mf{margin-bottom:12px;}
.mf label{display:block;font-size:10px;font-weight:700;color:var(--txt-mid);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.mf input,.mf select,.mf textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--txt-hi);font-size:13px;padding:9px 11px;outline:none;font-family:inherit;}
.mf input:focus,.mf select:focus{border-color:var(--bkk);}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.m-actions{display:flex;gap:10px;margin-top:14px;}
.mbtn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;}
.mbtn.primary{background:var(--bkk);color:#fff;}
.mbtn.ghost{background:var(--card2);color:var(--txt-mid);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--ok);color:var(--ok);padding:10px 16px;border-radius:9px;font-size:12px;font-weight:700;transition:.3s;z-index:300;opacity:0;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>

</div>

      {t:'2026-04-22 16:00', user:'Meaw', act:'提案 v1 送出'},

    venue:'Iconsiam · 待定',
    period:'2026-11-10 → 2026-12-25',
    ip:'Muziktiger', target:'฿ 160 萬',
    owner:'Meaw',
    stages:[
      {n:1, done:false, current:true, owner:'Meaw', note:'場地初步詢問已寄出',
       atts:[
         {name:'Iconsiam_詢問信.eml', up:'2026-05-05', user:'Meaw', stat:'已寄出'},
         {name:'Q4_Muziktiger_提案_outline.docx', up:'2026-05-06', user:'Meaw', stat:'草稿'},
       ]},
      {n:2, done:false, atts:[]},

      {t:'2026-05-05 14:00', user:'Meaw', act:'場地詢問信寄出至 Iconsiam'},
    ],

const STATUS_MAP = {
  live:{label:'● 營業中', cls:'s-live'},
  prep:{label:'● 籌備中', cls:'s-prep'},
  plan:{label:'● 規劃中', cls:'s-plan'},
  wrap:{label:'已撤店', cls:'s-wrap'},
};

function getCurrentStage(p){
  for(let i=0;i<p.stages.length;i++) if(!p.stages[i].done) return i+1;
  return 8;
}

function renderPopups(filter){
  filter = filter || 'all';
  const arr = filter==='all' ? POPUPS : POPUPS.filter(p=>p.class===filter);
  const c = document.getElementById('popups-container');
  if(!arr.length){
    c.innerHTML = '<div style="text-align:center;color:var(--txt-lo);padding:30px;font-size:12px;">此類別目前無 popup</div>';
    return;
  }
  c.innerHTML = arr.map(p => {
    const cur = getCurrentStage(p);
    const status = STATUS_MAP[p.class];

    // Pipeline track
    const trackHtml = p.stages.map((s,i) => {
      const cls = s.done ? 'done' : (s.current||cur===s.n) ? 'current' : 'future';
      return `<div class="pl-step ${cls}" onclick="document.getElementById('detail-${p.id}').classList.toggle('open');document.getElementById('detail-${p.id}').classList.add('open');">
        <div class="pl-dot">${s.done?'✓':s.n}</div>
        <div class="pl-label">${STAGE_SHORT[i]}</div>
      </div>`;
    }).join('');
    const lineHtml = p.stages.slice(0,-1).map((s,i) => {
      const left = ((i+0.5)/p.stages.length)*100;
      const w = (1/p.stages.length)*100;
      return `<div class="pl-line ${s.done?'done':''}" style="left:${left}%;width:${w}%;"></div>`;
    }).join('');

    // Current task
    const curStage = p.stages.find(s=>s.n===cur);
    const ctHtml = curStage && cur<8 ? `<div class="cur-task">
      <div class="ct-info">
        <div class="ct-label">當前階段 · ${STAGE_NAMES[cur-1]}</div>
        <div class="ct-text">${curStage.note||'待下一個動作'}</div>
        <div class="ct-meta">負責人：${curStage.owner||'未指派'}${curStage.atts && curStage.atts.length ? ' · '+curStage.atts.length+' 個附件' : ''}</div>
      </div>
      <button class="ct-action" onclick="markStage('${p.id}',${cur})">標記完成 ✓</button>
    </div>` : '';

    // Detail (all stages with attachments)
    const stagesDetail = p.stages.map((s,i) => {
      const isDone = s.done, isCur = cur===s.n && cur<8;
      const cls = isDone?'done':(isCur?'current':'future');
      const stat = isDone ? `<span class="sc-stat done">已完成</span>` :
                   isCur ? `<span class="sc-stat current">進行中</span>` :
                   `<span class="sc-stat future">未開始</span>`;
      const meta = s.owner ? `負責人 ${s.owner}${s.date?' · 完成 '+s.date:''}${s.note?' · '+s.note:''}` : '尚未指派';
      const atts = (s.atts && s.atts.length) ? `<div class="att-list">${s.atts.map(a=>`
        <div class="att-row">
          <span class="att-icon">📎</span>
          <span class="att-name">${a.name}</span>
          <span class="att-meta">${a.up} · ${a.user}</span>
          <span class="att-stat ${a.stat==='已批准'||a.stat==='已簽署'||a.stat==='已上傳'||a.stat==='已存檔'||a.stat==='已定稿'||a.stat==='已寄出'?'ok':'pending'}">${a.stat}</span>
        </div>
      `).join('')}</div>` : '';
      return `<div class="stage-card ${cls}">
        <div class="sc-row1">
          <div class="sc-name">階段 ${s.n} · ${STAGE_NAMES[i]}</div>
          ${stat}
        </div>
        <div class="sc-meta">${meta}</div>
        ${atts}
      </div>`;
    }).join('');

    const auditHtml = p.audit.map(a => `<div class="audit-row">
      <span class="audit-time">${a.t}</span>
      <span><b style="color:var(--txt-hi);">${a.user}</b> · ${a.act}</span>
    </div>`).join('');

    return `<div class="popup-card ${p.class}" id="card-${p.id}">
      <div class="popup-head">
        <div class="popup-head-left">
          <div class="popup-name">${p.name}</div>
          <div class="popup-meta">📍 ${p.venue} · ${p.period}</div>
          <div class="popup-badges">
            <span class="popup-badge b-ip">IP: ${p.ip}</span>
            <span class="popup-badge b-target">目標 ${p.target}</span>
            <span class="popup-badge b-target">主負責 ${p.owner}</span>
          </div>
        </div>
        <span class="popup-status ${status.cls}">${status.label}</span>
      </div>

      <div class="pl-track" style="position:relative;">
        ${lineHtml}
        ${trackHtml}
      </div>

      ${ctHtml}

      <div class="pl-toggle" onclick="document.getElementById('detail-${p.id}').classList.toggle('open');this.textContent=document.getElementById('detail-${p.id}').classList.contains('open')?'隱藏明細 ▲':'展開所有階段明細與附件 ▼';">展開所有階段明細與附件 ▼</div>

      <div class="pl-detail" id="detail-${p.id}">
        <div style="font-size:11px;font-weight:800;letter-spacing:.05em;color:var(--txt-mid);text-transform:uppercase;margin:8px 0 10px;">7 階段詳細</div>
        ${stagesDetail}
        <div style="font-size:11px;font-weight:800;letter-spacing:.05em;color:var(--txt-mid);text-transform:uppercase;margin:14px 0 8px;">變更歷史</div>
        <div style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;">
          ${auditHtml}
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterPopups(btn, filter){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPopups(filter);
}

function markStage(popupId, stageNum){
  showToast(`✓ ${popupId} 階段 ${stageNum}（${STAGE_NAMES[stageNum-1]}）已標記完成`);
  // 真實版會更新 demo data 並 re-render；mockup 只 toast
}

function openNewModal(){ document.getElementById('new-modal').classList.add('open'); }
function closeNewModal(){ document.getElementById('new-modal').classList.remove('open'); }

function submitNewPopup(){
  const name = document.getElementById('np-name').value.trim();
  if(!name){ showToast('⚠ 請填寫快閃店名稱','var(--danger)'); return; }
  closeNewModal();
  showToast('✓ 新企劃已送出，待 Ray 審閱（模擬）');
  // 真實版會 POST 到飛書 + 更新 popup list
}

function showToast(msg, color){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = color || 'var(--ok)';
  el.style.color = color || 'var(--ok)';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

// Init
renderPopups('all');

// If URL has hash, scroll to that popup
if(location.hash){
  setTimeout(()=>{
    const card = document.querySelector(location.hash);
    if(card){
      card.scrollIntoView({behavior:'smooth', block:'start'});
      const detailId = 'detail-'+location.hash.replace('#','');
      const detail = document.getElementById(detailId);
      if(detail) detail.classList.add('open');
    }
    if(location.hash === '#new') openNewModal();
  }, 100);
}
</script>
