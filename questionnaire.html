<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解 ERP · 經驗收集</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0b12;
  --surface:#13151f;
  --card:#1a1d29;
  --card-2:#22253a;
  --border:#2a2d42;
  --border-hi:#3d4268;
  --txt-hi:#f5f6ff;
  --txt-mid:#9ca3c5;
  --txt-lo:#5d6388;
  --accent:#a78bfa;
  --accent-glow:#c4b5fd;
  --accent-warm:#fb923c;
  --ok:#34d399;
  --ok-soft:#34d39915;
  --warn:#fbbf24;
  --warn-soft:#fbbf2415;
  --danger:#f87171;
  --danger-soft:#f8717115;
  --vam:#fb923c;
  --vam-soft:#fb923c15;
}
body{
  background:radial-gradient(ellipse 80% 50% at 50% -10%,#a78bfa10 0%,var(--bg) 60%);
  color:var(--txt-hi);
  font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Inter',sans-serif;
  min-height:100vh;
  letter-spacing:-.005em;
  line-height:1.5;
}

/* TOP BAR */
.topbar{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#a78bfa,#fb923c);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;}
.brand-text{font-size:14px;font-weight:700;}
.brand-sub{font-size:9px;color:var(--txt-lo);letter-spacing:.08em;text-transform:uppercase;}
.progress-text{font-size:11px;color:var(--txt-mid);font-weight:600;}

/* PROGRESS BAR */
.progress-bar{height:3px;background:var(--card);overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-warm));transition:width .4s ease;}

/* MAIN */
.main{max-width:680px;margin:0 auto;padding:40px 24px 80px;}

/* SCREEN STATES */
.screen{display:none;}
.screen.active{display:block;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* START SCREEN */
.start-hero{text-align:center;margin-bottom:40px;}
.dept-emoji{font-size:48px;margin-bottom:16px;}
.dept-title{font-size:30px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px;}
.dept-subtitle{font-size:14px;color:var(--txt-mid);margin-bottom:20px;line-height:1.6;}
.dept-meta{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:32px;}
.dept-meta-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt-mid);}
.dept-meta-icon{color:var(--accent-glow);}

.start-form{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;}
.start-form-label{font-size:11px;font-weight:700;color:var(--txt-mid);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;}
.start-form-input{width:100%;background:var(--card-2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:16px;color:var(--txt-hi);outline:none;font-family:inherit;}
.start-form-input:focus{border-color:var(--accent);}

.btn-primary{display:block;width:100%;background:linear-gradient(135deg,var(--accent),var(--accent-warm));color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .15s,opacity .15s;}
.btn-primary:hover{transform:translateY(-1px);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}

.btn-ghost{display:inline-block;background:transparent;border:1px solid var(--border-hi);color:var(--txt-mid);border-radius:10px;padding:12px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;}
.btn-ghost:hover{color:var(--txt-hi);border-color:var(--txt-mid);}

.dept-picker{margin-top:24px;text-align:center;}
.dept-picker-label{font-size:11px;color:var(--txt-lo);margin-bottom:10px;}
.dept-pills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.dept-pill{font-size:11px;font-weight:600;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--txt-mid);cursor:pointer;font-family:inherit;}
.dept-pill:hover{border-color:var(--accent);color:var(--accent-glow);}
.dept-pill.selected{background:var(--accent);border-color:var(--accent);color:#fff;}

/* QUESTION SCREEN */
.q-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.q-num{font-size:11px;color:var(--txt-lo);font-weight:700;letter-spacing:.04em;}
.q-vam-tag{background:var(--vam-soft);color:var(--vam);font-size:10px;font-weight:800;padding:3px 9px;border-radius:6px;letter-spacing:.04em;}
.q-required-tag{background:var(--accent)20;color:var(--accent-glow);font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;}
.q-text{font-size:22px;font-weight:700;letter-spacing:-.01em;margin-bottom:8px;line-height:1.45;}
.q-help{font-size:13px;color:var(--txt-mid);margin-bottom:24px;line-height:1.6;}

.q-input-block{margin-bottom:32px;}

/* NUMBER + SLIDER */
.num-slider-row{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;}
.num-input{width:100px;background:var(--card-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:24px;font-weight:700;color:var(--txt-hi);outline:none;font-family:inherit;text-align:center;}
.num-input:focus{border-color:var(--accent);}
.num-unit{font-size:13px;color:var(--txt-mid);font-weight:600;flex-shrink:0;}
.slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;background:var(--card-2);border-radius:3px;outline:none;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;background:var(--accent-glow);border-radius:50%;cursor:pointer;box-shadow:0 0 8px var(--accent);}
.slider::-moz-range-thumb{width:20px;height:20px;background:var(--accent-glow);border-radius:50%;cursor:pointer;border:none;}
.slider-range{display:flex;justify-content:space-between;font-size:10px;color:var(--txt-lo);margin-top:6px;padding:0 4px;}

/* PILL OPTIONS */
.pill-grid{display:flex;flex-wrap:wrap;gap:8px;}
.pill{background:var(--card);border:1.5px solid var(--border);color:var(--txt-mid);padding:11px 18px;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit;}
.pill:hover{border-color:var(--accent);color:var(--txt-hi);}
.pill.selected{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
.pill-multi.pill.selected{background:linear-gradient(135deg,var(--accent),#8b5cf6);}

/* TEXT */
.text-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:15px;color:var(--txt-hi);outline:none;font-family:inherit;}
.text-input:focus{border-color:var(--accent);}
.textarea-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:14px;color:var(--txt-hi);outline:none;font-family:inherit;resize:vertical;min-height:100px;line-height:1.6;}

/* MULTI NUMBER (sum validation) */
.multi-num-grid{display:flex;flex-direction:column;gap:10px;}
.multi-num-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;}
.multi-num-label{flex:1;font-size:13px;color:var(--txt-mid);font-weight:600;}
.multi-num-input{width:90px;background:var(--card-2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:16px;font-weight:700;color:var(--txt-hi);outline:none;font-family:inherit;text-align:right;}
.multi-num-input:focus{border-color:var(--accent);}
.multi-num-suffix{font-size:13px;color:var(--txt-mid);font-weight:600;width:20px;}
.sum-check{font-size:11px;font-weight:700;text-align:right;padding:8px 4px;}
.sum-check.ok{color:var(--ok);}
.sum-check.warn{color:var(--warn);}
.sum-check.bad{color:var(--danger);}

/* ABC TIER */
.abc-grid{display:flex;flex-direction:column;gap:10px;}
.abc-row{display:grid;grid-template-columns:60px 1fr;gap:14px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.abc-badge{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;}
.abc-a{background:linear-gradient(135deg,#fb923c,#f97316);}
.abc-b{background:linear-gradient(135deg,#a78bfa,#8b5cf6);}
.abc-c{background:linear-gradient(135deg,#34d399,#10b981);}
.abc-content{display:flex;align-items:center;gap:10px;}
.abc-name{font-size:12px;color:var(--txt-mid);font-weight:600;min-width:120px;}
.abc-input{flex:1;background:var(--card-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:16px;font-weight:700;color:var(--txt-hi);outline:none;font-family:inherit;text-align:right;max-width:140px;}
.abc-suffix{font-size:13px;color:var(--txt-mid);font-weight:600;}

/* TEXT MULTI (top N) */
.text-multi-grid{display:flex;flex-direction:column;gap:8px;}
.text-multi-row{display:flex;align-items:center;gap:12px;}
.text-multi-num{width:28px;height:28px;background:var(--card-2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--txt-mid);flex-shrink:0;}
.text-multi-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;color:var(--txt-hi);outline:none;font-family:inherit;}
.text-multi-input:focus{border-color:var(--accent);}

/* VALIDATION FEEDBACK */
.input-error{font-size:11px;color:var(--danger);margin-top:8px;padding-left:4px;}

/* NAV BUTTONS */
.q-nav{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-top:20px;padding-top:24px;border-top:1px solid var(--border);}
.q-nav-left{display:flex;gap:10px;}
.q-skip{font-size:12px;color:var(--txt-lo);background:transparent;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;}

/* REVIEW SCREEN */
.review-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:8px;}
.review-q{font-size:12px;color:var(--txt-mid);font-weight:600;margin-bottom:6px;}
.review-a{font-size:14px;color:var(--txt-hi);font-weight:700;}
.review-a.empty{color:var(--txt-lo);font-weight:400;font-style:italic;}
.review-edit{font-size:11px;color:var(--accent-glow);cursor:pointer;float:right;}

/* THANK YOU */
.thank-hero{text-align:center;padding:60px 20px;}
.thank-emoji{font-size:64px;margin-bottom:24px;}
.thank-title{font-size:28px;font-weight:800;margin-bottom:12px;}
.thank-sub{font-size:14px;color:var(--txt-mid);line-height:1.6;margin-bottom:32px;}

/* MULTI-RANGE (label + min ~ max) */
.range-grid{display:flex;flex-direction:column;gap:10px;}
.range-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.range-label{font-size:13px;color:var(--txt-mid);font-weight:600;line-height:1.4;}
.range-inputs{display:flex;align-items:center;gap:8px;}
.range-input{width:80px;background:var(--card-2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:15px;font-weight:700;color:var(--txt-hi);outline:none;font-family:inherit;text-align:center;}
.range-input:focus{border-color:var(--accent);}
.range-tilde{color:var(--txt-lo);font-size:14px;}
.range-suffix{font-size:12px;color:var(--txt-mid);font-weight:600;}

/* VENDOR LIST (name + category pills) */
.vendor-grid{display:flex;flex-direction:column;gap:12px;}
.vendor-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.vendor-row-top{display:flex;align-items:center;gap:10px;}
.vendor-num{width:24px;height:24px;background:var(--card-2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--txt-mid);flex-shrink:0;}
.vendor-input{flex:1;background:var(--card-2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;color:var(--txt-hi);outline:none;font-family:inherit;}
.vendor-input:focus{border-color:var(--accent);}
.vendor-cats{display:flex;flex-wrap:wrap;gap:5px;padding-left:34px;}
.vendor-cat{font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--txt-lo);cursor:pointer;font-family:inherit;}
.vendor-cat:hover{border-color:var(--accent);color:var(--accent-glow);}
.vendor-cat.selected{background:var(--accent);border-color:var(--accent);color:#fff;}

/* MOCKUP BANNER */
.mockup-banner{background:linear-gradient(90deg,#a78bfa20,#fb923c20);border-bottom:1px solid #a78bfa30;padding:6px 20px;font-size:10px;font-weight:600;color:var(--accent-glow);letter-spacing:.04em;text-align:center;}
</style>
</head>
<body>

<div class="mockup-banner" id="mockup-banner">
  ✨ Stage 1 Mockup · 答案目前只存本機（localStorage），尚未接飛書後端
</div>

<div class="topbar">
  <div class="brand">
    <div class="brand-logo">蕪</div>
    <div>
      <div class="brand-text">蕪解</div>
      <div class="brand-sub">經驗收集</div>
    </div>
  </div>
  <div class="progress-text" id="progress-text"></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%;"></div></div>

<div class="main">

  <!-- START SCREEN -->
  <div class="screen active" id="screen-start">
    <div class="start-hero">
      <div class="dept-emoji" id="start-emoji">📋</div>
      <div class="dept-title" id="start-title">經驗收集</div>
      <div class="dept-subtitle" id="start-subtitle">這份問卷會把你腦袋裡的經驗變成系統的預設值。<br>越精準，未來系統算出來的數字越接近真實。</div>
      <div class="dept-meta">
        <div class="dept-meta-item"><span class="dept-meta-icon">⏱</span> <span id="meta-time">預估 15 分鐘</span></div>
        <div class="dept-meta-item"><span class="dept-meta-icon">📝</span> <span id="meta-count">— 題</span></div>
        <div class="dept-meta-item"><span class="dept-meta-icon">💾</span> 自動存進度</div>
      </div>
    </div>

    <div class="start-form">
      <div class="start-form-label">你是哪一位？</div>
      <div id="filler-official-area"></div>
      <div id="filler-guest-area" style="margin-top:14px;">
        <button class="dept-pill" id="btn-guest-toggle" onclick="toggleGuestMode()">＋ 我是其他人想補充意見</button>
        <div id="guest-input-wrap" style="display:none;margin-top:10px;">
          <input class="start-form-input" id="filler-guest-name" type="text" placeholder="輸入你的名字，例如：Shawn">
          <div style="font-size:10px;color:var(--txt-lo);margin-top:6px;">作為「跨部門補充」記錄，不影響該部門必填同事的進度</div>
        </div>
      </div>
    </div>

    <button class="btn-primary" id="btn-start" onclick="startQuestionnaire()" disabled style="opacity:.4;">請先選擇填寫人</button>

    <div class="dept-picker">
      <div class="dept-picker-label">或選擇其他部門問卷：</div>
      <div class="dept-pills" id="dept-pills"></div>
    </div>
  </div>

  <!-- QUESTION SCREEN -->
  <div class="screen" id="screen-question">
    <div class="q-header" id="q-header"></div>
    <div class="q-text" id="q-text"></div>
    <div class="q-help" id="q-help"></div>
    <div class="q-input-block" id="q-input-block"></div>
    <div class="q-nav">
      <div class="q-nav-left">
        <button class="btn-ghost" id="btn-back" onclick="prevQuestion()">← 上一題</button>
        <button class="q-skip" id="btn-skip" onclick="skipQuestion()" style="display:none;">略過此題</button>
      </div>
      <button class="btn-primary" id="btn-next" style="max-width:160px;" onclick="nextQuestion()">下一題 →</button>
    </div>
  </div>

  <!-- REVIEW SCREEN -->
  <div class="screen" id="screen-review">
    <div class="start-hero">
      <div class="dept-emoji">📋</div>
      <div class="dept-title">檢視你的答案</div>
      <div class="dept-subtitle">所有答案最後一次確認，送出後會寫入系統。</div>
    </div>
    <div id="review-list"></div>
    <div style="display:flex;gap:10px;margin-top:24px;">
      <button class="btn-ghost" style="flex:1;" onclick="goToScreen('question')">繼續填</button>
      <button class="btn-primary" style="flex:2;" onclick="submitAll()">確認送出 ✓</button>
    </div>
  </div>

  <!-- THANK YOU -->
  <div class="screen" id="screen-thank">
    <div class="thank-hero">
      <div class="thank-emoji">🎉</div>
      <div class="thank-title">送出完成！</div>
      <div class="thank-sub">感謝你的時間。<br>你的經驗即將成為系統的預設值。</div>
      <button class="btn-ghost" onclick="location.reload()">填寫其他部門問卷</button>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// QUESTIONNAIRE DEFINITIONS
// ═══════════════════════════════════════════════════════════════

const DEPTS = {
  procurement: {
    emoji:'📦', name:'採購', sub:'賴哥 + 木子',
    color:'#fb923c',
    intro:'收集生產／成本／工廠常數，影響每個項目的時間表與預算。',
    officialFillers:['賴哥','木子'],
    questions:[
      {id:'1.1', type:'pill-multi', vam:false, required:true,
        text:'你最常做的產品類型有哪些？',
        help:'複選，所有你經手過的都選。',
        options:['PVC 公仔','絨毛','壓克力立牌','文具（筆/便利貼）','包裝盒','服裝（T恤/帽）','其他']},
      {id:'1.2', type:'number-slider', vam:false, required:true,
        text:'PVC 公仔開模平均要幾天？',
        help:'從下單到收到模具的天數',
        unit:'天', min:30, max:90, default:45},
      {id:'1.3', type:'number-slider', vam:false, required:true,
        text:'PVC 公仔量產平均要幾天？（單款）',
        help:'從模具完成到出貨的天數',
        unit:'天', min:30, max:120, default:60},
      {id:'1.4', type:'number-slider', vam:false, required:false,
        text:'多款一起量產會 +幾天？',
        help:'如果同時多款並行，需要的額外天數',
        unit:'+天', min:0, max:30, default:10},
      {id:'1.5', type:'number-slider', vam:false, required:false,
        text:'絨毛產品量產要幾天？',
        help:'沒做過填 0',
        unit:'天', min:0, max:90, default:30},
      {id:'1.6', type:'number-slider', vam:false, required:false,
        text:'壓克力／文具量產要幾天？',
        unit:'天', min:0, max:60, default:21},
      {id:'1.7', type:'number-slider', vam:false, required:false,
        text:'包裝盒量產要幾天？',
        unit:'天', min:0, max:30, default:14},
      {id:'1.8', type:'multi-num', vam:false, required:true,
        text:'模具費通常付款比例？',
        help:'總和必須 = 100%',
        rows:[
          {label:'開模時付', default:30, suffix:'%'},
          {label:'驗收時付', default:70, suffix:'%'},
        ], sumTarget:100},
      {id:'1.9', type:'multi-num', vam:false, required:true,
        text:'量產款付款比例？',
        help:'總和必須 = 100%',
        rows:[
          {label:'下單時付', default:30, suffix:'%'},
          {label:'驗收時付', default:40, suffix:'%'},
          {label:'出貨後付', default:30, suffix:'%'},
        ], sumTarget:100},
      {id:'1.10', type:'multi-range', vam:true, required:true,
        text:'每款模具費（用售價回推會比較好估）',
        help:'以「售價 69 元 RMB 盲盒」為例，依款式數量回答區間範圍即可，不用定死。',
        unit:'萬 RMB',
        rows:[
          {label:'6+1 款（69 元盲盒）', minDefault:3, maxDefault:6},

// STATE
// ═══════════════════════════════════════════════════════════════

let state = {
  dept: 'procurement',
  filler: '',
  fillerRole: '', // 'official' | 'guest'
  qIdx: 0,
  answers: {},
};

const STORAGE_KEY_PREFIX = 'wujie_q_';

function getStorageKey(){ return STORAGE_KEY_PREFIX + state.dept; }
function saveState(){
  localStorage.setItem(getStorageKey(), JSON.stringify({
    filler: state.filler, fillerRole: state.fillerRole, qIdx: state.qIdx, answers: state.answers
  }));
}
function loadState(){
  state.filler = '';
  state.fillerRole = '';
  state.qIdx = 0;
  state.answers = {};
  const s = localStorage.getItem(getStorageKey());
  if(s){
    const parsed = JSON.parse(s);
    state.filler = parsed.filler || '';
    state.fillerRole = parsed.fillerRole || '';
    state.qIdx = parsed.qIdx || 0;
    state.answers = parsed.answers || {};
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

function init(){
  const params = new URLSearchParams(location.search);
  const dept = params.get('dept');
  if(dept && DEPTS[dept]) state.dept = dept;

  loadState();
  renderStart();
}

function renderStart(){
  const d = DEPTS[state.dept];
  document.getElementById('start-emoji').textContent = d.emoji;
  document.getElementById('start-title').textContent = d.name + '（' + d.sub + '）';
  document.getElementById('start-subtitle').textContent = d.intro;
  document.getElementById('meta-count').textContent = d.questions.length + ' 題';
  document.getElementById('meta-time').textContent = '預估 ' + Math.ceil(d.questions.length * 0.8) + ' 分鐘';

  // Render official fillers (this dept's expected people)
  const officialArea = document.getElementById('filler-official-area');
  const officials = d.officialFillers || [];
  officialArea.innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:8px;">
      ${officials.map(name => `
        <button class="pill ${state.filler === name && state.fillerRole === 'official' ? 'selected' : ''}"
                style="flex:0 0 auto;"
                onclick="pickOfficialFiller('${name}')">${name}</button>
      `).join('')}
    </div>
    <div style="font-size:11px;color:var(--txt-lo);margin-top:8px;">
      ↑ 這個部門指定的填寫人，請該位同事點選自己的名字
    </div>
  `;

  // Restore guest input if state was guest
  if(state.fillerRole === 'guest'){
    document.getElementById('guest-input-wrap').style.display = 'block';
    document.getElementById('filler-guest-name').value = state.filler;
    document.getElementById('btn-guest-toggle').classList.add('selected');
  }
  updateStartButton();

  // Persona pills (other departments)
  const pills = document.getElementById('dept-pills');
  pills.innerHTML = Object.entries(DEPTS).filter(([k]) => k !== state.dept).map(([k,v]) =>
    `<button class="dept-pill" onclick="switchDept('${k}')">${v.emoji} ${v.name}</button>`
  ).join('');
}

function pickOfficialFiller(name){
  state.filler = name;
  state.fillerRole = 'official';
  // Clear guest mode
  document.getElementById('guest-input-wrap').style.display = 'none';
  document.getElementById('btn-guest-toggle').classList.remove('selected');
  document.getElementById('filler-guest-name').value = '';
  // Re-render to update selected pill
  document.querySelectorAll('#filler-official-area .pill').forEach(p => p.classList.remove('selected'));
  event.target.classList.add('selected');
  updateStartButton();
}

function toggleGuestMode(){
  const wrap = document.getElementById('guest-input-wrap');
  const isOpen = wrap.style.display !== 'none';
  if(isOpen){
    wrap.style.display = 'none';
    document.getElementById('btn-guest-toggle').classList.remove('selected');
    if(state.fillerRole === 'guest'){
      state.filler = '';
      state.fillerRole = '';
    }
  }else{
    wrap.style.display = 'block';
    document.getElementById('btn-guest-toggle').classList.add('selected');
    // Clear official selection
    document.querySelectorAll('#filler-official-area .pill').forEach(p => p.classList.remove('selected'));
    state.filler = '';
    state.fillerRole = 'guest';
    setTimeout(()=>document.getElementById('filler-guest-name').focus(), 50);
  }
  updateStartButton();
}

function updateStartButton(){
  const btn = document.getElementById('btn-start');
  const guestName = document.getElementById('filler-guest-name')?.value?.trim() || '';
  const hasOfficial = state.fillerRole === 'official' && state.filler;
  const hasGuest = state.fillerRole === 'guest' && guestName;
  if(hasOfficial || hasGuest){
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.textContent = '開始填寫 →';
  }else{
    btn.disabled = true;
    btn.style.opacity = '.4';
    btn.textContent = '請先選擇填寫人';
  }
}

function switchDept(d){
  state.dept = d;
  state.qIdx = 0;
  state.answers = {};
  loadState();
  history.replaceState(null, '', '?dept=' + d);
  renderStart();
}

// ═══════════════════════════════════════════════════════════════
// QUESTIONNAIRE FLOW
// ═══════════════════════════════════════════════════════════════

function startQuestionnaire(){
  // If guest mode, grab text input
  if(state.fillerRole === 'guest'){
    const guestName = document.getElementById('filler-guest-name').value.trim();
    if(!guestName){ alert('請輸入你的名字'); return; }
    state.filler = guestName;
  }
  if(!state.filler){ alert('請先選擇你是誰'); return; }
  saveState();
  goToScreen('question');
  renderQuestion();
}

// Watch guest name input to enable button
document.addEventListener('input', e => {
  if(e.target && e.target.id === 'filler-guest-name'){
    state.filler = e.target.value.trim();
    updateStartButton();
  }
});

function goToScreen(name){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function renderQuestion(){
  const d = DEPTS[state.dept];
  const q = d.questions[state.qIdx];
  if(!q){ renderReview(); return; }

  // Progress
  const total = d.questions.length;
  const progress = ((state.qIdx + 1) / total) * 100;
  document.getElementById('progress-text').textContent = (state.qIdx + 1) + ' / ' + total;
  document.getElementById('progress-fill').style.width = progress + '%';

  // Header
  const headerHtml = [
    `<span class="q-num">問題 ${state.qIdx + 1} / ${total}</span>`,
    q.vam ? '<span class="q-vam-tag">🚨 VAM 命脈</span>' : '',
    q.required ? '<span class="q-required-tag">必填</span>' : '',
  ].filter(Boolean).join('');
  document.getElementById('q-header').innerHTML = headerHtml;

  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-help').textContent = q.help || '';
  document.getElementById('q-help').style.display = q.help ? 'block' : 'none';

  // Render input based on type
  const inputBlock = document.getElementById('q-input-block');
  inputBlock.innerHTML = renderInput(q);

  // Bind events for special types
  bindInputEvents(q);

  // Skip button
  document.getElementById('btn-skip').style.display = q.required ? 'none' : 'inline-block';
  document.getElementById('btn-back').style.display = state.qIdx > 0 ? 'inline-block' : 'none';

  // Update next button text on last question
  const isLast = state.qIdx === total - 1;
  document.getElementById('btn-next').textContent = isLast ? '看答案 →' : '下一題 →';
}

// ═══════════════════════════════════════════════════════════════
// INPUT RENDERING
// ═══════════════════════════════════════════════════════════════

function renderInput(q){
  const ans = state.answers[q.id];
  switch(q.type){
    case 'number-slider': return renderNumberSlider(q, ans);
    case 'pill-single': return renderPillSingle(q, ans);
    case 'pill-multi': return renderPillMulti(q, ans);
    case 'text': return renderText(q, ans);
    case 'textarea': return renderTextarea(q, ans);
    case 'multi-num': return renderMultiNum(q, ans);
    case 'abc-tier': return renderAbcTier(q, ans);
    case 'text-multi': return renderTextMulti(q, ans);
    case 'multi-range': return renderMultiRange(q, ans);
    case 'vendor-list': return renderVendorList(q, ans);
    default: return '<div>Unknown type</div>';
  }
}

function renderNumberSlider(q, ans){
  const val = ans !== undefined ? ans : q.default;
  const step = q.step || 1;
  return `
    <div class="num-slider-row">
      <input class="num-input" type="number" id="ns-num" value="${val}" min="${q.min}" max="${q.max}" step="${step}">
      <div class="num-unit">${q.unit||''}</div>
      <input class="slider" type="range" id="ns-slider" value="${val}" min="${q.min}" max="${q.max}" step="${step}">
    </div>
    <div class="slider-range"><span>${q.min}</span><span>${q.max}</span></div>
  `;
}

function renderPillSingle(q, ans){
  return `<div class="pill-grid">${
    q.options.map((opt, i) => `
      <button class="pill ${ans === opt ? 'selected' : ''}" data-val="${opt}" onclick="selectPillSingle(this)">${opt}</button>
    `).join('')
  }</div>`;
}

function renderPillMulti(q, ans){
  const selected = ans || [];
  return `<div class="pill-grid">${
    q.options.map(opt => `
      <button class="pill pill-multi ${selected.includes(opt) ? 'selected' : ''}" data-val="${opt}" onclick="togglePillMulti(this)">${opt}</button>
    `).join('')
  }</div>`;
}

function renderText(q, ans){
  return `<input class="text-input" id="text-input" type="text" value="${ans||''}" placeholder="${q.placeholder||''}">`;
}

function renderTextarea(q, ans){
  return `<textarea class="textarea-input" id="textarea-input" placeholder="${q.placeholder||''}">${ans||''}</textarea>`;
}

function renderMultiNum(q, ans){
  const vals = ans || q.rows.map(r => r.default);
  return `
    <div class="multi-num-grid">
      ${q.rows.map((r,i) => `
        <div class="multi-num-row">
          <div class="multi-num-label">${r.label}</div>
          <input class="multi-num-input" type="number" data-idx="${i}" value="${vals[i]}" oninput="updateSumCheck()">
          <div class="multi-num-suffix">${r.suffix}</div>
        </div>
      `).join('')}
      ${q.noSum ? '' : `<div class="sum-check" id="sum-check" data-target="${q.sumTarget}"></div>`}
    </div>
  `;
}

function renderAbcTier(q, ans){
  const vals = ans || q.tiers.map(t => t.default);
  const cls = ['abc-a','abc-b','abc-c'];
  return `
    <div class="abc-grid">
      ${q.tiers.map((t,i) => `
        <div class="abc-row">
          <div class="abc-badge ${cls[i]}">${t.tier}</div>
          <div class="abc-content">
            <div class="abc-name">${t.name}</div>
            <input class="abc-input" type="number" data-idx="${i}" value="${vals[i]}">
            <div class="abc-suffix">${q.unit}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderTextMulti(q, ans){
  const vals = ans || Array(q.count).fill('');
  return `
    <div class="text-multi-grid">
      ${Array.from({length: q.count}, (_, i) => `
        <div class="text-multi-row">
          <div class="text-multi-num">${i+1}</div>
          <input class="text-multi-input" type="text" data-idx="${i}" value="${vals[i]||''}" placeholder="${i === 0 ? '例如: 深圳A廠' : ''}">
        </div>
      `).join('')}
    </div>
  `;
}

function renderMultiRange(q, ans){
  const vals = ans || q.rows.map(r => ({min: r.minDefault, max: r.maxDefault}));
  return `
    <div class="range-grid">
      ${q.rows.map((r,i) => `
        <div class="range-row">
          <div class="range-label">${r.label}</div>
          <div class="range-inputs">
            <input class="range-input" type="number" data-idx="${i}" data-kind="min" value="${vals[i]?.min ?? r.minDefault}" step="0.1">
            <span class="range-tilde">~</span>
            <input class="range-input" type="number" data-idx="${i}" data-kind="max" value="${vals[i]?.max ?? r.maxDefault}" step="0.1">
            <span class="range-suffix">${q.unit||''}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderVendorList(q, ans){
  const vals = ans || Array(q.count).fill(null).map(() => ({name:'', cats:[]}));
  return `
    <div class="vendor-grid">
      ${Array.from({length: q.count}, (_, i) => {
        const v = vals[i] || {name:'', cats:[]};
        return `
          <div class="vendor-row" data-idx="${i}">
            <div class="vendor-row-top">
              <div class="vendor-num">${i+1}</div>
              <input class="vendor-input" type="text" value="${v.name||''}" placeholder="${i === 0 ? '例如: 深圳A廠' : '工廠名稱'}">
            </div>
            <div class="vendor-cats">
              ${q.categories.map(cat => `
                <button class="vendor-cat ${v.cats.includes(cat) ? 'selected' : ''}" data-val="${cat}" onclick="toggleVendorCat(this)">${cat}</button>
              `).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

window.toggleVendorCat = function(btn){
  btn.classList.toggle('selected');
};

// ═══════════════════════════════════════════════════════════════
// INPUT EVENTS
// ═══════════════════════════════════════════════════════════════

function bindInputEvents(q){
  if(q.type === 'number-slider'){
    const num = document.getElementById('ns-num');
    const sl = document.getElementById('ns-slider');
    num.addEventListener('input', () => sl.value = num.value);
    sl.addEventListener('input', () => num.value = sl.value);
  }
  if(q.type === 'multi-num'){
    setTimeout(updateSumCheck, 50);
  }
}

function selectPillSingle(btn){
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
  btn.classList.add('selected');
}

function togglePillMulti(btn){
  btn.classList.toggle('selected');
}

function updateSumCheck(){
  const inputs = document.querySelectorAll('.multi-num-input');
  if(!inputs.length) return;
  const check = document.getElementById('sum-check');
  if(!check) return; // noSum mode, no sum check element
  const sum = Array.from(inputs).reduce((s,i) => s + (parseFloat(i.value)||0), 0);
  const target = parseFloat(check.dataset.target);
  let cls = 'ok', icon = '✓';
  if(Math.abs(sum - target) > 0.1){
    cls = sum > target ? 'bad' : 'warn';
    icon = sum > target ? '⚠' : '➕';
  }
  check.className = 'sum-check ' + cls;
  check.textContent = `${icon} 總和 ${sum} / ${target}`;
}

// ═══════════════════════════════════════════════════════════════
// COLLECT ANSWER
// ═══════════════════════════════════════════════════════════════

function collectAnswer(q){
  switch(q.type){
    case 'number-slider': return parseFloat(document.getElementById('ns-num').value);
    case 'pill-single': {
      const sel = document.querySelector('.pill.selected');
      return sel ? sel.dataset.val : null;
    }
    case 'pill-multi': {
      return Array.from(document.querySelectorAll('.pill.selected')).map(p => p.dataset.val);
    }
    case 'text': return document.getElementById('text-input').value.trim();
    case 'textarea': return document.getElementById('textarea-input').value.trim();
    case 'multi-num': return Array.from(document.querySelectorAll('.multi-num-input')).map(i => parseFloat(i.value)||0);
    case 'abc-tier': return Array.from(document.querySelectorAll('.abc-input')).map(i => parseFloat(i.value)||0);
    case 'text-multi': return Array.from(document.querySelectorAll('.text-multi-input')).map(i => i.value.trim());
    case 'multi-range': {
      const rows = document.querySelectorAll('.range-row');
      return Array.from(rows).map(row => {
        const inputs = row.querySelectorAll('.range-input');
        return {min: parseFloat(inputs[0].value)||0, max: parseFloat(inputs[1].value)||0};
      });
    }
    case 'vendor-list': {
      const rows = document.querySelectorAll('.vendor-row');
      return Array.from(rows).map(row => {
        const name = row.querySelector('.vendor-input').value.trim();
        const cats = Array.from(row.querySelectorAll('.vendor-cat.selected')).map(c => c.dataset.val);
        return {name, cats};
      }).filter(v => v.name);
    }
    default: return null;
  }
}

function validateAnswer(q, ans){
  if(!q.required) return true;
  if(ans === null || ans === undefined || ans === '') return false;
  if(Array.isArray(ans) && ans.length === 0) return false;
  if(q.type === 'multi-num' && !q.noSum){
    const sum = ans.reduce((s,v) => s + v, 0);
    if(Math.abs(sum - q.sumTarget) > 0.1) return false;
    return true;
  }
  if(q.type === 'multi-range'){
    return ans.some(r => (r.min > 0 || r.max > 0));
  }
  if(q.type === 'vendor-list'){
    return ans.some(v => v.name && v.name.length > 0);
  }
  if(Array.isArray(ans) && ans.every(v => !v || v === 0)) return false;
  return true;
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════

function nextQuestion(){
  const d = DEPTS[state.dept];
  const q = d.questions[state.qIdx];
  const ans = collectAnswer(q);

  if(!validateAnswer(q, ans)){
    alert(q.required ? '這是必填題，請完成後再前進' : '請填寫');
    return;
  }
  state.answers[q.id] = ans;
  state.qIdx++;
  saveState();

  if(state.qIdx >= d.questions.length){
    renderReview();
  }else{
    renderQuestion();
  }
  window.scrollTo({top:0, behavior:'smooth'});
}

function prevQuestion(){
  if(state.qIdx > 0){
    // Save current answer (don't validate, allow incomplete)
    const q = DEPTS[state.dept].questions[state.qIdx];
    try{ state.answers[q.id] = collectAnswer(q); }catch(e){}
    state.qIdx--;
    saveState();
    renderQuestion();
  }
  window.scrollTo({top:0, behavior:'smooth'});
}

function skipQuestion(){
  state.qIdx++;
  saveState();
  const d = DEPTS[state.dept];
  if(state.qIdx >= d.questions.length){
    renderReview();
  }else{
    renderQuestion();
  }
}

// ═══════════════════════════════════════════════════════════════
// REVIEW
// ═══════════════════════════════════════════════════════════════

function renderReview(){
  goToScreen('review');
  const d = DEPTS[state.dept];
  document.getElementById('progress-text').textContent = '檢視答案';
  document.getElementById('progress-fill').style.width = '100%';

  const reviewList = document.getElementById('review-list');
  reviewList.innerHTML = d.questions.map((q,i) => {
    const ans = state.answers[q.id];
    const ansDisplay = formatAnswer(q, ans);
    return `
      <div class="review-section">
        <div class="review-q">${q.id} · ${q.text} <span class="review-edit" onclick="editQuestion(${i})">編輯</span></div>
        <div class="review-a ${!ans ? 'empty' : ''}">${ansDisplay}</div>
      </div>
    `;
  }).join('');
}

function formatAnswer(q, ans){
  if(ans === null || ans === undefined || ans === '') return '（未填）';
  if(Array.isArray(ans)){
    if(q.type === 'multi-num') return q.rows.map((r,i) => `${r.label}: ${ans[i]||0}${r.suffix}`).join(' · ');
    if(q.type === 'abc-tier') return q.tiers.map((t,i) => `${t.tier} ${ans[i]||0} ${q.unit}`).join(' · ');
    if(q.type === 'text-multi') return ans.filter(v => v).join('、') || '（未填）';
    if(q.type === 'multi-range') return q.rows.map((r,i) => `${r.label}: ${ans[i]?.min||0}-${ans[i]?.max||0} ${q.unit}`).join('；');
    if(q.type === 'vendor-list') return ans.map(v => `${v.name}${v.cats.length ? '（' + v.cats.join('/') + '）' : ''}`).join('、') || '（未填）';
    return ans.join('、');
  }
  if(typeof ans === 'number') return ans + (q.unit ? ' ' + q.unit : '');
  return ans;
}

function editQuestion(i){
  state.qIdx = i;
  saveState();
  goToScreen('question');
  renderQuestion();
}

// ═══════════════════════════════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════════════════════════════

function submitAll(){
  const d = DEPTS[state.dept];
  const submission = {
    dept: state.dept,
    deptName: d.name,
    filler: state.filler,
    fillerRole: state.fillerRole, // 'official' | 'guest'
    submittedAt: new Date().toISOString(),
    answers: state.answers,
  };
  // Stage 1: localStorage only
  const allSubmissions = JSON.parse(localStorage.getItem('wujie_q_submissions')||'[]');
  allSubmissions.push(submission);
  localStorage.setItem('wujie_q_submissions', JSON.stringify(allSubmissions));

  // Clear in-progress
  localStorage.removeItem(getStorageKey());

  console.log('Submitted:', submission);
  goToScreen('thank');
  document.getElementById('progress-text').textContent = '';
}

init();
</script>
