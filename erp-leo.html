<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解 ERP · Leo 工作台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0c10;--surface:#111318;--card:#181a22;--card2:#1e2130;
  --border:#222535;--border-hi:#363b58;
  --txt-hi:#e8eaf8;--txt-mid:#7880a8;--txt-lo:#3d4268;
  --accent:#475569;--accent-dim:#47556920;
  --ok:#22c55e;--ok-dim:#22c55e18;
  --warn:#f59e0b;--warn-dim:#f59e0b18;
  --danger:#ef4444;--danger-dim:#ef444418;
  --blue:#0284c7;
}
body{background:var(--bg);color:var(--txt-hi);font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;min-height:100vh;padding-bottom:80px;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.tb-back{background:none;border:1px solid var(--border);border-radius:8px;color:var(--txt-mid);padding:6px 12px;font-size:12px;cursor:pointer;}
.tb-back:hover{border-color:var(--border-hi);color:var(--txt-hi);}
.tb-title{font-size:14px;font-weight:700;}
.tb-user{margin-left:auto;font-size:11px;color:var(--txt-mid);}

.main{padding:16px;max-width:720px;margin:0 auto;}

/* Greeting */
.greet{background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--border-hi);border-radius:16px;padding:20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.greet-left{}
.greet-hi{font-size:18px;font-weight:800;margin-bottom:4px;}
.greet-sub{font-size:12px;color:var(--txt-mid);}
.greet-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;}
.badge-warn{background:var(--warn-dim);border:1px solid var(--warn);color:var(--warn);}
.badge-ok{background:var(--ok-dim);border:1px solid var(--ok);color:var(--ok);}
.badge-blue{background:#0284c720;border:1px solid #0284c7;color:var(--blue);}

/* Section */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:24px;}
.sec-hd:first-of-type{margin-top:0;}
.sec-title{font-size:11px;font-weight:700;color:var(--txt-mid);text-transform:uppercase;letter-spacing:.08em;}
.sec-action{font-size:11px;color:var(--blue);cursor:pointer;border:none;background:none;}
.sec-action:hover{opacity:.8;}

/* Monthly checklist */
.checklist{display:flex;flex-direction:column;gap:8px;margin-bottom:4px;}
.check-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;}
.check-item:hover{border-color:var(--border-hi);}
.check-item.done{opacity:.55;}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border-hi);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.check-box:hover{border-color:var(--ok);}
.check-box.checked{background:var(--ok);border-color:var(--ok);}
.check-box.checked::after{content:'✓';font-size:12px;font-weight:800;color:#000;}
.check-info{flex:1;}
.check-name{font-size:13px;font-weight:700;}
.check-meta{font-size:11px;color:var(--txt-mid);margin-top:2px;}
.check-due{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;flex-shrink:0;}
.due-urgent{background:var(--danger-dim);color:var(--danger);}
.due-warn{background:var(--warn-dim);color:var(--warn);}
.due-ok{background:var(--ok-dim);color:var(--ok);}

/* Quick records */
.record-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:4px;}
@media(max-width:420px){.record-grid{grid-template-columns:1fr;}}
.record-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:border-color .15s;}
.record-card:hover{border-color:var(--border-hi);}
.rc-icon{font-size:22px;margin-bottom:6px;}
.rc-name{font-size:13px;font-weight:700;margin-bottom:4px;}
.rc-desc{font-size:11px;color:var(--txt-mid);line-height:1.5;}
.rc-sync{font-size:10px;color:var(--txt-lo);margin-top:6px;}
.rc-sync span{color:var(--blue);}

/* Recent entries */
.entry-list{display:flex;flex-direction:column;gap:6px;margin-bottom:4px;}
.entry-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:10px;}
.entry-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-income{background:var(--ok);}
.dot-expense{background:var(--danger);}
.dot-transfer{background:var(--blue);}
.entry-info{flex:1;}
.entry-name{font-size:12px;font-weight:700;}
.entry-meta{font-size:10px;color:var(--txt-lo);}
.entry-amount{font-size:13px;font-weight:800;flex-shrink:0;}
.entry-amount.income{color:var(--ok);}
.entry-amount.expense{color:var(--danger);}
.entry-amount.transfer{color:var(--blue);}

/* Sync status */
.sync-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:4px;}
.sync-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sync-title{font-size:13px;font-weight:700;}
.sync-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.sync-ok{background:var(--ok-dim);border:1px solid var(--ok);color:var(--ok);}
.sync-warn{background:var(--warn-dim);border:1px solid var(--warn);color:var(--warn);}
.sync-rows{display:flex;flex-direction:column;gap:8px;}
.sync-row{display:flex;justify-content:space-between;align-items:center;}
.sync-label{font-size:12px;color:var(--txt-mid);}
.sync-val{font-size:12px;font-weight:700;}
.sync-val.ok{color:var(--ok);}
.sync-val.pending{color:var(--warn);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:#00000080;z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border-hi);border-radius:16px;padding:22px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:800;margin-bottom:4px;}
.modal-sub{font-size:11px;color:var(--txt-mid);margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--txt-mid);font-weight:600;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--txt-hi);outline:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);}
.field select option{background:var(--card2);}
.field textarea{resize:vertical;min-height:70px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-footer{display:flex;gap:8px;margin-top:4px;}
.btn-full{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;}
.btn-submit{background:var(--blue);color:#fff;}
.btn-cancel{background:var(--card2);color:var(--txt-mid);border:1px solid var(--border);}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ok);color:#000;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
<script src="mock-data.js"></script>
</head>
<body>

<div class="topbar">
  <button class="tb-back" onclick="location.href='erp-lobby.html'">← 大廳</button>
  <span class="tb-title">🏦 Leo 工作台</span>
  <span class="tb-user" id="tb-user"></span>
  <button class="tb-back" onclick="logout()" style="margin-left:8px;">登出</button>
</div>

<div class="main">

  <!-- Greeting -->
  <div class="greet">
    <div class="greet-left">
      <div class="greet-hi" id="greet-hi">Leo，本月帳務整理</div>
      <div class="greet-sub">台灣出納 · 與躍明同步</div>
      <div class="greet-badges" id="greet-badges"></div>
    </div>
  </div>

  <!-- Monthly checklist -->
  <div class="sec-hd">
    <span class="sec-title" id="checklist-title">本月例行工作</span>
  </div>
  <div class="checklist" id="checklist"></div>

  <!-- Quick record -->
  <div class="sec-hd">
    <span class="sec-title">快速記帳</span>
  </div>
  <div class="record-grid">
    <div class="record-card" onclick="openRecord('income')">
      <div class="rc-icon">💰</div>
      <div class="rc-name">記錄收入</div>
      <div class="rc-desc">客戶付款、預收款、其他收入</div>
      <div class="rc-sync">同步至：<span>躍明財務工作台</span></div>
    </div>
    <div class="record-card" onclick="openRecord('expense')">
      <div class="rc-icon">💸</div>
      <div class="rc-name">記錄支出</div>
      <div class="rc-desc">房租水電、薪資、日常費用</div>
      <div class="rc-sync">同步至：<span>躍明財務工作台</span></div>
    </div>
    <div class="record-card" onclick="openRecord('transfer')">
      <div class="rc-icon">🔄</div>
      <div class="rc-name">跨帳戶轉帳</div>
      <div class="rc-desc">台灣各帳戶之間轉帳紀錄</div>
      <div class="rc-sync">同步至：<span>躍明財務工作台</span></div>
    </div>
    <div class="record-card" onclick="openRecord('advance')">
      <div class="rc-icon">📋</div>
      <div class="rc-name">代墊款記錄</div>
      <div class="rc-desc">員工代墊 / 公司代墊明細</div>
      <div class="rc-sync">需：<span>安然確認後回補</span></div>
    </div>
  </div>

  <!-- Sync status -->
  <div class="sec-hd"><span class="sec-title">與躍明同步狀態</span></div>
  <div class="sync-card">
    <div class="sync-header">
      <span class="sync-title">2026 年 5 月對帳</span>
      <span class="sync-badge sync-warn" id="sync-badge">待確認</span>
    </div>
    <div class="sync-rows">
      <div class="sync-row">
        <span class="sync-label">台灣費用明細</span>
        <span class="sync-val pending" id="sy-expense">整理中</span>
      </div>
      <div class="sync-row">
        <span class="sync-label">Q1 費用彙總</span>
        <span class="sync-val ok">✓ 已提交</span>
      </div>
      <div class="sync-row">
        <span class="sync-label">4 月固定支出</span>
        <span class="sync-val ok">✓ 已確認</span>
      </div>
      <div class="sync-row">
        <span class="sync-label">5 月固定支出</span>
        <span class="sync-val pending" id="sy-may">執行中</span>
      </div>
    </div>
  </div>

  <!-- Recent entries -->
  <div class="sec-hd">
    <span class="sec-title">近期記錄</span>
    <button class="sec-action" onclick="showToast('完整記錄在正式版查詢')">查看全部</button>
  </div>
  <div class="entry-list" id="entry-list"></div>

</div>

<!-- Record Modal -->
<div class="modal-bg" id="modal-record">
  <div class="modal">
    <div class="modal-title" id="rec-title">記錄收入</div>
    <div class="modal-sub" id="rec-sub">記錄後自動同步給躍明</div>
    <div class="field-row">
      <div class="field"><label>日期</label><input type="date" id="rec-date"></div>
      <div class="field"><label>金額</label><input id="rec-amount" placeholder="例：50,000"></div>
    </div>
    <div class="field"><label>幣別</label>
      <select id="rec-currency">
        <option>TWD</option><option>CNY</option><option>HKD</option><option>USD</option><option>THB</option>
      </select>
    </div>
    <div class="field"><label>摘要</label><input id="rec-desc" placeholder="說明這筆款項的來源/用途"></div>
    <div class="field"><label>帳戶</label>
      <select id="rec-account">
        <option>台灣主帳戶（悍草）</option>
        <option>台灣備用帳戶</option>
        <option>現金</option>
      </select>
    </div>
    <div class="field"><label>備註 / 附件說明</label>
      <textarea id="rec-note" placeholder="如有票據，說明票據號碼或上傳方式..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-full btn-cancel" onclick="closeRecord()">取消</button>
      <button class="btn-full btn-submit" onclick="saveRecord()">儲存並通知躍明</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SESS = JSON.parse(localStorage.getItem('erp_sess')||'null');
if(!SESS||Date.now()-SESS.ts>7*86400000){ localStorage.removeItem('erp_sess'); location.href='login.html'; }
function logout(){ localStorage.removeItem('erp_sess'); location.href='login.html'; }
document.getElementById('tb-user').textContent = SESS.name + ' · ' + SESS.role;

// ── Checklist ──────────────────────────────────────────────
const CHECKLIST_KEY = 'leo_checklist_v1';
const MONTHLY_TASKS = [
  {id:'c1',name:'5月固定支出執行',meta:'房租 + 水電 + 薪資，需同步躍明',due:'warn'},
  {id:'c2',name:'台灣 Q1 費用明細整理',meta:'配合躍明月結報表',due:'warn'},
  {id:'c3',name:'客戶預收款核對',meta:'確認是否有未入帳款項',due:'ok'},
  {id:'c4',name:'代墊款回補確認',meta:'安然複核後等躍明匯回',due:'ok'},
  {id:'c5',name:'月底帳目提交躍明',meta:'截止 5/31，每月例行',due:'ok'},
];

function loadChecklist(){ return JSON.parse(localStorage.getItem(CHECKLIST_KEY)||'{"done":[]}'); }
function saveChecklist(s){ localStorage.setItem(CHECKLIST_KEY,JSON.stringify(s)); }

// ── Entries ────────────────────────────────────────────────
const ENTRIES_KEY = 'leo_entries_v1';
function loadEntries(){
  const stored = localStorage.getItem(ENTRIES_KEY);
  if(stored) return JSON.parse(stored);
  const seed = [
    {id:'e1',type:'expense',name:'5月房租（台北辦公室）',meta:'2026-05-01 · 台灣主帳戶',amount:'-NT$45,000'},
    {id:'e2',type:'income', name:'客戶預付款 — 貓福珊迪批貨',meta:'2026-04-30 · 台灣主帳戶',amount:'+NT$120,000'},
    {id:'e3',type:'transfer',name:'主帳戶→備用帳戶轉帳',meta:'2026-04-28 · 備用金',amount:'NT$30,000'},
    {id:'e4',type:'expense',name:'4月水電瓦斯費',meta:'2026-04-25 · 台灣主帳戶',amount:'-NT$3,280'},
  ];
  localStorage.setItem(ENTRIES_KEY,JSON.stringify(seed));
  return seed;
}
function saveEntries(arr){ localStorage.setItem(ENTRIES_KEY,JSON.stringify(arr)); }

let currentRecordType = 'income';

function render(){
  const cl = loadChecklist();
  const done = cl.done||[];
  const total = MONTHLY_TASKS.length;
  const doneCount = done.length;

  // Greeting badges
  const remaining = total - doneCount;
  document.getElementById('greet-hi').textContent = remaining===0
    ? 'Leo，本月例行工作都完成了 ✓'
    : `Leo，本月還有 ${remaining} 件例行工作`;
  const badges = document.getElementById('greet-badges');
  badges.innerHTML='';
  if(doneCount>0) badges.innerHTML+=`<span class="badge badge-ok">✓ 已完成 ${doneCount}</span>`;
  if(remaining>0) badges.innerHTML+=`<span class="badge badge-warn">${remaining} 件待完成</span>`;

  // Checklist
  document.getElementById('checklist-title').textContent=`本月例行工作（${doneCount}/${total}）`;
  document.getElementById('checklist').innerHTML = MONTHLY_TASKS.map(t=>{
    const isDone = done.includes(t.id);
    return `<div class="check-item ${isDone?'done':''}" onclick="toggleCheck('${t.id}')">
      <div class="check-box ${isDone?'checked':''}"></div>
      <div class="check-info">
        <div class="check-name">${t.name}</div>
        <div class="check-meta">${t.meta}</div>
      </div>
      ${!isDone?`<span class="check-due due-${t.due}">${t.due==='warn'?'本月優先':'本月內'}</span>`:''}
    </div>`;
  }).join('');

  // Entries
  const entries = loadEntries().slice(0,6);
  document.getElementById('entry-list').innerHTML = entries.map(e=>`
    <div class="entry-row">
      <div class="entry-dot dot-${e.type}"></div>
      <div class="entry-info">
        <div class="entry-name">${e.name}</div>
        <div class="entry-meta">${e.meta}</div>
      </div>
      <div class="entry-amount ${e.type}">${e.amount}</div>
    </div>`).join('');
}

function toggleCheck(id){
  const cl = loadChecklist();
  const idx = cl.done.indexOf(id);
  if(idx>-1) cl.done.splice(idx,1);
  else cl.done.push(id);
  saveChecklist(cl);
  render();
  showToast(idx>-1 ? '已取消完成' : '已完成 ✓');
}

const REC_CONFIG = {
  income:  {title:'記錄收入',  sub:'收入記錄後同步給躍明'},
  expense: {title:'記錄支出',  sub:'支出記錄後同步給躍明'},
  transfer:{title:'跨帳戶轉帳',sub:'台灣帳戶間轉帳紀錄'},
  advance: {title:'代墊款記錄',sub:'需安然確認後由躍明匯回'},
};

function openRecord(type){
  currentRecordType = type;
  const cfg = REC_CONFIG[type];
  document.getElementById('rec-title').textContent = cfg.title;
  document.getElementById('rec-sub').textContent = cfg.sub;
  document.getElementById('rec-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('rec-amount').value='';
  document.getElementById('rec-desc').value='';
  document.getElementById('rec-note').value='';
  document.getElementById('modal-record').classList.add('show');
}

function saveRecord(){
  const desc = document.getElementById('rec-desc').value.trim()||'未填摘要';
  const amount = document.getElementById('rec-amount').value.trim()||'—';
  const currency = document.getElementById('rec-currency').value;
  const date = document.getElementById('rec-date').value;
  const entries = loadEntries();
  const prefix = currentRecordType==='income'?'+':currentRecordType==='expense'?'-':'';
  entries.unshift({
    id:'e'+Date.now(),
    type:currentRecordType,
    name:desc,
    meta:`${date} · ${document.getElementById('rec-account').value}`,
    amount:`${prefix}${currency} ${amount}`,
  });
  saveEntries(entries);
  closeRecord();
  render();
  showToast('已記錄並通知躍明 ✓');
}

function closeRecord(){ document.getElementById('modal-record').classList.remove('show'); }

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

render();
</script>

<!-- ── EXPENSE FAB ── -->
<style>

.exp-fab:active{transform:scale(.92);}

.exp-sheet{background:#111318;border:1px solid #222535;border-radius:16px 16px 0 0;width:100%;max-width:520px;padding:20px;max-height:85vh;overflow-y:auto;}
.exp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.exp-title{font-size:15px;font-weight:700;color:#e8eaf8;}

.exp-type-btn.active{border-color:#10b981;color:#10b981;background:#10b98112;}
.exp-field{margin-bottom:12px;}
.exp-field label{display:block;font-size:10px;font-weight:700;color:#7880a8;letter-spacing:.06em;margin-bottom:5px;text-transform:uppercase;}
.exp-field input,.exp-field select,.exp-field textarea{width:100%;background:#181a22;border:1px solid #222535;border-radius:8px;color:#e8eaf8;font-size:13px;padding:8px 10px;outline:none;}
.exp-field textarea{resize:vertical;font-family:inherit;}
.exp-amt-row{display:flex;gap:6px;}
.exp-amt-row input{flex:1;}
.exp-amt-row select{width:90px;}
.exp-routing{font-size:11px;color:#7880a8;padding:8px 10px;background:#181a22;border-radius:8px;margin-bottom:12px;border:1px solid #222535;}
.exp-routing strong{color:#10b981;}
.exp-submit{width:100%;padding:12px;background:#10b981;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
.exp-submit:active{opacity:.85;}
</style>
<button class="exp-fab" onclick="openExpModal()" title="費用申請">💰</button>
<div class="exp-overlay" id="expOverlay" onclick="if(event.target===this)closeExpModal()">
<div class="exp-sheet">
  <div class="exp-header"><span class="exp-title">費用申請</span><button class="exp-close" onclick="closeExpModal()">✕</button></div>
  <div class="exp-type-row" id="expTypeRow">
    <button class="exp-type-btn active" id="expTypePersonal" onclick="setExpType('personal')">個人報銷</button>
    <button class="exp-type-btn" id="expTypeSupplier" onclick="setExpType('supplier')">供應商付款申請</button>
  </div>
  <div id="expPersonalFields">
    <div class="exp-field"><label>金額</label><div class="exp-amt-row"><input id="expAmt" type="number" placeholder="0.00" min="0" step="0.01"><select id="expCcy"><option>RMB</option><option>TWD</option><option>HKD</option><option>THB</option><option>USD</option></select></div></div>
    <div class="exp-field"><label>類別</label><select id="expCat"><option value="transport">交通 / 車資</option><option value="meal">餐飲</option><option value="lodging">住宿</option><option value="business">業務招待</option><option value="material">材料 / 文具</option><option value="trip">出差費用</option><option value="other">其他</option></select></div>
    <div class="exp-field"><label>日期</label><input id="expDate" type="date"></div>
    <div class="exp-field"><label>說明</label><textarea id="expDesc" rows="2" placeholder="費用說明、事由..."></textarea></div>
  </div>
  <div id="expSupplierFields" style="display:none">
    <div class="exp-field"><label>供應商名稱</label><input id="expSupName" placeholder="例：東莞廠、德榮包裝"></div>
    <div class="exp-field"><label>關聯 PO#（選填）</label><input id="expSupPO" placeholder="例：PO-2026-318"></div>
    <div class="exp-field"><label>金額</label><div class="exp-amt-row"><input id="expSupAmt" type="number" placeholder="0.00" min="0" step="0.01"><select id="expSupCcy"><option>RMB</option><option>TWD</option><option>HKD</option><option>THB</option><option>USD</option></select></div></div>
    <div class="exp-field"><label>付款說明</label><textarea id="expSupDesc" rows="2" placeholder="付款條件、發票情況..."></textarea></div>
  </div>
  <div class="exp-routing" id="expRouting">載入中...</div>
  <button class="exp-submit" onclick="submitExpense()">送出申請</button>
</div>
</div>
<script>
(function(){
const EXP_ROUTES={
  shetong:{next:'bevis',nextLabel:'Bevis',cc:'安然'},
  peilin:{next:'bevis',nextLabel:'Bevis',cc:'安然'},
  bevis:{next:'ray',nextLabel:'Ray',cc:'安然'},
  laodong:{next:'anran',nextLabel:'安然',cc:null},
  debao:{next:'anran',nextLabel:'安然',cc:null},
  gaowei:{next:'shawn',nextLabel:'Shawn',cc:'安然'},
  chunlei:{next:'shawn',nextLabel:'Shawn',cc:'安然'},
  jiaying:{next:'shawn',nextLabel:'Shawn',cc:'安然'},
  xiaochuan:{next:'shawn',nextLabel:'Shawn',cc:'安然'},
  muzi:{next:'laige',nextLabel:'賴哥',cc:'安然'},
  laige:{next:'yangzi',nextLabel:'楊子（直接）',cc:'安然'},
  yuming:{next:'yangzi',nextLabel:'楊子（直接）',cc:'安然'},
  yangzi:{next:'anran',nextLabel:'安然',cc:null},
  anran:{next:'yangzi',nextLabel:'楊子（直接）',cc:'Ray'},
  shawn:{next:'yangzi',nextLabel:'楊子（直接）',cc:'Ray'},
  leo:{next:'ray',nextLabel:'Ray',cc:null},
  ray:{next:'yangzi',nextLabel:'楊子（直接）',cc:null},
};
const SUPPLIER_ALLOWED=['laige','muzi','anran','ray'];
const _LR='https://feishu-proxy.raychou6913.workers.dev';
const _LAT='Sg7ObNELHaAdZzshGIFjWPVhpce';
const _LTBL='tbl4OBNvsNkqS4mQ';
const _LAPPROVER={ray:'Ray',shawn:'Shawn',anran:'安然',yangzi:'楊子',laige:'賴哥'};
async function _lWriteApproval(fields){try{const tr=await fetch(_LR+'/auth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});const {tenant_access_token:tk}=await tr.json();await fetch(_LR+'/open-apis/bitable/v1/apps/'+_LAT+'/tables/'+_LTBL+'/records',{method:'POST',headers:{'Authorization':'Bearer '+tk,'Content-Type':'application/json'},body:JSON.stringify({fields})});}catch(e){console.warn('Feishu write skipped',e);}}
let expType='personal';
function getUser(){try{return(JSON.parse(localStorage.getItem('erp_sess')||'null')||{}).user||'';}catch(e){return '';}}
function openExpModal(){
  const u=getUser();const r=EXP_ROUTES[u];
  const hint=document.getElementById('expRouting');
  if(r){let s=`送審路徑：<strong>${r.nextLabel}</strong>`;if(r.cc)s+=` → 楊子付款，抄送 <strong>${r.cc}</strong>`;else if(r.next==='yangzi')s+=' 付款';hint.innerHTML=s;}
  else{hint.innerHTML='送審路徑：楊子';}
  const supBtn=document.getElementById('expTypeSupplier');
  if(supBtn)supBtn.style.display=SUPPLIER_ALLOWED.includes(u)?'':'none';
  document.getElementById('expDate').valueAsDate=new Date();
  setExpType('personal');
  document.getElementById('expOverlay').classList.add('open');
}
function closeExpModal(){document.getElementById('expOverlay').classList.remove('open');}
function setExpType(t){
  expType=t;
  document.getElementById('expPersonalFields').style.display=t==='personal'?'':'none';
  document.getElementById('expSupplierFields').style.display=t==='supplier'?'':'none';
  document.getElementById('expTypePersonal').classList.toggle('active',t==='personal');
  document.getElementById('expTypeSupplier').classList.toggle('active',t==='supplier');
}
function submitExpense(){
  const u=getUser();const r=EXP_ROUTES[u]||{next:'yangzi',nextLabel:'楊子',cc:null};
  let rec;
  if(expType==='personal'){
    const amt=document.getElementById('expAmt').value;
    const ccy=document.getElementById('expCcy').value;
    const cat=document.getElementById('expCat').options[document.getElementById('expCat').selectedIndex].text;
    const date=document.getElementById('expDate').value;
    const desc=document.getElementById('expDesc').value;
    if(!amt||!date){(window.showToast||window._toast||alert)('請填寫金額與日期');return;}
    rec={type:'個人報銷',user:u,amt,ccy,cat,date,desc,next:r.next,cc:r.cc,ts:Date.now()};
  }else{
    const name=document.getElementById('expSupName').value;
    const po=document.getElementById('expSupPO').value;
    const amt=document.getElementById('expSupAmt').value;
    const ccy=document.getElementById('expSupCcy').value;
    const desc=document.getElementById('expSupDesc').value;
    if(!name||!amt){(window.showToast||window._toast||alert)('請填寫供應商名稱與金額');return;}
    rec={type:'供應商付款申請',user:u,supplier:name,po,amt,ccy,desc,next:r.next,cc:r.cc,ts:Date.now()};
  }
  const key='erp_expense_queue';
  const q=JSON.parse(localStorage.getItem(key)||'[]');
  q.push(rec);localStorage.setItem(key,JSON.stringify(q));
  const _lcy={'TWD':'TWD','HKD':'HKD','USD':'USD','THB':'THB','CNY':'CNY','RMB':'CNY'}[rec.ccy]||'CNY';
  const _lapp=_LAPPROVER[rec.next]||'楊子';
  _lWriteApproval({'標題':`【${rec.type}】${rec.user} ${rec.amt}${rec.ccy}`,'審批標題':`【${rec.type}】${rec.user} ${rec.amt}${rec.ccy}`,'審批類型':'費用申請','申請人':rec.user,'申請日期':Date.now(),'金額':parseFloat(rec.amt)||0,'幣別':_lcy,'審批人':_lapp,'審批狀態':'待審批','Email已發送':'否','申請說明':rec.desc||rec.cat||''});
  closeExpModal();
  (window.showToast||window._toast||alert)(`✅ 申請已送出 · 待 ${r.nextLabel} 審核`);
}
window.openExpModal=openExpModal;window.closeExpModal=closeExpModal;window.setExpType=setExpType;window.submitExpense=submitExpense;
})();
</script>

</body>
</html>
