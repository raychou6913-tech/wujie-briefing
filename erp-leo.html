<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解 ERP · Leo 工作台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0c10;--surface:#111318;--card:#181a22;--card2:#1e2130;
  --border:#222535;--border-hi:#363b58;
  --txt-hi:#e8eaf8;--txt-mid:#7880a8;--txt-lo:#3d4268;
  --accent:#0284c7;--accent-dim:#0284c718;
  --ok:#22c55e;--ok-dim:#22c55e18;
  --warn:#f59e0b;--warn-dim:#f59e0b18;
  --danger:#ef4444;--danger-dim:#ef444418;
}
body{background:var(--bg);color:var(--txt-hi);font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;min-height:100vh;padding-bottom:80px;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.tb-back{background:none;border:1px solid var(--border);border-radius:8px;color:var(--txt-mid);padding:6px 12px;font-size:12px;cursor:pointer;}
.tb-back:hover{border-color:var(--border-hi);color:var(--txt-hi);}
.tb-title{font-size:14px;font-weight:700;}
.tb-user{margin-left:auto;font-size:11px;color:var(--txt-mid);}

.main{padding:16px;max-width:720px;margin:0 auto;}

/* Greeting */
.greet{background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--border-hi);border-radius:16px;padding:20px;margin-bottom:16px;}
.greet-hi{font-size:18px;font-weight:800;margin-bottom:4px;}
.greet-sub{font-size:12px;color:var(--txt-mid);}
.greet-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;}
.badge-warn{background:var(--warn-dim);border:1px solid var(--warn);color:var(--warn);}
.badge-ok{background:var(--ok-dim);border:1px solid var(--ok);color:var(--ok);}
.badge-blue{background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);}

/* Section */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:24px;}
.sec-title{font-size:11px;font-weight:700;color:var(--txt-mid);text-transform:uppercase;letter-spacing:.08em;}
.sec-link{font-size:11px;color:var(--accent);cursor:pointer;font-weight:700;border:none;background:none;}

/* Payment items */
.pay-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.pay-bar{width:4px;align-self:stretch;border-radius:2px;flex-shrink:0;}
.pay-body{flex:1;min-width:0;}
.pay-title{font-size:13px;font-weight:700;}
.pay-meta{font-size:10px;color:var(--txt-mid);margin-top:2px;}
.pay-note{font-size:10px;color:var(--txt-lo);margin-top:2px;}
.pay-right{text-align:right;flex-shrink:0;}
.pay-amt{font-size:14px;font-weight:800;color:var(--warn);margin-bottom:6px;}
.pay-btn{font-size:10px;font-weight:700;padding:4px 12px;border-radius:6px;cursor:pointer;border:1px solid;}

/* Payroll steps */
.payroll-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:4px;}
.payroll-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.payroll-month{font-size:14px;font-weight:800;}
.payroll-status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;}
.status-progress{background:var(--warn-dim);border:1px solid var(--warn);color:var(--warn);}
.status-done{background:var(--ok-dim);border:1px solid var(--ok);color:var(--ok);}
.payroll-rows{display:flex;flex-direction:column;gap:8px;}
.payroll-row{display:flex;align-items:center;gap:10px;}
.pr-step{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
.step-done{background:var(--ok);color:#000;}
.step-active{background:var(--accent);color:#fff;}
.step-todo{background:var(--card2);border:1px solid var(--border);color:var(--txt-lo);}
.pr-label{font-size:12px;flex:1;}
.pr-label.active{font-weight:700;color:var(--txt-hi);}
.pr-label.done{color:var(--txt-lo);text-decoration:line-through;}
.pr-action{font-size:11px;color:var(--accent);cursor:pointer;border:none;background:none;}

/* NHI (勞健保) */
.nhi-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:4px;}
.nhi-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
.nhi-month{font-size:13px;font-weight:800;}
.nhi-due{font-size:11px;color:var(--warn);font-weight:700;}
.nhi-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);}
.nhi-row:last-child{border-bottom:none;}
.nhi-label{font-size:12px;flex:1;color:var(--txt-mid);}
.nhi-amt{font-size:13px;font-weight:800;min-width:80px;text-align:right;}
.nhi-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border-hi);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;cursor:pointer;flex-shrink:0;transition:all .15s;}
.nhi-check.paid{background:var(--ok);border-color:var(--ok);color:#000;}
.nhi-check:not(.paid):hover{border-color:var(--ok);}
.nhi-total-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card2);border-top:1px solid var(--border-hi);}
.nhi-total-label{font-size:11px;font-weight:700;color:var(--txt-mid);}
.nhi-total-amt{font-size:14px;font-weight:800;}

/* Bank accounts */
.bank-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
@media(max-width:480px){.bank-grid{grid-template-columns:1fr;}}
.bank-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;}
.bank-name{font-size:11px;font-weight:700;color:var(--txt-mid);margin-bottom:6px;}
.bank-bal{font-size:20px;font-weight:800;margin-bottom:4px;}
.bank-meta{font-size:10px;color:var(--txt-lo);}
.bank-upd{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;background:var(--accent-dim);color:var(--accent);border:1px solid #0284c740;cursor:pointer;margin-top:8px;}
.bank-upd:hover{opacity:.8;}

/* Checklist */
.check-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;margin-bottom:8px;}
.check-item:hover{border-color:var(--border-hi);}
.check-item.done{opacity:.5;}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border-hi);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
.check-box.checked{background:var(--ok);border-color:var(--ok);color:#000;}
.check-info{flex:1;}
.check-name{font-size:13px;font-weight:700;}
.check-meta{font-size:11px;color:var(--txt-mid);margin-top:2px;}
.check-due{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;flex-shrink:0;}
.due-urgent{background:var(--danger-dim);color:var(--danger);}
.due-warn{background:var(--warn-dim);color:var(--warn);}
.due-ok{background:var(--ok-dim);color:var(--ok);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:#00000080;z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border-hi);border-radius:16px;padding:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:800;margin-bottom:4px;}
.modal-sub{font-size:11px;color:var(--txt-mid);margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--txt-mid);font-weight:600;margin-bottom:5px;}
.field input,.field select{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--txt-hi);outline:none;}
.field input:focus{border-color:var(--accent);}
.field select option{background:var(--card2);}
.modal-footer{display:flex;gap:8px;}
.btn-full{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-cancel{background:var(--card2);color:var(--txt-mid);border:1px solid var(--border);}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ok);color:#000;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
<script src="mock-data.js"></script>
</head>
<body>

<div class="topbar">
  <button class="tb-back" onclick="location.href='erp-lobby.html'">← 大廳</button>
  <span class="tb-title">🏦 Leo 工作台</span>
  <span class="tb-user" id="tb-user"></span>
  <button class="tb-back" onclick="logout()" style="margin-left:8px;">登出</button>
</div>

<div class="main">

  <!-- Greeting -->
  <div class="greet">
    <div class="greet-hi" id="greet-hi">Leo，今天有付款任務</div>
    <div class="greet-sub">台灣悍草出納 · 付款需躍明確認後執行</div>
    <div class="greet-badges" id="greet-badges"></div>
  </div>

  <!-- 待付款通知 -->
  <div class="sec-hd">
    <span class="sec-title" id="pay-title">待付款通知</span>
    <button class="sec-link" onclick="renderPayments()">刷新</button>
  </div>
  <div id="pay-list"></div>

  <!-- 薪資發放流程 -->
  <div class="sec-hd"><span class="sec-title">薪資發放流程</span></div>
  <div class="payroll-card">
    <div class="payroll-head">
      <span class="payroll-month">2026 年 5 月薪資</span>
      <span class="payroll-status status-progress" id="payroll-status">進行中</span>
    </div>
    <div class="payroll-rows" id="payroll-rows"></div>
  </div>

  <!-- 勞健保月結 -->
  <div class="sec-hd"><span class="sec-title">勞健保繳費（5月）</span></div>
  <div class="nhi-card" id="nhi-card">
    <div class="nhi-hd">
      <span class="nhi-month">2026 年 5 月 勞保 + 健保</span>
      <span class="nhi-due" id="nhi-due-badge">繳費期限 5/10</span>
    </div>
    <div id="nhi-rows"></div>
    <div class="nhi-total-row">
      <span class="nhi-total-label">本月合計（公司負擔）</span>
      <span class="nhi-total-amt" id="nhi-total"></span>
    </div>
  </div>

  <!-- 銀行帳戶管理 -->
  <div class="sec-hd">
    <span class="sec-title">銀行帳戶管理</span>
    <span style="font-size:10px;color:var(--txt-lo);">更新後同步躍明財務台</span>
  </div>
  <div class="bank-grid" id="bank-grid"></div>

  <!-- 本月例行工作 -->
  <div class="sec-hd">
    <span class="sec-title" id="checklist-title">本月例行工作</span>
  </div>
  <div id="checklist"></div>

</div>

<!-- Bank Balance Update Modal -->
<div class="modal-bg" id="modal-bank">
  <div class="modal">
    <div class="modal-title" id="bank-modal-title">更新帳戶餘額</div>
    <div class="modal-sub" id="bank-modal-sub">請輸入最新對帳餘額</div>
    <div class="field">
      <label>帳戶餘額（TWD）</label>
      <input type="number" id="bank-bal-input" placeholder="例：1,280,000">
    </div>
    <div class="field">
      <label>更新備註（選填）</label>
      <input id="bank-note-input" placeholder="例：5/8 網銀對帳">
    </div>
    <div class="modal-footer">
      <button class="btn-full btn-cancel" onclick="closeBankModal()">取消</button>
      <button class="btn-full btn-primary" onclick="saveBankBalance()">儲存並同步 →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SESS = JSON.parse(localStorage.getItem('erp_sess')||'null');
if(!SESS||Date.now()-SESS.ts>7*86400000){ localStorage.removeItem('erp_sess'); location.href='login.html'; }
function logout(){ localStorage.removeItem('erp_sess'); location.href='login.html'; }
document.getElementById('tb-user').textContent = SESS.name + ' · ' + SESS.role;

// ── Bank Accounts ──────────────────────────────────────────
const BANK_KEY = 'leo_bank_v1';
const BANK_DEFAULTS = [
  {id:'tw-main', name:'台灣悍草・主帳戶（玉山銀行）', ccy:'TWD', balance:1284600, updated:'2026-05-07'},
  {id:'tw-backup', name:'台灣悍草・備用帳戶（國泰世華）', ccy:'TWD', balance:320000, updated:'2026-05-01'},
];
function loadBankAccounts(){
  return JSON.parse(localStorage.getItem(BANK_KEY)||JSON.stringify(BANK_DEFAULTS));
}
function saveBankAccounts(arr){ localStorage.setItem(BANK_KEY, JSON.stringify(arr)); }

let currentBankId = null;
function openBankModal(id){
  const banks = loadBankAccounts();
  const b = banks.find(x=>x.id===id);
  if(!b) return;
  currentBankId = id;
  document.getElementById('bank-modal-title').textContent = '更新：' + b.name.split('（')[0].trim();
  document.getElementById('bank-modal-sub').textContent = `現有餘額 NT$${b.balance.toLocaleString()} · ${b.updated}`;
  document.getElementById('bank-bal-input').value = b.balance;
  document.getElementById('bank-note-input').value = '';
  document.getElementById('modal-bank').classList.add('show');
}
function closeBankModal(){ document.getElementById('modal-bank').classList.remove('show'); }
function saveBankBalance(){
  const val = parseFloat(document.getElementById('bank-bal-input').value);
  if(!val && val!==0){ showToast('請填寫帳戶餘額'); return; }
  const banks = loadBankAccounts();
  const idx = banks.findIndex(x=>x.id===currentBankId);
  if(idx>-1){
    banks[idx].balance = val;
    banks[idx].updated = new Date().toISOString().slice(0,10);
    banks[idx].note = document.getElementById('bank-note-input').value;
  }
  saveBankAccounts(banks);
  closeBankModal();
  renderBankGrid();
  showToast('帳戶餘額已更新，已同步至躍明財務台 ✓');
}

function renderBankGrid(){
  const banks = loadBankAccounts();
  const total = banks.reduce((s,b)=>s+b.balance,0);
  document.getElementById('bank-grid').innerHTML = banks.map(b=>`
    <div class="bank-card">
      <div class="bank-name">${b.name}</div>
      <div class="bank-bal">NT$${b.balance.toLocaleString()}</div>
      <div class="bank-meta">最後更新：${b.updated}</div>
      <button class="bank-upd" onclick="openBankModal('${b.id}')">更新餘額</button>
    </div>`).join('') +
    `<div class="bank-card" style="border-color:var(--border-hi);">
      <div class="bank-name">台灣悍草合計</div>
      <div class="bank-bal" style="color:var(--ok);">NT$${total.toLocaleString()}</div>
      <div class="bank-meta">${banks.length} 個帳戶</div>
    </div>`;
}

// ── NHI (勞健保) ───────────────────────────────────────────
const NHI_KEY = 'leo_nhi_v1';
const NHI_ITEMS = [
  {id:'n1', label:'勞保費（公司負擔）', note:'6名員工・依月投保薪資', amount:18420},
  {id:'n2', label:'健保費（公司負擔）', note:'6名員工・含眷屬', amount:13680},
  {id:'n3', label:'勞工退休金（公司提繳）', note:'6% 每月提繳', amount:19800},
];
function loadNHI(){ return JSON.parse(localStorage.getItem(NHI_KEY)||'{"paid":[]}'); }
function saveNHI(s){ localStorage.setItem(NHI_KEY, JSON.stringify(s)); }
function toggleNHI(id){
  const nhi = loadNHI();
  const idx = nhi.paid.indexOf(id);
  if(idx>-1) nhi.paid.splice(idx,1);
  else nhi.paid.push(id);
  saveNHI(nhi);
  renderNHI();
  showToast(idx>-1 ? '已取消' : '✓ 已標記繳費');
}
function renderNHI(){
  const nhi = loadNHI();
  const total = NHI_ITEMS.reduce((s,x)=>s+x.amount,0);
  const paidAll = NHI_ITEMS.every(x=>nhi.paid.includes(x.id));
  document.getElementById('nhi-due-badge').textContent = paidAll ? '✓ 本月已繳' : '繳費期限 5/10';
  document.getElementById('nhi-due-badge').style.color = paidAll ? 'var(--ok)' : 'var(--warn)';
  document.getElementById('nhi-rows').innerHTML = NHI_ITEMS.map(x=>{
    const paid = nhi.paid.includes(x.id);
    return `<div class="nhi-row">
      <div>
        <div class="nhi-label" style="color:var(--txt-hi);font-size:12px;font-weight:600;">${x.label}</div>
        <div style="font-size:10px;color:var(--txt-lo);">${x.note}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div class="nhi-amt" style="${paid?'color:var(--ok);text-decoration:line-through;':''}"">NT$${x.amount.toLocaleString()}</div>
      </div>
      <div class="nhi-check ${paid?'paid':''}" onclick="toggleNHI('${x.id}')">${paid?'✓':''}</div>
    </div>`;
  }).join('');
  document.getElementById('nhi-total').textContent = `NT$${total.toLocaleString()}`;
}

// ── Payroll ────────────────────────────────────────────────
const PAYROLL_KEY = 'leo_payroll_v1';
const PAYROLL_STEPS = [
  {id:'p1', label:'確認各員工出勤記錄'},
  {id:'p2', label:'計算薪資（含勞健保扣除）'},
  {id:'p3', label:'送躍明核帳確認'},
  {id:'p4', label:'執行銀行薪資轉帳'},
  {id:'p5', label:'確認入帳並通知員工'},
];
function loadPayroll(){ return JSON.parse(localStorage.getItem(PAYROLL_KEY)||'{"done":["p1"]}'); }
function savePayroll(s){ localStorage.setItem(PAYROLL_KEY, JSON.stringify(s)); }
function markPayrollDone(id){
  const p = loadPayroll();
  if(!p.done.includes(id)) p.done.push(id);
  savePayroll(p);
  renderPayroll();
  showToast('已完成此步驟 ✓');
}
function renderPayroll(){
  const p = loadPayroll();
  const rows = PAYROLL_STEPS.map((step,i)=>{
    const done = p.done.includes(step.id);
    const activeIdx = PAYROLL_STEPS.findIndex(s=>!p.done.includes(s.id));
    const isActive = i===activeIdx;
    const sc = done?'step-done':isActive?'step-active':'step-todo';
    const lc = done?'done':isActive?'active':'';
    const action = !done&&isActive ? `<button class="pr-action" onclick="markPayrollDone('${step.id}')">完成 →</button>` : '';
    return `<div class="payroll-row">
      <div class="pr-step ${sc}">${done?'✓':i+1}</div>
      <div class="pr-label ${lc}">${step.label}</div>
      ${action}
    </div>`;
  }).join('');
  document.getElementById('payroll-rows').innerHTML = rows;
  const allDone = PAYROLL_STEPS.every(s=>p.done.includes(s.id));
  document.getElementById('payroll-status').textContent = allDone?'✓ 已完成':'進行中';
  document.getElementById('payroll-status').className = 'payroll-status ' + (allDone?'status-done':'status-progress');
}

// ── Payments ───────────────────────────────────────────────
const PAY_KEY = 'leo_payments_v1';
function loadPayments(){
  const stored = localStorage.getItem(PAY_KEY);
  if(stored) return JSON.parse(stored);
  const seed = [
    {id:'pay1', title:'5月薪資（台灣悍草全員）', person:'躍明確認', date:'2026-05-08', ccy:'TWD', amount:307000, note:'Bevis/珮玲/詩彤/楊子/躍明/Leo · 已核帳', status:'pending'},
    {id:'pay2', title:'Bevis 出差費用報銷', person:'Bevis 申請', date:'2026-05-06', ccy:'TWD', amount:12600, note:'台北→台中客戶簡報出差費', status:'pending'},
    {id:'pay3', title:'台北辦公室 5月租金', person:'躍明確認', date:'2026-05-01', ccy:'TWD', amount:45000, note:'房東：大安路XXX號', status:'paid'},
  ];
  localStorage.setItem(PAY_KEY, JSON.stringify(seed));
  return seed;
}
function savePayments(arr){ localStorage.setItem(PAY_KEY, JSON.stringify(arr)); }
function markPaid(id){
  const pays = loadPayments();
  const idx = pays.findIndex(x=>x.id===id);
  if(idx>-1) pays[idx].status='paid';
  savePayments(pays);
  renderPayments();
  renderBankGrid();
  showToast('✅ 已標記付款完成');
}
function renderPayments(){
  const pays = loadPayments().filter(x=>x.status==='pending');
  const el = document.getElementById('pay-list');
  document.getElementById('pay-title').textContent = `待付款通知（${pays.length}）`;
  if(!pays.length){
    el.innerHTML='<div style="padding:16px;text-align:center;color:var(--txt-lo);font-size:12px;">目前沒有待付款項目</div>';
    return;
  }
  el.innerHTML = pays.map(p=>`
    <div class="pay-item">
      <div class="pay-bar" style="background:var(--warn);"></div>
      <div class="pay-body">
        <div class="pay-title">${p.title}</div>
        <div class="pay-meta">${p.person} · ${p.date}</div>
        <div class="pay-note">${p.note}</div>
      </div>
      <div class="pay-right">
        <div class="pay-amt">${p.ccy} ${p.amount.toLocaleString()}</div>
        <button class="pay-btn" style="background:var(--ok-dim);color:var(--ok);border-color:#22c55e40;" onclick="markPaid('${p.id}')">付款 →</button>
      </div>
    </div>`).join('');
}

// ── Checklist ──────────────────────────────────────────────
const CHECK_KEY = 'leo_check_v1';
const MONTHLY_TASKS = [
  {id:'c1', name:'勞健保繳費（期限 5/10）', meta:'健保局 + 勞保局線上繳費', due:'urgent'},
  {id:'c2', name:'薪資轉帳執行', meta:'躍明核帳後 → 銀行系統批次轉帳', due:'warn'},
  {id:'c3', name:'5月固定支出確認', meta:'房租 / 水電 / 網路', due:'warn'},
  {id:'c4', name:'更新主帳戶對帳餘額', meta:'網銀對帳後更新至 ERP', due:'ok'},
  {id:'c5', name:'月底帳目提交躍明', meta:'截止 5/31', due:'ok'},
];
function loadCheck(){ return JSON.parse(localStorage.getItem(CHECK_KEY)||'{"done":[]}'); }
function saveCheck(s){ localStorage.setItem(CHECK_KEY, JSON.stringify(s)); }
function toggleCheck(id){
  const cl = loadCheck();
  const idx = cl.done.indexOf(id);
  if(idx>-1) cl.done.splice(idx,1);
  else cl.done.push(id);
  saveCheck(cl);
  renderCheck();
  showToast(idx>-1?'已取消':'✓ 已完成');
}
function renderCheck(){
  const cl = loadCheck();
  const done = cl.done;
  const total = MONTHLY_TASKS.length;
  const doneCount = done.length;
  document.getElementById('checklist-title').textContent = `本月例行工作（${doneCount}/${total}）`;
  document.getElementById('checklist').innerHTML = MONTHLY_TASKS.map(t=>{
    const isDone = done.includes(t.id);
    const dueCls = {urgent:'due-urgent',warn:'due-warn',ok:'due-ok'}[t.due]||'due-ok';
    const dueLabel = {urgent:'本月優先',warn:'本月內',ok:'月底前'}[t.due]||'';
    return `<div class="check-item ${isDone?'done':''}" onclick="toggleCheck('${t.id}')">
      <div class="check-box ${isDone?'checked':''}">${isDone?'✓':''}</div>
      <div class="check-info">
        <div class="check-name">${t.name}</div>
        <div class="check-meta">${t.meta}</div>
      </div>
      ${!isDone?`<span class="check-due ${dueCls}">${dueLabel}</span>`:''}
    </div>`;
  }).join('');
}

// ── Greeting ───────────────────────────────────────────────
function renderGreeting(){
  const pays = loadPayments().filter(x=>x.status==='pending').length;
  const nhi = loadNHI();
  const nhiPending = NHI_ITEMS.filter(x=>!nhi.paid.includes(x.id)).length;
  const cl = loadCheck();
  const checkPending = MONTHLY_TASKS.filter(x=>!cl.done.includes(x.id)).length;

  const total = pays + (nhiPending>0?1:0) + checkPending;
  document.getElementById('greet-hi').textContent = total===0
    ? 'Leo，本月例行工作都完成了 ✓'
    : `Leo，今天有 ${total} 件待處理`;

  const badges = document.getElementById('greet-badges');
  badges.innerHTML = '';
  if(pays>0) badges.innerHTML+=`<span class="badge badge-warn">💸 ${pays} 筆待付款</span>`;
  if(nhiPending>0) badges.innerHTML+=`<span class="badge badge-warn">🏥 勞健保未繳</span>`;
  if(pays===0&&nhiPending===0) badges.innerHTML+=`<span class="badge badge-ok">✓ 付款無待辦</span>`;
}

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// Init
renderPayments();
renderPayroll();
renderNHI();
renderBankGrid();
renderCheck();
renderGreeting();
</script>
