<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* ── v4 design tokens ── */
  --paper:#fafaf8;
  --paper-soft:#f2f2ef;
  --line:#e8e8e3;
  --ink:#0a0a0a;
  --ink-deep:#1a1a1a;
  --ink-mid:#666;
  --ink-lo:#999;
  --ink-faint:#ccc;
  --brand:#ff6b35;
  --brand-soft:#fff4ef;
  --ok:#22c55e;--ok-dim:#22c55e18;
  --warn:#f59e0b;--warn-dim:#f59e0b18;
  --danger:#ef4444;--danger-dim:#ef444418;
  --radius:12px;
  --ease:cubic-bezier(0.32,0.72,0,1);
  /* ── Legacy aliases — keep for inline HTML styles + JS var() refs ── */
  --bg:var(--paper);
  --surface:var(--paper);
  --card:#fff;
  --card2:var(--paper-soft);
  --border:var(--line);
  --border-hi:var(--ink-faint);
  --txt-hi:var(--ink);
  --txt-mid:var(--ink-mid);
  --txt-lo:var(--ink-lo);
  --accent:var(--brand);
  --accent2:#cc5420;
  /* ── Page-specific tokens ── */
  --teal:#14b8a6;
}
body{background:var(--bg);color:var(--txt-hi);font-family:"Inter","Helvetica Neue","PingFang TC","Noto Sans TC",-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01";
  letter-spacing:-.003em;min-height:100vh;padding-bottom:80px;}
.topbar{background:var(--paper);border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.tb-back{background:none;border:1px solid var(--line);border-radius:8px;color:var(--ink-mid);padding:6px 12px;font-size:12px;cursor:pointer;}
.tb-back:hover{border-color:var(--ink-faint);color:var(--ink);}
.tb-title{font-size:14px;font-weight:700;}
.tb-user{margin-left:auto;font-size:11px;color:var(--txt-mid);}

.main{padding:16px;max-width:720px;margin:0 auto;}

/* Greeting */
.greet{background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--border-hi);border-radius:16px;padding:20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.greet-hi{font-size:18px;font-weight:800;margin-bottom:4px;}
.greet-sub{font-size:12px;color:var(--txt-mid);}
.greet-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;}
.badge-danger{background:var(--danger-dim);border:1px solid var(--danger);color:var(--danger);}
.badge-warn{background:var(--warn-dim);border:1px solid var(--warn);color:var(--warn);}
.badge-ok{background:var(--ok-dim);border:1px solid var(--ok);color:var(--ok);}
.go-approval{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.go-approval:hover{opacity:.88;}

/* Section */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-size:9px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.18em;}

/* Task cards */
.task-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.t-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.t-card.overdue{border-color:#ef444440;}
.t-card.today{border-color:#f59e0b30;}
.t-head{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;}
.t-urgency-bar{width:3px;border-radius:3px;min-height:40px;align-self:stretch;flex-shrink:0;}
.bar-danger{background:var(--danger);}
.bar-warn{background:var(--warn);}
.bar-ok{background:var(--ok);}
.bar-lo{background:var(--txt-lo);}
.t-main{flex:1;min-width:0;}
.t-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.t-meta{font-size:11px;color:var(--txt-mid);display:flex;flex-wrap:wrap;gap:8px;}
.t-stage-tag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;background:var(--accent-dim);color:var(--accent);letter-spacing:.04em;}
.t-deadline{font-size:10px;}
.t-deadline.late{color:var(--danger);font-weight:700;}
.t-deadline.soon{color:var(--warn);font-weight:700;}
.t-right{flex-shrink:0;display:flex;align-items:center;gap:8px;}
.t-chevron{color:var(--txt-lo);font-size:12px;transition:transform .2s;}
.t-card.open .t-chevron{transform:rotate(180deg);}
.t-done-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-hi);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s var(--ease);flex-shrink:0;}
.t-done-check:hover{border-color:var(--ok);}
.t-done-check.checked{background:var(--ok);border-color:var(--ok);}
.t-done-check.checked::after{content:'✓';font-size:11px;font-weight:800;color:#000;}
.t-body{display:none;border-top:1px solid var(--border);padding:16px;}
.t-card.open .t-body{display:block;}

/* Brief block */
.brief-block{background:var(--card2);border-radius:10px;padding:14px;margin-bottom:12px;}
.brief-label{font-size:10px;font-weight:700;color:var(--txt-lo);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.brief-ip-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.brief-ip-dot{width:10px;height:10px;border-radius:50%;}
.brief-ip-name{font-size:13px;font-weight:700;}
.brief-desc{font-size:12px;color:var(--txt-mid);line-height:1.6;}
.brief-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.brief-tag{font-size:9px;padding:2px 8px;border-radius:5px;background:var(--card);border:1px solid var(--border);color:var(--txt-mid);}

/* Feedback block */
.feedback-block{background:#f59e0b08;border:1px solid #f59e0b30;border-radius:10px;padding:12px;margin-bottom:12px;}
.feedback-label{font-size:10px;font-weight:700;color:var(--warn);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.feedback-from{font-size:10px;color:var(--txt-lo);margin-bottom:6px;}
.feedback-text{font-size:12px;color:var(--txt-hi);line-height:1.6;}
.feedback-block.pass{background:#22c55e08;border-color:#22c55e30;}
.feedback-block.pass .feedback-label{color:var(--ok);}
.feedback-block.info{background:#0284c708;border-color:#0284c730;}
.feedback-block.info .feedback-label{color:var(--accent);}

/* Action row */
.t-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{font-size:11px;font-weight:700;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;transition:opacity .15s var(--ease);}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--brand);color:#fff;}
.btn-ok{background:var(--ok);color:#000;}
.btn-outline{background:none;border:1px solid var(--border-hi);color:var(--txt-mid);}
.btn-teal{background:var(--teal);color:#000;}

/* IP警報卡 */
.ip-alert-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.ip-alert{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;}
.ip-alert.urgent{border-color:#ef444435;}
.ip-alert.warn{border-color:#f59e0b35;}
.ip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ip-info{flex:1;min-width:0;}
.ip-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.ip-meta{font-size:11px;color:var(--txt-mid);}
.ip-action-tag{font-size:9px;font-weight:800;padding:2px 8px;border-radius:5px;flex-shrink:0;}
.ip-days{font-size:12px;font-weight:700;flex-shrink:0;}

/* Done section */
.done-list{display:flex;flex-direction:column;gap:6px;margin-bottom:24px;}
.done-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;opacity:.6;}
.done-check{width:20px;height:20px;border-radius:50%;background:var(--ok);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#000;flex-shrink:0;}
.done-text{font-size:12px;}
.done-time{margin-left:auto;font-size:10px;color:var(--txt-lo);}

/* Empty */
.empty{text-align:center;padding:36px 16px;color:var(--txt-lo);font-size:13px;}
.empty .emoji{font-size:32px;display:block;margin-bottom:10px;}

/* Upload modal */
.modal-bg{position:fixed;inset:0;background:#00000080;z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border-hi);border-radius:16px;padding:22px;width:100%;max-width:420px;}
.modal-title{font-size:15px;font-weight:800;margin-bottom:4px;}
.modal-sub{font-size:11px;color:var(--txt-mid);margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--txt-mid);font-weight:600;margin-bottom:5px;}
.field select,.field textarea,.field input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--txt-hi);outline:none;}
.field select:focus,.field textarea:focus,.field input:focus{border-color:var(--accent);}
.field select option{background:var(--card2);}
.field textarea{resize:vertical;min-height:70px;}
.upload-zone{border:2px dashed var(--border-hi);border-radius:10px;padding:20px;text-align:center;color:var(--txt-lo);font-size:12px;cursor:pointer;margin-bottom:14px;}
.upload-zone:hover{border-color:var(--accent);color:var(--accent);}
.modal-footer{display:flex;gap:8px;}
.btn-full{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;}
.btn-submit{background:var(--accent);color:#fff;}
.btn-cancel{background:var(--card2);color:var(--txt-mid);border:1px solid var(--border);}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ok);color:#000;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>

const _PL_PROXY='https://feishu-proxy.raychou6913.workers.dev';
const _PL_AT='Sg7ObNELHaAdZzshGIFjWPVhpce';
const _PL_CONTRACT_TBL='tblWn4PwOVRgt7c1';

let IP_ALERTS = [
  {
    ip:'Muziktiger', color:'#ef4444',
    event:'版權送審回覆截止',
    meta:'已等待 14 天，版權方尚未回覆第 2 輪修改意見',

    daysLeft:4, urgency:'warn',
    action:'催辦中', actionColor:'#f59e0b',
  },
  {
    ip:'Opanchu（褲褲兔）', color:'#f59e0b',
    event:'合約到期預警',
    meta:'授權合約 2026-09-30 到期，建議 7 月前啟動續約洽談',
    daysLeft:145, urgency:'ok',
    action:'續約籌備', actionColor:'#22c55e',
  },
];

function renderIpAlerts(alerts){
  const arr = alerts || IP_ALERTS;
  const el = document.getElementById('ip-alert-list');
  if(!el) return;
  el.innerHTML = arr.map(a=>{
    const dayLabel = a.daysLeft<0
      ? `<span style="color:var(--danger);font-weight:800;">逾期 ${Math.abs(a.daysLeft)} 天</span>`
      : `<span style="color:${a.daysLeft<=14?'var(--warn)':'var(--txt-mid)'};">剩 ${a.daysLeft} 天</span>`;
    return `<div class="ip-alert ${a.urgency}">
      <div class="ip-dot" style="background:${a.color};"></div>
      <div class="ip-info">
        <div class="ip-name">${a.ip} <span style="font-size:10px;color:var(--txt-lo);font-weight:400;">· ${a.event}</span></div>
        <div class="ip-meta">${a.meta}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        ${dayLabel}
        <div style="font-size:9px;font-weight:800;margin-top:3px;padding:2px 7px;border-radius:5px;background:${a.actionColor}18;color:${a.actionColor};">${a.action}</div>
      </div>
    </div>`;
  }).join('');
}

async function loadContractAlerts(){
  try{
    const tr=await fetch(_PL_PROXY+'/auth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    const {tenant_access_token:tk}=await tr.json();
    const res=await fetch(_PL_PROXY+'/open-apis/bitable/v1/apps/'+_PL_AT+'/tables/'+_PL_CONTRACT_TBL+'/records?page_size=100',
      {headers:{'Authorization':'Bearer '+tk}});
    const {data}=await res.json();
    const items=(data&&data.items)||[];
    if(!items.length) return;
    const now=Date.now();
    const fn=(f,keys)=>{for(const k of keys){const v=f[k];if(v!=null){return typeof v==='object'?(v.text||v.value||''):String(v);}}return '';};
    const apiAlerts=items.map(item=>{
      const f=item.fields;
      const ipName=fn(f,['IP名稱','授權IP','IP','合約名稱','標題']);
      const expiryRaw=fn(f,['合約截止日','到期日','合約到期日','截止日期','授權到期']);
      if(!ipName||!expiryRaw) return null;
      const exStr=isNaN(Number(expiryRaw))
        ?String(expiryRaw).slice(0,10)
        :new Date(Number(expiryRaw)).toISOString().slice(0,10);
      const daysLeft=Math.round((new Date(exStr).getTime()-now)/86400000);
      if(daysLeft>180) return null;
      const color=daysLeft<60?'#ef4444':'#f59e0b';
      return {ip:ipName,color,event:'合約到期預警',meta:`授權合約 ${exStr} 到期`,
        daysLeft,urgency:daysLeft<60?'urgent':'warn',
        action:daysLeft<60?'立即洽談續約':'籌備續約',actionColor:color};
    }).filter(Boolean);
    if(apiAlerts.length){
      const nonExpiry=IP_ALERTS.filter(a=>a.event!=='合約到期預警');
      const merged=[...nonExpiry,...apiAlerts].sort((a,b)=>a.daysLeft-b.daysLeft);
      renderIpAlerts(merged);
    }
  }catch(e){/* silent — stay on fallback */}
}

      type:'submitted',

      text:'第 1 輪送審包已遞交，等待佳盛文化版權部回覆中。已 14 天無消息，需升級跟催。',
    },
  },
];

const DONE_KEY = 'peilin_done_v1';
let doneSet = new Set(JSON.parse(localStorage.getItem(DONE_KEY)||'[]'));
let currentUploadId = null;

// ── Render ─────────────────────────────────────────────────
function _computeUrgency(t){
  if(t.urgency==='waiting') return 'waiting';
  if(!t.deadline) return t.urgency;
  const today=new Date(); today.setHours(0,0,0,0);
  const due=new Date(t.deadline);
  if(due<today) return 'overdue';
  if(due.getTime()===today.getTime()) return 'today';
  return (t.urgency==='overdue'||t.urgency==='today')?'ok':t.urgency;
}
function render(){
  renderIpAlerts();

  const active = TASKS.filter(t=>!doneSet.has(t.id)).map(t=>({...t,urgency:_computeUrgency(t)}));
  const done = TASKS.filter(t=>doneSet.has(t.id));

  const overdue = active.filter(t=>t.urgency==='overdue').length;
  const todayCount = active.filter(t=>t.urgency==='today').length;
  document.getElementById('greet-hi').textContent = active.length===0
    ? '珮玲，今天所有任務都完成了 🎉'
    : `珮玲，你今天有 ${active.length} 個待處理任務`;
  document.getElementById('greet-sub').textContent = overdue>0
    ? `其中 ${overdue} 個已逾期，請優先處理`
    : todayCount>0
      ? `${todayCount} 個今天截止，注意時間`
      : '設計 · 版權送審 · 對齊 Bevis';

  const badges = document.getElementById('greet-badges');
  badges.innerHTML='';
  if(overdue>0) badges.innerHTML+=`<span class="badge badge-danger">⚠ ${overdue} 個逾期</span>`;
  if(todayCount>0) badges.innerHTML+=`<span class="badge badge-warn">⏰ ${todayCount} 個今天到期</span>`;
  if(done.length>0) badges.innerHTML+=`<span class="badge badge-ok">✓ 已完成 ${done.length}</span>`;

  const list = document.getElementById('task-list');
  document.getElementById('active-title').textContent = `待處理任務（${active.length}）`;

  if(!active.length){
    list.innerHTML='<div class="empty"><span class="emoji">✨</span>今天的任務全部完成！</div>';
  } else {
    list.innerHTML = active.map(t=>{
      const urgClass = t.urgency==='overdue'?'overdue':t.urgency==='today'?'today':'';
      const barClass = t.urgency==='overdue'?'bar-danger':t.urgency==='today'?'bar-warn':t.urgency==='waiting'?'bar-lo':'bar-ok';
      const deadlineText = t.deadline
        ? (t.urgency==='overdue'
            ? `<span class="t-deadline late">⚠ 逾期 ${daysDiff(t.deadline)} 天</span>`
            : t.urgency==='today'
              ? `<span class="t-deadline soon">今天截止</span>`
              : `<span class="t-deadline">截止 ${t.deadline}</span>`)
        : '';

      let feedbackHtml = '';
      if(t.feedback){
        const fb = t.feedback;
        const cls = fb.type==='revise'?'':'feedback-block '+(fb.type==='submitted'?'pass':fb.type==='info'?'info':'');
        const lbl = fb.type==='revise'?'⚡ Bevis 修改意見':fb.type==='submitted'?'✓ 已提交，等待回覆':fb.type==='info'?'ℹ Bevis 備注':'';
        feedbackHtml = `<div class="feedback-block ${fb.type==='revise'?'':fb.type==='submitted'?'pass':fb.type==='info'?'info':''}">
          <div class="feedback-label">${lbl}</div>
          <div class="feedback-from">${fb.from}</div>
          <div class="feedback-text">${fb.text}</div>
        </div>`;
      }

      const refHtml = t.brief.refs.length
        ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">${t.brief.refs.map(r=>`<div style="width:72px;height:72px;border-radius:8px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;">${r}</div>`).join('')}</div>`
        : '';

      const isWaiting = t.urgency==='waiting';
      const actionHtml = isWaiting
        ? `<button class="btn btn-primary" onclick="escalateFollow('${t.id}')">📨 升級追催</button>
           <button class="btn btn-outline" onclick="showToast('等待版權方回覆中...')">等待中</button>`
        : `<button class="btn btn-primary" onclick="openUpload('${t.id}')">📎 上傳設計稿</button>
           <button class="btn btn-teal" onclick="location.href='erp-approval-tracker.html'">📋 送審追蹤</button>
           <button class="btn btn-outline" onclick="markDone('${t.id}')">✓ 標記完成</button>`;

      return `<div class="t-card ${urgClass}" id="card-${t.id}">
        <div class="t-head" onclick="toggleCard('${t.id}')">
          <div class="t-urgency-bar ${barClass}"></div>
          <div class="t-main">
            <div class="t-title">${t.title}</div>
            <div class="t-meta">
              <span class="t-stage-tag">${t.stage}</span>
              ${deadlineText}
            </div>
          </div>
          <div class="t-right">
            <div class="t-done-check" onclick="event.stopPropagation();markDone('${t.id}')" title="標記完成"></div>
            <span class="t-chevron">▼</span>
          </div>
        </div>
        <div class="t-body">
          ${feedbackHtml}
          <div class="brief-block">
            <div class="brief-label">📋 Brief</div>
            <div class="brief-ip-row">
              <div class="brief-ip-dot" style="background:${t.ipColor}"></div>
              <div class="brief-ip-name">${t.ip}</div>
            </div>
            <div class="brief-desc">${t.brief.desc}</div>
            <div class="brief-tags">${t.brief.tags.map(tag=>`<span class="brief-tag">${tag}</span>`).join('')}</div>
          </div>
          ${refHtml}
          <div class="t-actions">${actionHtml}</div>
        </div>
      </div>`;
    }).join('');
  }

  const doneSection = document.getElementById('done-section');
  const doneList = document.getElementById('done-list');
  if(done.length>0){
    doneSection.style.display='block';
    doneList.innerHTML = done.map(t=>`
      <div class="done-item">
        <div class="done-check">✓</div>
        <div class="done-text">${t.title} <span style="color:var(--txt-lo);font-size:10px;">· ${t.ip}</span></div>
        <span class="done-time">今天</span>
      </div>`).join('');
  } else {
    doneSection.style.display='none';
  }
}

function daysDiff(dateStr){
  const d = new Date(dateStr);
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((today-d)/86400000);
}

function toggleCard(id){
  document.getElementById('card-'+id)?.classList.toggle('open');
}

function markDone(id){
  doneSet.add(id);
  localStorage.setItem(DONE_KEY,JSON.stringify([...doneSet]));
  render();
  showToast('已標記完成 ✓');
}

function escalateFollow(id){
  showToast('追催記錄已送出，安然將同步跟進 ✓');
}

function openUpload(id){
  currentUploadId = id;
  const t = TASKS.find(x=>x.id===id);
  document.getElementById('upload-title').textContent = `上傳設計稿：${t?.ip}`;
  document.getElementById('upload-sub').textContent = `${t?.title} · ${t?.stage}`;
  document.getElementById('up-version').value='';
  document.getElementById('up-note').value='';
  document.getElementById('modal-upload').classList.add('show');
}

let _selectedFileName = '';
function handleFileSelect(input){
  if(input.files&&input.files[0]){
    _selectedFileName = input.files[0].name;
    document.getElementById('upload-zone-label').innerHTML =
      `✅ 已選擇：${_selectedFileName}<br><span style="font-size:10px;margin-top:4px;display:block;">點擊重新選擇</span>`;
  }
}

const UPLOAD_KEY = 'peilin_uploads_v1';
function submitUpload(){
  const t = TASKS.find(x=>x.id===currentUploadId);
  const version = document.getElementById('up-version').value.trim();
  const note = document.getElementById('up-note').value.trim();
  const notify = document.getElementById('up-notify').value;
  const rec = {
    ts: Date.now(), taskId: currentUploadId,
    ip: t?.ip||'', title: t?.title||'',
    fileName: _selectedFileName||'(未選擇檔案)',
    version, note, notify, by: SESS?.name||'珮玲',
  };
  const arr = JSON.parse(localStorage.getItem(UPLOAD_KEY)||'[]');
  arr.unshift(rec);
  localStorage.setItem(UPLOAD_KEY, JSON.stringify(arr));
  _selectedFileName = '';
  document.getElementById('upload-zone-label').innerHTML =
    '📎 點擊上傳設計稿<br><span style="font-size:10px;margin-top:4px;display:block;">支援 PNG / PDF / AI / PSD</span>';
  closeModal();
  if(t) markDone(currentUploadId);
  const notifyLabel = {bevis:'Bevis',['bevis-anran']:'Bevis + 安然',['bevis-ray']:'Bevis + Ray'}[notify]||'Bevis';
  showToast(`已記錄並通知 ${notifyLabel} ✓`);
}

function closeModal(){ document.getElementById('modal-upload').classList.remove('show'); }

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

render();
loadContractAlerts();
</script>

<script>
(function(){
const _PR='https://feishu-proxy.raychou6913.workers.dev';
const _PAT='Sg7ObNELHaAdZzshGIFjWPVhpce';
const _PTBL='tbl4OBNvsNkqS4mQ';
async function _writeApproval(fields){
  try{
    const tr=await fetch(_PR+'/auth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    const {tenant_access_token:tk}=await tr.json();
    await fetch(_PR+'/open-apis/bitable/v1/apps/'+_PAT+'/tables/'+_PTBL+'/records',{
      method:'POST',headers:{'Authorization':'Bearer '+tk,'Content-Type':'application/json'},
      body:JSON.stringify({fields})
    });
  }catch(e){console.warn('Feishu write skipped',e);}
}
let expType='personal';
function openExpModal(){
  document.getElementById('expDate').valueAsDate=new Date();
  document.getElementById('expOverlay').classList.add('open');
}
function closeExpModal(){document.getElementById('expOverlay').classList.remove('open');}
function setExpType(t){
  expType=t;
  document.getElementById('expPersonalFields').style.display=t==='personal'?'':'none';
  document.getElementById('expLeaveFields').style.display=t==='leave'?'':'none';
  document.getElementById('expTypePersonal').classList.toggle('active',t==='personal');
  document.getElementById('expTypeLeave').classList.toggle('active',t==='leave');
  document.getElementById('expRouting').innerHTML = t==='leave'
    ? '送審路徑：<strong>Bevis</strong>（直屬主管）→ 楊子備案'
    : '送審路徑：<strong>Bevis</strong> → 楊子付款，抄送安然';
}
function submitExpense(){
  let rec;
  if(expType==='leave'){
    const start=document.getElementById('expLeaveStart').value;
    const end=document.getElementById('expLeaveEnd').value;
    if(!start||!end){showToast('請填寫請假日期');return;}
    rec={type:'請假申請',leaveType:document.getElementById('expLeaveType').value,start,end,
      proxy:document.getElementById('expLeaveProxy').value,
      reason:document.getElementById('expLeaveReason').value,ts:Date.now()};
  }else{
    const amt=document.getElementById('expAmt').value;
    const date=document.getElementById('expDate').value;
    if(!amt||!date){showToast('請填寫金額與日期');return;}
    rec={type:'個人報銷',amt,ccy:document.getElementById('expCcy').value,
      cat:document.getElementById('expCat').value,date,
      desc:document.getElementById('expDesc').value,ts:Date.now()};
  }
  const q=JSON.parse(localStorage.getItem('erp_expense_queue')||'[]');
  q.push(rec);localStorage.setItem('erp_expense_queue',JSON.stringify(q));

  // Fire-and-forget → Feishu 審批記錄
  const sess2=JSON.parse(localStorage.getItem('erp_sess')||'null');
  const applicant=sess2?.name||'珮玲';
  const title=rec.type==='請假申請'
    ? `【請假】${applicant} ${rec.leaveType||'年假'} ${rec.start}~${rec.end}`
    : `【費用】${applicant} ${rec.cat} ¥${rec.amt}${rec.ccy==='TWD'?' TWD':''}`;
  _writeApproval({'標題':title,'審批標題':title,'審批類型':rec.type==='請假申請'?'其他':'費用申請',
    '申請人':applicant,'申請日期':Date.now(),'金額':parseFloat(rec.amt)||0,
    '幣別':{'TWD':'TWD','THB':'THB','USD':'USD'}[rec.ccy]||'CNY',
    '審批人':'Ray','審批狀態':'待審批','Email已發送':'否',
    '申請說明':rec.desc||rec.reason||rec.type});

  closeExpModal();
  showToast('✅ 申請已送出，Bevis 將收到通知');
}
window.openExpModal=openExpModal;window.closeExpModal=closeExpModal;
window.setExpType=setExpType;window.submitExpense=submitExpense;
})();
</script>
