<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蕪解 ERP · 物流作業台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* ── v4 design tokens ── */
  --paper:#fafaf8;
  --paper-soft:#f2f2ef;
  --line:#e8e8e3;
  --ink:#0a0a0a;
  --ink-deep:#1a1a1a;
  --ink-mid:#666;
  --ink-lo:#999;
  --ink-faint:#ccc;
  --brand:#ff6b35;
  --brand-soft:#fff4ef;
  --ok:#22c55e;--ok-dim:#22c55e18;
  --warn:#f59e0b;--warn-dim:#f59e0b18;
  --danger:#ef4444;--danger-dim:#ef444418;
  --radius:12px;
  --ease:cubic-bezier(0.32,0.72,0,1);
  /* ── Legacy aliases — keep for inline HTML styles + JS var() refs ── */
  --bg:var(--paper);
  --surface:var(--paper);
  --card:#fff;
  --card2:var(--paper-soft);
  --border:var(--line);
  --border-hi:var(--ink-faint);
  --txt-hi:var(--ink);
  --txt-mid:var(--ink-mid);
  --txt-lo:var(--ink-lo);
  --accent:var(--brand);
  --accent2:#cc5420;
  /* ── Page-specific tokens ── */
  --blue:#0284c7;--blue-dim:#0284c718;
  --indigo:#ff6b35;
}
body{background:var(--bg);color:var(--txt-hi);font-family:"Inter","Helvetica Neue","PingFang TC","Noto Sans TC",-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01";
  letter-spacing:-.003em;min-height:100vh;padding-bottom:80px;}
.topbar{background:var(--paper);border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.tb-back{background:none;border:1px solid var(--line);border-radius:8px;color:var(--ink-mid);padding:6px 12px;font-size:12px;cursor:pointer;}
.tb-back:hover{border-color:var(--ink-faint);color:var(--ink);}
.tb-title{font-size:14px;font-weight:700;}
.tb-user{margin-left:auto;font-size:11px;color:var(--txt-mid);}

.main{padding:16px;max-width:900px;margin:0 auto;}

/* Section */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:20px;}
.sec-hd:first-of-type{margin-top:0;}
.sec-title{font-size:9px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.18em;}
.sec-action{font-size:11px;color:var(--ok);cursor:pointer;border:none;background:none;font-weight:700;}
.sec-action:hover{opacity:.8;}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:4px;}
@media(max-width:500px){.stats-row{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
.stat-label{font-size:10px;color:var(--txt-lo);margin-bottom:4px;}
.stat-num{font-size:22px;font-weight:800;}
.stat-num.ok{color:var(--ok);}
.stat-num.warn{color:var(--warn);}
.stat-num.danger{color:var(--danger);}
.stat-sub{font-size:10px;color:var(--txt-mid);margin-top:3px;}

/* Shipment cards */
.ship-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:4px;}
.ship-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .15s var(--ease);}
.ship-card:hover{border-color:var(--border-hi);}
.ship-card.alert{border-color:#ef444440;}
.ship-head{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.ship-status-bar{width:4px;border-radius:4px;align-self:stretch;flex-shrink:0;}
.bar-transit{background:var(--blue);}
.bar-customs{background:var(--warn);}
.bar-alert{background:var(--danger);}
.bar-delivered{background:var(--ok);}
.bar-prep{background:var(--txt-lo);}
.ship-info{flex:1;min-width:0;}
.ship-id{font-size:13px;font-weight:800;margin-bottom:3px;}
.ship-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.tag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;}
.tag-sea{background:#0284c720;color:var(--blue);}
.tag-air{background:#ff6b3520;color:var(--indigo);}
.tag-express{background:#7c3aed20;color:#ff6b35;}
.tag-fob{background:#f59e0b15;color:var(--warn);}
.tag-cif{background:#22c55e15;color:var(--ok);}
.tag-ddp{background:#ef444415;color:var(--danger);}
.tag-cn{background:#f9731620;color:#fb923c;}
.tag-domestic{background:#22c55e20;color:var(--ok);}
.ship-route{font-size:11px;color:var(--txt-mid);}
.ship-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ship-eta{font-size:11px;font-weight:700;}
.ship-eta.soon{color:var(--warn);}
.ship-eta.late{color:var(--danger);}
.ship-eta.ok{color:var(--ok);}
.ship-chevron{color:var(--txt-lo);font-size:12px;transition:transform .2s;}
.ship-card.open .ship-chevron{transform:rotate(180deg);}

/* Timeline */
.timeline{display:flex;align-items:center;gap:0;margin:12px 0;overflow-x:auto;padding-bottom:4px;}
.tl-step{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.tl-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;cursor:pointer;transition:all .15s var(--ease);}
.tl-dot.done{background:var(--ok);color:#000;}
.tl-dot.active{background:var(--warn);color:#000;box-shadow:0 0 8px var(--warn);}
.tl-dot.todo{background:var(--card2);border:1.5px solid var(--border);color:var(--txt-lo);}
.tl-dot.alert{background:var(--danger);color:#fff;box-shadow:0 0 8px var(--danger);}
.tl-label{font-size:9px;color:var(--txt-lo);margin-top:4px;text-align:center;max-width:44px;line-height:1.3;}
.tl-label.active{color:var(--warn);font-weight:700;}
.tl-label.done{color:var(--ok);}
.tl-line{flex:1;height:2px;background:var(--border);min-width:12px;}
.tl-line.done{background:var(--ok);}
.tl-line.active{background:var(--warn);}

/* Detail body */
.ship-body{display:none;border-top:1px solid var(--border);padding:16px;}
.ship-card.open .ship-body{display:block;}
.block-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
@media(max-width:580px){.block-grid{grid-template-columns:1fr;}}
.detail-block{background:var(--card2);border-radius:10px;padding:12px;}
.db-label{font-size:10px;font-weight:700;color:var(--txt-lo);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.db-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.db-row:last-child{border-bottom:none;}
.db-key{font-size:11px;color:var(--txt-mid);}
.db-val{font-size:12px;font-weight:700;}
.db-val.warn{color:var(--warn);}
.db-val.ok{color:var(--ok);}
.db-val.danger{color:var(--danger);}

/* Doc upload zone */
.doc-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.doc-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;}
.doc-icon{font-size:14px;flex-shrink:0;}
.doc-name{font-size:11px;flex:1;}
.doc-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;}
.doc-ok{background:var(--ok-dim);color:var(--ok);}
.doc-missing{background:var(--danger-dim);color:var(--danger);}
.doc-warn{background:var(--warn-dim);color:var(--warn);}
.doc-upload-btn{font-size:10px;color:var(--blue);cursor:pointer;border:none;background:none;font-weight:700;white-space:nowrap;}

/* Transfer pricing warning */
.tp-warn{background:#f59e0b0a;border:1px solid #f59e0b40;border-radius:8px;padding:10px 12px;font-size:11px;color:var(--warn);margin-bottom:10px;display:flex;gap:8px;align-items:flex-start;}
.tp-warn .icon{flex-shrink:0;}

/* Action buttons */
.ship-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{font-size:11px;font-weight:700;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;transition:opacity .15s var(--ease);}
.btn:hover{opacity:.85;}
.btn-ok{background:var(--ok);color:#000;}
.btn-warn{background:var(--warn);color:#000;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-outline{background:none;border:1px solid var(--border-hi);color:var(--txt-mid);}
.btn-danger{background:var(--danger);color:#fff;}

/* Escalation */
.escalate-btn{width:100%;padding:12px;background:var(--danger-dim);border:1px solid #ef444450;border-radius:10px;color:var(--danger);font-size:13px;font-weight:800;cursor:pointer;margin-top:12px;text-align:left;display:flex;align-items:center;gap:10px;}
.escalate-btn:hover{background:#ef444420;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:#00000088;z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border-hi);border-radius:16px;padding:22px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:800;margin-bottom:16px;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;color:var(--txt-mid);font-weight:600;margin-bottom:5px;letter-spacing:.04em;}
.field input,.field select,.field textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--txt-hi);outline:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ok);}
.field select option{background:var(--card2);}
.field textarea{resize:vertical;min-height:70px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field-note{font-size:10px;color:var(--txt-lo);margin-top:4px;}
.modal-footer{display:flex;gap:8px;margin-top:16px;}
.btn-full{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;}
.btn-submit{background:var(--ok);color:#000;}
.btn-cancel{background:var(--card2);color:var(--txt-mid);border:1px solid var(--border);}
.btn-esc{background:var(--danger);color:#fff;}

/* Carton info block */
.carton-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.carton-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px;text-align:center;}
.carton-val{font-size:16px;font-weight:800;}
.carton-label{font-size:9px;color:var(--txt-lo);margin-top:2px;}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ok);color:#000;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* FAB */
.fab{position:fixed;bottom:22px;right:22px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 16px #16a34a40;z-index:150;display:flex;align-items:center;justify-content:center;}

/* Page tabs */
.page-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border);}
.ptab{background:none;border:none;padding:10px 18px;font-size:12px;font-weight:700;color:var(--txt-lo);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s var(--ease);}
.ptab.active{color:var(--ok);border-bottom-color:var(--ok);}
.ptab:hover:not(.active){color:var(--txt-mid);}

/* Filter tabs */
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.ftab{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:7px 12px;font-size:11px;font-weight:700;color:var(--txt-mid);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s var(--ease);}
.ftab:hover{border-color:var(--border-hi);color:var(--txt-hi);}
.ftab.active{background:var(--ok-dim);border-color:var(--ok);color:var(--ok);}
.ftab.ftab-danger.active{background:var(--danger-dim);border-color:var(--danger);color:var(--danger);}
.ftab.ftab-warn.active{background:var(--warn-dim);border-color:var(--warn);color:var(--warn);}
.ftab-badge{background:var(--card2);border-radius:10px;padding:1px 7px;font-size:10px;font-weight:800;}

/* Inventory */
.inv-toggle{display:flex;gap:6px;margin-bottom:14px;}
.inv-toggle-btn{padding:7px 16px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid var(--border);background:var(--card);color:var(--txt-mid);cursor:pointer;transition:all .15s var(--ease);}
.inv-toggle-btn.active{background:var(--ok-dim);border-color:var(--ok);color:var(--ok);}
.inv-loc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:580px){.inv-loc-grid{grid-template-columns:1fr;}}
.inv-loc-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;}
.inv-loc-title{font-size:10px;font-weight:700;color:var(--txt-lo);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;}
.inv-loc-num{font-size:28px;font-weight:800;color:var(--ok);}
.inv-loc-sub{font-size:10px;color:var(--txt-mid);margin-top:3px;}
.inv-table{width:100%;border-collapse:collapse;margin-top:10px;}
.inv-table th{font-size:10px;font-weight:700;color:var(--txt-lo);text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
.inv-table td{font-size:12px;padding:9px 10px;border-bottom:1px solid var(--border);}
.inv-table tr:last-child td{border-bottom:none;}
.inv-table tr:hover td{background:var(--card2);}
.inv-table .num{text-align:right;font-weight:700;font-variant-numeric:tabular-nums;}
.inv-table .num.ok{color:var(--ok);}
.inv-table .num.warn{color:var(--warn);}
.inv-tag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;white-space:nowrap;}
.inv-note{font-size:11px;color:var(--txt-mid);padding:12px;text-align:center;}

/* Store accordion (快閃) */
.store-row{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;}
.store-row:hover{background:var(--card2);}
.store-row:last-child{border-bottom:none;}
.store-chev{color:var(--txt-lo);font-size:11px;transition:transform .2s;flex-shrink:0;}
.store-row.open .store-chev{transform:rotate(180deg);}
.store-info{flex:1;min-width:0;}
.store-name{font-size:13px;font-weight:800;margin-bottom:2px;}
.store-meta{font-size:10px;color:var(--txt-mid);}
.store-vals{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;text-align:right;}
.store-cost{font-size:12px;font-weight:700;color:var(--warn);}
.store-rev{font-size:11px;color:var(--ok);}
.store-status{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;flex-shrink:0;}
.status-active{background:#22c55e15;color:var(--ok);}
.status-prep{background:#ff6b3515;color:#ff6b35;}
.status-ended{background:#64748b20;color:var(--txt-lo);}
/* SKU sub-table */
.sku-panel{display:none;border-bottom:1px solid var(--border);background:var(--card2);}
.store-row.open+.sku-panel{display:block;}
.sku-table{width:100%;border-collapse:collapse;}
.sku-table th{font-size:9px;font-weight:700;color:var(--txt-lo);text-transform:uppercase;padding:7px 12px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:.04em;}
.sku-table th:first-child,.sku-table th:nth-child(2){text-align:left;}
.sku-table td{font-size:11px;padding:8px 12px;border-bottom:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums;}
.sku-table td:first-child{text-align:left;}
.sku-table td:nth-child(2){font-size:12px;font-weight:700;text-align:left;}
.sku-table tr:last-child td{border-bottom:none;}
.sku-table .cost-val{color:var(--warn);font-weight:700;}
.sku-table .rev-val{color:var(--ok);font-weight:700;}
.sku-table .tot-row td{font-weight:800;border-top:1px solid var(--border-hi);color:var(--txt-hi);}
</style>
<script src="mock-data.js"></script>
<script src="erp-project-link.js"></script>
</head>
<body>

<div class="topbar">
  <button class="tb-back" onclick="location.href='erp-lobby.html'">← 大廳</button>
  <span class="tb-title">🚢 物流作業台</span>
  <span class="tb-user" id="tb-user"></span>
  <button class="tb-back" onclick="logout()" style="margin-left:8px;">登出</button>
</div>

<div class="main">

  <!-- Page tabs -->
  <div class="page-tabs">
    <button class="ptab active" id="ptab-logistics" onclick="setPageTab('logistics',this)">🚢 物流批次</button>
    <button class="ptab" id="ptab-inventory" onclick="setPageTab('inventory',this)">📦 庫存現況</button>
  </div>

  <!-- ── 物流批次 tab ── -->
  <div id="page-logistics">
    <!-- Filter tabs -->
    <div class="filter-tabs">
      <button class="ftab active" id="ftab-all" onclick="setFilter('all',this)">全部 <span class="ftab-badge" id="stat-all">—</span></button>
      <button class="ftab" id="ftab-transit" onclick="setFilter('transit',this)">在途 <span class="ftab-badge" id="stat-transit">—</span></button>
      <button class="ftab ftab-warn" id="ftab-arriving" onclick="setFilter('arriving',this)">本週到港 <span class="ftab-badge" id="stat-arriving">—</span></button>
      <button class="ftab ftab-danger" id="ftab-alert" onclick="setFilter('alert',this)">卡關/異常 <span class="ftab-badge" id="stat-alert">—</span></button>
      <button class="ftab" id="ftab-done" onclick="setFilter('done',this)">本月完成 <span class="ftab-badge" id="stat-done">—</span></button>
    </div>
    <div class="sec-hd" style="margin-top:0;">
      <span class="sec-title" id="active-title">進行中批次</span>
      <button class="sec-action" onclick="openNewShipment()">+ 新增批次</button>
    </div>
    <div class="ship-grid" id="ship-grid"></div>
  </div>

  <!-- ── 庫存現況 tab ── -->
  <div id="page-inventory" style="display:none;">

    <!-- 庫存總貨值卡 -->
    <div id="inv-value-card" style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;">
      <div style="font-size:10px;font-weight:700;color:var(--txt-lo);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">庫存總貨值</div>
      <div id="inv-value-body" style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-end;"></div>
    </div>

    <div class="inv-toggle">
      <button class="inv-toggle-btn active" id="inv-btn-wholesale" onclick="setInvType('wholesale',this)">批發產品</button>
      <button class="inv-toggle-btn" id="inv-btn-popup" onclick="setInvType('popup',this)">快閃店產品</button>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;">
      <div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:11px;font-weight:700;color:var(--txt-mid);text-transform:uppercase;letter-spacing:.06em;" id="inv-table-title">產品庫存明細</span>
        <span style="font-size:10px;color:var(--txt-lo);" id="inv-table-sub"></span>
      </div>
      <div id="inv-table-wrap"></div>
    </div>
  </div>

</div>

<button class="fab" id="fab-new" onclick="openNewShipment()" title="新增批次">+</button>
<div class="toast" id="toast"></div>

<!-- New Shipment Modal -->
<div class="modal-bg" id="modal-new">
  <div class="modal">
    <div class="modal-title">新增出貨批次</div>

    <!-- 出貨類型切換 -->
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <button id="type-btn-intl" onclick="setShipType('cross_border')"
        style="flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid var(--blue);background:var(--blue-dim);color:#38bdf8;">
        🌏 境外跨境
      </button>
      <button id="type-btn-cn" onclick="setShipType('domestic_cn')"
        style="flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:transparent;color:var(--txt-lo);">
        🏠 大陸境內
      </button>
    </div>
    <input type="hidden" id="ns-type" value="cross_border">

    <div class="field"><label>批次名稱</label><input id="ns-name" placeholder="例：BKK-240501 Snoopy 夏日系列"></div>

    <!-- 客戶欄位（境內顯示，跨境隱藏） -->
    <div class="field" id="ns-customer-row" style="display:none;">
      <label>客戶名稱 ★</label>

// ── Page tab ───────────────────────────────────────────────
function setPageTab(tab, btn){
  currentPageTab = tab;
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('page-logistics').style.display = tab==='logistics' ? '' : 'none';
  document.getElementById('page-inventory').style.display = tab==='inventory' ? '' : 'none';
  if(tab==='inventory') renderInventory();
  document.getElementById('fab-new').style.display = tab==='logistics' ? '' : 'none';
}

// ── Filter tabs ────────────────────────────────────────────
function setFilter(filter, btn){
  currentFilter = filter;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── Render ─────────────────────────────────────────────────
function render(){
  const ships = loadShipments();
  const all    = ships;
  const active = ships.filter(s=>s.stage!=='delivered');
  const done   = ships.filter(s=>s.stage==='delivered');
  const transit  = active.filter(s=>['departed','transit'].includes(s.stage));
  const arriving = active.filter(s=>['arrived','customs_in'].includes(s.stage));
  const alerts   = ships.filter(s=>s.status==='alert'||s.escalation);

  // Badge counts
  document.getElementById('stat-all').textContent = ships.length;
  document.getElementById('stat-transit').textContent = transit.length;
  document.getElementById('stat-arriving').textContent = arriving.length;
  document.getElementById('stat-alert').textContent = alerts.length;
  document.getElementById('stat-done').textContent = done.length;

  // Filter
  let filtered, title;
  if(currentFilter==='transit'){
    filtered = transit; title = `在途批次（${transit.length}）`;
  } else if(currentFilter==='arriving'){
    filtered = arriving; title = `本週到港（${arriving.length}）`;
  } else if(currentFilter==='alert'){
    filtered = alerts; title = `卡關/異常（${alerts.length}）`;
  } else if(currentFilter==='done'){
    filtered = done; title = `本月已完成（${done.length}）`;
  } else {
    filtered = all; title = `全部批次（${all.length}）`;
  }

  document.getElementById('active-title').textContent = title;
  renderGrid('ship-grid', filtered);
}

function renderGrid(gridId, ships){
  const grid = document.getElementById(gridId);
  if(!ships.length){ grid.innerHTML='<div style="padding:16px;text-align:center;color:var(--txt-lo);font-size:13px;">暫無記錄</div>'; return; }
  grid.innerHTML = ships.map(s=>{
    const isCN = s.type === 'domestic_cn';
    const stages = getStages(s);
    const stageIdx = stages.findIndex(st=>st.key===s.stage);
    const stageLabel = stages[stageIdx]?.label || s.stage;

    const barClass = s.status==='alert'?'bar-alert':
      isCN ? (s.stage==='delivered'?'bar-delivered':s.stage==='packing'?'bar-prep':'bar-transit') :
      ['arrived','customs_in'].includes(s.stage)?'bar-customs':s.stage==='delivered'?'bar-delivered':['factory','warehouse'].includes(s.stage)?'bar-prep':'bar-transit';

    const etaDiff = s.eta ? Math.round((new Date(s.eta)-new Date())/86400000) : null;
    const etaClass = etaDiff===null?'':etaDiff<0?'late':etaDiff<=3?'soon':'ok';
    const etaLabel = isCN ? '預計送達' : 'ETA';
    const etaText = etaDiff===null?'—':etaDiff<0?`逾期 ${Math.abs(etaDiff)} 天`:etaDiff===0?(isCN?'今日送達':'今日到港'):`${etaDiff} 天後${isCN?'送達':'到港'}`;

    const tlHtml = stages.map((st,i)=>{
      const isDone = i<=stageIdx && s.stage!=='alert';
      const isActive = i===stageIdx;
      const cls = s.status==='alert'&&isActive?'alert':isDone?'done':isActive?'active':'todo';
      const line = i<stages.length-1 ? `<div class="tl-line ${isDone&&!isActive?'done':isActive?'active':''}"></div>` : '';
      return `<div class="tl-step"><div class="tl-dot ${cls}" title="${st.label}">${isDone&&!isActive?'✓':i+1}</div><div class="tl-label ${cls}">${st.label}</div></div>${line}`;
    }).join('');

    const cartonHtml = `<div class="carton-grid">
      <div class="carton-item"><div class="carton-val">${s.boxes||'—'}</div><div class="carton-label">總箱數</div></div>
      <div class="carton-item"><div class="carton-val">${s.weight||'—'}</div><div class="carton-label">毛重 kg</div></div>
      <div class="carton-item"><div class="carton-val">${s.cbm||'—'}</div><div class="carton-label">CBM</div></div>
    </div>`;

    // 境內：不需要報關文件，只顯示快遞單號
    const docsSection = isCN ? `

/* ── BUILD ORIGIN DROPDOWN FROM PO → SUPPLIER ── */
// Demo PO→supplier map (replaced by Feishu API when live)
const DEMO_PO_SUPPLIERS = {
  'PO-318': {supplier:'東莞奧達實業', city:'廣東東莞'},
  'PO-319': {supplier:'東莞奧達實業', city:'廣東東莞'},
  'PO-320': {supplier:'浙江義烏騰輝', city:'浙江義烏'},
  'PO-321': {supplier:'廣州龍勝包裝', city:'廣東廣州'},
  'PO-322': {supplier:'深圳勤耀工藝', city:'廣東深圳'},
  'PO-323': {supplier:'北京德興玩具', city:'北京'},
};

function buildOriginFromPO(poInput){
  const sel = document.getElementById('ns-from');
  if(!sel) return;
  // Find matching suppliers from PO numbers (supports multi PO: "PO-318, PO-319")
  const poBits = poInput.split(/[,，\s]+/).filter(Boolean);
  const matched = [];
  const seen = new Set();
  // Check demo map
  poBits.forEach(p=>{
    const key = Object.keys(DEMO_PO_SUPPLIERS).find(k=>p.includes(k)||k.includes(p));
    if(key && !seen.has(key)){
      matched.push(DEMO_PO_SUPPLIERS[key]);
      seen.add(key);
    }
  });
  // Also check procurement quotes in localStorage
  const quotes = JSON.parse(localStorage.getItem('erp_quotes_v1')||'[]');
  poBits.forEach(p=>{
    quotes.filter(q=>q.po && (q.po.includes(p)||p.includes(q.po))).forEach(q=>{
      const k = (q.supplier||'')+':'+(q.city||'');
      if(!seen.has(k)){ matched.push({supplier:q.supplier||'',city:q.city||''}); seen.add(k); }
    });
  });

  sel.innerHTML = '';
  // Matched PO suppliers go first (highlighted)
  if(matched.length){
    matched.forEach(s=>{
      const val = s.city ? `${s.supplier}·${s.city}` : s.supplier;
      const label = s.city ? `★ ${s.supplier}（${s.city}）製造商` : `★ ${s.supplier} 製造商`;
      sel.innerHTML += `<option value="${val}" selected>${label}</option>`;
    });
    sel.innerHTML += `<option disabled>──────────</option>`;
  }
  // All other procurement suppliers (deduped)
  const allSeen = new Set(matched.map(s=>`${s.supplier}:${s.city}`));
  quotes.forEach(q=>{
    const k = (q.supplier||'')+':'+(q.city||'');
    if(!q.supplier||allSeen.has(k)) return;
    allSeen.add(k);
    const val = q.city ? `${q.supplier}·${q.city}` : q.supplier;
    const label = q.city ? `${q.supplier}（${q.city}）` : q.supplier;
    sel.innerHTML += `<option value="${val}">${label}</option>`;
  });
  // Own warehouses
  sel.innerHTML += `<option value="北京倉">北京倉（自有）</option>`;
  sel.innerHTML += `<option value="泰國倉">泰國倉（自有）</option>`;
  sel.innerHTML += `<option value="__other__">其他（手動填入）</option>`;
  const custom = document.getElementById('ns-from-custom');
  if(custom){ custom.value=''; custom.style.display='none'; }
}

function buildOriginDropdown(){
  buildOriginFromPO(document.getElementById('ns-po')?.value||'');
}

function openNewShipment(){
  ['ns-name','ns-po','ns-order','ns-boxes','ns-weight','ns-cbm','ns-freight','ns-customer','ns-tracking'].forEach(id=>{
    const el = document.getElementById(id); if(el) el.value='';
  });
  buildOriginFromPO('');
  // Reset custom inputs
  ['ns-from-custom','ns-to-intl-custom','ns-to-cn-custom'].forEach(id=>{
    const el=document.getElementById(id); if(el){el.value='';el.style.display='none';}
  });
  setShipType('cross_border');
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('ns-etd').value = today;
  document.getElementById('ns-etd-cn').value = today;
  document.getElementById('modal-new').classList.add('show');
}

function saveNewShipment(){
  const name = document.getElementById('ns-name').value.trim();
  if(!name){ showToast('請填寫批次名稱'); return; }
  const type = document.getElementById('ns-type').value;
  const isCN = type==='domestic_cn';
  if(isCN && !document.getElementById('ns-customer').value.trim()){
    showToast('大陸境內出貨請填寫客戶名稱'); return;
  }
  const ships = loadShipments();
  const newShip = {
    id:'s'+Date.now(), type,
    name,
    from: (()=>{ const v=document.getElementById('ns-from').value; return v==='__other__' ? (document.getElementById('ns-from-custom').value.trim()||'未填') : v; })(),
    to: (()=>{
      if(isCN){ const v=document.getElementById('ns-to-cn').value; return v==='其他城市' ? (document.getElementById('ns-to-cn-custom').value.trim()||'其他') : v; }
      else { const v=document.getElementById('ns-to-intl').value; return v==='其他' ? (document.getElementById('ns-to-intl-custom').value.trim()||'其他') : v; }
    })(),
    customer: isCN ? document.getElementById('ns-customer').value.trim() : '',
    mode: isCN ? document.getElementById('ns-mode-cn').value : document.getElementById('ns-mode-intl').value,
    terms: isCN ? '' : document.getElementById('ns-terms').value,
    agent: isCN
      ? (MODE_LABEL[document.getElementById('ns-mode-cn').value]||'快遞')
      : (document.getElementById('ns-agent-intl').value||'未選擇'),
    trackingNo: isCN ? document.getElementById('ns-tracking').value.trim() : '',
    po: document.getElementById('ns-po').value.trim(),
    order: document.getElementById('ns-order').value.trim(),
    etd: isCN ? document.getElementById('ns-etd-cn').value : document.getElementById('ns-etd').value,
    eta: isCN ? document.getElementById('ns-eta-cn').value : document.getElementById('ns-eta').value,
    boxes: document.getElementById('ns-boxes').value,
    weight: document.getElementById('ns-weight').value,
    cbm: document.getElementById('ns-cbm').value,
    freight: document.getElementById('ns-freight').value,
    freightActual: '',
    entity: isCN ? '北京蕪解' : document.getElementById('ns-entity').value,
    stage: isCN ? 'packing' : 'factory',
    stageHistory: { [isCN?'packing':'factory']: new Date().toISOString().slice(0,10) },
    docs: isCN ? {} : {invoice:false,packing:false,bl:false,insurance:false},
    status: 'normal', note:'', escalation:null,
  };
  ships.unshift(newShip);
  saveShipments(ships);
  closeModal('modal-new');
  render();
  showToast(isCN ? `境內批次已建立，老董已收到通知 ✓` : '跨境批次已建立，安然已收到通知 ✓');
}

function openStatusUpdate(id){
  currentShipId = id;
  const s = loadShipments().find(x=>x.id===id);
  if(!s) return;
  const stages = getStages(s);
  document.getElementById('ms-title').textContent = `更新狀態：${s.name}`;
  const curIdx = stages.findIndex(st=>st.key===s.stage);
  const sel = document.getElementById('ms-stage');
  sel.innerHTML = stages.map((st,i)=>`<option value="${st.key}" ${i===curIdx+1?'selected':''}>${st.label}</option>`).join('');
  document.getElementById('ms-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('ms-note').value = '';
  // TP warning only for cross-border
  const tpWarn = document.getElementById('ms-tp-warn');
  const isCN = s.type==='domestic_cn';
  tpWarn.style.display = (!isCN && (s.stage==='customs_out'||sel.value==='customs_out')) ? 'flex' : 'none';
  document.getElementById('modal-status').classList.add('show');
}

function saveStatusUpdate(){
  const ships = loadShipments();
  const i = ships.findIndex(s=>s.id===currentShipId);
  if(i<0) return;
  const newStage = document.getElementById('ms-stage').value;
  const date = document.getElementById('ms-date').value;
  ships[i].stage = newStage;
  ships[i].stageHistory[newStage] = date;
  ships[i].note = document.getElementById('ms-note').value || ships[i].note;
  saveShipments(ships);
  closeModal('modal-status');
  render();
  const label = STAGES.find(s=>s.key===newStage)?.label||newStage;
  showToast(`已更新：${label} ✓（已推送通知）`);
}

function uploadDoc(id, docKey){
  const ships = loadShipments();
  const i = ships.findIndex(s=>s.id===id);
  if(i<0) return;
  ships[i].docs[docKey] = true;
  saveShipments(ships);
  render();
  showToast('文件已上傳 ✓（正式版支援 PDF/圖片）');
}

function confirmFreight(id){
  const actual = prompt('請輸入實際運費（例：¥5,200）：');
  if(!actual) return;
  const ships = loadShipments();
  const i = ships.findIndex(s=>s.id===id);
  if(i<0) return;
  ships[i].freightActual = actual;
  saveShipments(ships);
  render();
  showToast('實際運費已記錄，已通知躍明對帳 ✓');
}

function markDelivered(id){
  const ships = loadShipments();
  const i = ships.findIndex(s=>s.id===id);
  if(i<0) return;
  ships[i].stage = 'delivered';
  ships[i].stageHistory['delivered'] = new Date().toISOString().slice(0,10);
  saveShipments(ships);
  render();
  showToast('已標記交付完成，已通知老董/電商確認到貨 ✓');
}

function openEscalate(id){
  currentShipId = id;
  const s = loadShipments().find(x=>x.id===id);
  document.getElementById('esc-ship').value = s?.name||'';
  document.getElementById('esc-desc').value = '';
  document.getElementById('modal-escalate').classList.add('show');
}

function saveEscalation(){
  const ships = loadShipments();
  const i = ships.findIndex(s=>s.id===currentShipId);
  if(i<0) return;
  ships[i].status = 'alert';
  ships[i].escalation = {
    type: document.getElementById('esc-type').value,
    desc: document.getElementById('esc-desc').value,
    escalateTo: document.getElementById('esc-escalate').value,
    date: new Date().toISOString().slice(0,10),
  };
  ships[i].note = `⚠ 卡關升級：${document.getElementById('esc-desc').value}`;
  saveShipments(ships);
  closeModal('modal-escalate');
  render();
  showToast('🚨 已緊急通報安然/Ray，戰情室警報已觸發');
}

function closeModal(id){ document.getElementById(id).classList.remove('show'); }

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

function renderInventory(){
  const isPopup = currentInvType==='popup';

  // ── 總貨值計算 ──
  let valGroups = {}; // ccy → {cost, rev}
  const allSkus = isPopup
    ? POPUP_STORES.flatMap(s=>s.skus)
    : INV_WHOLESALE;
  allSkus.forEach(r=>{
    const qty = r.factory + r.bj + r.bkk;
    const c = r.ccy||'CNY';
    if(!valGroups[c]) valGroups[c]={cost:0,rev:0};
    valGroups[c].cost += qty * (r.cost||0);
    valGroups[c].rev  += qty * (r.price||0);
  });
  const valueBodyHtml = Object.entries(valGroups).map(([ccy,v])=>`
    <div style="flex:1;min-width:140px;">
      <div style="font-size:10px;color:var(--txt-lo);margin-bottom:3px;">${ccy} · ${isPopup?'快閃':'批發'}</div>
      <div style="font-size:22px;font-weight:800;color:var(--warn);">${ccy==='CNY'?'¥':''}${ccy==='THB'?'฿':''}${Math.round(v.cost).toLocaleString()}</div>
      <div style="font-size:10px;color:var(--txt-lo);margin-top:2px;">成本貨值</div>
      <div style="font-size:14px;font-weight:700;color:var(--ok);margin-top:6px;">${ccy==='CNY'?'¥':''}${ccy==='THB'?'฿':''}${Math.round(v.rev).toLocaleString()}</div>
      <div style="font-size:10px;color:var(--txt-lo);margin-top:2px;">潛在收入（全賣完）</div>
      <div style="font-size:10px;color:var(--indigo);margin-top:4px;">毛利空間 ${ccy==='CNY'?'¥':''}${ccy==='THB'?'฿':''}${Math.round(v.rev-v.cost).toLocaleString()}</div>
    </div>
  `).join('<div style="width:1px;background:var(--border);align-self:stretch;margin:0 4px;"></div>');
  document.getElementById('inv-value-body').innerHTML = valueBodyHtml;

  if(isPopup){
    // ── 快閃店：按場次 accordion ──
    document.getElementById('inv-table-title').textContent = '快閃店庫存 · 按場次';
    const totalSkus = POPUP_STORES.reduce((s,st)=>s+st.skus.length,0);
    document.getElementById('inv-table-sub').textContent = `${POPUP_STORES.length} 個場次 · ${totalSkus} 個 SKU`;

    const STATUS_MAP={active:{cls:'status-active',txt:'進行中'},prep:{cls:'status-prep',txt:'籌備中'},ended:{cls:'status-ended',txt:'已結束'}};

    const html = POPUP_STORES.map(store=>{
      const st = STATUS_MAP[store.status]||STATUS_MAP.prep;
      // Store totals
      const storeVals={};
      store.skus.forEach(r=>{
        const qty=r.factory+r.bj+r.bkk;
        const c=r.ccy||'CNY';
        if(!storeVals[c])storeVals[c]={qty:0,cost:0,rev:0};
        storeVals[c].qty+=qty;
        storeVals[c].cost+=qty*(r.cost||0);
        storeVals[c].rev+=qty*(r.price||0);
      });
      const ccy=store.skus[0]?.ccy||'CNY';
      const sym=ccy==='THB'?'฿':'¥';
      const sv=storeVals[ccy]||{qty:0,cost:0,rev:0};

      // SKU sub-table rows
      const skuRows = store.skus.map(r=>{
        const qty=r.factory+r.bj+r.bkk;
        const costVal=qty*(r.cost||0);
        const revVal=qty*(r.price||0);
        const badge=`<span class="inv-tag" style="background:${r.ip_color}20;color:${r.ip_color}">${r.ip}</span>`;
        return `<tr>
          <td>${badge}</td>
          <td>${r.name}<div style="font-size:9px;color:var(--txt-lo);margin-top:1px;">${r.sku}</div></td>
          <td>${r.factory>0?r.factory.toLocaleString():'—'}</td>

          <td>${r.bkk>0?r.bkk.toLocaleString():'—'}</td>

          <td>${sym}${r.cost}</td>

          <td class="rev-val">${sym}${Math.round(revVal).toLocaleString()}</td>
        </tr>`;
      }).join('');
      const skuTotCost=Object.values(storeVals).reduce((s,v)=>s+v.cost,0);
      const skuTotRev=Object.values(storeVals).reduce((s,v)=>s+v.rev,0);
      const totRow=`<tr class="tot-row">
        <td colspan="5" style="text-align:left;font-size:11px;">合計（${store.skus.length} SKU）</td>
        <td>${sv.qty.toLocaleString()}</td>
        <td>—</td>
        <td class="cost-val">${sym}${Math.round(skuTotCost).toLocaleString()}</td>
        <td>—</td>
        <td class="rev-val">${sym}${Math.round(skuTotRev).toLocaleString()}</td>
      </tr>`;

      return `
        <div class="store-row" id="store-row-${store.id}" onclick="toggleStore('${store.id}')">
          <span class="store-chev">▼</span>
          <div class="store-info">
            <div class="store-name">${store.name}</div>
            <div class="store-meta">${store.location} · ${store.dates} · ${store.skus.length} SKU</div>
          </div>
          <span class="store-status ${st.cls}">${st.txt}</span>
          <div class="store-vals">
            <div class="store-cost">成本 ${sym}${Math.round(sv.cost).toLocaleString()}</div>
            <div class="store-rev">潛收 ${sym}${Math.round(sv.rev).toLocaleString()}</div>
          </div>
        </div>
        <div class="sku-panel" id="sku-panel-${store.id}">
          <div style="overflow-x:auto;">
          <table class="sku-table">
            <thead><tr>
              <th style="text-align:left;">IP</th>
              <th style="text-align:left;">產品名稱 / SKU</th>
              <th>工廠</th><th>北京</th><th>泰國</th>
              <th>合計</th>
              <th>成本價</th><th>成本貨值</th>
              <th>售價</th><th>潛在收入</th>
            </tr></thead>
            <tbody>${skuRows}${totRow}</tbody>
          </table>
          </div>
        </div>`;
    }).join('');
    document.getElementById('inv-table-wrap').innerHTML = html +
      `<div style="padding:10px 14px;font-size:10px;color:var(--txt-lo);">⓵ 點擊場次列可展開所有 SKU 明細。API 接入後顯示飛書真實庫存與成本。</div>`;

  } else {
    // ── 批發：flat table with cost + price ──
    document.getElementById('inv-table-title').textContent = '批發產品庫存明細';
    document.getElementById('inv-table-sub').textContent = `${INV_WHOLESALE.length} 個 SKU`;
    const rows = INV_WHOLESALE.map(r=>{
      const qty=r.factory+r.bj+r.bkk;
      const costVal=qty*r.cost;
      const revVal=qty*r.price;
      const badge=`<span class="inv-tag" style="background:${r.ip_color}20;color:${r.ip_color}">${r.ip}</span>`;
      return `<tr>
        <td>${badge}</td>
        <td style="font-weight:700;">${r.name}<div style="font-size:9px;color:var(--txt-lo);margin-top:1px;">${r.sku}</div></td>
        <td class="num ok">${r.factory>0?r.factory.toLocaleString():'—'}</td>
        <td class="num">${r.bj>0?r.bj.toLocaleString():'—'}</td>
        <td class="num">${r.bkk>0?r.bkk.toLocaleString():'—'}</td>
        <td class="num" style="color:var(--txt-hi);">${qty.toLocaleString()}</td>
        <td class="num">¥${r.cost}</td>
        <td class="num" style="color:var(--warn);font-weight:700;">¥${Math.round(costVal).toLocaleString()}</td>
        <td class="num">¥${r.price}</td>
        <td class="num" style="color:var(--ok);font-weight:700;">¥${Math.round(revVal).toLocaleString()}</td>
      </tr>`;
    }).join('');
    const totQty=INV_WHOLESALE.reduce((s,r)=>s+(r.factory+r.bj+r.bkk),0);
    const totCost=INV_WHOLESALE.reduce((s,r)=>s+(r.factory+r.bj+r.bkk)*r.cost,0);
    const totRev=INV_WHOLESALE.reduce((s,r)=>s+(r.factory+r.bj+r.bkk)*r.price,0);
    const totRow=`<tr style="font-weight:800;border-top:1px solid var(--border-hi);">
      <td colspan="2" style="color:var(--txt-hi);">合計</td>
      <td colspan="3"></td>
      <td class="num" style="color:var(--txt-hi);">${totQty.toLocaleString()}</td>
      <td></td>
      <td class="num" style="color:var(--warn);">¥${Math.round(totCost).toLocaleString()}</td>
      <td></td>
      <td class="num" style="color:var(--ok);">¥${Math.round(totRev).toLocaleString()}</td>
    </tr>`;
    document.getElementById('inv-table-wrap').innerHTML = `<div style="overflow-x:auto;">
      <table class="inv-table">
        <thead><tr>
          <th>IP</th><th>產品名稱</th>
          <th style="text-align:right;">工廠</th><th style="text-align:right;">北京</th><th style="text-align:right;">泰國</th>
          <th style="text-align:right;">合計</th>
          <th style="text-align:right;">成本價</th><th style="text-align:right;">成本貨值</th>
          <th style="text-align:right;">售價</th><th style="text-align:right;">潛在收入</th>
        </tr></thead>
        <tbody>${rows}${totRow}</tbody>
      </table>
      </div>
      <div style="padding:10px 14px;font-size:10px;color:var(--txt-lo);">⓵ 工廠寄存為主力庫存（客戶下單直發）。成本 / 售價為 demo 數據，API 接入後替換飛書真實成本。</div>`;
  }
}

render();
</script>

  const u=getUser();const r=EXP_ROUTES[u]||{next:'yangzi',nextLabel:'楊子',cc:null};
  const proj=window.getSelectedProject?window.getSelectedProject('expProject'):null;
  if(!proj){alert('請選擇對應項目（所有費用必須掛項目下）\n\n若還沒有項目，請先到「+ 新增項目」建立。');return;}
  let rec;
  if(expType==='personal'){
    const amt=document.getElementById('expAmt').value;
    const ccy=document.getElementById('expCcy').value;
    const cat=document.getElementById('expCat').options[document.getElementById('expCat').selectedIndex].text;
    const date=document.getElementById('expDate').value;
    const desc=document.getElementById('expDesc').value;
    const subj=document.getElementById('expBudgetSubject').value;
    if(!amt||!date){(window.showToast||window._toast||alert)('請填寫金額與日期');return;}
    if(!subj){(window.showToast||window._toast||alert)('請選擇預算科目（財務入帳用）');return;}
    rec={type:'個人報銷',user:u,amt,ccy,cat,date,desc,subject:subj,next:r.next,cc:r.cc,ts:Date.now()};
  }else{
    const name=document.getElementById('expSupName').value;
    const po=document.getElementById('expSupPO').value;
    const amt=document.getElementById('expSupAmt').value;
    const ccy=document.getElementById('expSupCcy').value;
    const desc=document.getElementById('expSupDesc').value;
    if(!name||!amt){(window.showToast||window._toast||alert)('請填寫供應商名稱與金額');return;}
    rec={type:'供應商付款申請',user:u,supplier:name,po,amt,ccy,desc,subject:'倉儲物流費',next:r.next,cc:r.cc,ts:Date.now()};
  }
  const key='erp_expense_queue';
  const q=JSON.parse(localStorage.getItem(key)||'[]');
  q.push(rec);localStorage.setItem(key,JSON.stringify(q));
  const _gcy={'TWD':'TWD','HKD':'HKD','USD':'USD','THB':'THB','CNY':'CNY','RMB':'CNY'}[rec.ccy]||'CNY';
  const _gapp=_GAPPROVER[rec.next]||'楊子';
  _gWriteApproval({'標題':`【${rec.type}】${rec.user} ${rec.amt}${rec.ccy}`,'審批標題':`【${rec.type}】${rec.user} ${rec.amt}${rec.ccy}`,'審批類型':'費用申請','申請人':rec.user,'申請日期':Date.now(),'金額':parseFloat(rec.amt)||0,'幣別':_gcy,'審批人':_gapp,'審批狀態':'待審批','Email已發送':'否','申請說明':rec.desc||rec.cat||'','預算科目':rec.subject||'','對應項目':proj.name,'對應項目ID':proj.id});
  closeExpModal();
  (window.showToast||window._toast||alert)(`✅ 申請已送出 · 待 ${r.nextLabel} 審核`);
}
window.openExpModal=openExpModal;window.closeExpModal=closeExpModal;window.setExpType=setExpType;window.submitExpense=submitExpense;
})();
</script>
