<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>項目管理中心 — 蕪解</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
/* ── breadcrumb ── */
.breadcrumb{background:#fff;border-bottom:1px solid #f1f5f9;padding:6px 24px;font-size:12px;color:#94a3b8;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.breadcrumb a{color:#64748b;text-decoration:none}.breadcrumb a:hover{color:#6366f1}.breadcrumb .sep{color:#cbd5e1;margin:0 1px}.breadcrumb .cur{color:#0f172a;font-weight:600}
.contract-badge-ok{background:#f0fdf4;color:#166534;border:1px solid #10b981}
.contract-badge-warn{background:#fff7ed;color:#92400e;border:1px solid #f59e0b}
/* ── topbar ── */
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px #0000000a}
.tb-title{font-size:17px;font-weight:700;color:#0f172a}
.tb-actions{display:flex;gap:8px;align-items:center}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.btn:hover{opacity:.85}
.btn-primary{background:#6366f1;color:#fff}
.btn-ghost{background:#fff;color:#64748b;border:1px solid #e2e8f0}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-danger{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
/* ── stats ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:16px 24px}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px;box-shadow:0 1px 4px #0000000a}
.stat-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px}
.stat-val{font-size:22px;font-weight:700;margin:4px 0}
.stat-sub{font-size:11px;color:#94a3b8}
/* ── filters ── */
.filters{padding:0 24px 12px;display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{background:#fff;border:1px solid #e2e8f0;color:#64748b;padding:5px 14px;border-radius:20px;cursor:pointer;font-size:12px;transition:all .15s}
.filter-btn.active{background:#6366f115;border-color:#6366f1;color:#6366f1;font-weight:600}
/* ── project cards ── */
.projects{padding:0 24px 40px}
.proj-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;margin-bottom:12px;overflow:hidden;transition:box-shadow .15s;box-shadow:0 1px 4px #0000000a}
.proj-card:hover{box-shadow:0 4px 16px #00000014}
.proj-header{padding:16px 20px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start;cursor:pointer}
.proj-ip{background:#f1f5f9;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;white-space:nowrap}
.proj-name{font-size:15px;font-weight:600;color:#0f172a}
.proj-meta{font-size:12px;color:#64748b;margin-top:2px}
.proj-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
/* ── progress ── */
.proj-progress{padding:0 20px 16px}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:#94a3b8;margin-bottom:4px}
.prog-bar{background:#f1f5f9;border-radius:4px;height:8px}
.prog-fill{height:8px;border-radius:4px;transition:width .4s}
/* ── subtasks ── */
.subtasks{border-top:1px solid #e2e8f0;display:none}
.subtasks.open{display:block}
.st-tabs{display:flex;gap:0;border-bottom:1px solid #e2e8f0;background:#f8fafc}
.st-tab{padding:8px 16px;font-size:12px;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.st-tab.active{color:#6366f1;border-bottom-color:#6366f1;font-weight:600}
.st-body{padding:16px 20px;min-height:60px}
.st-table{width:100%;border-collapse:collapse;font-size:12px}
.st-table th{color:#64748b;font-weight:600;padding:6px 8px;text-align:left;font-size:11px;border-bottom:1px solid #e2e8f0}
.st-table td{padding:8px;border-bottom:1px solid #f1f5f9;vertical-align:middle;color:#0f172a}
.empty-msg{color:#94a3b8;text-align:center;padding:20px;font-size:13px}
/* ── modal ── */
.overlay{display:none;position:fixed;inset:0;background:#0008;z-index:500;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;width:min(600px,95vw);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px #00000020}
.modal-title{font-size:16px;font-weight:700;color:#0f172a;margin-bottom:20px;display:flex;justify-content:space-between}
.close-btn{background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer}
.close-btn:hover{color:#0f172a}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:#64748b;margin-bottom:5px;font-weight:600}
.field input,.field select,.field textarea{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;color:#0f172a;font-size:13px;outline:none}
.field input:focus,.field select:focus{border-color:#6366f1;background:#fff}
.field textarea{min-height:70px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
/* ── toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:12px 20px;font-size:13px;color:#0f172a;z-index:999;display:none;animation:fadeIn .2s;box-shadow:0 4px 20px #00000015}
.toast.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(max-width:600px){.row2{grid-template-columns:1fr}.proj-header{grid-template-columns:1fr auto}}
</style>
</head>
<body>

<div class="breadcrumb">
  <a href="home.html">🏠 首頁</a><span class="sep">›</span>
  <span class="cur">📋 項目管理中心</span>
</div>
<div class="topbar">
  <div class="tb-title">📋 項目管理中心</div>
  <div class="tb-actions">
    <span id="tb-user" style="font-size:12px;color:#64748b"></span>
    <button class="btn btn-primary" onclick="openModal()">＋ 新增項目</button>
    <a href="forms/index.html" class="btn btn-ghost" style="text-decoration:none">📝 填報中心</a>
    <a href="dashboard.html" class="btn btn-ghost" style="text-decoration:none">← 儀表板</a>
    <a href="login.html" class="btn btn-ghost" style="text-decoration:none" onclick="localStorage.removeItem('wujie_session')">登出</a>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="filters" id="filters">
  <span class="filter-btn active" data-type="全部" onclick="setFilter(this,'全部')">全部</span>
  <span class="filter-btn" data-type="批發"    onclick="setFilter(this,'批發')">批發</span>
  <span class="filter-btn" data-type="快閃店"  onclick="setFilter(this,'快閃店')">快閃店</span>
  <span class="filter-btn" data-type="代工"    onclick="setFilter(this,'代工')">代工</span>
  <span class="filter-btn" data-type="設計服務" onclick="setFilter(this,'設計服務')">設計服務</span>
  <span class="filter-btn" data-type="授權"    onclick="setFilter(this,'授權')">授權</span>
</div>

<div class="projects" id="projects"><div style="text-align:center;padding:60px;color:#475569">載入中...</div></div>

<!-- 新增/編輯 Modal -->
<div class="overlay" id="overlay">
<div class="modal">
  <div class="modal-title">
    <span id="modal-title-text">新增項目</span>
    <button class="close-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="field"><label>案件名稱 *</label><input id="m-name" placeholder="例：Snoopy 公仔 2026 Q2"></div>

  <!-- ① 版權方 -->
  <div class="field">
    <label>① 版權方 *</label>
    <select id="m-licensor-sel"><option value="">載入中…</option></select>
    <div style="font-size:11px;color:#94a3b8;margin-top:3px">先選版權方，下方合約清單自動篩選</div>
  </div>
  <!-- Gate Level 1 -->
  <div id="m-gate" style="display:none;background:#fff7ed;border:1.5px solid #f59e0b;border-radius:10px;padding:14px 16px;margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:6px" id="m-gate-title"></div>
    <div style="font-size:12px;color:#78350f;margin-bottom:10px" id="m-gate-msg"></div>
    <a id="m-gate-link" href="#" target="_blank"
      style="display:inline-block;background:#f59e0b;color:#fff;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;text-decoration:none">前往補齊 →</a>
  </div>

  <!-- ② 合約（版權方選後出現） -->
  <div id="m-step2" style="display:none">
    <div class="field">
      <label>② 合約 *</label>
      <select id="m-contract"><option value="">— 選擇合約 —</option></select>
      <span id="contract-status-badge" style="display:none;margin-top:4px;font-size:11px;padding:2px 10px;border-radius:12px;font-weight:700"></span>
      <!-- Gate Level 2 -->
      <div id="m-gate2" style="display:none;background:#fff7ed;border:1.5px solid #f59e0b;border-radius:10px;padding:12px 14px;margin-top:8px">
        <div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:4px" id="m-gate2-title"></div>
        <div style="font-size:12px;color:#78350f;margin-bottom:8px" id="m-gate2-msg"></div>
        <a id="m-gate2-link" href="#" target="_blank"
          style="display:inline-block;background:#f59e0b;color:#fff;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;text-decoration:none">前往補齊 →</a>
      </div>
    </div>
    <!-- 合約摘要 -->
    <div id="m-contract-info" style="display:none;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;font-size:12px;color:#475569;margin-bottom:10px;line-height:1.8">
      <span id="m-info-licensor"></span><br>
      <span id="m-info-cats"></span><br>
      <span id="m-info-region"></span>
    </div>
  </div>
  <!-- hidden IP (auto-filled from contract) -->
  <input type="hidden" id="m-ip">
  <div class="row2">
    <div class="field"><label>業務類型</label>
      <select id="m-type">
        <option>批發</option><option>快閃店</option><option>代工</option>
        <option>設計服務</option><option>授權</option><option>其他</option>
      </select></div>
    <div class="field"><label>所在地</label>
      <select id="m-loc">
        <option>台北</option><option>北京</option><option>曼谷</option><option>跨地區</option>
      </select></div>
  </div>
  <div class="field"><label>負責人</label><input id="m-owner" placeholder="Shawn / Ray / 安然..."></div>
  <div class="row2">
    <div class="field"><label>開始日期</label><input type="date" id="m-start"></div>
    <div class="field"><label>截止日期</label><input type="date" id="m-end"></div>
  </div>
  <div class="field"><label>當前關卡</label>
    <select id="m-stage"><option>IP決策中</option><option>預算規劃</option><option>概念提案</option><option>跨部門確認</option><option>設計送審</option><option>採購詢價</option><option>預算確認</option><option>打樣/開模</option><option>市場收單</option><option>大貨生產</option><option>出貨物流</option><option>銷售推廣</option><option>已完成</option><option>已暫停</option></select></div>
  <div class="field"><label>目前狀態</label>
    <select id="m-status">
      <option>計劃中</option><option>進行中</option><option>已延遲</option>
      <option>已完成</option><option>已取消</option>
    </select></div>
  <div class="field"><label>備註 / 項目說明</label><textarea id="m-note" placeholder="項目背景、目標、注意事項..."></textarea></div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="saveProject()">儲存</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const APP_TOKEN="YlVkb0ACjacJVqsgRT5j4c6gpeh";
const PROXY="https://feishu-proxy.raychou6913.workers.dev";
const FEISHU=PROXY+"/open-apis";
const TABLES={"project": "tblYBjAlemYPuNGy", "design": "tblTEoNLDvtYi4pX", "procure": "tblae5v8pGMXleJZ", "stock": "tblsmZ7S5cNiYN4Y", "sales": "tblRtqmbO9TO3sYZ", "approval": "tblD6acV3m2ZXJHe", "ip_db": "tblHPNUTdcFa7tqs", "contract": "tbltnJNDhRNwVkZC"};
const STAGES=["IP\u6c7a\u7b56\u4e2d", "\u9810\u7b97\u898f\u5283", "\u6982\u5ff5\u63d0\u6848", "\u8de8\u90e8\u9580\u78ba\u8a8d", "\u8a2d\u8a08\u9001\u5be9", "\u63a1\u8cfc\u8a62\u50f9", "\u9810\u7b97\u78ba\u8a8d", "\u6253\u6a23/\u958b\u6a21", "\u5e02\u5834\u6536\u55ae", "\u5927\u8ca8\u751f\u7522", "\u51fa\u8ca8\u7269\u6d41", "\u92b7\u552e\u63a8\u5ee3", "\u5df2\u5b8c\u6210", "\u5df2\u66ab\u505c"];
const STAGE_IDX=Object.fromEntries(STAGES.map((s,i)=>[s,i]));

// 登入驗證
(function(){
  const s=JSON.parse(localStorage.getItem("wujie_session")||"null");
  if(!s||Date.now()>s.expires){localStorage.removeItem("wujie_session");location.replace("login.html");return;}
  const el=document.getElementById("tb-user");
  if(el) el.textContent=s.name+"（"+s.dept+"）";
})();

let token="", projects=[], subtaskCache={}, editingId=null, currentFilter="全部", ipBrands=[];

const IP_COLOR_BASE={
  "Snoopy":"#f59e0b","Mofusand":"#ec4899","Chiikawa":"#6366f1",
  "Labubu":"#10b981","Fuggler":"#8b5cf6","EVE點點":"#06b6d4","其他":"#64748b"
};
const _IP_PALETTE=["#0ea5e9","#d946ef","#f97316","#84cc16","#14b8a6","#e11d48","#7c3aed"];
function getIpColor(name){
  if(IP_COLOR_BASE[name]) return IP_COLOR_BASE[name];
  let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))&0xffffffff;
  return _IP_PALETTE[Math.abs(h)%_IP_PALETTE.length];
}
const IP_COLOR=new Proxy(IP_COLOR_BASE,{get:(t,k)=>t[k]||getIpColor(k)});
const STATUS_COLOR={
  "計劃中":"#6366f1","進行中":"#10b981","已延遲":"#ef4444","已完成":"#64748b","已取消":"#374151"
};
const TYPE_COLOR={
  "批發":"#6366f1","快閃店":"#f59e0b","代工":"#10b981","設計服務":"#ec4899","授權":"#8b5cf6","其他":"#64748b"
};

async function getToken(){
  const r=await fetch(PROXY+"/auth/token",{
    method:"POST",headers:{"Content-Type":"application/json"},body:"{}"
  });
  token=(await r.json()).tenant_access_token;
}

async function loadIpBrands(){
  if(ipBrands.length) return ipBrands;
  if(!token) await getToken();
  const r=await fetch(FEISHU+`/bitable/v1/apps/${APP_TOKEN}/tables/${TABLES.ip_db}/records?page_size=100`,
    {headers:{"Authorization":"Bearer "+token}});
  const d=await r.json();
  ipBrands=(d.data?.items||[]).map(rec=>{
    const f=rec.fields||{};
    const nv=f["IP名稱"]; const name=Array.isArray(nv)?nv[0]?.text||"":String(nv||"");
    const lv=f["版權方"]; const licensor=Array.isArray(lv)?lv[0]?.text||"":String(lv||"");
    const av=f["版權代理商"]; const agent=Array.isArray(av)?av[0]?.text||"":String(av||"");
    const cascadeLicensor=agent||licensor;
    return name?{name,licensor,agent,cascadeLicensor}:null;
  }).filter(Boolean);
  return ipBrands;
}

async function fetchAll(tableKey){
  const tid=TABLES[tableKey];
  let all=[],pt=null;
  while(true){
    const params=pt?`?page_size=100&page_token=${pt}`:"?page_size=100";
    const r=await fetch(FEISHU+`/bitable/v1/apps/${APP_TOKEN}/tables/${tid}/records`+params,
      {headers:{"Authorization":"Bearer "+token}});
    const d=await r.json();
    if(d.code!==0) break;
    all=all.concat(d.data.items||[]);
    if(!d.data.has_more) break;
    pt=d.data.page_token;
  }
  return all;
}

function fv(rec,key,def=""){
  const v=rec?.fields?.[key];
  if(v==null) return def;
  if(Array.isArray(v)) return v.map(i=>typeof i==="object"?i.text||"":i).join(", ");
  if(typeof v==="object"&&v.text) return v.text;
  return String(v);
}
function fn(rec,key){ return parseFloat(fv(rec,key,"0"))||0; }
function tsToDate(ts){ if(!ts) return ""; return new Date(ts).toISOString().split("T")[0]; }
function dateToTs(s){ return s?new Date(s).getTime():null; }

async function loadProjects(){
  await getToken();
  projects=(await fetchAll("project")).filter(r=>fv(r,"項目名稱"));
  renderStats();
  renderProjects();
}

function renderStats(){
  const active=projects.filter(p=>fv(p,"狀態")==="進行中").length;
  const delayed=projects.filter(p=>fv(p,"狀態")==="已延遲").length;
  document.getElementById("stats").innerHTML=`
    <div class="stat"><div class="stat-label">總項目</div>
      <div class="stat-val" style="color:#6366f1">${projects.length}</div></div>
    <div class="stat"><div class="stat-label">進行中</div>
      <div class="stat-val" style="color:#10b981">${active}</div></div>
    <div class="stat"><div class="stat-label">已延遲</div>
      <div class="stat-val" style="color:#ef4444">${delayed}</div></div>
  `;
}

function setFilter(el,type){
  currentFilter=type;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  renderProjects();
}

function renderProjects(){
  const list=currentFilter==="全部"?projects:projects.filter(p=>fv(p,"業務類型")===currentFilter);
  if(!list.length){
    document.getElementById("projects").innerHTML='<div class="empty-msg">📭 此類別暫無項目</div>';
    return;
  }
  document.getElementById("projects").innerHTML=list.map(p=>renderCard(p)).join("");
}

function renderCard(p){
  const id=p.record_id;
  const name=fv(p,"項目名稱","未命名");
  const ip=fv(p,"IP品牌","—");
  const type=fv(p,"業務類型","—");
  const status=fv(p,"狀態","計劃中");
  const stage=fv(p,"當前關卡","—");
  const stageIdx=STAGE_IDX[stage]??-1;
  const stageTotal=STAGES.length-2;  // 排除「已完成」「已暫停」
  const isFinished=stage==="已完成"||stage==="已暫停";
  const stagePct=isFinished?100:stageIdx>=0?Math.round((stageIdx+1)/stageTotal*100):0;
  const stageLabel=isFinished?stage:(stageIdx>=0?`第 ${stageIdx+1} 關 / ${stageTotal} 關`:"未設定");
  const owner=fv(p,"負責人","—");
  const loc=fv(p,"所在地","—");
  const start=tsToDate(fn(p,"開始日期")||null);
  const end=tsToDate(fn(p,"截止日期")||null);
  const ipColor=IP_COLOR[ip]||"#64748b";
  const stColor=STATUS_COLOR[status]||"#64748b";
  const tyColor=TYPE_COLOR[type]||"#64748b";
  return `<div class="proj-card" id="card-${id}">
    <div class="proj-header" onclick="toggleSubtasks('${id}','${name}')">
      <div>
        <span class="proj-ip" style="color:${ipColor};border:1px solid ${ipColor}40">${ip}</span>
        <span style="margin-left:6px;background:${tyColor}22;color:${tyColor};padding:3px 8px;border-radius:6px;font-size:11px">${type}</span>
      </div>
      <div>
        <div class="proj-name">${name}</div>
        <div class="proj-meta">${owner} · ${loc}${start?" · "+start:""}&nbsp;→&nbsp;${end||"未定"}</div>
      </div>
      <div class="proj-right">
        <span class="badge" style="background:#f1f5f9;border:1px solid #e2e8f0;color:#64748b;font-size:10px" title="流程進度 ${stageIdx+1}/${stageTotal}">📍 ${stage}</span>
        <span class="badge" style="background:${stColor}22;color:${stColor}">${status}</span>
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openModal('${id}')" style="padding:4px 10px">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteProject('${id}','${name}')" style="padding:4px 10px">🗑</button>
      </div>
    </div>
    <div class="proj-progress">
      <div class="prog-row"><span>流程進度</span><span style="color:#6366f1;font-weight:600">${stageLabel}</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${stagePct}%;background:#6366f1"></div></div>
    </div>
    <div class="subtasks" id="sub-${id}">
      <div class="st-tabs" id="tabs-${id}">
        <div class="st-tab active" onclick="switchTab('${id}','sales',this)">🎯 銷售</div>
        <div class="st-tab" onclick="switchTab('${id}','design',this)">🎨 設計</div>
        <div class="st-tab" onclick="switchTab('${id}','procure',this)">🛒 採購</div>
        <div class="st-tab" onclick="switchTab('${id}','stock',this)">📦 庫存</div>
        <div class="st-tab" onclick="switchTab('${id}','approval',this)">🔔 審批</div>
      </div>
      <div class="st-body" id="stbody-${id}"><div class="empty-msg">載入中...</div></div>
    </div>
  </div>`;
}

async function toggleSubtasks(id, name){
  const el=document.getElementById("sub-"+id);
  if(el.classList.contains("open")){ el.classList.remove("open"); return; }
  el.classList.add("open");
  if(!subtaskCache[id]){
    await loadSubtasks(id, name);
  }
  renderSubtask(id,"sales");
}

async function loadSubtasks(projId, projName){
  const tables=["sales","design","procure","stock","approval"];
  const cache={};
  for(const t of tables){
    const all=await fetchAll(t);
    cache[t]=all.filter(r=>{
      const linked=fv(r,"項目關聯")||fv(r,"項目名稱")||"";
      return linked && projName && linked.includes(projName.split(" ")[0]);
    });
  }
  subtaskCache[projId]=cache;
}

function switchTab(id,type,el){
  document.querySelectorAll(`#tabs-${id} .st-tab`).forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  renderSubtask(id,type);
}

function renderSubtask(id,type){
  const body=document.getElementById("stbody-"+id);
  const data=subtaskCache[id]?.[type]||[];
  if(!data.length){
    body.innerHTML='<div class="empty-msg">此項目尚無相關資料，請至<a href="forms/index.html" style="color:#6366f1">填報中心</a>填寫</div>';
    return;
  }
  const headers={
    sales:   ["客戶","產品","金額","幣別","帳期","狀態"],
    design:  ["設計名稱","類型","設計師","提交日","狀態","版本"],
    procure: ["品項","數量","議定價","幣別","狀態","到貨日"],
    stock:   ["品項","倉庫","現有庫存","單位","物流狀態","報關"],
    approval:["標題","申請人","金額","申請日","審批人","狀態"],
  };
  const rowFns={
    sales:   r=>[fv(r,"客戶名稱"),fv(r,"產品/項目"),fn(r,"總金額").toLocaleString(),fv(r,"幣別"),fv(r,"帳期"),fv(r,"訂單狀態")],
    design:  r=>[fv(r,"設計名稱"),fv(r,"設計類型"),fv(r,"設計師/供應商"),fv(r,"提交日期"),fv(r,"審核狀態"),fv(r,"版本號")],
    procure: r=>[fv(r,"採購品項"),fn(r,"採購數量"),fn(r,"議定價格").toLocaleString(),fv(r,"幣別"),fv(r,"採購狀態"),fv(r,"預計到貨日")],
    stock:   r=>[fv(r,"品項名稱"),fv(r,"所在倉庫"),fn(r,"現有庫存"),fv(r,"單位"),fv(r,"物流狀態"),fv(r,"報關狀態")],
    approval:r=>[fv(r,"審批標題"),fv(r,"申請人"),fn(r,"金額").toLocaleString(),fv(r,"申請日期"),fv(r,"審批人"),fv(r,"審批狀態")],
  };
  const ths=headers[type].map(h=>`<th>${h}</th>`).join("");
  const trs=data.map(r=>{
    const vals=rowFns[type](r);
    return "<tr>"+vals.map(v=>`<td>${v||"—"}</td>`).join("")+"</tr>";
  }).join("");
  body.innerHTML=`<table class="st-table"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}

// ── contracts helper ─────────────────────────────────────────
let contractsCache=null;
async function fetchContracts(){
  if(contractsCache) return contractsCache;
  if(!token) await getToken();
  const r=await fetch(FEISHU+`/bitable/v1/apps/${APP_TOKEN}/tables/${TABLES.contract}/records?page_size=200`,
    {headers:{"Authorization":"Bearer "+token}});
  const d=await r.json();
  const t=v=>Array.isArray(v)?v[0]?.text||"":String(v||"");
  contractsCache=(d.data?.items||[]).map(rec=>{
    const f=rec.fields||{};
    const name=t(f["合約名稱"]); if(!name) return null;
    return {name,ip:t(f["IP品牌"]),licensor:t(f["版權方"]),
            status:t(f["合約狀態"]),cats:t(f["授權品類"]),region:t(f["授權地區"])};
  }).filter(Boolean);
  return contractsCache;
}

function _setGate(show, title="", msg="", link="", linkLabel="前往補齊 →"){
  const gate=document.getElementById("m-gate");
  const saveBtn=document.querySelector(".modal .btn-primary");
  gate.style.display=show?"block":"none";
  if(show){
    document.getElementById("m-gate-title").textContent=title;
    document.getElementById("m-gate-msg").textContent=msg;
    const a=document.getElementById("m-gate-link");
    a.href=link; a.textContent=linkLabel;
    if(saveBtn) saveBtn.disabled=true;
  } else {
    if(saveBtn) saveBtn.disabled=false;
  }
}
function _setGate2(show, title="", msg="", link=""){
  const gate=document.getElementById("m-gate2");
  const saveBtn=document.querySelector(".modal .btn-primary");
  gate.style.display=show?"block":"none";
  if(show){
    document.getElementById("m-gate2-title").textContent=title;
    document.getElementById("m-gate2-msg").textContent=msg;
    document.getElementById("m-gate2-link").href=link;
    if(saveBtn) saveBtn.disabled=true;
  } else {
    if(saveBtn) saveBtn.disabled=false;
  }
}

async function loadContractsByLicensor(licensorName, selectedContract=""){
  const sel=document.getElementById("m-contract");
  const badge=document.getElementById("contract-status-badge");
  const info=document.getElementById("m-contract-info");
  sel.innerHTML='<option value="">載入中…</option>';
  badge.style.display="none"; info.style.display="none";
  if(!licensorName){sel.innerHTML='<option value="">— 先選版權方 —</option>';return;}
  const all=await fetchContracts();
  const list=all.filter(c=>c.licensor===licensorName);
  if(list.length===0){
    sel.innerHTML='<option value="">（此版權方尚無合約）</option>';
    _setGate2(true,
      "⚠️ 需要先建立合約",
      "「"+licensorName+"」目前沒有任何合約記錄。請先在合約管理中建立對應合約（任何狀態皆可），才能新增案件。",
      "forms/contract.html");
    return;
  }
  _setGate2(false);
  sel.innerHTML='<option value="">— 選擇合約 —</option>';
  list.forEach(c=>{
    const o=document.createElement("option");
    o.value=c.name;
    o.textContent="["+c.ip+"] "+c.name+(c.status?" · "+c.status:"");
    o.dataset.ip=c.ip; o.dataset.licensor=c.licensor;
    o.dataset.status=c.status; o.dataset.cats=c.cats; o.dataset.region=c.region;
    sel.appendChild(o);
  });
  if(selectedContract) sel.value=selectedContract;
  const syncInfo=()=>{
    const ch=sel.options[sel.selectedIndex];
    badge.style.display="none"; info.style.display="none";
    if(!ch?.value) return;
    const s=ch.dataset.status||"";
    const safe=["已簽署","執行中"];
    badge.style.display="inline-block"; badge.textContent=s;
    badge.style.cssText="display:inline-block;margin-top:4px;font-size:11px;padding:2px 10px;border-radius:12px;font-weight:700;"+
      (safe.includes(s)?"background:#f0fdf4;color:#166534;border:1px solid #10b981":"background:#fff7ed;color:#92400e;border:1px solid #f59e0b");
    // fill hidden IP
    document.getElementById("m-ip").value=ch.dataset.ip||"";
    info.style.display="block";
    document.getElementById("m-info-licensor").textContent="IP 品牌："+ch.dataset.ip+" ／ 版權方："+ch.dataset.licensor;
    document.getElementById("m-info-cats").textContent="授權品類："+(ch.dataset.cats||"—");
    document.getElementById("m-info-region").textContent="授權地區："+(ch.dataset.region||"—");
  };
  sel.onchange=syncInfo; syncInfo();
}

// ── 版權方 select helper ──────────────────────────────────────
async function populateLicensorSelect(selectedLicensor="", selectedContract=""){
  const sel=document.getElementById("m-licensor-sel");
  const brands=await loadIpBrands();
  if(brands.length===0){
    sel.innerHTML='<option value="">（版權方資料庫尚無資料）</option>';
    _setGate(true,
      "⚠️ 需要先建立版權方資料",
      "版權方資料庫目前是空的。請先新增至少一筆 IP 資料，才能建立合約與案件。",
      "forms/ip_db.html","前往版權方資料庫 →");
    return;
  }
  _setGate(false);
  // unique cascadeLicensors (agent if exists, else licensor)
  const licensors=[...new Set(brands.map(b=>b.cascadeLicensor||b.licensor).filter(Boolean))];
  sel.innerHTML='<option value="">— 選擇版權方 —</option>';
  licensors.forEach(l=>{
    const o=document.createElement("option"); o.value=l; o.textContent=l; sel.appendChild(o);
  });
  if(selectedLicensor) sel.value=selectedLicensor;
  sel.onchange=()=>{
    const step2=document.getElementById("m-step2");
    step2.style.display=sel.value?"block":"none";
    _setGate2(false);
    document.getElementById("m-contract-info").style.display="none";
    if(sel.value) loadContractsByLicensor(sel.value,"");
    else document.getElementById("m-contract").innerHTML='<option value="">— 先選版權方 —</option>';
  };
  if(selectedLicensor){
    document.getElementById("m-step2").style.display="block";
    await loadContractsByLicensor(selectedLicensor, selectedContract);
  }
}

// ── Modal CRUD ────────────────────────────────────────────────
function openModal(id=null){
  editingId=id;
  document.getElementById("modal-title-text").textContent=id?"編輯案件":"新增案件";
  document.getElementById("m-step2").style.display="none";
  document.getElementById("m-contract-info").style.display="none";
  const g2=document.getElementById("m-gate2"); if(g2) g2.style.display="none";
  if(id){
    const p=projects.find(x=>x.record_id===id);
    if(p){
      document.getElementById("m-name").value=fv(p,"項目名稱");
      populateLicensorSelect(fv(p,"版權方"), fv(p,"合約名稱"));
      document.getElementById("m-type").value=fv(p,"業務類型");
      document.getElementById("m-loc").value=fv(p,"所在地");
      document.getElementById("m-owner").value=fv(p,"負責人");
      const s=fn(p,"開始日期"); document.getElementById("m-start").value=s?tsToDate(s):"";
      const e=fn(p,"截止日期"); document.getElementById("m-end").value=e?tsToDate(e):"";
      document.getElementById("m-stage").value=fv(p,"當前關卡")||"IP決策中";
      document.getElementById("m-status").value=fv(p,"狀態")||"計劃中";
      document.getElementById("m-note").value=fv(p,"備註");
    }
  } else {
    document.getElementById("m-name").value="";
    document.getElementById("m-ip").value="";
    populateLicensorSelect("");
    document.getElementById("m-note").value="";
    const today=new Date().toISOString().split("T")[0];
    document.getElementById("m-start").value=today;
    document.getElementById("m-end").value="";
    document.getElementById("m-stage").value="IP決策中";
    document.getElementById("m-status").value="計劃中";
  }
  document.getElementById("overlay").classList.add("open");
}

function closeModal(){
  document.getElementById("overlay").classList.remove("open");
  editingId=null;
}

async function saveProject(){
  const name=document.getElementById("m-name").value.trim();
  if(!name){ alert("請填入案件名稱"); return; }
  if(!document.getElementById("m-licensor-sel").value){ alert("請先選擇版權方"); return; }
  const contractSel=document.getElementById("m-contract");
  if(!contractSel.value){ alert("請選擇依附的合約。\n\n若此版權方尚無合約，請先至「合約管理」建立一筆（任何狀態皆可）。"); return; }
  const contractChosen=contractSel.options[contractSel.selectedIndex];
  const fields={
    "項目名稱":  name,
    "合約名稱":  contractSel.value||"",
    "IP品牌":    contractChosen?.dataset?.ip||document.getElementById("m-ip").value||"",
    "版權方":    contractChosen?.dataset?.licensor||"",
    "業務類型":  document.getElementById("m-type").value,
    "所在地":    document.getElementById("m-loc").value,
    "負責人":    document.getElementById("m-owner").value,
    "開始日期":  dateToTs(document.getElementById("m-start").value),
    "截止日期":  dateToTs(document.getElementById("m-end").value),
    "當前關卡":  document.getElementById("m-stage").value,
    "狀態":      document.getElementById("m-status").value,
    "備註":      document.getElementById("m-note").value,
  };
  await getToken();
  let url=FEISHU+`/bitable/v1/apps/${APP_TOKEN}/tables/${TABLES.project}/records`;
  let method="POST"; let body=JSON.stringify({fields});
  if(editingId){
    url+="/"+editingId; method="PUT";
  }
  const r=await fetch(url,{method,headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},body});
  const d=await r.json();
  if(d.code===0){
    showToast(editingId?"✅ 項目已更新":"✅ 項目已新增");
    closeModal();
    await loadProjects();
  } else {
    showToast("❌ 儲存失敗："+d.msg);
  }
}

async function deleteProject(id, name){
  if(!confirm(`確定刪除「${name}」？此操作無法復原。`)) return;
  await getToken();
  const r=await fetch(FEISHU+`/bitable/v1/apps/${APP_TOKEN}/tables/${TABLES.project}/records/${id}`,{
    method:"DELETE",headers:{"Authorization":"Bearer "+token}
  });
  const d=await r.json();
  if(d.code===0){ showToast("🗑 項目已刪除"); await loadProjects(); }
  else showToast("❌ 刪除失敗："+d.msg);
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

document.getElementById("overlay").addEventListener("click",e=>{
  if(e.target===document.getElementById("overlay")) closeModal();
});

loadProjects();
</script>
